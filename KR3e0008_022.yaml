body:
  text: 辨發汗吐下後脈證并治第二十二辨發汗吐下後脈證并治第二十二此第十卷第二十二篇凡四十八證前三陰三陽篇中悉具載之此已下諸方於隨卷本證下雖已有緣止以加減言之未甚明白似於覽者檢閲未便今復校勘備列于後桂枝加葛根湯主之方葛根四兩芍藥二兩甘草二兩生薑三兩切大棗十二枚擘桂枝二兩去皮麻黃三兩去節右七味以水一斗先煮麻黃葛根減二升去上沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥餘如桂枝湯法桂枝加厚朴杏子湯方於桂枝湯方內加厚朴二兩杏仁五十箇去皮尖餘依前法桂枝加附子湯方於桂枝湯方內加附子一枚炮去皮破八片餘依前法朮附湯方附於此方內去桂枝加白朮四兩依前法桂枝去芍藥湯方於桂枝湯方內去芍藥餘依前法桂枝去芍藥加附子湯方於桂枝湯方內去芍藥加附子一枚炮去皮破八片餘依前法桂枝麻黃各半湯方桂枝一兩十六銖去皮芍藥生薑切甘草炙麻黃各一兩去節大棗四枚擘杏仁二十四箇湯浸去皮尖及兩仁者右七味以水五升先煮麻黃一二沸去上沫內諸藥煮取一升八合去滓溫服六合桂枝二麻黃一湯方桂枝一兩十七銖去皮芍藥一兩六銖麻黃十六銖去節生薑一兩六銖切杏仁十六箇去皮尖甘草一兩二銖炙大棗五枚擘右七味以水五升先煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升日再服白虎加人參湯方於白虎湯方內加人參三兩餘依白虎湯法桂枝去桂加茯苓白朮湯方於桂枝湯方內去桂枝加茯苓白朮各三兩餘依前法煎服小便利則愈已上九方病證並在第二卷內葛根加半夏湯方於葛根湯方內加入半夏半升餘依葛根湯法桂枝加芍藥生薑人參新加湯方於第二卷桂枝湯方內更加芍藥生薑各一兩人參三兩餘依桂枝湯法服梔子甘草豉湯方於梔子豉湯方內加入甘草二兩餘依前法得吐止後服梔子生薑豉湯方於梔子豉湯方內加生薑五兩餘依前法得吐止後服柴胡加芒硝湯方於小柴胡湯方內加芒硝六兩餘依前法服不解更服桂枝加桂湯方於第二卷桂枝湯方內更加桂二兩共五兩餘依前法已上六方病證並在第三卷內柴胡桂枝湯方桂枝去皮黃芩人參各一兩半甘草一兩炙半夏二合半芍藥一兩半大棗六枚擘生薑一兩半切柴胡四兩右九味以水七升煮取三升去滓溫服附子瀉心湯方大黃二兩黃連黃芩各一兩附子一枚炮去皮破別煮取汁右四味切三味以麻沸湯二升漬之須臾絞去滓內附子汁分溫再服生薑瀉心湯方生薑四兩切甘草三兩炙人參三兩乾薑一兩黃芩三兩半夏半升洗黃連一兩大棗十二枚右八味以水一斗煮取六升去滓再煎取三升溫服一升日三服甘草瀉心湯方甘草四兩黃芩三兩乾薑三兩半夏半升洗黃連一兩大棗十二枚擘右六味以水一斗煮取六升去滓再煎取三升溫服一升日三服黃芩加半夏生薑湯方於黃芩湯方內加半夏半升生薑一兩半餘依黃芩湯法服已上五方病證並在第四卷內桂枝加大黃湯方桂枝三兩去皮大黃一兩芍藥六兩生薑三兩切甘草二兩炙大棗十二枚擘右六味以水七升煮取三升去滓溫服一升日三服桂枝加芍藥湯方於第二卷桂枝湯方內更加芍藥三兩隨前共六兩餘依桂枝湯法四逆加吳茱萸生薑湯方當歸二兩芍藥三兩甘草二兩炙通草二兩桂枝三兩去皮細辛三兩生薑半斤切大棗二十五枚擘吳茱萸二升右九味以水六升清酒六升和煮取五升去滓溫分五服一方水酒各四升已上三方病證並在第六卷內四逆加人參湯方於四逆湯方內加人參一兩餘依四逆湯法服四逆加豬膽汁湯方於四逆湯方內加入豬膽汁半合餘依前法服如無豬膽以羊膽代之已上二方病證并在第七卷內
