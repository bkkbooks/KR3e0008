body:
  text: 辨不可下病脈證并治第二十脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微不可下下之則心下痞硬動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸也動氣在左不可下下之則腹內拘急食不下動氣更劇雖有身熱臥則欲踡動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌動氣在下不可下下之則腹脹滿卒起頭眩食則下清穀心下痞也咽中閉塞不可下下之則上輕下重水漿不下臥則欲踡身急痛下利日數十行諸外實者不可下下之則發微熱亡脈厥者當臍握熱諸虛者不可下下之則大渴求水者易愈惡水者劇脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛虛者不可下也微則為欬欬則吐涎下之則欬止而利因不休利不休則胸中如蟲齧粥入則出小便不利兩脅拘急喘息為難頸背相引臂則不仁極寒反汗出身冷若冰眼睛不慧語言不休而穀氣多入此為除中口雖欲言舌不得前脈濡而弱弱反在關濡反在巔浮反在上數反在下浮為陽虛數為無血浮為虛數為熱浮為虛自汗出而惡寒數為痛振寒而慄微弱在關胸下為急喘汗而不得呼吸呼吸之中痛在於脅振寒相搏形如瘧狀醫反下之故令脈數發熱狂走見鬼心下為痞小便淋瀝小腹甚硬小便則尿血也脈濡而緊濡則胃氣微緊則榮中寒陽微衛中風發熱而惡寒榮緊胃氣冷微嘔心內煩醫為有大熱解飢而發汗亡陽虛煩躁心下苦痞堅表裏俱虛竭卒起而頭眩客熱在皮膚悵怏不得眠不知胃氣冷緊寒在關元技巧無所施汲水灌其身客熱應時罷慄慄而振寒重被而覆之汗出而冒巔體惕而又振小便為微難寒氣因水發清穀不容間嘔變反腸出顛倒不得安手足為微逆身冷而內煩遲欲從後救安可復追還脈浮而大浮為氣實大為血虛血虛為無陰孤陽獨下陰部者小便當赤而難胞中當虛今反小便利而大汗出法應衛家當微今反更實津液四射榮竭血盡乾煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此為重虛客陽去有期必下如污埿而死脈數者久數不止止則邪結正氣不能復正氣卻結於藏故邪氣浮之與皮毛相得脈數者不可下下之則必煩利不止脈浮大應發汗醫反下之此為大逆嘔多雖有陽明證不可攻之太陽病外證未解不可下下之為逆夫病陽多者熱下之則硬無陽陰強大便硬者下之則必清穀腹滿傷寒發熱頭痛微汗出發汗則不識人熏之則喘不得小便心腹滿下之則短氣小便難頭痛背強加溫針則衂傷寒脈陰陽俱緊惡寒發熱則脈欲厥厥者脈初來大漸漸小更來漸漸大是其候也如此者惡寒甚者翕翕汗出喉中痛熱多者目赤脈多睛不慧醫復發之咽中則傷若復下之則兩目閉寒多者便清穀熱多者便膿血若熏之則身發黃若熨之則咽燥若小便利者可救之小便難者為危殆傷寒發熱口中勃勃氣出頭痛目黃衂不可制貪水者必嘔惡水者厥若下之咽中生瘡假令手足溫者必下重便膿血頭痛目黃者若下之則兩目閉貪水者脈必厥其聲嚶咽喉塞若發汗則戰慄陰陽俱虛惡水者若下之則裏冷不嗜食大便完穀出若發汗則口中傷舌上白胎煩燥脈數實不大便六七日後必便血若發汗則小便自利也下利脈大者虛也以其強下之故也設脈浮革因爾腸鳴者屬當歸四逆湯主之
