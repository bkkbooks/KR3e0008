body:
  text: 辨陽明脈證并治第八問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥煩實大便難是也陽明之為病胃家實也問曰何緣得陽明病答曰太陽病發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也問曰惡寒何故自罷答曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也本太陽初得病時發其汗汗先出不徹因轉屬陽明也傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也傷寒三日陽明脈大傷寒脈浮而緩手足自溫者是為繫在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也傷寒轉繫陽明者其人濈然微汗出也陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也陽明病若能食名中風不能食名中寒陽明病若中寒不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者以胃中冷水穀不別故也陽明病欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共併脈緊則愈陽明病欲解時從申至戌上陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作穀疸雖下之腹滿如故所以然者脈遲故也陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛陽明病無汗小便不利心中懊憹者身必發黃陽明病被火額上微汗出小便不利者必發黃陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出陽明病口燥但欲漱水不欲咽者此必衄陽明病本自汗出醫更重發汗病已差尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也傷寒嘔多雖有陽明證不可攻之陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈陽明病面合赤色不可攻之攻之必發熱色黃小便不利也陽明病不吐不下心煩者可與調胃承氣湯陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裏也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下大承氣湯方大黃四兩苦寒酒洗厚朴半斤苦溫炙去皮枳實五枚苦寒炙芒硝三合醎寒右四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上火微一兩沸分溫再服得下餘勿服小承氣湯方大黃四兩厚朴二兩炙去皮枳實三枚大者炙已上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之陽明病潮熱大便微硬者可與大承氣湯不硬者不與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉失氣者慎不可攻也夫實則讝語虛則鄭聲鄭聲重語也直視讝語喘滿者死下利者亦死發汗多若重發汗者亡其陽讝語脈短者死脈自和者不死傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱讝語者大承氣湯主之若一服利止後服陽明病其人多汗以津液外出胃中燥大便必硬硬則讝語小承氣湯主之若一服讝語止更莫復服陽明病讝語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣勿更與之明日不大便脈反微澀者裏虛也為難治不可更與承氣湯也陽明病讝語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬爾宜大承氣湯下之陽明病下血讝語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈汗出讝語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂以表虛裏實故也下之則愈宜大承氣湯傷寒四五日脈沈而喘滿沈為在裏而反發其汗津液越出大便為難表虛裏實久則讝語三陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿發汗則讝語下之則額上生汗手足逆冷若自汗出者白虎湯主之二陽併病太陽證罷但發潮熱手足漐漐汗出大便難而讝語者下之則愈宜大承氣湯陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則燥心憒憒反讝語若加燒針必怵惕煩燥不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之豬苓湯方豬苓去皮甘平茯苓甘平阿膠甘平滑石碎甘寒澤瀉甘醎寒各一兩右伍味以水四升先煮四味取二升去滓內下阿膠煬消溫服七合日三服陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也脈浮而遲表熱裏寒下利清穀者四逆湯主之若胃中虛冷不能食者飲水則噦脈浮發熱口乾鼻燥能食者則衄陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之陽明病脅下硬滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導蜜煎導方蜜七合一味內銅器中微火煎之稍凝似飴狀攪之勿令焦著欲可丸併手捻作挺令頭鋭大如指長二寸許當熱時急作冷則硬以內穀道中以手急抱欲大便時乃去之豬膽汁方大豬膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明病脈浮無汗而喘者發汗則愈宜麻黃湯陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裏身必發黃茵蔯蒿湯主之茵蔯蒿湯方茵蔯蒿六兩苦微寒梔子十四枚擘苦寒大黃二兩去皮苦寒右三味以水一斗先煮茵蔯減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也陽明證其人喜忘者必有畜血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯病人不大便五六日繞臍痛煩燥發作有時者此有燥屎故使不大便也病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯食穀欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也吳茱萸湯方吳茱萸一升洗辛熱人參三兩甘溫生薑六兩切辛溫大棗十二枚擘甘溫右四味以水七升煮取二升去滓溫服七合日三服太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散脈陽微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過為陽絶於裏亡津液大便因硬也脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絶趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約麻仁丸主之麻仁丸方麻子仁二升甘平芍藥半斤酸平枳實半斤炙苦寒大黃一斤去皮苦寒厚朴一斤炙去皮苦寒杏仁一斤去皮尖熬別作脂甘溫右六味為末煉蜜為丸桐子大飲服十丸日三服漸加以和為度太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之傷寒吐後腹脹滿者與調胃承氣湯太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之愈得病二三日脈弱無太陽柴胡證煩燥心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯傷寒六七日目中不了了睛不和無表裏證大便難身微熱者此為實也急下之宜大承氣湯陽明病發熱汗多者急下之宜大承氣湯發汗不解腹滿痛者急下之宜大承氣湯腹滿不減減不足言當下之宜大承氣湯陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜大承氣湯病人無表裏證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血宜抵當湯若脈數不解而下不止必協熱而便膿血也傷寒發汗已身目為黃所以然者以寒濕在裏不解故也以為不可下也於寒濕中求之傷寒七八日身黃如橘子色小便不利腹微滿者茵蔯蒿湯主之傷寒身黃發熱者梔子蘗皮湯主之梔子蘗皮湯方梔子一十五箇擘苦寒甘草一兩甘平黃蘗二兩右三味以水四升煮取一升半去滓分溫再服傷寒瘀熱在裏身必發黃麻黃連軺赤小豆湯主之麻黃連軺赤小豆湯方麻黃二兩甘溫去節赤小豆一升甘平連軺二兩連翹根也苦寒杏仁四十箇甘溫去皮尖大棗十二枚擘甘溫生梓白皮一升苦寒生薑二兩辛溫切甘草二兩炙甘平已上八味以潦水一斗先煮麻黃再沸去上沫內諸藥煮取三升分溫三服半日服盡
