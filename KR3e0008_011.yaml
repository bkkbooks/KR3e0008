body:
  text: 辨少陰病脈證并治第十一少陰之為病脈微細但欲寐也少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利少陰病咳而下利讝語者被火氣劫故也小便必難以強責少陰汗也少陰病脈細沉數病為在裏不可發汗少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈少陰病下利若利自止惡寒而踡臥手足溫者可治少陰病惡寒而踡時自煩欲去衣被者可治少陰中風脈陽微陰浮者為欲愈少陰病欲解時從子至寅上少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯少陰病八九日一身手足盡熱者以熱在膀胱必便血也少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治少陰病惡寒身踡而利手足逆冷者不治少陰病吐利燥煩四逆者死少陰病下利止而頭眩時時自冒者死少陰病四逆惡寒而身踡脈不至不煩而躁者死少陰病六七日息高者死少陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死少陰病始得之反發熱脈沉者麻黃附子細辛湯主之麻黃附子細辛湯方麻黃二兩去節甘熱細辛二兩辛熱附子一枚炮去皮破八片辛熱右三味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升日三服少陰病得之二三日麻黃附子甘草湯微發汗以二三日無裏證故微發汗也麻黃附子甘草湯方麻黃二兩去節甘草二兩炙附子一枚炮去皮右三味以水七升先煮麻黃一兩沸去上沫內諸藥煮取三升去滓溫服一升日三服少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之黃連阿膠湯方黃連四兩苦寒黃芩一兩苦寒芍藥二兩酸平雞子黃二枚甘溫阿膠三兩甘溫右五味以水五升先煮三物取二升去滓內膠煬盡小冷內雞子黃攪令相得溫服七合日三服少陰病得之一二日口中和其背惡寒者當灸之附子湯主之附子湯方附子二枚炮破八片去皮辛熱茯苓三兩甘平人參二兩甘溫白朮四兩甘溫芍藥三兩酸平右五味以水八升煮取三升去滓溫服一升日三服少陰病身體痛手足寒骨節痛脈沉者附子湯主之少陰病下利便膿血者桃花湯主之桃花湯方赤石脂一斤一半全用一半篩末甘溫乾薑一兩辛熱粳米一升甘平右三味以水七升煮米令熟去滓溫服七合內赤石脂末方寸匕日三服若一服愈餘勿服少陰病二三日至四五日腹滿小便不利下利不止便膿血者桃花湯主之少陰病下痢便膿血者可刺少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之少陰病下痢咽痛胸滿心煩者豬膚湯主之豬膚湯方豬膚一斤味甘寒右一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和令相得溫分六服少陰病二三日咽痛者可與甘草湯不差者與桔梗湯甘草湯方甘草二兩右一味以水三升煮取一升半去滓溫服七合日二服桔梗湯方桔梗一兩辛甘微溫甘草二兩甘平右二味以水三升煮取一升去滓分溫再服少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之苦酒湯方半夏洗破如棗核大十四枚辛溫雞子一枚去黃內上苦酒著雞子殼中甘微寒右二味內半夏著苦酒中以雞子殼置刀鐶中安火上令三沸去滓少少含咽之不差更作三劑少陰病咽中痛半夏散及湯主之半夏散及湯方半夏洗辛溫桂枝去皮辛熱甘草炙甘平以上各等分已上三味各別搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸內散兩方寸匕更煎三沸下火令小冷少少咽之少陰病下利白通湯主之白通湯方蔥白四莖辛溫乾薑一兩辛熱附子一枚生用去皮破八片辛熱右三味以水三升煮取一升去滓分溫再服少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生白通加豬膽汁湯方蔥白四莖乾薑一兩附子一枚生去皮破八片人尿五合醎寒豬膽汁一合苦寒已上三味以水三升煮取一升去滓內膽汁人尿和令相得分溫再服若無膽亦可用少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之真武湯方茯苓三兩甘平芍藥三兩酸平生薑三兩切辛溫白朮二兩甘溫附子一枚炮去皮破八片辛熱右五味以水八升煮取三升去滓溫服七合日三服後加減法若咳者加五味子半升細辛乾薑各一兩若小便利者去茯苓若下利者去芍藥加乾薑二兩若嘔者去附子加生薑足前成半斤少陰病下利清穀裏寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之通脈四逆湯方甘草二兩炙附子大者一枚生用去皮破八片乾薑三兩強人可四兩右三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之四逆散方甘草炙甘平枳實破水漬炙乾苦寒柴胡苦寒芍藥酸微寒右四味各拾分搗篩白飲和服方寸匕日三服咳者加五味子乾薑各伍分并主下痢悸者加桂枝伍分小便不利者加茯苓伍分腹中痛者加附子一枚炮令拆泄利下重者先以水五升煮薤白三升煮取三升去滓以散三方寸匕內湯中煮取一升半分溫再服少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之少陰病得之二三日口燥咽乾者急下之宜大承氣湯少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯少陰病六七日腹脹不大便者急下之宜大承氣湯少陰病脈沉者急溫之宜四逆湯少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之
