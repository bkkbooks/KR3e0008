body:
  text: 傷寒例第三陰陽大論云春氣溫和夏氣暑熱秋氣清涼冬氣冷冽此則四時正氣之序也冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳其傷於四時之氣皆能為病以傷寒為毒者以其最成殺厲之氣也中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也是以辛苦之人春夏多溫熱病皆由冬時觸寒所致非時行之氣也凡時行者春時應暖而復大寒夏時應大熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也夫欲候知四時正氣為病及時行疫氣之法皆當按斗曆占之九月霜降節後宜漸寒向冬大寒至正月雨水節後宜解也所以謂之雨水者以冰雪解而為雨水故也至驚蟄二月節後氣漸和暖向夏大熱至秋便涼從霜降以後至春分以前凡有觸冒霜露體中寒即病者謂之傷寒也九月十月寒氣尚微為病則輕十一月十二月寒冽已嚴為病則重正月二月寒漸將解為病亦輕此以冬時不調適有傷寒之人即為病也其冬有非節之暖者名曰冬溫冬溫之毒與傷寒大異冬溫復有先後更相重沓亦有輕重為治不同證如後章從立春節後其中無暴大寒又不冰雪而有人壯熱為病者此屬春時陽氣發於冬時伏寒變為溫病從春分以後至秋分節前天有暴寒者皆為時行寒疫也三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微其病與溫及暑病相似但治有殊耳十五日得一氣於四時之中一時有六氣四六名為二十四氣也然氣候亦有應至而不至或有未應至而至者或有至而太過者皆成病氣也但天地動靜陰陽鼓擊者各正一氣耳是以彼春之暖為夏之暑彼秋之忿為冬之怒是故冬至之後一陽爻升一陰爻降也夏至之後一陽氣下一陰氣上也斯則冬夏二至陰陽合也春秋二分陰陽離也陰陽交易人變病焉此君子春夏養陽秋冬養陰順天地之剛柔也小人觸冒必嬰暴疹須知毒烈之氣留在何經而發何病詳而取之是以春傷於風夏必飱泄夏傷於暑秋必病瘧秋傷於濕冬必咳嗽冬傷於寒春必病溫此必然之道可不審明之傷寒之病逐日淺深以施方治今世人傷寒或始不早治或治不對病或日數久淹困乃告醫醫人又不依次第而治之則不中病皆宜臨時消息制方無不效也今搜採仲景舊論録其證候診脈聲色對病真方有神驗者擬防世急也又土地溫涼高下不同物性剛柔餐居亦異是黃帝興四方之問岐伯舉四治之能以訓後賢開其未悟者臨病之工宜須兩審也凡傷於寒則為病熱熱雖甚不死若兩感於寒而病者必死尺寸俱浮者太陽受病也當一二日發以其脈上連風府故頭項痛腰脊強尺寸俱長者陽明受病也當二三日發以其脈俠鼻絡於目故身熱目疼鼻乾不得臥尺寸俱弦者少陽受病也當三四日發以其脈循脅絡於耳故胸脅痛而耳聾此三經皆受病未入於府者可汗而已尺寸俱沉細者太陰受病也當四五日發以其脈布胃中絡於嗌故腹滿而嗌乾尺寸俱沉者少陰受病也當五六日發以其脈貫腎絡於肺繫舌本故口燥舌乾而渴尺寸俱微緩者厥陰受病也當六七日發以其脈循陰器絡於肝故煩滿而囊縮此三經皆受病已入於府可下而已若兩感於寒者一日太陽受之即與少陰俱病則頭痛口乾煩滿而渴二日陽明受之即與太陰俱病則腹滿身熱不欲食讝語三日少陽受之即與厥陰俱病則耳聾囊縮而厥水漿不入不知人者六日死若三陰三陽五藏六府皆受病則榮衛不行府藏不通則死矣其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈也八日陽明病衰身熱少歇也九日少陽病衰耳聾微聞也十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止舌乾已而嚏也十二日厥陰病衰囊縱少腹微下大氣皆去病人精神爽慧也若過十三日以上不間尺寸陷者大危若更感異氣變為他病者當依舊壞證病而治之若脈陰陽俱盛重感於寒者變為溫瘧陽脈浮滑陰脈濡弱者更遇於風變為風溫陽脈洪數陰脈實大者遇溫熱變為溫毒溫毒為病最重也陽脈濡弱陰脈弦緊者更遇溫氣變為溫疫以此冬傷於寒發為溫病脈之變證方治如説凡人有疾不時即治隱忍冀差以成痼疾小兒女子益以滋甚時氣不和便當早言尋其邪由及在腠理以時治之罕有不愈者患人忍之數日乃説邪氣入藏則難可制此為家有患備慮之要凡作湯藥不可避晨夜覺病須臾即宜便治不等早晚則易愈矣若或差遲病即傳變雖欲除治必難為力服藥正如方法縱意違師不須治之凡傷寒之病多從風寒得之始表中風寒入裏則不消矣未有溫覆而當不消散者不在證治擬欲攻之猶當先解表乃可下之若表已解而內不消非大滿猶生寒熱則病不除若表已解而內不消大滿大實堅有燥屎自可除下之雖四五日不能為禍也若不宜下而便攻之內虛熱入協熱遂利煩燥諸變不可勝數輕者困篤重者必死矣夫陽盛陰虛汗之則死下之則愈陽虛陰盛汗之則愈下之則死夫如是則神丹安可以誤發甘遂何可以妄攻虛盛之治相背千里吉凶之機應若影響豈容易哉況桂枝下咽陽盛則斃承氣入胃陰盛以亡死生之要在乎須臾視身之盡不暇計日此陰陽虛實之交錯其候至微發汗吐下之相反其禍至速而醫術淺狹懵然不知病源為治乃誤使病者殞歿自謂其分至今冤魂塞於冥路死尸盈於曠野仁者鑒此豈不痛歟凡兩感病俱作治有先後發表攻裏本自不同而執迷妄意者乃云神丹甘遂合而飲之且解其表又除其裏言巧似是其理實違夫智者之舉錯也常審以慎愚者之動作也必果而速安危之變豈可詭哉世上之士但務彼翕習之榮而莫見此傾危之敗惟明者居然能護其本近取諸身夫何遠之有焉凡發汗溫服湯藥其方雖言日三服若病劇不解當促其間可半日中盡三服若與病相阻即便有所覺重病者一日一夜當晬時觀之如服一劑病證猶在故當復作本湯服之至有不肯汗出服三劑乃解若汗不出者死病也凡得時氣病至五六日而渴欲飲水飲不能多不當與也何者以腹中熱尚少不能消之便更與人作病也至七八日大渴欲飲水者猶當依證與之與之常令不足勿極意也言能飲一斗與五升若飲而腹滿小便不利若喘若噦不可與之忽然大汗出是為自愈也凡得病反能飲水此為欲愈之病其不曉病者但聞病飲水自愈小渴者乃強與飲之因成其禍不可復數凡得病厥脈動數服湯藥更遲脈浮大減小初躁後靜此皆愈證也凡治溫病可刺五十九穴又身之穴三百六十有五其三十九穴灸之有害七十九穴刺之為災并中髓也凡脈四損三日死平人四息病人脈一至名曰四損脈五損一日死平人五息病人脈一至名曰五損脈六損一時死平人六息病人脈一至名曰六損脈盛身寒得之傷寒脈虛身熱得之傷暑脈陰陽俱盛大汗出不解者死脈陰陽俱虛熱不止者死脈至乍疏乍數者死脈至如轉索者其日死讝言妄語身微熱脈浮大手足溫者生逆冷脈沉細者不過一日死矣此以前是傷寒熱病證候也
