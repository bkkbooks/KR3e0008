body:
  text: 辨太陽病脈證并治第六太陽病項背強几几無汗惡風葛根湯主之葛根湯方葛根四兩麻黃三兩去節桂枝二兩去皮芍藥二兩切甘草二兩炙生薑三兩切大棗十二枚擘右柒味㕮咀以水一斗先煮麻黃葛根減二升去沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥餘如桂枝法將息及禁忌太陽與陽明合病者必自下利葛根湯主之太陽與陽明合病不下利但嘔者葛根加半夏湯主之葛根加半夏湯方葛根四兩麻黃三兩去節湯泡去黃汁焙乾稱生薑三兩切甘草二兩炙芍藥二兩桂枝二兩去皮大棗十二枚擘半夏半斤洗右八味以水一斗先煮葛根麻黃減二升去白沫內諸藥煮取三升去滓溫服一升覆取微似汗太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之葛根黃芩黃連湯方葛根半斤甘草二兩炙味甘平黃芩二兩味苦寒黃連三兩味苦寒右四味以水八升先煮葛根減二升內諸藥煮取二升去滓分溫再服太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之麻黃湯方麻黃三兩味甘溫去節桂枝二兩去皮味辛熱甘草一兩炙味甘平杏仁七十箇湯去皮尖味辛溫右四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥餘如桂枝法將息太陽與陽明合病喘而胸滿者不可下宜麻黃湯主之太陽病十日以去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也大青龍湯主之大青龍湯方麻黃六兩去節味甘溫桂枝二兩去皮味辛熱甘草二兩炙味甘平杏人四十箇去皮尖味苦甘溫生薑三兩切味辛溫大棗十二枚擘味甘溫石膏如雞子大碎味甘微寒右七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之小青龍湯方麻黃三兩去節味甘溫芍藥三兩味酸微寒五味子半升味酸溫乾薑三兩味辛熱甘草三兩炙味甘平桂枝三兩去皮味辛熱半夏半升湯洗味辛微溫細辛三兩味辛溫右八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之太陽病外證未解脈浮弱者當以汗解宜桂枝湯太陽病下之微喘者表未解故也桂枝加厚朴杏人湯主之太陽病外證未解者不可下也下之為逆欲解外者宜桂枝湯主之太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯主之太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之太陽病脈浮緊發熱身無汗自衄者愈二陽併病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裏虛須表裏實津液自和便自汗出愈脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之然以榮氣不足血少故也脈浮者病在表可發汗宜麻黃湯脈浮而數者可發汗宜麻黃湯病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣和諧故爾以榮行脈中衛行脈外復發其汗榮衛和則愈宜桂枝湯病人藏無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯主之傷寒脈浮緊不發汗因致衄者麻黃湯主之傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裏仍在表也當須發汗若頭痛者必衄宜桂枝湯傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯主之凡病若發汗若吐若下若亡津液陰陽自和者必自愈大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈下之後復發汗必振寒脈微細所以然者以內外俱虛故也下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之乾薑附子湯方乾薑一兩味辛熱附子一枚生用去皮破八片味辛熱右二味以水三升煮取一升去滓頓服發汗後身疼痛脈沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之麻黃杏人甘草石膏湯方麻黃四兩去節味甘溫杏人五十箇去皮尖味甘溫甘草二兩炙味甘平石膏半斤碎綿裹味甘寒右四味以水七升先煮麻黃減二升去上沫內諸藥煮取二升去滓溫服一升本云黃耳柸發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之桂枝甘草湯方桂枝四兩去皮味辛熱甘草二兩炙味甘平右二味以水三升煮取一升去滓頓服發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之茯苓桂枝甘草大棗湯方茯苓半斤味甘平甘草二兩炙味甘平大棗十五枚擘味甘平桂枝四兩去皮右四味以甘爛水一斗先煮茯苓減二升內諸藥煮取三升去滓溫服一升日三服作甘爛水法取水二斗置大盆內以杓揚之水上有珠子五六千顆相逐取用之發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之厚朴生薑甘草半夏人參湯方厚朴半斤去皮炙味苦溫生薑半斤切味辛溫半夏半斤洗味辛平人參一兩味甘溫甘草二兩炙味甘平右五味以水一斗煮取三升去滓溫服一升日三服傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之茯苓桂枝白朮甘草湯方茯苓四兩味甘平桂枝三兩去皮味辛熱白朮二兩味苦甘溫甘草二兩炙味甘平右四味以水六升煮取三升去滓分溫叄服發汗病不解反惡寒者虛故也芍藥甘草附子湯主之芍藥甘草附子湯方芍藥三兩味酸微寒甘草三兩炙味甘平附子一枚炮去皮破八片味辛熱已上三味以水伍升煮取一升伍合去滓分溫服疑非仲景意發汗若下之病仍不解煩躁者茯苓四逆湯主之茯苓四逆湯方茯苓六兩味甘平人參一兩味甘溫甘草二兩炙味甘平乾薑一兩半味辛熱附子一枚生用去皮破八片味辛熱右伍味以水伍升煮取三升去滓溫服七合日三服發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯太陽病發汗後大汗出胃中乾煩燥不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者與五苓散主之五苓散方豬苓十八銖味甘平去皮澤瀉一兩六銖半味酸醎茯苓十八銖味甘平桂枝半兩去皮味辛熱白朮十八銖味甘平右伍味為末以白飲和服方寸匕日三服多飲暖水汗出愈發汗已脈浮數煩渴者五苓散主之傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之茯苓甘草湯方茯苓二兩味甘平桂枝二兩去皮味辛熱生薑三兩切味辛溫甘草一兩炙味甘平右四味以水四升煮取二升去滓分溫三服中風發熱六七日不解而煩有表裏證渴欲飲水水入則吐者名曰水逆五苓散主之未持脈時病人手叉自冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此發汗後飲水多必喘以水灌之亦喘發汗後水藥不得入口為逆若更發汗必吐下不止發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之梔子豉湯方梔子十四枚擘味苦寒香豉四合綿裹味苦寒右二味以水四升先煮梔子得二升半內豉煮取一升半去滓分為二服溫進一服得吐者止後服若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之發汗若下之而煩熱胸中窒者梔子豉湯主之傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之梔子厚朴湯方梔子十四枚擘味苦寒厚朴四兩薑炙苦溫枳實四枚水浸去穰炒味苦寒已上三味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之梔子乾薑湯方梔子十四枚擘味苦寒乾薑二兩味辛熱右二味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服凡用梔子湯病人舊微溏者不可與服之太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之咽喉乾燥者不可發汗淋家不可發汗發汗必便血瘡家雖身疼痛不可發汗發汗則痓衄家不可發汗汗出必額上陷脈急緊直視不能眴不得眠亡血家不可發汗發汗則寒栗而振汗家重發汗必恍惚心亂小便已陰疼與禹餘糧丸闕病人有寒復發汗胃中冷必吐蛔本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆傷寒醫下之續得下利清穀不止身疼痛者急當救裏後身疼痛清便自調者急當救表救裏宜四逆湯救表宜桂枝湯病發熱頭痛脈反沉若不差身體疼痛當救其裏宜四逆湯太陽病先下之而不愈因復發汗以此表裏俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也得裏未和然後復下之太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯主之太陽病發熱汗出者此為榮弱衛強故使汗出欲救邪風者宜桂枝湯傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者與小柴胡湯主之小柴胡湯方柴胡半斤味苦微寒黃芩三兩味苦寒人參三兩味甘溫甘草三兩味甘平半夏半升洗味辛溫生薑三兩切味辛溫大棗十三枚擘味甘溫右柒味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服若胸中煩而不嘔去半夏人參加括蔞實一枚若渴者去半夏加人參合前成肆兩半括蔞根肆兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣肆兩若心下悸小便不利者去黃芩加茯苓肆兩若不渴外有微熱者去人參加桂三兩溫覆取微汗愈若咳者去人參大棗生薑加五味子半升乾薑二兩血弱氣盡腠理開邪氣因入與正氣相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食藏府相連其痛必下邪高痛下故使嘔也小柴胡湯主之服柴胡湯已渴者屬陽明也以法治之得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食穀者噦傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之傷寒陽脈澀陰脈弦法當腹中急痛者先與小建中湯不差者與小柴胡湯主之小建中湯方桂枝三兩去皮味辛熱甘草三兩炙味甘平大棗十二枚擘味甘溫芍藥六兩味酸微寒生薑三兩切味辛溫膠飴一升味甘溫右六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也傷寒中風有柴胡證但見一證便是不必悉具凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解傷寒二三日心中悸而煩者小建中湯主之太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱鬱微煩者為未解也與大柴胡湯下之則愈大柴胡湯方柴胡半斤味甘平黃芩三兩味苦寒芍藥三兩味酸微寒半夏半升洗味辛溫生薑五兩切味辛溫枳實四枚炙味苦寒大棗十二枚擘味甘溫大黃二兩味苦寒右七味以水一斗二升煮取六升去滓再煎溫服一升日三服一方用大黃二兩若不加大黃恐不為大柴胡湯也傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒消湯主之傷寒十三日不解過經讝語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯方桃核承氣湯方桃人五十箇去皮尖味甘平桂枝二兩去皮味辛熱大黃四兩芒硝二兩甘草二兩炙右伍味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服伍合日三服當微利傷寒八九日下之胸滿煩驚小便不利讝語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之柴胡加龍骨牡蠣湯方半夏二合洗大棗六枚柴胡四兩生薑一兩半人參一兩半龍骨一兩半鉛丹一兩半桂枝一兩半去皮茯苓一兩半大黃二兩牡蠣一兩半煅右十一味以水八升煮取四升內大黃切如碁子更煮一二沸去滓溫服一升傷寒腹滿讝語寸口脈浮而緊此肝乘脾也名曰縱刺期門傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門太陽病二日反躁反尉其背而大汗出大熱入胃胃中水竭躁煩必發讝語十餘日振栗自下利者此為欲解也故其汗從腰已下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及多大便已頭卓然而痛其人足心必熱穀氣下流故也太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則讝語甚者至噦手足躁擾捻衣摸床小便利者其人可治傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之桂枝去芍藥加蜀漆龍骨牡蠣救逆湯方桂枝三兩去皮甘草二兩炙生薑三兩切牡蠣五兩熬味酸醎龍骨四兩味甘平大棗十二枚擘蜀漆三兩洗去腳味辛平右為末以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升形作傷寒其脈不弦緊而弱弱者必渴被火者必讝語弱者發熱脈浮解之當汗出愈太陽病以火熏之不得汗其人必躁到經不解必清血名為火邪脈浮熱甚反灸之此為實實以虛治因火而動必咽燥唾血微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痺名火逆也欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂二兩火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之桂枝甘草龍骨牡蠣湯方桂枝一兩甘草二兩牡蠣二兩熬龍骨二兩右為末以水伍升煮取二升半去滓溫服八合日三服太陽傷寒者加溫針必驚也太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱鬱微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裏故也抵當湯主之抵當湯方水蛭三十箇熬味醎苦寒虻蟲三十箇熬去翅足味苦微寒桃人二十箇去皮尖味苦甘平大黃三兩酒浸味苦寒右四味為末以水伍升煮取三升去滓溫服一升不下再服太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可餘藥宜抵當丸抵當丸方水蛭二十箇味苦寒虻蟲二十五箇味苦微寒桃人二十箇去皮尖大黃三兩右四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服太陽病小便利者以飲水多必心下悸小便少者必苦裏急也
