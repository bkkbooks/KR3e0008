body:
  text: 辨不可發汗病脈證并治第十五夫以為疾病至急倉卒尋按要者難得故重集諸可與不可方治比之三陰三陽篇中此易見也又時有不止是三陰三陽出在諸可與不可中也脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微發汗躁不得眠動氣在右不可發汗發汗則衄而渴心苦煩飲即吐水動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤動氣在上不可發汗發汗則氣上衝正在心端動氣在下不可發汗發汗則無汗心中大煩骨節苦疼目運惡寒食則反吐穀不得前咽中閉寒不可發汗發汗則吐血氣欲絶手足厥冷欲得踡臥不能自溫諸脈得數動微弱者不可發汗發汗則大便難腹中乾胃燥而煩其形相象根本異源脈微而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛不可發汗發汗則寒栗不能自還咳者則劇數吐涎沫咽中必乾小便不利心中飢煩晬時而發其形似瘧有寒無熱虛而寒栗咳而發汗踡而苦滿腹中復堅厥脈緊不可發汗發汗則聲亂咽嘶舌萎聲不得前諸逆發汗病微者難差劇者言亂目眩者死命將難全咳而小便利若失小便者不可發汗汗出則四肢厥逆冷傷寒頭痛翕翕發熱形象中風常微汗出自嘔者下之益煩心中懊憹如飢發汗則致痓身強難以屈伸熏之則發黃不得小便灸則發咳唾
