body:
  text: 辨脈法第一問曰脈有陰陽者何謂也答曰凡脈大浮數動滑此名陽也脈沉澀弱弦微此名陰也凡陰病見陽脈者生陽病見陰脈者死問曰脈有陽結陰結者何以別之答曰其脈浮而數能食不大便者此為實名曰陽結也期十七日當劇其脈沉而遲不能食身體重大便反硬名曰陰結也期十四日當劇問曰病有灑淅惡寒而復發熱者何答曰陰脈不足陽往從之陽脈不足陰往乘之曰何謂陽不足答曰假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也曰何謂陰不足答曰假令尺脈弱名曰陰不足陽氣下陷入陰中則發熱也陽脈浮陰脈弱者則血虛血虛則筋急也其脈沉者榮氣微也其脈浮而汗出如流珠者衛氣衰也榮氣微者加燒針則血流不行更發熱而躁煩也脈藹藹如車蓋者名曰陽結也脈纍纍如循長竿者名曰陰結也脈瞥瞥如羹上肥者陽氣微也脈縈縈如蜘蛛絲者陽氣衰也脈綿綿如瀉漆之絶者亡其血也脈來緩時一止復來者名曰結脈來數時一止復來者名曰促脈陽盛則促陰盛則結此皆病脈陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒者此三焦傷也若數脈見于關上上下無頭尾如豆大厥厥動搖者名曰動也陽脈浮大而濡陰脈浮大而濡陰脈與陽脈同等者名曰緩也脈浮而緊者名曰弦也弦者狀如弓弦按之不移也脈緊者如轉索無常也脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半産漏下男子則亡血失精問曰病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出而解也若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也問曰病有不戰而汗出解者何也答曰脈大而浮數故知不戰汗出而解也問曰病有不戰不汗出而解者何也答曰其脈自微此以曾經發汗若吐若下若亡血以內無津液此陰陽自和必自愈故不戰不汗出而解也問曰傷寒三日脈浮數而微病人身涼和者何也答曰此為欲解也解以夜半脈浮而解者濈然汗出也脈數而解者必能食也脈微而解者必大汗出也問曰脈病欲知愈未愈者何以別之答曰寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解者此脈陰陽為和平雖劇當愈立夏得洪大脈是其本位其人病身體苦疼重者須發其汗若明日身不疼不重者不須發汗若汗濈濈自出者明日便解矣何以言之立夏得洪大脈是其時脈故使然也四時倣此問曰凡病欲知何時得何時愈答曰假令夜半得病明日日中愈日中得病夜半愈何以言之日中得病夜半愈者以陽得陰則解也夜半得病明日日中愈者以陰得陽則解也寸口脈浮為在表沉為在裏數為在府遲為在藏假令脈遲此為在藏也趺陽脈浮而澀少陰脈如經也其病在脾法當下利何以知之若脈浮大者氣實血虛也今趺陽脈浮而澀故知脾氣不足胃氣虛也以少陰脈弦而浮才見此為調脈故稱如經也若反滑而數者故知當屎膿也寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼當發其汗也趺陽脈遲而緩胃氣如經也趺陽脈浮而數浮則傷胃數則動脾此非本病醫特下之所為也榮衛內陷其數先微脈反但浮其人必大便硬氣噫而除何以言之本以數脈動脾其數先微故知脾氣不治大便硬氣噫而除今脈反浮其數改微邪氣獨留心中則飢邪熱不殺穀潮熱發渴數脈當遲緩脈因前後度數如法病者則飢數脈不時則生惡瘡也師曰病人脈微而澀者此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱此醫發其汗令陽氣微又大下之令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著復衣十一月之時陽氣在裏胃中煩熱以陰氣內弱不能勝熱故欲裸其身又陰脈遲澀故知血亡也脈浮而大心下反硬有熱屬藏者攻之不令發汗屬府者不令溲數溲數則大便硬汗多則熱愈汗少則便難脈遲尚未可攻脈浮而洪身汗如油喘而不休水漿不下體形不仁乍靜乍亂此為命絶也又未知何藏先受其災若汗出髮潤喘不休者此為肺先絶也陽反獨留形體如煙熏直視搖頭者此心絶也脣吻反青四肢漐習者此為肝絶也環口黧黑柔汗發黃者此為脾絶也溲便遺失狂言目反直視者此為腎絶也又未知何藏陰陽前絶若陽氣前絶陰氣後竭者其人死身色必青陰氣前絶陽氣後竭者其人死身色必赤腋下溫心下熱也寸口脈浮大而醫反下之此為大逆浮則無血大則為寒寒氣相搏則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人即䭇趺陽脈浮浮則為虛浮虛相搏故令氣䭇言胃氣虛竭也脈滑則為噦此為醫咎責虛取實守空迫血脈浮鼻中燥者必衄也諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常者畜積有膿也脈浮而遲面熱赤而戰惕者六七日當汗出而解反發熱者差遲遲為無陽不能作汗其身必癢也寸口脈陰陽俱緊者法當清邪中於上焦濁邪中於下焦清邪中上名曰潔也濁邪中下名曰渾也陰中於邪必內栗也表氣微虛裏氣不守故使邪中於陰也陽中於邪必發熱頭痛項強頸攣腰痛脛酸所為陽中霧露之氣故曰清邪中上濁邪中下陰氣為栗足膝逆冷便溺妄出表氣微虛裏氣微急三焦相溷內外不通上焦怫鬱藏氣相熏口爛食齗也中焦不治胃氣上衝脾氣不轉胃中為濁榮衛不通血凝不流若衛氣前通者小便赤黃與熱相搏因熱作使遊於經絡出入藏府熱氣所過則為癰膿若陰氣前通者陽氣厥微陰無所使客氣內入嚏而出之聲嗢咽塞寒厥相逐為熱所擁血凝自下狀如豚肝陰陽俱厥脾氣孤弱五液注下下焦不闔清便下重令便數難臍築湫痛命將難全脈陰陽俱緊者口中氣出脣口乾燥踡臥足冷鼻中涕出舌上胎滑勿妄治也到七日已來其人微發熱手足溫者此為欲解或到八日已上反大發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也脈陰陽俱緊至於吐利其脈獨不解緊去人安此為欲解若脈遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解病六七日手足三部脈皆至大煩而口噤不能言其人躁擾者必欲解也若脈和其人大煩目重臉內際黃者此為欲解也脈浮而數浮為風數為虛風為熱虛為寒風虛相搏則灑淅惡寒也脈浮而滑浮為陽滑為實陽實相搏其脈數疾衛氣失度浮滑之脈數疾發熱汗出者此為不治傷寒咳逆上氣其脈散者死謂其形損故也
