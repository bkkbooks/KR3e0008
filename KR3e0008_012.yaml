body:
  text: 辨厥陰病脈證并治第十二厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止厥陰中風脈微浮為欲愈不浮為未愈厥陰病欲解時從寅至卯上厥陰病渴欲飲水者少少與之愈諸四逆厥者不可下之虛家亦然傷寒先厥後發熱而利者必自止見厥復利傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日并前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痺傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為藏厥非為蛔厥也蛔厥者其人當吐蛔令病者靜而復時煩此為藏寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅圓主之又主久利方烏梅圓方烏梅三百箇味酸溫細辛六兩辛熱乾薑十兩辛熱黃連一斤苦寒當歸四兩辛溫附子六兩炮辛熱蜀椒四兩去子辛熱桂枝六兩辛熱人參六兩甘溫黃蘗六兩苦寒右十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成埿和藥令相得內臼中與蜜杵二千下員如梧桐子大先食飲服十圓日三服稍加至二十圓禁生冷滑物臭食等傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者其後必便膿血傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也傷寒六七日脈微手足厥冷煩燥灸厥陰厥不還者死傷寒發熱下利厥逆躁不得臥者死傷寒發熱下利至甚厥不止者死傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死發熱而厥七日下利者為難治傷寒脈促手足厥逆者可灸之傷寒脈滑而厥者裏有熱也白虎湯主之手足厥寒脈細欲絶者當歸四逆湯主之當歸四逆湯方當歸三兩辛溫桂枝三兩辛熱芍藥三兩酸寒細辛三兩辛熱大棗二十五箇甘溫甘草二兩炙甘平通草二兩甘平右柒味以水八升煮取三升去滓溫服一升日三服若其人內有久寒者宜當歸四逆加吳茱萸生薑湯主之大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之大汗若大下利而厥冷者四逆湯主之病人手足厥冷脈乍緊者邪結在胸中心中滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黃升麻湯主之麻黃升麻湯方麻黃二兩半去節甘溫升麻一兩一分甘平當歸一兩一分辛溫知母苦寒黃芩苦寒萎蕤甘平各十八銖石膏碎綿裹甘寒白朮甘溫乾薑辛熱芍藥酸平天門冬去心甘平桂枝辛熱茯苓甘平甘草炙甘平各六銖右十四味以水一斗先煮麻黃一兩沸去上沫內諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈傷寒四五日腹中痛若轉氣下趣少腹者此欲自利也傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之乾薑黃連黃芩人參湯方乾薑辛熱黃連苦寒黃芩苦寒人參甘溫各三兩右四味以水六升煮取二升去滓分溫再服下利有微熱而渴脈弱者今自愈下利脈數有微熱汗出今自愈設復緊為未解下利手足厥冷無脈者灸之不溫若脈不還反微喘者死少陰負趺陽者為順也下利寸脈反浮數尺中自澀者必清膿血下利清穀不可攻表汗出必脹滿下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也下利脈數而渴者今自愈設不差必清濃血以有熱故也下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死傷寒下利日十餘行脈反實者死下利清穀裏寒外熱汗出而厥者通脈四逆湯主之熱利下重者白頭翁湯主之白頭翁湯方白頭翁二兩苦寒黃柏苦寒黃連苦寒秦皮苦寒各三兩右四味以水七升煮取二升去滓溫服一升不愈更服一升下利腹脹滿身體疼痛者先溫其裏乃攻其表溫裏宜四逆湯攻表宜桂枝湯下利欲飲水者以有熱故也白頭翁湯主之下利讝語者有燥屎也宜小承氣湯下利後更煩按之心下濡者為虛煩也宜梔子豉湯嘔家有癰膿者不可治嘔膿盡自愈嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之乾嘔吐涎沫頭痛者吳茱萸湯主之嘔而發熱者小柴胡湯主之傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也傷寒噦而腹滿視其前後知何部不利利之則愈
