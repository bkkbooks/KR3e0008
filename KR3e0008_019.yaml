body:
  text: 辨可吐第十九大法春宜吐凡用吐湯中病即止不必盡劑也病胸上諸實胸中鬱鬱而痛不能食欲使人按之而反有涎唾下利日十餘行其脈反遲寸口脈微滑此可吐之吐之利則止宿食在上脘者當吐之病人手足厥冷脈乍結以客氣在胸中心下滿而煩欲食不能食者病在胸中當吐之
