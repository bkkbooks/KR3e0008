  text: 註解傷寒論卷第二
  hash: sha256:1aefe64df3b57c92275c7096c84e46987d161c180be7b633dd58447a95d28018
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0008_SBCK_002-1a}
body:
  text: 漢張仲景著晉王叔和撰次宋成無巳註明汪濟川校正傷寒例第三隂陽大論云春氣温和夏氣暑熱秋氣清凉冬氣冷冽此則四時正氣之序也春夏爲陽春温夏熱者陽之動始於温盛於暑故也秋冬爲隂秋凉而冬寒者以隂之動始於清盛於寒故也冬時嚴寒萬類深藏君子固宻則不傷於寒觸冒之者乃名傷寒耳冬三月純隂用事陽乃伏藏水冰地坼寒氣嚴凝當是之時善攝生者岀處固宻去寒就温則不傷於寒其渉寒冷觸冐霜雪爲病者謂之傷寒也其傷於四時之氣皆能爲病春風夏暑秋濕冬寒謂之四時之氣以傷寒爲毒者以其最成殺厲之氣也熱爲陽陽主生寒爲隂隂主殺隂寒爲病最爲肅殺毒厲之氣中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變爲温病至夏變爲暑病暑病者熱極重於温也内經曰先夏至日爲温病後夏至日爲暑病温暑之病夲傷於寒而得之故太醫均謂之傷寒也是以辛苦之人春夏多温熱病皆由冬時觸寒所致非時行之氣也凡時行者春時應暖而復大寒夏時應大熱而反大凉秋時應凉而反大熱冬時應寒而反大温此非其時而有其氣是以一歲之中長㓜之病多相似者此則時行之氣也四時氣候不正爲病謂之時行之氣時氣所行爲病非暴厲之氣感受必同是以一歲之中長㓜之病多相似也夫欲候知四時正氣爲病及時行疫氣之法皆當按斗暦占之四時正氣者春風夏暑秋濕冬寒是也時行者時行之氣是也温者冬時感寒至春發者是也疫者暴厲之氣是也占前斗建審其時候之寒溫察其邪氣之輕重而治之故下文曰九月霜降節後冝漸寒向冬大寒至正月雨水節後冝解也所以謂之雨水者以冰雪解而爲雨水故也至驚蟄二月節後氣漸和暖向夏大熱至秋便凉冬寒春温夏熱秋凉爲四時之正氣也從霜降以後至春分以前凡有觸冐霜露體中寒即病者謂之傷寒也九月十月寒氣尚㣲爲病則輕十一月十二月寒冽巳嚴爲病則重正月二月寒漸將解爲病亦輕此以冬時不調適有傷寒之人即爲病也此爲四時正氣中而即病者也其冬有非節之暖者名曰冬温冬温之毒與傷寒大異冬温復有先後更相重沓亦有輕重爲治不同證如後章此爲時行之氣前云冬時應寒而反大温者是也從立春節後其中無暴大寒又不冰雪而有人壯熱爲病者此屬春時陽氣發於冬時伏寒變爲温病此爲温病也内經曰冬傷於寒春必病温從春分以後至秋分節前天有暴寒者皆爲時行寒疫也三月四月或有暴寒其時陽氣尚弱爲寒所折病熱猶輕五月六月陽氣巳盛爲寒所折病熱則重七月八月陽氣巳衰爲寒所折病熱亦㣲其病與温及暑病相似但治有殊耳此爲疫氣也是數者以明前斗暦之法占其隨時氣候發病寒熱輕重不同耳十五日得一氣於四時之中一時有六氣四六名爲二十四氣也節氣十二中氣十二共二十四内經曰五日謂之候三候謂之氣六氣謂之時四時謂之歲然氣候亦有應至而不至或有未應至而至者或有至而太過者皆成病氣也疑漏或有至而不去此一句按金匱要畧曰有未至而至有至而不至有至而不去有至而太過何故也師曰冬至之後甲子夜半少陽起少隂之時陽始生天得温和以未得甲子天因温和此爲未至而至也以得甲子而天未温和此爲至而不至也以得甲子天大寒不解此爲至而不去也以得甲子而天温如盛夏五六月時此爲至而太過也内經曰至而和則平至而甚則病至而反者病至而不至者病未至而至者病即是觀之脫漏明矣但天地動静隂陽鼓撃者各正一氣耳内經曰隂陽者天地之道清陽爲天動而不息濁隂爲地静而不移天地隂陽之氣鼓擊而生春夏秋冬寒熱溫凉各正一氣也是以彼春之暧爲夏之暑彼秋之忿爲冬之怒春暖爲夏暑從生而至長也秋忿爲冬怒從肅而至殺也是故冬至之後一陽爻升一隂爻降也夏至之後一陽氣下一隂氣上也十月六爻皆隂坤卦爲用隂極陽來陽生於子冬至之後一陽爻升一隂爻降於卦爲復言陽氣得復也四月六爻皆陽乾卦爲用陽極隂來隂生於午夏至之後一陽氣下一隂氣上於卦爲姤言隂則遇陽也内經曰冬至四十五日陽氣㣲上隂氣㣲下夏至四十五日隂氣㣲上陽氣㣲下斯則冬夏二至隂陽合也春秋二分隂陽離也陽生於子隂生於午是隂陽相接故曰合陽退於酉隂退於卯是隂陽相背故曰離内經曰氣至之謂至氣分之謂分至則氣同分則氣異隂陽交易人變病焉天地隂陽之氣旣交錯而不正人所以變病内經曰隂陽相錯而變由生也此君子春夏養陽秋冬養隂順天地之剛柔也内經曰養生者必順於時春夏養陽以凉以寒秋冬養隂以温以熱所以然者從其根故也小人觸冐必嬰暴疹湏知毒烈之氣留在何經而發何病詳而取之不能順四時調養觸冐寒温者必成暴病醫者當在意審詳而治之是以春傷於風夏必飱泄夏傷於暑秋必病瘧秋傷於濕冬必咳嗽冬傷於寒春必病温此必然之道可不審明之當春之時風氣大行春傷於風風氣通於肝肝以春適王風雖入之不能即發至夏肝衰然後始動風滛末疾則當發於四肢夏以陽氣外盛風不能外發故攻内而爲飱泄飱泄者下利米穀不化而色黄當秋之時濕氣大行秋傷於濕濕則干於肺肺以秋適王濕雖入之不能即發至冬肺衰然後濕始動也雨滛腹疾則當發爲下利冬以陽氣内固濕氣不能下行故上逆而爲咳嗽當夏之時暑氣大行夏傷於暑夏以隂爲主内暑雖入之勢未能動及秋隂出而陽爲内主然後暑動傳隂而爲痎􅒻痎者二日一發􅒻者一日一發當冬之時寒氣大行冬傷於寒冬以陽爲主内寒雖入之勢未能動及春陽岀而隂爲内主然後寒動傳陽而爲温病是感冐四時正氣爲病必然之道傷寒之病逐日淺深以施方治内經曰未滿三日者可汗而巳其滿三日者可泄而巳今世人傷寒或始不早治或治不對病或日數乆淹困乃告醫醫人又不依次第而治之則不中病皆冝臨時消息制方無不効也今搜採仲景舊論録其證候診脉聲色對病眞方有神驗者擬防世急也仲景之書逮今千年而顯用於世者王叔和之力也又土地温凉高下不同物性剛柔飡居亦異是黃帝興四方之問𡵨伯舉四治之能以訓後賢開其未悟者臨病之工宜須兩審也東方地氣温南方地氣熱西方地氣凉北方地氣寒西北方高東南方下是土地温凉高下不同也東方安居食魚西方陵居蕐食南方濕處而嗜酸北方野處而食乳是飡居之異也東方治宜砭石西方治冝毒藥南方治宜㣲針北方治宜灸􅡒是四方醫治不同也醫之治病當審其土地所冝凡傷於寒則爲病熱熱雖甚不死内經曰風寒客於人使人毫毛畢直皮膚閉而爲熱是傷寒爲病熱也鍼經曰多熱者易巳多寒者難巳是熱雖甚不死若兩感於寒而病者必死表裏俱病者謂之兩感尺寸俱浮者太陽受病也當一二日發以其脉上連風府故頭項痛腰脊強太陽爲三陽之長其氣浮於外故尺寸俱浮是邪氣初入皮膚外在表也當一二日發風府穴名也項中央太陽之脉從巔入絡腦還出別下項是以上連風府其經循肩膞内俠脊抵腰中故病頭項痛腰脊強尺寸俱長者陽明受病也當二三日發以其脉俠鼻絡於目故身熱目疼鼻乾不得卧陽明血氣俱多尺寸俱長者邪併陽明而血氣淖溢也太陽受邪不巳傳於陽明是當二三日發其脉俠鼻者陽明脉起於鼻交頸中絡於目陽明之脉正上䪼頞還岀繋目系身熱者陽明主身之肌肉鍼經曰陽明氣盛則身以前皆熱目疼鼻乾者經中客邪也不得卧者胃氣逆不得從其道也内經曰胃不和則卧不安尺寸俱弦者少陽受病也當三四日發以其脉循脇絡於耳故胷脇痛而耳聾内經曰陽中之少陽通於春氣春脉弦尺寸俱弦者知少陽受邪也二三日陽明之邪不巳傳於少陽是當三四日發胷脇痛而耳聾者經壅而不利也此三經皆受病未入於府者可汗而巳三陽受邪爲病在表法當汗解然三陽亦有便入府者入府則宜下故云未入於府者可汗而巳尺寸俱沉細者太隂受病也當四五日發以其脉布胃中絡於嗌故腹滿而嗌乾陽極則隂受之邪傳三陽旣遍次乃傳於隂經在陽爲在表在隂爲在裏邪在表則見陽脉邪在裏則見隂脉陽邪傳隂邪氣内䧟故太隂受病而脉尺寸俱沉細也自三陽傳於太隂是當四五日發也邪入於隂則漸成熱腹滿而嗌乾者脾經壅而成熱也尺寸俱沉者少隂受病也當五六日發以其脉貫腎絡於肺繋舌本故口燥舌乾而渴少隂腎水也性趣下少隂受病脉尺寸俱沉也四五日太隂之邪不巳至五六日則傳於少隂也是少隂病當五六日發人傷於寒則爲病熱謂始爲寒而終成熱也少隂爲病口燥舌乾而渴邪傳入裏熱氣漸深也尺寸俱㣲緩者厥隂受病也當六七日發以其脉循隂噐絡於肝故煩滿而囊縮緩者風脉也厥隂脉㣲緩者邪傳厥隂熱氣巳劇近於風也當六七日發以少隂邪傳於厥隂煩滿而囊縮者熱氣聚於内也此三經皆受病巳入於府可下而巳三隂受邪爲病在裏於法當下然三隂亦有在經者在經則冝汗故云巳入於府者可下而巳經曰臨病之工宜須兩審若兩感於寒者一日太陽受之即與少隂俱病則頭痛口乾煩滿而渴二日陽明受之即與太隂俱病則腹滿身熱不欲食讝語三日少陽受之即與厥隂俱病則耳聾囊縮而厥水漿不入不知人者六日死若三隂三陽五藏六府皆受病則榮衞不行府藏不通則死矣隂陽俱病表裏俱傷者爲兩感以其隂陽兩感病則兩證俱見至於傳經則亦隂陽兩經俱傳也始得一日頭痛者太陽口乾煩滿而渴者少隂至二日則太陽傳於陽明而少隂亦傳於太隂身熱讝語者陽明腹滿不欲食者太隂至三日陽明傳於少陽而太隂又傳於厥隂耳聾者少陽囊縮而厥者厥隂水漿不入不知人者胃氣不通也内經曰五藏巳傷六府不通榮衞不行如是之後三日乃死何也𡵨伯曰陽明者十二經脉之長也其血氣盛故云不知人三日其氣乃盡故死矣謂三日六經俱病榮衞之氣不得行於内外府藏之氣不得通於上下至六日府藏之氣俱盡榮衞之氣俱絶則死矣其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈也八日陽明病衰身熱少歇也九日少陽病衰耳聾㣲聞也十日太隂病衰腹减如故則思飲食十一日少隂病衰渴止舌乾巳而嚏也十二日厥隂病衰囊縱少腹㣲下大氣皆去病人精神爽慧也六日傳遍三隂三陽之氣皆和大邪之氣皆去病人精神爽慧也若過十三日以上不間尺寸䧟者大危間者瘳也十二日傳經盡則當瘳愈若過十三日巳上不瘳尺寸之脉沉䧟者即正氣内衰邪氣獨勝故云大危若更感異氣變爲他病者當依舊壞證病而治之若脉隂陽俱盛重感於寒者變爲温􅒻異氣者爲先病未巳又感别異之氣也兩邪相合變爲他病脉隂陽俱盛者傷寒之脉也難經曰傷寒之脉隂陽俱盛而緊濇經曰脉盛身寒得之傷寒則爲前病熱未巳再感於寒寒熱相搏變爲温􅒻陽脉浮滑隂脉濡弱者更遇於風變爲風溫此前熱未歇又感於風者也難經曰中風之脉陽浮而滑隂濡而弱風來乘熱故變風温陽脉洪數隂脉實大者遇温熱變為温毒温毒爲病最重也此前熱未巳又感温熱者也陽主表隂主裏洪數實大皆熱也兩熱相合變爲温毒以其表裏俱熱故爲病最重陽脉濡弱隂脉弦緊者更遇温氣變爲温疫以此冬傷於寒發爲温病脉之變証方治如說此前熱未巳又感温氣者也温熱相合變爲温疫凡人有疾不時即治隱忍兾差以成痼疾凡覺不佳急須求治苟延時日則邪氣入深難可復制千金曰凡有少苦似不如平常即須早道若隱忍不治兾望自差須臾之間以成痼疾此之謂也小兒女子益以滋甚小兒氣血未全女子血室多病凡所受邪易於滋蔓時氣不和便當早言㝷其邪由及在腠理以時治之罕有不愈者腠理者津液腠泄之所文理縫㑹之中也金匱要畧曰腠者是三焦通㑹元眞之處爲血氣所注理者是皮膚藏府之文理也邪客於皮膚則邪氣浮淺易爲散發若以時治之罕有不愈者矣金匱玉函曰主候長存形色未病未入腠理針藥及時服將調節委以良醫病無不愈患人忍之數日乃說邪氣入藏則難可制此爲家有患備慮之要邪在皮膚則外属陽而易治邪傳入裏則内属隂而難治内經曰善治者治皮毛其次治肌膚其次治筋脉其次治六府其次治五藏治五藏者半死半生也昔桓侯怠於皮膚之㣲疾以至骨髓之病家有患者可不備慮凡作湯藥不可避晨夜覺病須臾即冝便治不等早晩則易愈矣千金曰凡始覺不佳即須治療迄至於病湯食競進折其毒勢自然而差若或差遲病即傳變雖欲除治必難爲力傳有常也變無常也傳為循經而傳如太陽傳陽明是也變爲不常之變如陽證變隂證是也邪旣傳變病勢深也夲草曰病勢巳成可得半愈病勢巳過命將難全服藥正如方法縱意違師不須治之内經曰拘於鬼神者不可與言至德惡於針石者不可與言至巧病不許治者病必不治治之無功矣凡傷寒之病多從風寒得之凡中風與傷寒爲病自古通謂之傷寒千金曰夫傷寒病者起自風寒入於腠理與精氣分爭榮衞偏隔周身不通而病始表中風寒入裏則不消矣始自皮膚入於經絡傳於藏府是也未有温覆而當不消散者風寒初客於皮膚便投湯藥温暖發散而當者則無不消散之邪不在證治擬欲攻之猶當先解表乃可下之先解表而後下之則無復傳之邪也若表巳解而内不消非大滿猶生寒熱則病不除表證雖罷裏不至大堅滿者亦未可下之是邪未収歛成實下之則裏虚而邪復不除猶生寒熱也若表巳解而内不消大滿大實堅有燥屎自可除下之雖四五日不能爲禍也外無表證裏有堅滿爲下證悉具外臺云表和裏病下之則愈下證旣具則不必拘於日數若不宜下而便攻之内虚熱入恊熱遂利煩燥諸變不可勝數輕者困篤重者必死矣下之不當病輕者證猶變易而難治又矧重者乎夫陽盛隂虚汗之則死下之則愈陽虚隂盛汗之則愈下之則死表爲陽裏爲隂隂虚者陽必湊之陽盛之邪乘其裏虚而入於府者爲陽盛隂虚也經曰尺脉弱名曰隂不足陽氣下䧟入隂中則發熱者是矣下之除其内熱而愈若反汗之則竭其津液而死隂脉不足陽往從之陽脉不足隂往乘之隂邪乘其表虚客於榮衞之中者爲陽虚隂盛也經曰假令寸口脉㣲名曰陽不足隂氣上入陽中則灑淅惡寒者是矣汗之散其表寒則愈若反下之則脫其正氣而死經曰夲發汗而復下之此爲逆也夲先下之而反汗之爲逆夫如是則神丹安可以誤發丼遂何可以妄攻虚盛之治相背千里吉凶之機應若影響豈容易哉神丹者發汗之藥也丼遂者下藥也若汗下當則吉汗下不當則凶其應如影隨形如響應聲况桂枝下咽陽盛則斃承氣入胃隂盛以亡桂枝湯者發汗藥也承氣湯者下藥也金匱玉函曰不當汗而強與汗之者令人奪其津液枯槁而死不當下而強與下之者令人開膓洞泄便溺不禁而死死生之要在乎須臾視身之盡不暇計日投湯不當則災禍立見豈暇計其日數哉此隂陽虚實之交錯其候至㣲發汗吐下之相反其禍至速而醫術淺狹懵然不知病源爲治乃悮使病者殞殁自謂其分至今冤魂塞於冥路死屍盈於矌野仁者鑒此豈不痛歟凡兩感病俱作治有先後發表攻裏夲自不同而執迷妄意者乃云神丹丼遂合而飲之且解其表又除其裏言巧似是其理實違夫智者之舉錯也常審以愼愚者之動作也必果而速安危之變豈可詭哉世上之士但務彼翕習之榮而莫見此傾危之敗惟明者居然能護其本近取諸身夫何逺之有焉兩感病俱作欲成不治之疾醫者大冝消息審其先後次第而治之若妄意攻治以求速效者必致傾危之敗凡發汗温服湯藥其方雖言日三服若病劇不解當促其間可半日中盡三服若與病相阻即便有所覺重病者一日一夜當晬時觀之如服一劑病證猶在故當復作本湯服之至有不肯汗岀服三劑乃解若汗不岀者死病也發汗藥須温暖服者易爲發散也日三服者藥勢續也病勢稍重當促急服之以折盛熱不可拘於本方設藥病不相對湯入即便知之如隂多者投以凉藥即寒逆隨生陽多者飮以温劑則熱毒即起是便有所覺晬時者周時也一日一夜服湯藥盡劑更㸔其傳如病證猶在當復作夲湯以發其汗若服三劑不解汗不出者邪氣大甚湯不能勝必成大疾千金曰熱病脉躁盛而不得汗者此陽脉之極也死凡得時氣病至五六日而渴欲飮水飮不能多不當與也何者以腹中熱尚少不能消之便更與人作病也至七八日大渇欲飮水者猶當依證與之與之常令不足勿極意也言能飮一斗與五升若飲而腹滿小便不利若喘若􅎪不可與之忽然大汗出是爲自愈也熱在上焦則爲消渴言熱消津液而上焦乾燥則生渇也大熱則能消水熱少不能消之若強飮則停飲變爲諸病至七八日陽勝氣温向解之時多尚生大渴亦須少少與之以潤胃氣不可極意飲也若飮而腹滿小便不利若喘若􅎪者爲水飮内停而不散不可更與之忽然陽氣通水氣散先發於外作大汗而解凡得病反能飲水此爲欲愈之病其不曉病者但聞病飮水自愈小渇者乃強與飮之因成其禍不可復數小渴者爲腹中熱少若強與水水飲不消復爲諸飲病也凡得病厥脉動數服湯藥更遲脉浮大减小初躁後静此皆愈證也動數之脉邪在陽也湯入而變遲者陽邪愈也浮大之脉邪在表也而復减小者表邪散也病初躁亂者邪所煩也湯入而安靜者藥勝病也是皆爲愈證凡治温病可刺五十九穴五十九穴者以㵼諸經之温熱鍼經曰熱病取之諸陽五十九穴刺以㵼其熱而岀其汗實其隂而𥙷其不足所謂五十九刺兩手内外側各三凡十二痏五指間各一凡八痏足亦如是頭入髪際一寸旁三分各三凡六痏更入髪三寸邉五凡十痏耳前後口下各一項中一穴凡六痏巔上一𩕄㑹一髪際一廉泉一風池二天柱二又内經曰熱俞五十九頭上五行行五者以㵼諸陽之熱逆也大杼􅈾俞缺盆背俞此八者以㵼胷中之熱也氣衝三里巨虚上下廉此八者以㵼胃中之熱也雲門䯞骨委中髓空此八者以㵼四支之熱也五藏俞旁五此十者以㵼五藏之熱也凡此五十九穴者皆熱之左右也又身之穴三百六十有五其三十九穴灸之有害七十九穴刺之爲災并中髓也穴有三百六十五以應一歲其灸刺之禁皆肉薄骨解之處血脉虚少之分鍼灸井中髓也凡脉四損三日死平人四息病人脉一至名曰四損脉五損一日死平人正息病人脉一至名曰五損脉六損一時死平人六息病人脉一至名曰六損四藏氣絶者脉四損五藏氣絶者脉五損五藏六府俱絶者脉六損脉盛身寒得之傷寒脉虚身熱得之傷暑内經曰脉者血之府也脉實血實脉虚血虚寒則傷血邪併於血則血盛而氣虚故傷寒者脉盛而身寒熱則傷氣邪併於氣則氣盛而血虚故傷暑者脉虚而身熱脉隂陽俱盛大汗岀不解者死脉隂陽俱盛當汗岀而解若汗岀不解則邪氣内勝正氣外脫故死内經曰汗出而脉尚躁盛者死千金曰熱病巳得汗脉尚躁盛此陽脉之極也死脉隂陽俱虚熱不止者死脉隂陽俱虚者真氣弱也熱不止者邪氣勝也内經曰病温虚甚者死脉至乍踈乍數者死爲天真滎衞之氣斷絶也脉至如轉索者其日死爲緊急而不軟是中無胃氣故不岀其日而死讝言妄語身㣲熱脉浮大手足温者生逆冷脉沉細者不過一日死矣讝言妄語陽病也身㣲熱脉浮大手足温爲脉病相應若身逆冷脉沉細爲陽病見隂脉脉病不相應故不過一日而死難經曰脉不應病病不應脉是爲死病此以前是傷寒熱病證候也辨痓濕暍脉證第四傷寒所致太陽痓濕暍三種宜應别論以爲與傷寒相似故此見之痓當作痙傳冩之誤也痓者惡也非強也内經曰肺移熱於腎傳於柔痓柔爲筋柔而無力痙謂骨痙而不隨痙者強也千金以強直爲痓經曰頸項強急口噤背反張者痓即是觀之痓爲痙字明矣太陽病發熱無汗反惡寒者名曰剛痓千金曰太陽中風重感寒濕則變痓太陽病發熱無汗爲表實則不當惡寒今反惡寒者則太陽中風重感於寒爲痓病也以表實感寒故名剛痓太陽病發熱汗出不惡寒者名曰柔痓太陽病發熱汗岀爲表虚則當惡寒其不惡寒者爲陽明病今發熱汗出而不惡寒者非陽明證則是太陽中風重感於濕爲柔痓也表虚感濕故曰柔痓太陽病發熱脉沉而細者名曰痓太陽主表太陽病發熱爲表病脉當浮大今脉反沉細旣不愈則太陽中風重感於濕而爲痓也金匱要畧曰太陽病其證備身體強几几然脉反沉遲此爲痓括蔞桂枝湯主之太陽病發汗太多因致痓太陽病發汗太多則亡陽内經曰陽氣者精則養神柔則養筋陽㣲不能養筋則筋脉緊急而成痓也病身熱足寒頸項強急惡寒時頭熱靣赤目脉赤獨頭靣揺卒口噤背反張者痓病也太陽中風爲純中風也太陽傷寒爲純傷寒也皆不作痓惟是太陽中風重感寒濕乃變爲痓也身熱足寒者寒濕傷下也時頭熱靣赤目脉赤風傷於上也頭摇者風主動也獨頭揺者頭爲諸陽之㑹風傷陽也若純傷風者身亦爲之動摇手足爲之搐搦此皆内挾寒濕故頭摇也口噤者寒主急也卒口噤者不常噤也有時而緩若風寒相搏則口噤而不時開此皆加之風濕故卒口噤也足太陽之脉起於目内眥上額交巔上其支别者從巔入絡腦還岀别下項循肩膞内夾脊抵腰中下貫臀以下至足風寒客於經中則筋脉拘急故頸項強急而背反張也太陽病關節疼痛而煩脉沉而細者此名濕痺之候其人小便不利大便反快但當利其小便金匱要畧曰霧傷皮腠濕流關節疼痛而煩者濕氣内流也濕同水也脉沉而細者水性趣下也痺痛也因其關節煩疼而名曰濕痺非脚氣之痺也内經曰濕勝則濡泄小便不利大便反快者濕氣内勝也但當利其小便以宜泄腹中濕氣古云治濕之病不利小便非其治也濕家之爲病一身盡疼發熱身色如似熏黃身黃如橘子色者陽明瘀熱也此身色如似熏黃即非陽明瘀熱身黃發熱者梔子蘗皮湯主之爲表裏有熱則身不疼痛此一身盡疼非傷寒客熱也知濕邪在經而使之脾惡濕濕傷則脾病而色見是以身發黃者爲其黃如煙熏非正黃色也濕家其人但頭汗岀背強欲得𬒳覆向火若下之早則􅎪匈滿小便不利舌上如胎者以丹田有熱匈中有寒渴欲得水而不能飲則口燥煩也濕家有風濕有寒濕此寒濕相搏者也濕勝則多汗傷寒則無汗寒濕相搏雖有汗而不能周身故但頭汗出也背陽也腹隂也太陽之脉夾脊抵腰太陽客寒濕表氣不利而背強也裏有邪者外不惡寒表有邪者則惡寒欲得𬒳覆向火者寒濕在表而惡寒也若下之早則傷動胃氣損其津液故致􅎪而匈滿小便不利下後裏虚上焦陽氣因虚而䧟於下焦爲丹田有熱表中寒乘而入於匈中爲匈上有寒使舌上生白胎滑也藏燥則欲飲水以匈上客寒濕故不能飲而但口燥煩也濕家下之額上汗岀㣲喘小便利者死若下利不止者亦死濕家發汗則愈金匱要畧曰濕家身煩疼可與麻黃加术四兩發其汗爲冝若妄下則大逆額上汗岀而㣲喘者乃陽氣上逆也小便自利或下利者隂氣下流也隂陽相離故云死矣内經曰隂陽離缺精氣乃絶問曰風濕相搏一身盡疼痛法當汗出而解值天隂雨不止醫云此可發汗汗之病不愈者何也荅曰發其汗汗大岀者但風氣去濕氣在是故不愈也若治風濕者發其汗但㣲㣲似欲汗出者風濕俱去也值天隂雨不止明其濕勝也内經曰陽受風氣隂受濕氣又曰傷於風者上先受之傷於濕者下先受之風濕相搏則風在外而濕在内汗大岀者其氣暴暴則外邪岀而裏邪不能岀故風去而濕在汗㣲㣲而岀者其氣緩緩則内外之邪皆岀故風濕俱去也濕家病身上疼痛發熱靣黃而喘頭痛鼻塞而煩其脉大自能飯食腹中和無病病在頭中寒濕故鼻塞内藥鼻中則愈病有淺深證有中外此則濕氣淺者也何以言之濕家不云關節煩疼而云身上疼痛是濕氣不流關節而外客肌表也不云發熱身似熏黃復云發熱靣黃而喘是濕不干於脾而薄於上焦也隂受濕氣則濕邪爲深今頭痛鼻塞而煩是濕客於陽而不客於隂也濕家之脉當沉細爲濕氣内流脉大者陽也則濕不内流而外在表也又以自能飲食匈腹别無滿痞爲腹中和無病知其濕氣㣲淺内藥鼻中以宣泄頭中寒濕病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗岀當風或乆傷取冷所致也一身盡疼者濕也發熱日晡所劇者風也若汗岀當風而得之者則先客濕而後感風若乆傷取冷得之者則先傷風而後中濕可與麻黃杏仁薏苡仁丼草湯見金匱要畧中太陽中熱者暍是也其人汗岀惡寒身熱而渴也汗岀惡寒身熱而不渴者中風也汗岀惡寒身熱而渴者中暍也白虎加人參湯主之見金匱要畧中方太陽中暍者身熱疼重而脉㣲弱此亦夏月傷冷水水行皮中所致也經曰脉虚身熱得之傷暑身熱脉㣲弱者暍也身體疼重者水也夏時暑熱以水灌洗而得之一物瓜蔕散主之見金匱要畧中方太陽中暍者發熱惡寒身重而疼痛其脉弦細芤遲小便巳灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加温針則發熱甚數下之則淋甚病有在表有在裏者有表裏俱病者此則表裏俱病者也發熱惡寒身重疼痛者表中暍也脉弦細芤遲者中暑脉虚也小便巳灑灑然毛聳手足逆冷者太陽經氣不足也小有勞身即熱者謂勞動其陽而暍即發也口開前板齒燥者重有熱也内經曰因於暑汗煩則喘喝口開謂喘喝也以喘喝不止故前板齒乾燥若發汗以去表邪則外虚陽氣故惡寒甚若以温針助陽則火熱内攻故發熱甚若下之以除裏熱則内虚而膀胱燥故淋甚辨太陽病脉證并治法上第五太陽之爲病脉浮頭項強痛而惡寒經曰尺寸俱浮者太陽受病太陽受病太陽主表爲諸陽主氣脉浮頭項強痛而惡寒者太陽表病也太陽病發熱汗岀惡風脉緩者名爲中風風陽也寒隂也風則傷衞發熱汗岀惡風者衞中風滎病發熱無汗不惡風而惡寒衞病則發熱汗岀不惡寒而惡風以衞爲陽衞外者也病則不能衞固其外而皮腠踈故汗岀而惡風也傷寒脉緊傷風脉緩者寒性勁急而風性解緩故也太陽病或巳發熱或未發熱必惡寒體痛嘔逆脉隂陽俱緊者名曰傷寒經曰凡傷於寒則爲病熱爲寒氣客於經中陽經怫結而成熱也中風即發熱者風爲陽也及傷寒云或巳發熱或未發熱以寒爲隂邪不能即熱欝而方變熱也風則傷衞寒則傷榮衞虚者惡風榮虚者惡寒榮傷寒者必惡寒也氣病者則麻血病者則痛風令氣緩寒令氣逆體痛嘔逆者榮中寒也經曰脉盛身寒得之傷寒脉隂陽俱緊者知其傷寒也傷寒一日太陽受之脉若靜者爲不傳頗欲吐若燥煩脉數急者爲傳也太陽主表一日則太陽受邪至二日當傳陽明若脉氣㣲而不傳陽明胃經受邪則喜吐寒邪傳裏者則變熱如頗欲吐若煩燥脉急數者爲太陽寒邪變熱傳於陽明也傷寒二三日陽明少陽證不見者爲不傳也傷寒二三日無陽明少陽證知邪不傳止在太陽經中也太陽病發熱而渴不惡寒者爲温病發熱而渴不惡寒者陽明也此太陽受邪知爲温病非傷寒也積温成熱所以發熱而渴不惡寒也若發汗巳身灼熱者名曰風温風温爲病脉隂陽俱浮自汗岀身重多眠睡息必鼾語言難岀若被下者小便不利直視失溲若𬒳火者㣲發黃色劇則如驚癎時瘈瘲若火熏之一逆尚引日再逆促命期傷寒發汗巳則身凉若發汗巳身灼熱者非傷寒爲風温也風傷於上而陽受風氣風與温相合則傷衞脉隂陽俱浮自汗岀者衞受邪也衞者氣也風則傷衞温則傷氣身重多眠睡者衞受風温而氣昏也鼻息必鼾語言難岀者風温外甚而氣擁不利也若𬒳下者則傷藏氣太陽膀胱經也内經曰膀胱不利爲癃不約爲遺溺癃者小便不利也太陽之脉起目内眥内經曰瞳子高者太陽不足戴眼者太陽巳絶小便不利直視失溲爲下後竭津液損藏氣風温外勝經曰欲絶也爲難治若被火者則火助風温成熱㣲者熱瘀而發黃劇者熱甚生風如驚癎而時瘈瘲也先曽𬒳火爲一逆若更以火熏之是再逆也一逆尚猶延引時日而不愈其再逆者必致危殆故云促命期病有發熱惡寒者發於陽也無熱惡寒者發於隂也發於陽者七日愈發於隂者六日愈以陽數七隂數六故也陽爲熱也隂爲寒也發熱而惡寒寒傷陽也無熱而惡寒寒傷隂也陽法火隂法水火成數七水成數六陽病七日愈者火數足也隂病六日愈者水數足也太陽病頭痛至七日巳上自愈者以行其經盡故也若欲作再經者鍼足陽明使經不傳則愈傷寒自一日至六日傳三陽三隂經盡至七日當愈經曰七日太陽病衰頭痛少愈若七日不愈則太陽之邪再傳陽明鍼足陽明爲迎而奪之使經不傳則愈太陽病欲解時從巳至未上巳爲正陽則陽氣得以復也始於太陽終於厥隂六經各以三時爲解而太陽從巳至未陽明從申至戌少陽從寅至辰至於太隂從亥至丑少隂從子至寅厥隂從丑至卯者以陽行也速隂行也緩陽主於晝隂主於夜陽三經解時從寅至戌以陽道常饒也隂三經解時從亥至卯以隂道常乏也内經曰陽中之太陽通於夏氣則巳午未太陽乘王也風家表解而不了了者十二日愈中風家發汗解後未全快暢者十二日大邪皆去六經悉和則愈病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也皮膚言淺骨髓言深皮膚言外骨髓言内身熱欲得衣者表熱裏寒也身寒不欲衣者表寒裏熱也太陽中風陽浮而隂弱陽浮者熱自發隂弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之陽以候衞隂以候榮陽脉浮者衞中風也隂脉弱者榮氣弱也風并於衞則衞實而榮虚故發熱汗自出也經曰太陽病發熱汗岀者此爲榮弱衞強者是也嗇嗇者不足也惡寒之貌也淅淅者灑淅也惡風之貌也衞虚則惡風榮虚則惡寒榮弱衞強惡寒復惡風者以自汗岀則皮膚緩腠理踈是亦惡風也翕翕者熇熇然而熱也若合羽所覆言熱在表也鼻鳴乾嘔者風擁而氣逆也與桂枝湯和榮衞而散風邪也桂枝湯方桂枝三兩去皮味辛熱芍藥三兩味苦酸㣲寒丼草二兩炙味丼平生薑三兩切味辛温大棗十二枚擘味丼温内經曰辛丼發散爲陽桂枝湯辛丼之劑也所以發散風邪内經曰風滛所勝平以辛佐以苦丼以丼緩之以酸収之是以桂枝爲主芍藥丼草爲佐也内經曰風滛於内以丼緩之以辛散之是以生薑大棗爲使也右伍味㕮咀以水㭍升㣲火煑取三升去滓適寒温服壹升服巳湏臾歠熱稀粥壹升餘以助藥力温覆令壹時許遍身漐漐㣲似有汗者益佳不可令如水流漓病必不除若壹服汗岀病差停後服不必盡劑若不汗更服依前法又不汗後服小促􅟕其間半日許令叄服盡若病重者壹日壹夜服周時觀之服壹劑盡病證猶在者更作服若汗不岀者乃服至貳叄劑禁生冷粘滑肉麵五辛酒酪臭惡等物太陽病頭痛發熱汗岀惡風者桂枝湯主之頭痛者太陽也發熱汗岀惡風者中風也與桂枝湯解散風邪太陽病項背強几几反汗岀惡風者桂枝加葛根湯主之几几者伸頸之貌也動則伸頸摇身而行項背強者動則如之項背几几者當無汗反汗岀惡風者中風表虚也與桂枝湯以和表加麻黃葛根以祛風且麻黃主表實後葛根湯證云太陽病項背強几几無汗惡風葛根湯主之藥味正與此方同其無汗者當用麻黃今自汗岀恐不加麻黃但加葛根也太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之太陽病属表而反下之則虚其裏邪欲乘虚傳裏若氣上衝者裏不受邪而氣逆上與邪爭也則邪仍在表故當復與桂枝湯解外其氣不上衝者裏虚不能與邪爭邪氣巳傳裏也故不可更與桂枝湯攻表太陽病三日巳發汗若吐若下若温鍼仍不解者此爲壞病桂枝不中與也觀其脉證知犯何逆隨證治之太陽病三日中曽經發汗吐下温鍼虚其正氣病仍不解者謂之壞病言爲醫所壞病也不可復與桂枝湯審觀脉證知犯何逆而治之逆者隨所逆而救之桂枝本爲解肌若其人脉浮緊發熱汗不岀者不可與也常須識此勿令誤也脉浮發熱汗岀惡風者中風也可與桂枝湯解肌脉浮緊發熱不汗出者傷寒也可與麻黃湯常須識此勿妄治也若酒客病不可與桂枝湯得湯則嘔以酒客不喜丼故也酒客内熱喜辛而惡丼桂枝湯丼酒客得之則中滿而嘔喘家作桂枝湯加厚朴杏子佳太陽病爲諸陽主氣風甚氣擁則生喘也與桂枝湯以散風加厚朴杏仁以降氣凡服桂枝湯吐者其後必吐膿血也内熱者服桂枝湯則吐如酒客之類也旣亡津液又爲熱所搏其後必吐膿血吐膿血謂之肺痿金匱要畧曰熱在上焦爲肺痿謂或從汗或從嘔吐重亡津液故得之太陽病發汗遂漏不止其人惡風小便難四支㣲急難以屈伸者桂枝加附子湯主之太陽病因發汗遂汗漏不止而惡風者爲陽氣不足因發汗陽氣益虚而皮腠不固也内經曰膀胱者州都之官津液藏焉氣化則岀小便難者汗岀亡津液陽氣虚弱不能施化四肢者諸陽之夲也四肢㣲急難以屈伸者亡陽而脫液也鍼經曰液脫者骨屬屈伸不利與桂枝加附子湯以温經復陽太陽病下之後脉促胷滿者桂枝去芍藥湯主之若㣲惡寒者去芍藥方中加附子湯主之脉來數時一止復來者名曰促促爲陽盛則不因下後而脉促者也此下後脉促不得爲陽盛也太陽病下之其脉促不結胷者此爲欲解此下後脉促而復胷滿則不得爲欲解由下後陽虚表邪漸入而客於胷中也與桂枝湯以散客邪通行陽氣芍藥益隂陽虚者非所冝故去之陽氣巳虚若更加之㣲惡寒則必當温劑以散之故加附子太陽病得之八九日加􅒻狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脉㣲緩者爲欲愈也脉㣲而惡寒者此隂陽俱虚不可更發汗更下更吐也靣色反有熱色者未欲解也以其不能得小汗岀身必痒宜桂枝麻黄各半湯傷寒八九日則邪傳再經又遍三陽欲傳三隂之時也傳經次第則三日傳遍三陽至四日陽去入隂不入隂者爲欲解其傳隂經第六日傳遍三隂爲傳經盡而當解其不解傳爲再經者至九日又遍三陽陽不傳隂則解如􅒻發作有時也寒多者爲病進熱多者爲病退經曰厥少熱多其病爲愈寒多熱少陽氣退故爲進也今雖發熱惡寒而熱多寒少爲陽氣進而邪氣少也裏不和者嘔而利今不嘔清便自調者裏和也寒熱間日發者邪氣深也日一發者邪氣復常也日再發者邪氣淺也日二三發者邪氣㣲也内經曰大則邪至小則平言邪甚則脉大邪少則脉㣲今日數多而脉㣲緩者是邪氣㣲緩也故云欲愈脉㣲而惡寒者表裏俱虚也陽表也隂裏也脉㣲爲裏虚惡寒爲表虚以表裏俱虚故不可更發汗更下更吐也隂陽俱虚則靣色青白反有熱色者表未解也熱色爲赤色也得小汗則和不得汗則得邪氣外散皮膚而爲痒也與桂枝麻黃各半湯小發其汗以除表邪太陽病初服桂枝湯反煩不解者先刺風池風府却與桂枝湯則愈煩者熱也服桂枝湯後當汗岀而身凉和若反煩不解者風甚而未能散也先刺風池風府以通太陽之經而泄風氣却與桂枝湯解散則愈服桂枝湯大汗岀脉洪大者與桂枝湯如前法若形如􅒻日再發者汗岀必解宜桂枝二麻黃一湯經曰如服一劑病證猶在者故當復作本湯服之服桂枝湯汗岀後脉洪大者病猶在也若形如􅒻日再發者邪氣客於榮衞之間也與桂枝二麻黃一湯解散榮衞之邪服桂枝湯大汗岀後大煩渴不解脉洪大者白虎加人參湯主之大汗岀脉洪大而不渴邪氣猶在表也可更與桂枝湯若大汗岀脉洪大而煩渴不解者表裏有熱不可更與桂枝湯可與白虎加人參湯生津止渴和表散熱太陽病發熱惡寒熱多寒少脉㣲弱者此無陽也不可更汗宜桂枝二越婢一湯方桂枝二越婢一湯方桂枝去皮芍藥丼草各十八銖生薑一兩三錢切大棗四枚擘麻黄十八銖去節石膏二十四銖碎綿褁胃爲十二經之主脾治水榖爲卑藏若婢内經曰脾主爲胃行其津液是湯所以謂之越脾者以發越脾氣通行津液外臺方一名越脾湯即此義也右㭍味㕮咀以五升水煑麻黄一二沸去上沫内諸藥煑取二升去滓温服一升夲方當裁爲越婢湯桂枝湯合飲一升今合爲一方桂枝二越婢一服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿㣲痛小便不利者桂枝湯去桂加茯苓白术湯主之頭項強痛翕翕發熱雖經汗下爲邪氣仍在表也心下滿㣲痛小便利者則欲成結胷今外證未罷無汗小便不利則心下滿㣲痛爲停飮也與桂枝湯以解外加茯苓白术利小便行留飲傷寒脉浮自汗岀小便數心煩㣲惡寒脚攣急反與桂枝湯欲攻其表此誤也得之便厥咽中乾煩燥吐逆者作丼草乾薑湯與之以復其陽若厥愈足温者更作芍藥丼草湯與之其脚即伸若胃氣不和讝語者少與調胃承氣湯若重發汗復加燒鍼者四逆湯主之脉浮自汗岀小便數而惡寒者陽氣不足也心煩脚攣急者隂氣不足也隂陽血氣俱虚則不可發汗若與桂枝湯攻表則又損陽氣故爲誤也得之便厥咽中乾煩燥吐逆者先作丼草乾姜湯復其陽氣得厥愈足温乃與芍藥丼草湯益其隂血則脚踁得伸隂陽雖復其有胃燥讝語少與調胃承氣湯㣲溏以和其胃重發汗爲亡陽加燒針則損隂内經曰榮氣㣲者加燒針則血不流行重發汗復燒針是隂陽之氣大虚四逆湯以復隂陽之氣丼草乾薑湯方丼草四兩炙味丼平乾薑二兩炮味辛熱内經曰辛丼發散爲陽丼草乾薑相合以復陽氣右㕮咀以水叄升煑取一升五合去滓分温再服芍藥丼草湯方白芍藥四兩味酸㣲寒丼草四兩炙丼平芍藥白𥙷而赤㵼白収而赤散也酸以收之丼以緩之酸丼相合用𥙷隂血右二味㕮咀以水叄升煑取一升半去滓分温再服之調胃承氣湯方大黄四兩去皮清酒浸丼草二兩炙味丼平芒硝半斤味醎苦大寒内經曰熱滛於内治以醎寒佐以苦丼芒硝醎寒以除熱大黄苦寒以蕩實丼草丼平助二物推陳而緩中右三味㕮咀以水叄升煑取一升去滓内芒硝更上火㣲煑令沸少少温服四逆湯方丼草二兩炙味丼平乾薑一兩半味辛熱附子一枚生用去皮破八片辛大熱内經曰寒淫於内治以丼熱又曰寒滛所勝平以辛熱丼草薑附相合爲丼辛大熱之劑乃可發散隂陽之氣右三味㕮咀以水三升煑取一升二合去滓分温再服強人可大附子一枚乾薑三兩問曰證象陽旦按法治之而増劇厥逆咽中乾兩脛拘急而讝語師曰言夜半手足當温兩脚當伸後如師言何以知此荅曰寸口脉浮而大浮則為風大則爲虚風則生㣲熱虚則兩脛攣病證象桂枝因加附子參其間増桂令汗出附子温經亡陽故也厥逆咽中乾煩燥陽明内結讝語煩亂更飲丼草乾薑湯夜半陽氣還兩足當熱脛尚㣲拘急重與芍藥丼草湯爾乃脛伸以承氣湯㣲溏則止其讝語故知病可愈陽旦桂枝湯别名也前證脉浮自汗岀小便數心煩㣲惡寒脚攣急與桂枝湯證相似是證象陽旦也與桂枝湯而増劇得寸口脉浮大浮爲風邪大爲血虚即於桂枝湯加附子温經以𥙷虚増桂令汗出以祛風其有治之之逆而増厥者與丼草乾薑湯陽復而足温更與芍藥丼草湯隂和而脛伸表邪巳解隂陽巳復而有陽明内結讝語煩亂少與調胃承氣湯㣲溏泄以和其胃則隂陽之氣皆和内外之邪悉去故知病可愈釋音清凉上七正反疫音役忿孚吻切疹之忍切癮疹也飱泄上音孫下音薛𩕄音信痎音皆瘧也䪼頞上音拙面骨也下音遏鼻也逮音代及也砭悲廉切石針也􅌊如劣切中病上音衆之長音掌嗌音益咽也沓徒合切俱見音現嚏丁計切瘳音抽病愈也痼音固迄許訖切至也狹懵上戸甲切下莫孔切殞羽粉功晬祖對切周歲也痏羽軌切􅈾於陵切匈也䯞音偶又音虞肩前也痓充至切惡也一曰風病暍音謁傷暑也痙巨井切強急也几几音殊短羽鳥飛几几也攣力全㓛内藥上音納晡布胡切灑蘇狠切驚貌惡寒上烏路切怫音佛鼾音汗卧息也癃音隆淅思歴切熇許酷切熱也歠昌恱切漐直立切汗岀貌脛胡定切卷二終
