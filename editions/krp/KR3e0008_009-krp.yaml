front:
  text: 註解傷寒論卷第十
  hash: sha256:3b592a009a7d9d159a37de9f2624d7ace7c8fbee78fe412ade8bf7e9a763fe88
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0008_SBCK_009-1a}
body:
  text: 漢張仲景著晉王叔和撰次宋成無已註明汪濟川校正辨發汗吐下後脉證并治第二十三此第十卷第二十二篇凡四十八證前三隂三陽篇中悉具載之卷内音釋上卷巳有此已下諸方於隨卷本證下雖巳有縁止以加减言之未甚明白似於覽者檢閲未便今復校勘備列于後桂枝加葛根湯主之方葛根四两芍藥二两甘草二两生薑三两切大棗十二枚擘桂枝二两去皮麻黄三两去節右七味以水一斗先煑麻黄葛根减二升去上沫内諸藥煑取三升去滓温服一升覆取㣲似汗不須啜粥餘如桂枝法桂枝加厚朴杏子湯方於桂枝湯方内加厚朴二兩否仁五十箇去皮尖餘依前法桂枝加附子湯方於桂枝湯方内加附子一枚炮去皮破八片餘依前法术附湯方附於此方内去桂枝加白术四兩依前法桂枝去芍藥湯方於桂枝湯方内去芍藥餘依前法桂枝去芍藥加附子湯方於桂枝湯方内去芍藥加附子一枚炮去皮破八片餘依前法桂枝麻黄各半湯方桂枝一两十六銖去皮芍藥生薑切甘草炙麻黄各一两去節大棗四枚擘杏仁二十四箇湯浸去皮尖及两仁者右七味以水五升先煑麻黄一二沸去上沫内諸藥煑取一升八合去滓温服六合桂枝二麻黄一湯方桂枝一两十七銖去皮芍藥一两六銖麻黄十六銖去節生薑一两六銖切杏仁十六箇去皮尖甘草一两二銖炙大棗五枚擘右七味以水五升先煑麻黄一二沸去上沫内諸藥煑取二升去滓温服一升日再白虎加人參湯方於白虎湯方内加人參三兩餘依白虎湯法桂枝去桂加茯苓白术湯方於桂枝湯方内去桂枝加茯苓白术各三兩餘依前法煎服小便利則愈已上九方病證並在第二卷内葛根加半夏湯方於葛根湯方内加入半夏半升餘依葛根湯法桂枝加芍藥生薑人參新加湯方於第二卷桂枝湯方内更加芍藥生薑各一兩人參三兩餘依桂枝湯法服梔子甘草豉湯方於梔子豉湯方内加入甘草二兩餘依前法得吐止後服梔子生薑豉湯方於梔子豉湯方内加生薑五兩餘依前法得吐止後服柴胡加芒硝湯方於小柴胡湯方内加芒硝六兩餘依前法服不觧更服桂枝加桂湯方於第二卷桂枝湯方内更加桂二兩共五兩餘依前法巳上六方病證並在第三卷内柴胡桂枝湯方桂枝去皮黄芩人參各一两半甘草一两炙半夏二合半芍藥一两半大棗六枚擘生薑一两半切柴胡四两右九味以水七升煑取三升去滓温服附子㵼心湯方大黄二两黄連黄芩各一两附子一枚炮去皮破别煑取汁右四味切三味以麻沸湯二升漬之湏臾絞去滓内附子汁分温再服生薑㵼心湯方生薑四两切甘草三两炙人參三两乾薑一两黄芩三两半夏半升洗黄連一两大棗十二枚右八味以水一斗煑取六升去滓再煎取三升温服一升日三服甘草㵼心湯方甘草四两黄芩三两乾薑三两半夏半升洗黄連一两大棗十二枚擘右六味以水一斗煑取六升去滓再煎取三升温服一升日三服黄芩加半夏生薑湯方於黄芩湯方内加半夏半升生薑一两半餘依黄芩湯法服已上五方病證並在第四卷内桂枝加大黄湯方桂枝三两去皮大黄一两芍藥六两生薑三两切甘草二两炙大棗十二枚擘右六味以水七升煑取三升去滓温服一升日三服桂枝加芍藥湯方於第二卷桂枝湯方内更加芍藥三两隨前共六兩餘依桂枝湯法四逆加呉茱茰生薑湯方當歸二两芍藥三两甘草二两炙通草二两桂枝三两去皮細辛三两生薑半斤切大棗二十五枚擘呉茱茰二升右九味以水六升清酒六升和煑取五升去滓温分五服一方水酒各四升已上三方病證並在第六卷内四逆加人參湯方於四逆湯方内加人參一兩餘依四逆湯法服四逆加猪膽汁湯方於四逆湯方内加入猪膽汁半合餘依前法服如無猪膽以羊膽代之巳上二方病證并在第七卷内註解傷寒論卷第十
