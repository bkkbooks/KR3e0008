  text: 註解傷寒論卷五
  hash: sha256:aa931d74f2701e80968bc16dbb1fc5284309488062ad76b6fb59a1f6a74b196c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0008_SBCK_005-1a}
body:
  text: 漢張仲景著晉王叔和撰次宋成無巳註明汪濟川校正辨陽明脉證并治第八問曰病有太陽陽明有正陽陽明有少陽陽明何謂也荅曰太陽陽明者脾約是也陽明胃也邪自太陽經傳之入府者謂之太陽陽明經曰太陽病若吐若下若發汗後㣲煩小便數大便因鞕者與小承氣湯即是太陽陽明脾約病也正陽陽明者胃家實是也邪自陽明經傳入府者謂之正陽陽明經曰陽明病脉遲雖汗岀不惡寒其身必重短氣腹滿而喘有潮熱者外欲解可攻裏也手足濈濈然汗岀者此大便巳鞕也大承氣湯主之即是正陽陽明胃家實也少陽陽明者發汗利小便已胃中燥煩實大便難是也邪自少陽經傳之入府者謂之少陽陽明經曰傷寒脉弦細頭痛發熱者属少陽少陽不可發汗發汗則讝語此属胃即是少陽陽明病也陽明之爲病胃家實也邪傳入胃熱毒留結則胃家爲實華陀曰熱毒入胃要須下去之不可留於胃中是知邪在陽明爲胃家實也問曰何縁得陽明病荅曰太陽病發汗若下若利小便此亡津液胃中乾燥因轉属陽明不更衣内實大便難者此名陽明也本太陽病不解因汗利小便亡津液胃中乾燥太陽之邪入府轉属陽明古人登厠必更衣不更衣者通爲不大便不更衣則胃中物不得泄故爲内實胃無津液加之畜熱大便則難爲陽明裏實也問曰陽明病外證云何荅曰身熱汗自岀不惡寒反惡熱也陽明病爲邪入府也邪在表則身熱汗出而惡寒邪旣入府則表證已罷故不惡寒但身熱汗出而惡熱也問曰病有得之一日不發熱而惡寒者何也荅曰雖得之一日惡寒將自罷即自汗出而惡熱也邪客在陽明當發熱而不惡寒今得之一日猶不發熱而惡寒者即邪未全入府尚帶表邪若表邪全入則更無惡寒必自汗岀而惡熱也問曰惡寒何故自罷荅曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此爲陽明病也胃爲水榖之海主養四旁四旁有病皆能傳入於胃入胃則更不復傳如太陽傳之入胃則更不傳陽明陽明病傳之入胃則更不傳少陽少陽病傳之入胃則更不傳三隂本太陽𥘉得病時發其汗汗先岀不徹因轉属陽明也傷寒傳經者則一日太陽二日陽明此太陽傳經故曰轉属陽明傷寒發熱無汗嘔不能食而反汗岀濈濈然者是轉属陽明也傷寒發熱無汗嘔不能食者太陽受病也若反汗岀濈濈然者太陽之邪轉属陽明也經曰陽明病法多汗傷寒三日陽明脉大傷寒三日邪傳陽明之時經曰尺寸俱長者陽明受病當二三日發陽明氣血俱多又邪併於經是以脉大傷寒脉浮而緩手足自温者是爲繫在太隂太隂者身當發黄若小便自利者不能發黄至七八月大便鞕者爲陽明病也浮爲陽邪緩爲脾脉傷寒脉浮緩太隂客熱邪在三陽則手足熱邪在三隂則手足寒今手足自温是知繫在太隂也太隂土也爲邪烝之則色見於外當發身黄小便自利者熱不内畜不能發黄至七八日大便鞕者即太隂之邪入府轉属陽明也傷寒轉繫陽明者其人濈然㣲汗岀也傷寒則無汗陽明法多汗此以傷寒邪轉繫陽明故濈然㣲汗岀陽明中風口苦咽乾腹滿㣲喘發熱惡寒脉浮而緊若下之則腹滿小便難也脉浮在表緊爲裏實陽明中風口苦咽乾腹滿㣲喘者熱傳於裏也發熱惡寒者表仍未解也若下之裏邪雖去表邪復入於裏又亡津液故使腹滿而小便難陽明病若能食名中風不能食名中寒陽明病以飲食别受風寒者以胃爲水榖之海風爲陽邪陽殺榖故中風者能食寒爲隂邪隂邪不殺榖故傷寒者不能食陽明病若中寒不能食小便不利手足濈然汗岀此欲作固瘕必大便𥘉鞕後溏所以然者以胃中冷水榖不别故也陽明中寒不能食者寒不殺榖也小便不利者津液不化也陽明病法多汗則周身汗岀此手足濈然而汗岀而身無汗者陽明中寒也固瘕者寒氣結積也胃中寒甚欲留結而爲固瘕則津液不得通行而大便必鞕者若汗岀小便不利者爲實也此以小便不利水榖不别雖大便𥘉鞕後必溏也陽明病欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗岀而解者此水不勝榖氣與汗共併脉緊則愈陽病客熱𥘉傳入胃胃熱則消榖而欲食陽明病熱爲實者則小便當數大便當鞕今小便反不利大便自調者熱氣散漫不爲實也欲食則胃中榖多内經曰食入於隂長氣於陽榖多則陽氣勝熱消津液則水少經曰水入於經其血乃成水少則隂血弱金匱要畧曰隂氣不通即骨疼其人骨節疼者隂氣不足也熱甚於表者翕翕發熱熱甚於裏者烝烝發熱此熱氣散漫不專著於表裏故翕翕如有熱狀奄忽也忽然發狂者隂不勝陽也内經曰隂不勝其陽者則脉流薄疾并乃狂陽明藴熱爲實者須下之愈熱氣散漫不爲實者必待汗岀而愈故云濈然而汗岀解也水榖之等者隂陽氣平也水不勝榖氣是隂不勝陽也汗岀則陽氣衰脉緊則隂氣生隂陽氣平兩無偏勝則愈故云與汗共併脉緊則愈陽明病欲解時從申至戌上四月爲陽土旺於申酉戌向王時是爲欲解陽明病不能食攻其熱必􅎪所以然者胃中虚冷故也以其人本虚故攻其熱必􅎪不能食胃中本寒攻其熱復虚其胃虚寒相搏故令􅎪也經曰關脉弱胃氣虚有熱不可大攻之熱去則寒起此之謂也陽明病脉遲食難用飽飽則㣲煩頭眩必小便難此欲作榖疸雖下之腹滿如故所以然者脉遲故也陽明病脉遲則邪方入裏熱未爲實也食入於隂長氣於陽胃中有熱食難用飽飽則㣲煩而頭眩者榖氣與熱氣相搏也兩熱相合消摶津液必小便難利者不能發黄言熱得泄也小便不利則熱不得泄身必發黄疸黄也以其發於榖氣之熱故名榖疸熱實者下之則愈脉遲爲熱氣未實雖下之腹滿亦不减也經曰脉遲尚未可攻陽明病法多汗反無汗其身如蟲行皮中狀者此以乆虚故也胃爲津液之府氣虚津液少病則反無汗胃候身之肌肉其身如蟲行皮中者知胃氣乆虚也陽明病反無汗而小便利二三日嘔而欬手足厥者必苦頭痛若不欬不嘔手足不厥者頭不痛陽明病法多汗反無汗而小便利者陽明傷寒而寒氣内攻也至二三日嘔欬而支厥者寒邪發於外也必苦頭痛若不欬不嘔手足不厥者是寒邪但攻裏而不外發其頭亦不痛也陽明病但頭眩不惡寒故能食而欬其人必咽痛若不欬者咽不痛陽明病身不重痛但頭眩而不惡寒者陽明中風而風氣内攻也經曰陽明病若能食名中風風邪攻胃胃氣上逆則欬咽門者胃之系欬甚則咽傷故必咽痛若胃氣不逆則不欬其咽亦不痛也陽明病無汗小便不利心中懊憹者身必發黄陽明病無汗而小便不利者熱藴於内而不得越心中懊憹者熱氣欝烝欲發於外而爲黄也陽明病𬒳火額上㣲汗出小便不利者必發黄陽明病則爲内熱𬒳火則火熱相合而甚若遍身汗岀而小便利者熱得泄越不能發黄今額上㣲汗岀而小便不利則熱不得越欝烝於胃必發黄也陽明病脉浮而緊者必潮熱發作有時但浮者必盗汗岀浮爲在經緊者裏實脉浮而緊者表熱裏實也必潮熱發作有時若脉但浮而不緊者止是表熱也必盗汗出盗汗者睡而汗出也陽明病裏熱者自汗表熱者盗汗陽明病口燥但欲漱水不欲嚥者此必衂陽明之脉起於鼻絡於口陽明裏熱則渇欲飲水此口燥但欲漱水不欲嚥者是熱在經而裏無熱也陽明氣血俱多經中熱甚迫血妄行必作衂也陽明病本自汗出醫更重發汗病已差尚㣲煩不了了者此大便必鞕故也以亡津液胃中乾燥故令大便鞕當問其小便日幾行若本小便日三四行今日再行故知大便不乆出今爲小便數少以津液當還入胃中故知不乆必大便也先亡津液使大便鞕小便數少津液分别大便必自下也傷寒嘔多雖有陽明證不可攻之嘔者熱在上焦未全入府故不可下陽明病心下鞕滿者不可攻之攻之利遂不止者死利止者愈陽明病腹滿者爲邪氣入府可下之心下鞕滿則邪氣尚淺未全入府不可便下之得利止者爲邪氣去正氣安正氣安則愈若因下利不止者爲正氣脫而死陽明病靣合赤色不可攻之必發熱色黄小便不利也合通也陽明病靣色通赤者熱在經也不可下之下之虚其胃氣耗其津液經中之熱乘虚入胃必發熱色黄小便不利也陽明病不吐不下心煩者可與調胃承氣湯吐後心煩謂之内煩下後心煩謂之虚煩今陽明病不吐不下心煩則是胃有欝熱也與調胃承氣湯以下欝熱陽明病脉遲雖汗岀不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裏也手足濈然而汗岀者此大便巳鞕也大承氣湯主之若汗多㣲發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯㣲和胃氣勿令大泄下陽明病脉遲若汗岀多㣲發熱惡寒者表未解也若脉遲雖汗出而不惡寒者表證罷也身重短氣腹滿而喘有潮熱者熱入府也四肢諸陽之本津液足爲熱烝之則周身汗出津液不足爲熱烝之其手足濈然而汗岀知大便已鞕也與大承氣湯以下胃熱經曰潮熱者實也其熱不潮是熱未成實故不可便與大承氣湯雖有腹大滿不通之急亦不可與大承氣湯與小承氣湯㣲和胃氣大承氣湯方大黄四兩苦寒酒洗厚朴半斤苦温炙去皮枳實五枚苦寒炙芒硝三合醎寒内經曰燥淫所勝以苦下之大黄枳實之苦以潤燥除熱又曰燥淫於内治以苦温厚朴之苦下結燥又曰熱淫所勝治以鹹寒芒硝之鹹以攻藴熱右四味以水一斗先煑二物取五升去滓内大黄煑取二升去滓内芒硝更上火㣲一兩沸分温再服得下餘勿服小承氣湯方大黄四兩厚朴二兩炙去皮枳實三枚大者炙大熱結實者與大承氣湯小熱㣲結者與小承氣湯以熱不大甚故於大承氣湯去芒硝又以結不至堅故不减厚朴枳實也巳上三味以水四升煑取一升二合去滓分温二服𥘉服湯當更衣不爾者盡飲之若更衣者勿服之陽明病潮熱大便㣲鞕者可與大承氣湯不鞕者不與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣者此但𥘉頭鞕後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則􅎪其後發熱者必大便復鞕而少也以小承氣湯和之不轉失氣者愼不可攻也潮熱者實得大便㣲鞕者便可攻之若便不鞕者則熱未成實雖有潮熱亦未可攻若不大便六七日恐有燥屎當先與小承氣湯賾之如有燥屎小承氣湯藥勢緩不能宣泄必轉氣下失若不轉失氣是胃中無燥屎但腸間少鞕爾止𥘉頭鞕後必溏攻之則虚其胃氣致腹脹滿不能食也胃中乾燥則欲飲水水入胃中虚寒相搏氣逆則􅎪其後却發熱者則熱氣乘虚還復聚於胃中胃燥得熱必大便復鞕而少與小承氣湯㣲利與和之故以重云不轉失氣不可攻内愼之至也夫實則讝語虚則鄭聲鄭聲重語也内經曰邪氣盛則實精氣奪則虚讝語由邪氣盛而神識昬也鄭聲由精氣奪而聲不全也讝語者言語不次也鄭聲者鄭音不正也論語云惡鄭聲之亂雅樂又曰放鄭聲逺佞人鄭聲淫佞人殆言鄭聲不正也今新差氣虚人聲轉者是所謂重語者也若聲重亦聲轉之直視讝語喘滿者死下利者亦死直視讝語邪勝也喘滿爲氣上脫下利爲氣下脫是皆主死發汗多若重發汗者亡其陽讝語脉短者死脉自和者不死亡陽胃燥讝語者脉短津液已絶不可復治脉自和爲正氣未衰而猶可生也傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸牀惕而不安㣲喘直視脉弦者生濇者死㣲者但發熱讝語者大承氣湯主之若一服利止後服若吐若下皆傷胃氣不大便五六日上至十餘日者亡津液胃氣虚邪熱内結也陽明王於申酉戌日晡所發潮熱熱者陽明熱甚也不惡寒者表證罷也獨語如見鬼狀者陽明内實也以爲熱氣有餘若劇者是熱氣甚大也熱大甚於内昬冐正氣使不識人至於循衣摸牀惕而不安㣲喘直視傷寒陽勝而隂絶者死隂勝而陽絶者死熱劇者爲陽勝脉弦爲隂有餘澁爲隂不足陽熱雖劇脉弦知隂未絶而猶可生脉澁則絶隂故不可治其邪熱㣲而未至於劇者但發熱讝語可與大承氣湯以下胃中熱經曰凡服下藥中病即止不必盡劑此以熱未劇故云若一服利則止後服陽明病其人多汗以津液外岀胃中燥大便必鞕鞕則讝語小承氣湯主之若一服讝語止更莫復服亡津液胃燥大便鞕而讝語雖無大熱内結亦須與小承氣湯和其胃氣得一服讝語止則胃燥以潤更莫復與承氣湯以本無實熱故也陽明病讝語發潮熱脉滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣勿更與之明日不大便脉反㣲澁者裏虚也爲難治不可更與承氣湯也陽明病讝語發潮熱若脉沉實者内實者也則可下若脉滑疾爲裏熱未實則未可下先與小承氣湯和之湯入腹中得失氣者中有燥屎可更與小承氣湯一升以除之若不轉失氣者是無燥屎不可更與小承氣湯至明日邪氣傳時脉得沉實緊牢之類是裏實也反得㣲澁者裏氣大虚也若大便利後脉㣲澁者止爲裏虚而猶可此不曽大便脉反㣲澁是正氣内衰爲邪氣所勝故云難治陽明病讝語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但鞕爾冝大承氣湯下之讝語潮熱爲胃熱當消榖引食反不能食者胃中有燥屎而胃中實也若能食者胃中虚熱雖鞕不得爲有燥屎雜病虚爲不欲食實爲欲食傷寒則胃實熱甚者不能食胃中虚熱甚者能食與雜病爲異也大承氣湯以下燥屎逐結熱陽明病下血讝語者此爲熱入血室但頭汗岀者刺期門隨其實而㵼之濈然汗岀則愈陽明病熱入血室迫血下行使下血讝語陽明病法多汗以奪血者無汗故但頭汗岀也刺期門以散血室之熱隨其實而㵼之以除陽明之邪熱散邪除熱榮衛得通津液得復濈然汗岀而解汗岀讝語者以有燥屎在胃中此爲風也須下之過經乃可下之下之若早語言必亂以表虚裏實故也下之則愈冝大承氣湯胃中有燥屎則讝語以汗岀爲表未罷故云風也燥屎在胃則當下以表未和則未可下須過太陽經無表證乃可下之若下之早燥屎雖除則表邪乘虚復䧟於裏爲表虚裏實胃虚熱甚語言必亂與大承氣湯却下胃中邪熱則止傷寒四五日脉沈而喘滿沈爲在裏而反發其汗津液越岀大便爲難表虚裏實乆則讝語邪氣入内之時得脉沈而喘滿裏證其也則當下之反發其汗令津液越岀胃中乾燥大便必難乆則屎燥胃實必發讝語三陽合病腹滿身重難以轉側口不仁而靣垢讝語遺尿發汗則讝語下之則額上生汗手足逆冷若自汗岀者白虎湯主之腹滿身重難以反側口不仁讝語者陽明也鍼經曰少陽病甚則靣㣲塵此靣垢者少陽也遺尿者太陽也三者以陽明證多故岀陽明篇中三陽合病爲表裏有邪若發汗攻表則燥熱益甚必愈讝語若下之攻裏表熱乘虚内䧟必額上汗岀手足逆冷其自汗岀者三陽經熱甚也内經曰熱則腠理開榮衛通汗大泄與白虎湯以解内外之熱二陽併病太陽證罷但發潮熱手足漐漐汗岀大便難而讝語者下之則愈冝大承氣湯本太陽病併於陽明名曰併病太陽證罷是無表證但發潮熱是熱併陽明一身汗岀爲熱越今手足漐漐汗岀是熱聚於胃也必大便難而讝語經曰手足漐然而汗岀者必大便已鞕也與大承氣湯以下胃中實熱陽明病脉浮而緊咽燥口苦腹滿而喘發熱汗岀不惡寒反惡熱身重若發汗則燥心憒憒反讝語若加燒鍼必怵惕煩燥不得眠若下之則胃中空虚客氣動隔心中懊憹舌上胎者梔子豉湯主之脉浮發熱爲邪在表咽燥口苦爲熱在經脉緊腹滿而喘汗岀不惡寒反惡熱身重爲邪在裏此表裏俱有邪猶當雙解之若發汗攻表表熱雖除而内熱益甚故燥而憒憒反讝語憒憒者心亂經曰榮氣㣲者加燒鍼則血不行更發熱而躁煩此表裏有熱若加燒鍼則損動隂氣故怵惕煩燥不得眠也若下之裏熱雖去則胃中空虚表中客邪之氣乘虚䧟於上焦煩動於膈使心中懊憹而不了了也舌上胎黄者熱氣客於胃中舌上胎白知熱氣客於胸中與梔子豉湯以吐胸中之邪若渇欲飲水口乾舌燥者白虎加人參湯主之若下後邪熱客於上焦者爲虚煩此下後邪熱不客於上焦而客於中焦者是爲乾燥煩渇與白虎加人參湯散熱潤燥若脉浮發熱渇欲飲水小便不利者猪苓湯主之此下後客熱客於下焦者也邪氣自表入裏客於下焦三焦俱帶熱也脉浮發熱者上焦熱也渇欲飲水者中焦熱也小便不利者邪客下焦津液不得下通也與猪苓湯利小便以㵼下焦之熱也猪苓湯方猪苓去皮丼平茯苓丼平阿膠丼平滑石碎丼寒澤㵼丼醎寒各一兩丼甚而反淡淡味滲泄爲陽猪苓茯苓之丼以行小便鹹味湧泄爲隂澤㵼之鹹以泄伏水滑利竅阿膠滑石之滑以利水道右伍味以水四升先煑四味取二升去滓内下阿膠烊消温服七合日三服陽明病汗岀多而渇者不可與猪苓湯以汗多胃中燥猪苓湯復利其小便故也鍼經曰水榖入於口輸於腸胃其液别爲五天寒衣薄則爲溺天熱衣厚則爲汗是汗溺一液也汗多爲津液外泄胃中乾燥故不可與猪苓湯利小便也脉浮而遲表熱裏寒下利清榖者四逆湯主之浮爲表熱遲爲裏寒下利清榖者裏寒甚也與四逆湯温裏散寒若胃中虚冷不能食者飲水則􅎪􅎪者欬逆是也千金曰咳逆者􅎪逆之名胃中虚冷得水則水寒相搏胃氣逆而􅎪脉浮發熱口乾鼻燥能食者則衂脉浮發熱口乾鼻燥者熱在經也能食者裏和也熱甚於經迫血爲衂胃中虚冷隂勝也水入於經其血乃成飲水者助隂氣逆爲􅎪發熱口乾陽勝也食入於隂長氣於陽能食者助陽血妄爲衂三者偏隂偏陽之疾也陽明病下之其外有熱手足温不結胸心中懊憹飢不能食但頭汗岀者梔子豉湯主之表未罷而下者應邪熱内䧟也熱内䧟者則外熱而無手足寒今外有熱而手足温者熱雖内䧟然而不深故不作結胸也心中懊憹飢不能食者熱客胸中爲虚煩也熱自胸中薫蒸於上故但頭汗岀而身無汗與梔子豉湯以吐胸中之虚煩陽明病發潮熱大便溏小便自可胸脇滿不去者小柴胡湯主之陽明病潮熱爲胃實大便鞕而小便數今大便溏小便自可則胃熱未實而水榖不别也大便溏者應氣降而胸脇滿去今反不去者邪氣猶在半表半裏之間與小柴胡湯以去表裏之邪陽明病脇下鞕滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗岀解也陽明病腹滿不大便舌上胎黄者爲邪熱入府可下若脇下鞕滿雖不大便而嘔舌上曰胎者爲邪未入府在表裏之間與小柴胡湯以和解之上焦得通則嘔止津液得下則胃氣因和汗岀而解陽明中風脉弦浮大而短氣腹都滿脇下及心痛乆按之氣不通鼻乾不得汗嗜卧一身及靣目悉黄小便難有潮熱時時􅎪耳前後腫刺之小差外不解病過十日脉續浮者與小柴胡湯脉但浮無餘證者與麻黄湯若不尿腹滿加􅎪者不治浮大爲陽風在表也弦則爲隂風在裏也短氣腹滿脇下及心痛風熱壅於腹中而不通也若寒客於内而痛者按之則寒氣散而痛止此以風熱内壅故雖乆按而氣亦不通陽明病鼻乾不得卧自汗岀者邪在表也此鼻乾不得汗而嗜卧者風熱内攻不于表也一身面目悉黄小便難有潮熱時時􅎪者風熱攻於胃也陽明之脉岀大迎循頰車上耳前過客主人熱勝則腫此風熱在經故耳前後腫刺之經氣通腫則小差如此者外證罷則可攻若外證不觧雖過十日脉續浮者邪氣猶在半表半裏與小柴胡湯以和解之若其脉但浮而不弦大無諸裏證者是邪但在表也可與麻黄湯以發其汗若不尿腹滿加􅎪者關格之疾也故云不治難經曰關格者不得盡其命而死陽明病自汗岀若發汗小便自利者此爲津液内竭雖硬不可攻之當湏自欲大便宜蜜煎導而通之若土瓜根及與大猪膽汁皆可爲導津液内竭腸胃乾燥大便因硬此非結熱故不可攻宜以藥外治而導引之蜜煎導方蜜七合一味内銅噐中㣲火煎之稍凝似飴狀攪之勿令焦著欲可丸併手捻作挺令頭銳大如指長二寸許當熱時急作冷則硬以内榖道中以手急抱欲大便時乃去之猪膽汁方大猪膽一枚㵼汁和醋少許以灌榖道中如一食頃當大便出陽明病脉遲汗出多㣲惡寒者表未解也可發汗宜桂枝湯陽明病脉遲汗出多當責邪在裏以㣲惡寒知表未解與桂枝湯和表陽明病脉浮無汗而喘者發汗則愈宜麻黄湯陽明傷寒表實脉浮無汗而喘也與麻黄湯以發汗陽明病發熱汗出此爲熱越不能發黄也但頭汗岀身無汗劑頸而還小便不利渴引水漿者此爲瘀熱在裏身必發黄茵蔯湯主之但頭汗岀身無汗劑頸而還者熱不得越也小便不利渴引水漿者熱甚於胃津液内竭也胃爲土而色黄胃爲熱蒸則色奪於外必發黄也與茵蔯湯逐熱退黄茵蔯蒿湯方茵蔯蒿六兩苦㣲寒梔子十四枚擘苦寒大黄二兩去皮苦寒小熱之氣凉以和之大熱之氣寒以取之茵蔯梔子之苦寒以逐胃燥宜下必以苦宜𥙷必以酸大黄之苦寒以下瘀熱右三味以水一斗先煑茵蔯减六升内二味煑取三升去滓分温三服小便當利尿如皂角汁狀色正赤一宿腹减黄從小便去也陽明證其人喜忘者必有畜血所以然者本有乆瘀血故令喜忘屎雖鞕大便反易其色必黒宜抵當湯下之内經曰血并於下亂而喜忘此下本有乆瘀血所以喜忘也津液少大便鞕以畜血在内屎雖鞕大便反易其色黒也與抵當湯以下瘀血陽明病下之心中懊憹而煩胃中有燥屎者可攻腹㣲滿𥘉頭鞕後必溏不可攻之若有燥屎者宜大承氣湯下後心中懊憹而煩者虚煩也當與梔子豉湯若胃中有燥屎者非虚煩也可與大承氣湯下之其腹㣲滿𥘉鞕後溏是無燥屎此熱不在胃而在上也故不可攻病人不大便五六日繞臍痛煩燥發作有時者此有燥屎故使不大便也不大便五六日者則大便必結爲燥屎也胃中燥實氣不得下通故繞臍痛煩燥發作有時也病人煩熱汗岀則解又如􅒻狀日晡所發熱者属陽明也脉實者宜下之脉浮虚者宜發汗下之與大承氣湯發汗宜桂枝湯雖得陽明證未可便爲裏實審㸔脉候以别内外其脉實者熱巳入府爲實可與大承氣湯下之其脉浮虚者是熱未入府猶在表也可與桂枝湯發汗則愈大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯大下之後則胃弱不能消榖至六七日不大便則宿食巳結不消故使煩熱不解而腹滿痛是知有燥屎也與大承氣湯以下除之病人小便不利大便乍難乍易時有㣲熱喘冐不能卧者有燥屎也宜大承氣湯小便利則大便鞕此以有燥屎故小便不利而大便乍難乍易胃熱者發熱喘冐無時及嗜卧也此燥屎在胃故時有㣲熱喘冐不得卧也與大承氣湯以下燥屎食榖欲嘔者属陽明也呉茱茰湯主之得湯反劇者属上焦也上焦主内胃爲之市食榖欲嘔者胃不受也與呉茱茰湯以温胃氣得湯反劇者上焦不内也以治上焦法治之呉茱茰湯方呉茱茰一升洗辛熱人參三兩丼温生薑六兩切辛温大棗十二枚擘甘温内經曰寒淫於内治以丼熱佐以苦辛呉茱茰生姜之辛以温胃人參大棗之丼以緩脾右四味以水七升煑取二升去滓温服七合日三服太陽病寸緩關浮尺弱其人發熱汗岀復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渇者此轉属陽明也小便数者大便必鞕不更衣十日無所苦也渇欲飲水少少與之但以法救之渇者宜五苓散太陽病脉陽浮隂弱爲邪在表今寸緩關浮尺弱邪氣漸傳裏則發熱汗岀復惡寒者表未解也傳經之邪入裏裏不和者必嘔此不嘔但心下痞者醫下之早邪氣留於心下也如其不下者必漸不惡寒而渇太陽之邪轉属陽明也若吐若下若發汗後小便數大便鞕者當與小承氣湯和之此不因吐下發汗後小便數大便鞕若是無滿實雖不更衣十日無所苦也候津液還入胃中小便數少大便必自岀也渇欲飲水者少少與之以潤胃氣但審邪氣所在以法救之如渴不止與五苓散是也脉陽㣲而汗岀少者爲自和也汗岀多者爲太過脉陽㣲者邪氣少汗岀少者爲適當故自和汗岀多者反損正氣是汗出太過也陽脉實因發其汗岀多者亦爲太過太過爲陽絶於裏亡津液大便因鞕也陽脉實者表熱甚也因發汗熱乘虚蒸津液外泄致汗岀太過汗出多者亡其陽陽絶於裏腸胃乾燥大便因鞕也脉浮而芤浮爲陽芤爲隂浮芤相搏胃氣生熱其陽則絶浮芤相搏隂陽不諧胃氣獨治欝而生熱消爍津液其陽爲絶趺陽脉浮而濇浮則胃氣強澁則小便數浮澁相搏大便則難其脾爲約麻仁丸主之趺陽者脾胃之脉診浮爲陽知胃氣強澁爲隂知脾爲約約者儉約之約又約束之約内經曰飲入於胃游溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸於膀胱水精四布五經並行是脾主爲胃行其津液者也今胃強脾弱約束津液不得四布但輸膀胱致小便數大便難與脾約丸通腸潤燥麻仁丸方麻子仁二升丼平芍藥半斤酸平枳實半斤炙苦寒大黄一斤去皮苦寒厚朴一斤炙去皮苦寒杏仁一斤去皮尖熬别作脂丼温内經曰脾欲緩急食丼以緩之麻子杏仁之丼緩脾而潤燥津液不足以酸収之芍藥之酸以歛津液腸燥胃強以苦泄之枳實厚朴大黄之苦下燥結而泄胃強也右六味爲末煉蜜爲丸桐子大飲服十丸日三服漸加以和爲度太陽病三日發汗不解蒸蒸發熱者属胃也調胃承氣湯主之蒸蒸者如熱薫蒸言甚熱也太陽病三日發汗不解則表邪已罷蒸蒸發熱胃熱爲甚與調胃承氣湯下胃熱傷寒吐後腹脹滿者與調胃承氣湯内經曰諸脹腹大皆属於熱熱在上焦則吐吐後不解復腹脹滿者邪熱入胃也與調胃承氣湯下其胃熱太陽病若吐若下若發汗㣲煩小便數大便因鞕者與小承氣湯和之愈吐下發汗皆損津液表邪乘虚傳裏大煩者邪在表也㣲煩者邪入裏也小便數大便因鞕者其脾爲約也小承氣湯和之愈得病二三日脉弱無太陽柴胡證煩燥心下鞕至四五日雖能食以小承氣湯少少與㣲和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭鞕後必溏未定成鞕攻之必溏湏小便利屎定鞕乃可攻之宜大承氣湯針經曰脉軟者病將下弱爲隂脉當責邪在裏得病二三日脉弱是日數雖淺而邪氣已入裏也無太陽證爲表證已罷無柴胡證爲無半表半裏之證煩燥心下鞕者邪氣内甚也胃實熱甚則不能食胃虚熱甚至四五日雖能食亦當與小承氣湯㣲和之至六日則熱甚與大承氣湯一升若不大便六七日小便多者爲津液内竭大便必鞕則可下之小便少者則胃中水榖不别必𥘉鞕後溏雖不能食爲胃實以小便少則未定成鞕亦不可攻湏小便利屎定鞕乃可攻之傷寒六七日目中不了了睛不和無表裏證大便難身㣲熱者此爲實也急下之宜大承氣湯内經曰諸脉者皆属於目傷寒六七日邪氣入裏之時目中不了了睛不和者邪熱内甚上熏於目也無表裏證大便難者裏實也身大熱者表熱也身㣲熱者裏熱也針經曰熱病目不明熱不已者死此目中不了了睛不和則證近危惡也湏急與大承氣湯下之陽明發熱汗多者急下之宜大承氣湯邪熱入府外發熱汗多者熱迫津液將竭急與大承氣湯以下其府熱發汗不解腹滿痛者急下之宜大承氣湯發汗不解邪熱傳入府而成腹滿痛者傳之迅也是湏急下之腹滿不减减不足言當下之宜大承氣湯腹滿不减邪氣實也經曰大滿大實自可除下之大承氣湯下其滿實若腹滿時减非内實也則不可下金匱要畧曰腹滿時减復如故此爲寒當與温藥是减不足言也陽明少陽合病必下利其脉不負者順也負者失也互相剋賊名爲負也脉滑而數者有宿食也當下之宜大承氣湯陽明土少陽木二經合病氣不相和則必下利少陽脉不勝陽明不負是不相剋爲順也若少陽脉勝陽明脉負者是鬼賊相剋爲正氣失也脉經曰脉滑者爲病食也又曰滑數則胃氣實下利者脉當㣲厥冷脉滑數知胃有宿食與大承氣湯以下除之病人無表裏證發熱七八日雖脉浮數者可下之假令已下脉數不解合熱則消榖善飢至六七日不大便者有瘀血宜抵當湯七八日邪入府之時病人無表裏證但發熱雖脉浮數亦可與大承氣湯下之浮爲熱客於氣數爲熱客於血下之邪熱去而浮數之脉俱當解若下後數脉去而脉但浮則是榮血間熱併於衛氣間也當爲邪氣獨留心中則飢邪熱不殺榖潮熱發渴之證此下之後浮脉去而數不解則是衛氣間熱合於榮血間也熱氣合併迫血下行胃虚恊熱消榖善飢血至下焦若大便利者下血乃愈若六七日不大便則血不得行畜積於下爲瘀血與抵當湯以下去之若脉數不解而下不止必恊熱而便膿血也下後脉數不解而不大便者是熱不得泄畜血於下爲瘀血也若下後脉數不解而下利不止者爲熱得下泄迫血下行必便膿血傷寒發汗已身目爲黄所以然者以寒濕在裏不解故也以爲不可下也於寒濕中求之金匱要畧曰黄家所起從濕得之汗出熱去則不能發黄發汗已身目爲黄者風氣去濕氣在也脾惡濕濕氣内著脾色外奪者身目爲黄若瘀血在裏發黄者則可下此以寒濕在裏故不可下當從寒濕法治之傷寒七八日身黄如橘子色小便不利腹㣲滿者茵蔯蒿湯主之當熱甚之時身黄如橘子色是熱毒發泄於外内經曰膀胱者津液藏焉氣化則能出小便不利小腹滿者熱氣甚於外而津液不得下行也與茵蔯湯利小便退黄逐熱傷寒身黄發熱者梔子蘗皮湯主之傷寒身黄胃有瘀熱當湏下去之此以發熱爲熱未實與梔子蘗皮湯解散之梔子蘗皮湯方梔子一十五箇苦寒丼草一兩丼平黄蘗二兩右三味以水四升煑取一升半去滓分温再服傷寒瘀熱在裏身必發黄麻黄連軺赤小豆湯主之濕熱相交民多病癉癉黄也傷寒爲寒濕在表發黄爲瘀熱在裏與麻黄連軺赤小豆湯除熱散濕麻黄連軺赤小豆湯方麻黄二两丼温去節赤小豆一升丼平連軺二两連翹根也苦寒杏仁四十箇丼温去皮尖大棗十二枚丼温生梓白皮一升苦寒生薑二两辛温切丼草二两炙丼平内經曰濕上甚而熱治以丼温佐以丼平以汗爲故正此之謂也又煎用潦水者亦取其水味薄則不助濕氣巳上八味以潦水一斗先煑麻黄再沸去上沫内諸藥煑取三升分温三服半日服盡辨少陽病脉證并治第九少陽之病口苦咽乾目眩也足少陽膽經也内經曰有病口苦者名曰膽癉甲乙經曰膽者中精之府五藏取决於膽咽爲之使少陽之脉起於目銳眥少陽受邪故口苦咽乾目眩少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚少陽之脉起於目眥走於耳中其支者下胸中貫膈風傷氣風則爲熱少陽中風氣壅而熱故耳聾目赤胸滿而煩邪在少陽爲半表半裏以吐除煩吐則傷氣氣虚者悸以下除滿下則亡血血虚者驚傷寒脉弦細頭痛發熱者属少陽少陽不可發汗發汗則讝語此属胃胃和則愈胃不和則煩而悸經曰三部俱弦者少陽受病脉細者邪漸傳裏雖頭痛發熱爲表未解以邪客少陽爲半在表半在裏則不可發汗發汗亡津液胃中乾燥少陽之邪因傳入胃必發讝語當與調胃承氣湯下之胃和則愈不下則胃爲少陽木邪干之故煩而悸本太陽病不解轉入少陽者脇下鞕滿乾嘔不能食往來寒熱尚未吐下脉沉緊者與小柴胡湯太陽轉入少陽是表邪入於裏脇下鞕滿不能食徃來寒熱者邪在半表半裏之間若巳經吐下脉沉緊者邪氣入府爲裏實尚未可吐下而脉沉緊爲傳裏雖深未全入府外猶未解也與小柴胡湯以和解之若巳吐下發汗温鍼讝語柴胡湯證罷此爲壞病知犯何逆以法治之少陽之邪在表裏之間若妄吐下發汗温鍼損耗津液胃中乾燥木邪干胃必發讝語若柴胡證不罷者則不爲逆柴胡證罷者壞病也詳其因何治之逆以法救之三陽合病脉浮大上關上但欲眠睡目合則汗關脉以候少陽之氣太陽之脉浮陽明之脉大脉浮大上関上知三陽合病膽熱則睡少隂病但欲眠睡目合則無汗以隂不得有汗但欲眠睡目合則汗知三陽合病膽有熱也傷寒六七日無大熱其人燥煩者此爲陽去入隂故也表爲陽裏爲隂邪在表則外有熱六七日邪氣入裏之時外無大熱内有燥煩者表邪傳裏也故曰陽去入隂傷寒三日三陽爲盡三隂當受邪其人反能食而不嘔此爲三隂不受邪也傷寒四日表邪傳裏裏不和則不能食而嘔今反能食而不嘔是邪不傳隂但在陽也傷寒三日少陽脉小者欲巳也内經曰大則邪至小則平傷寒三日邪傳少陽脉當弦緊今脉小者邪氣㣲而欲已也少陽病欲解時從寅至辰上内經曰陽中之少陽通於春氣寅卯辰少陽木王之時釋音厠𥘉吏切圊溷也瘕音假腹中乆病疸音旦黄病憒古對切心亂也怵勑律切愍也惕音踼敬也又憂惧也癉丁賀切勞病也註解傷寒論卷第五
