front:
  text: 註解傷寒論卷第六漢張仲景著􅀳王叔和撰次
  hash: sha256:6318804ecf34bedb0710df48e10a7b2935c32ed713c7d1cb056410e2ef0d5cbf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0008_SBCK_006-1a}
body:
  text: 宋成無已註明汪濟川校正辨太隂脉證并治第十太隂之爲病腹滿而􅄍食不下自利益甚時腹自痛若下之必胷下結鞕太隂爲病陽邪傳裏也太隂之脉布胃中邪氣壅而爲腹滿上不得降者嘔􅄍而食不下下不得升者自利益甚時腹自痛隂塞在内而爲腹痛者則爲常痛此陽邪干裏雖痛而亦不常痛但時時腹自痛也若下之則隂邪留於胷下爲結鞕經曰病􅀤於隂而反下之因作痞太隂中風四肢煩疼陽㣲隂澁而長者爲欲愈太隂脾也主營四末太隂中風四肢煩疼者風滛末疾也表邪少則㣲裏向和則澁而長長者陽也隂病見陽脉則生以隂得陽則解故云欲愈太隂病欲解時從亥至丑上脾爲隂土王於丑亥子向陽故云解時太隂病脉浮者可􅀤汗宜桂枝湯經曰浮爲在表沉爲在裏太隂病脉浮者邪在經也故當汗散之自利不渇者屬太隂以其藏有寒故也當温之宜服四逆軰自利而渇者屬少隂爲寒在下焦目利不渇者屬太隂爲寒在中焦與四逆等湯以温其藏傷寒脉浮而緩手足自温者繋在太隂太隂當􅀤身黄若小便自利者不能􅀤黄至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也太隂病至七八日大便鞕者爲太隂入府傳於陽明也今至七八日暴煩下利十餘行者脾家實腐穢去也下利煩燥者死此以脾氣和逐邪下泄故雖暴煩下利日十餘行而利必自止本太陽病醫反下之因而腹滿時痛者屬太隂也桂枝加芍藥湯主之表邪未罷醫下之邪因乘虚傳於太隂裏氣不和故腹滿時痛與桂枝湯以解表加芍藥以和裏太實痛者桂枝加大黄湯主之大實大滿自可除下之故加大黄以下大實太隂爲病脉弱其人續自便利設當行大黄芍藥者宜减之以其人胃氣弱易動故也腹滿痛者太隂病也脉弱其人續自便利則邪雖在裏未成大實欲與大黄芍藥攻滿痛者宜少與之以胃氣尚弱易爲動利也辨少隂病脉證并治第十一少隂之爲病脉㣲細但欲寐也少隂爲病脉㣲細爲邪氣傳裏深也衞氣行於陽則寤行於隂則寐邪傳少隂則氣行於隂而不行於陽故但欲寐少隂病欲􅄍不􅄍心煩但欲寐五六日自利而渇者屬少隂也虚故引水自救若小便色白者少隂病形悉具小便白者以下焦虚有寒不能制水故令色白也欲􅄍不􅄍心煩者表邪傳裏也若腹滿痛則屬太隂此但欲􅄰則知屬少隂五六日邪傳少隂之時自利不渴者寒在中焦屬太隂此自利而渴爲寒在下焦屬少隂腎虚水燥渇欲引水自救下焦虚寒不能制水小便色白也經曰下利欲飲水者以有􅀬故也此下利雖渴然以小便色白明非裏􅀬不可不察病人脉隂陽俱􅂃反汗岀者亡陽也此屬少隂法當咽痛而復􅄍利脉隂陽俱􅂃爲少隂傷寒法當無汗反汗岀者陽虚不固也故云亡陽以無陽隂獨是屬少隂内經曰邪客少隂之絡令人嗌痛不可内食少隂寒甚是當咽痛而復􅄍利少隂病欬而下利讝語者􅀍火氣刼故也小便必難以強責少隂汗也欬而下利裏寒而亡津液也反以火刼強責少隂汗者津液内竭加火氣煩之故讝語小便難也少隂病脉細沉数病爲在裏不可􅀤汗少隂病始得之反􅀤􅀬脉沉者爲邪在經可與麻黄附子細辛湯􅀤汗此少隂病脉細沉數爲病在裏故不可􅀤汗少隂病脉㣲不可􅀤汗亡陽故也陽已虚尺脉弱濇者復不可下之脉㣲爲亡陽表虚不可􅀤汗脉弱濇爲亡陽裏虚復不可下少隂病脉􅂃至七八日自下利脉􅁀㣲手足反温脉􅂃反去者爲欲解也雖煩下利必自愈少隂病脉􅂃者寒甚也至七八日傳經盡欲解之時自下利脉􅁀㣲者寒氣得泄也􅀂隂寒勝正陽虚而泄者則手足厥而脉􅂃不去今手足反温脉􅂃反去知陽氣復寒氣去故爲欲解下利煩燥者逆此正勝邪㣲雖煩下利必自止少隂病下利􅀂利自止惡寒而踡卧手足温者可治少隂病下利惡寒踡卧寒極而隂勝也利自止手足温者裏和陽氣得復故爲可治少隂病惡寒而踡時自煩欲去衣􅀍者可治惡寒而踡隂寒甚也時時自煩欲去衣􅀍爲陽氣得復故云可治少隂中風脉陽㣲隂浮者爲欲愈少隂中風陽脉當浮而陽脉㣲者表邪緩也隂脉當沉而隂脉浮者裏氣和也陽中有隂隂中有陽隂陽調和故爲欲愈少隂病欲解時從子至寅上陽生於子子爲一陽丑爲二陽寅爲三陽少隂解於此者隂得陽則解也少隂病􅄍利手足不逆冷反􅀤􅀬者不死脉不至者灸少隂七壯經曰少隂病􅄍利躁煩四逆者死􅄍利手足不厥冷者則陽氣不衰雖反􅀤􅀬不死脉不至者􅄍利􅁀虚也灸少隂七壯以通其脉少隂病八九日一身手足盡􅀬者以􅀬在膀胱必便血也膀胱太陽也少隂太陽爲表裏少隂病至八九日寒邪變􅀬復傳太陽太陽爲諸陽主氣􅀬在太陽故一身手足盡􅀬太陽經多血少氣爲􅀬所乗則血散下行必便血也少隂病但厥無汗而強􅀤之必動其血未知従何道岀或從口鼻或從目岀是名下厥上竭爲難治但厥無汗􅀬行於裏也而強􅀤汗虚其經絡􅀬乗經虚迫血妄行從虚而岀或從口鼻或從目岀諸厥者皆屬於下但厥爲下厥血亡於上爲上竭傷氣損血邪甚正虚故爲難治少隂病惡寒身踡而利手足逆冷者不治針經曰多􅀬者易已多寒者難已此内外寒極純隂無陽故云不治少隂病􅄍利燥煩四逆者死􅄍利者寒甚於裏四逆者寒甚於表躁煩則陽氣欲絶是知死矣少隂病下利止而頭眩時時自冒者死下利止則水榖竭眩冒則陽氣脫故死少隂病四逆惡寒而身踡脉不至不煩而躁者死四逆惡寒而身踡則寒甚脉不至則真氣絶煩􅀬也躁亂也若憤躁之躁從煩至躁爲􅀬來有漸則猶可不煩而躁是氣欲脫而爭也譬猶燈將㓕而暴明其能乆乎少隂病六七日息高者死腎爲生氣之源呼吸之門少隂病六七日不愈而息高者生氣㫁絶也少隂病脉㣲細沉但欲卧汗岀不煩自欲􅄍至五六日自利復煩躁不得卧寐者死隂氣方盛至五六日傳經盡陽氣得復則愈反更自利煩燥不得卧寐則正氣弱陽不能復病勝藏故死少隂病始得之反􅀤􅀬脉沉者麻黄附子細辛湯主之少隂病當無􅀬惡寒反􅀤􅀬者邪在表也雖脉沉以始得則邪氣未深亦當温劑􅀤汗以散之麻黄附子細辛湯方麻黄二两去節甘􅀬細辛二两辛􅀬附子一枚炮去皮破八片辛􅀬内經曰寒滛於内治以甘􅀬佐以苦辛以辛潤之麻黄之甘以解少隂之寒細辛附子之辛以温少隂之經右三味以水一斗先煑麻黄减二升去上沫内藥煑取三升去滓温服一升日三服少隂病得之二三日麻黄附子甘草湯㣲􅀤汗以二三日無裏證故㣲􅀤汗也二三日邪未深也旣無􅄍利厥逆諸裏證則可與麻黄附子甘草湯㣲汗以散之麻黄附子甘草湯方麻黄二兩去節甘草二两炙附子一枚炮去皮麻黄甘草之甘以散表寒附子之辛以温寒氣右三味以水七升先煑麻黄一兩沸去上沫内諸藥煑取三升去滓温服一升日三服少隂病得之二三日以上心中煩不得卧黄連阿膠湯主之脉經曰風傷陽寒傷隂少隂受病則得之於寒二三日已上寒極變􅀬之時􅀬煩於内心中煩不得卧也與黄連阿膠湯扶隂散􅀬黄連阿膠湯方黄連四两苦寒黄芩一两苦寒芍藥二两酸平鷄子黄二枚甘温阿膠三两甘温陽有餘以苦除之黄芩黄連之苦以除􅀬隂不足以甘􅀘之鷄黄阿膠之甘以􅀘血酸収也泄也芍藥之酸収隂氣而泄邪􅀬右五味以水五升先煑三物取二升去滓内膠烊盡小冷内鷄子黄攪令相得温服七合日三服少隂病得之一二日口中和其背惡寒者當灸之附子湯主之少隂客􅀬則口燥舌乾而渇口中和者不苦不燥是無􅀬也背爲陽背惡寒者陽氣弱隂氣勝也經曰無􅀬惡寒者􅀤於隂也灸之􅂇陽消隂與附子湯温經散寒附子湯方附子二枚破八片去皮辛􅀬茯苓三两甘平人參二两甘温白术四两甘温芍藥三两酸平辛以散之附子之辛以散寒甘以緩之茯苓人參白术之甘以􅀘陽酸以収之芍藥之酸以扶隂所以然者偏隂偏陽則爲病火欲實水當平之不欲偏勝也右五味以水八升煑取三升去滓温服一升日三服少隂病身體痛手足寒骨節痛脉沉者附子湯主之少隂腎水而主骨節身體疼痛支冷脉沉者寒成於隂也身疼骨痛若脉浮手足􅀬則可􅀤汗此手足寒脉沉故當與附子湯温經少隂病下利便膿血者桃花湯主之陽病下利便膿血者恊􅀬也少隂病下利便膿血者下焦不約而裏寒也與桃花湯固下散寒桃花湯方赤石脂一斤一半全用一半篩末甘温乾薑一兩辛􅀬粳米一升甘平濇可去脫赤石脂之濇以固腸胃辛以散之乾薑之辛以散裏寒粳米之甘以補正氣右三味以水七升煑米令熟去滓温服七合内赤石脂末方寸匕日三服若一服愈餘勿服少隂病二三日至四五日腹滿小便不利下利不止便膿血者桃花湯主之二三日以至四五日寒邪入裏深也腹痛者裏寒也小便不利者水榖不别也下利不止便膿血者腸胃虚弱下焦不固也與桃花湯固腸止利也少隂病下痢便膿血者可刺下焦血氣留聚腐化則爲膿血刺之以利下焦宣通血氣少隂病􅄍利手足厥冷煩躁欲死者呉茱茰湯主之􅄍利手足厥冷則隂寒氣甚煩躁欲死者陽氣内爭與呉茱茰湯􅂇陽散寒少隂病下痢咽痛胷滿心煩者猪膚湯主之少隂之脉從腎上貫肝膈入肺中則循喉嚨其支别者從肺岀絡心注胷中邪自陽經傳於少隂隂虚客􅀬下利咽痛胷滿心煩也與猪膚湯調隂散􅀬猪膚湯方猪膚一斤甘寒猪水畜也其氣先入腎少隂客􅀬是以猪膚解之加白􅁡以潤燥除煩白粉以益氣㫁利右一味以水一斗煑取五升去滓加白􅁡一升白粉五合熬香和相得温分六服少隂病二三日咽痛者可與甘草湯不差者與桔梗湯陽邪傳於少隂邪􅀬爲咽痛服甘草湯則差若寒􅀬相􅅮爲咽痛者服甘草湯若不差與桔梗湯以和少隂之氣甘草湯方甘草二两右一味以水三升煑取一升半去滓温服七合日二服桔梗湯方桔梗一两辛甘㣲温甘草二兩甘平桔梗辛温以散寒甘草味􅅴平以除􅀬甘梗相合以調寒􅀬右二味以水三升煑取一升去滓分温再服少隂病咽中傷生瘡不能語言聲不岀者苦酒湯主之􅀬傷於絡則經絡乾燥使咽中傷生瘡不能言語聲不岀者與苦酒湯以解絡􅀬愈咽瘡苦酒湯方半夏洗破如􅀥核大十四枚辛温鷄子一枚去黄内上苦酒著鷄子殻中甘㣲寒辛以散之半夏之辛以􅀤聲音甘以緩之鷄子之甘以緩咽痛酸以収之苦酒之酸以歛咽瘡右二味内半夏著苦酒中以鷄子殻置刀鐶中安火上令三沸去滓少少含嚥之不差更作三劑少隂病咽中痛半夏散及湯主之甘草湯主少隂客􅀬咽痛桔梗湯主少隂寒􅀬相搏咽痛半夏散及湯主少隂客寒咽痛也半夏散及湯方半夏洗辛温桂枝去皮辛􅀬甘草炙甘平以上各等分内經曰寒滛所勝平以辛􅀬佐以甘苦半夏桂枝之辛以散經寒甘草之甘以緩正氣已上三味各别搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸内散兩方寸匕更煎三沸下火令小冷少少嚥之少隂病下利白通湯主之少隂主水少隂客寒不能制水故自利也白通湯温裏散寒白通湯方葱白四莖辛温乾薑一兩辛􅀬附子一枚生用去皮破八片辛􅀬内經曰腎苦燥急食辛以潤之葱白之辛以通陽氣薑附之辛以散隂寒右三味以水三升煑取一升去滓分温再服少隂病下利脉㣲者與白通湯利不止厥逆無脉乾嘔煩者白通加猪膽汁湯主之服湯脉暴岀者死㣲續者生少隂病下利脉㣲爲寒極隂勝與白通湯復陽散寒服湯利不止厥逆無脉乾嘔煩者寒氣大甚内爲格拒陽氣逆亂也與白通湯加猪膽汁湯以和之内經曰逆而從之從而逆之又曰逆者正治從者反治此之謂也服湯脉暴岀者正氣因􅀤泄而脫也故死脉㣲續者陽氣漸復也故生白通加猪膽汁方葱白四莖乾薑一两附子一枚生去皮破八片人尿五合醎寒猪膽汁一合苦寒内經曰若調寒􅀬之逆冷􅀬必行則􅀬物冷服下嗌之後冷體旣消􅀬性便􅀤由是病氣隨愈嘔􅎪皆除情且不違而致大益此和人尿猪膽汁鹹苦寒物於白通湯􅀬劑中要其氣相從則可以去格拒之寒也巳上三味以水三升煑取一升去滓内膽汁人尿和令相得分温再服若無膽亦可用少隂病二三日不巳至四五日腹痛小便不利四肢沉重疼痛自下利者此爲有水氣其人或欬或小便利或下利或嘔者真武湯主之少隂病二三日則邪氣猶淺至四五日邪氣巳深腎主水腎病不能制水水飲停爲水氣腹痛者寒濕内甚也四肢沉重疼痛寒濕外甚也小便不利自下利者濕勝而水榖不別也内經曰濕勝則濡泄與真武湯益陽氣散寒濕真武湯方茯苓三兩甘平芍藥三两酸平生薑三兩切辛温白术二两甘温附子一枚炮去皮破八片辛􅀬脾惡濕甘先入脾茯苓白术之甘以益脾逐水寒􅁋所勝平以辛􅀬濕滛所勝佐以酸平附子芍藥生薑之酸辛以温經散濕右五味以水八升煑取三升去滓温服七合日三服後加减法􅀂欬者加五味半升細辛乾薑各一兩氣逆欬者五味予之酸以收逆氣水寒相摶則欬細辛乾薑之辛以散水寒􅀂小便利者去茯苓小便利則無伏水故去茯苓􅀂下利者去芍藥加乾薑二兩芍藥之酸泄氣乾薑之辛散寒􅀂嘔者去附子加生薑足前成半斤氣逆則嘔附子􅀘氣生薑散氣千金曰嘔家多服生薑此爲嘔家聖藥少隂病下利清榖裏寒外􅀬手足厥逆脉㣲欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脉不岀者通脉四逆湯主之下利清榖手足厥逆脉㣲欲絶爲裏寒身􅀬不惡寒面色赤爲外􅀬此隂甚於内格陽於外不相通也與通脉四逆湯散隂通陽通脉四逆湯方甘草二兩炙附子大者一枚生用去皮破八片乾薑三兩強人可四兩右三味以水三升煑取一升二合去滓分温再服其脉即岀者愈靣色赤者加葱九莖葱味辛以通陽氣腹中痛者去葱加芍藥二兩芍藥之酸通寒利腹中痛爲氣不通也嘔者加生薑二兩辛以散之嘔爲氣不散也咽痛者去芍藥加桔梗一兩咽中如結加桔梗則能散之利止脉不岀者去桔梗加人參二兩利止脉不岀者亡血也加人參以􅀘之經曰脉㣲而利亡血也四逆加人參湯主之脉病皆與方相應者乃可服之少隂病四逆其人或欬或悸或小便不利或腹中痛或泄利下重者四逆散主之四逆者四肢不温也傷寒邪在三陽則手足必􅀬傳到太隂手足自温至少隂則邪熱漸深故四肢逆而不温也及至厥隂則手足厥冷是又甚於逆四逆散以散傳隂之􅀬也四逆散方甘草炙甘平枳實破水漬炙乾苦寒柴胡苦寒芍藥酸㣲寒内經曰熱滛於内佐以甘苦以酸収之以苦􅀤之枳實甘草之甘苦以泄裏熱芍藥之酸以収隂氣柴胡之苦以􅀤表􅀬右四味各拾分搗篩白飲和服方寸匕日三服欬者加五味子乾薑各伍分并主下痢肺寒氣逆則欬五味子之酸収逆氣乾薑之辛散肺寒并主下痢者肺與大腸爲表裏上欬下痢治則頗同悸者加桂枝伍分悸者氣虚而不能通行心下築築然悸動也桂猶圭也引導陽氣若􅀬以使小便不利者加茯苓伍分茯苓味甘而淡用以滲泄腹中痛者加附子一枚炮令拆裏虚遇邪則痛加附子以􅀘虚泄利下重者先以水五升煑薤白三升煑取三升去滓以散三方寸匕内湯中煑取一升半分温再服泄利下重者下焦氣滯也加薤白以泄氣滯少隂病下利六七日欬而嘔渇心煩不得眠者猪苓湯主之下利不渇者裏寒也經曰自利不渇者属太隂以其藏寒故也此下利嘔渇知非裏寒心煩不得眠知恊􅀬也與猪苓湯滲泄小便分別水榖經曰復不止當利其小便此之謂歟少隂病得之二三日口燥咽乾者急下之宜大承氣湯傷寒傳經五六日邪傳少隂則口燥舌乾而渇爲邪漸深也今少隂病得之二三日邪氣未深入之時便作口燥咽乾者是邪􅀬巳甚腎水乾也急與大承氣湯下之以全腎也少隂病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯少隂腎水也青肝色也自利色青爲肝邪乘腎難經曰從前來者爲實邪以腎藴實邪必心下痛口乾燥也與大承氣湯以下實邪少隂病六七日腹脹不大便者急下之宜大承氣湯此少隂入府也六七日少隂之邪入府之時陽明内􅀬壅甚腹滿不大便也陽明病土勝腎水則乾急與大承氣湯下之以救腎水少隂病脉沉者急温之冝四逆湯旣􅄍且利小便復利而大汗岀下利清榖内寒外熱脉㣲欲絶者不云急温此少隂病脉沉而云急温者彼雖寒甚然而證已形見於外治之則有成法此􅀄頭脉沉未有形證不知邪氣所之將􅀤何病是急與四逆湯温之少隂病飲食入口則􅄍心中温温欲􅄍復不能􅄍始得之手足寒脉弦遲者此胷中實不可下也當􅄍之若膈上有寒飲乾嘔者不可􅄍也急温之宜四逆湯傷寒表邪傳裏至於少隂少隂之脉從肺岀絡心注胷中邪旣留於胷中而不散者飲食入口則􅄍心中温温欲􅄍陽受氣於胷中邪旣留於胷中則陽氣不得宣􅀤於外是以始得之手足寒脉弦遲此是胷中實不可下而當􅄍其膈上有寒飲亦使人心中温温而手足寒􅄍則物岀嘔則物不岀􅄍與嘔别焉胷中實則􅄍而物岀若膈上有寒飲則但乾嘔而不􅄍也此不可􅄍可與四逆湯以温其膈少隂病下利脉㣲澁嘔而汗岀必數更衣反少者當温其上灸之脉㣲爲亡陽澁爲亡血下利嘔而汗岀亡陽亡血也津液不足裏有虚寒必數更衣反少者温其上以􅂇其陽也灸之以消其隂辨厥隂病脉證并治第十二厥隂之爲病消渇氣上撞心心中疼熱飢而不欲食食則􅄍蚘下之利不止邪傳厥隂則熱已深也邪自太陽傳至太隂則腹滿而嗌乾未成渇也邪至少隂者口燥舌乾而渇未成消也至厥隂成消渇者熱甚能消水故也飲水多而小便少者謂之消渇木生於火肝氣通心厥隂客􅀬氣上撞心心中疼熱傷寒六七日厥隂受病之時爲傳經盡則當入府胃虚客熱飢不欲食蚘在胃中無食則動聞食嗅而岀得食􅄍蚘此熱在厥隂經也若便下之虚其胃氣厥隂木邪相乘必􅄍下不止厥隂中風脉㣲浮爲欲愈不浮爲未愈經曰隂病見陽脉而生浮者陽也厥隂中風脉㣲浮爲邪氣還表向汗之時故云欲愈厥隂病欲解時從寅至􅆗上厥隂木也王於􅆗丑寅向王故爲解時厥隂病渇欲飲水者少少與之愈邪至厥隂爲傳經盡欲汗之時渇欲得水者少少與之胃氣得潤則愈諸四逆厥者不可下之虚家亦然四逆者四肢不温也厥者手足冷也皆陽氣少而隂氣多故不可下虚家亦然下之是爲重虚金匱玉凾曰虚者十􅀘勿一㵼之傷寒先厥後􅀤熱而利者必自止見厥復利隂氣勝則厥逆而利陽氣復則􅀤熱利必自止見厥則隂氣還勝而復利也傷寒始􅀤熱六日厥反九日而利凡厥利者當不能食今反能食者恐爲除中食以索餅不􅀤􅀬者知胃氣尚在必愈恐暴􅀬來岀而復去也後三日脉之其􅀬續在者期之旦日夜半愈所以然者本􅀤􅀬六日厥反九日復􅀤􅀬三日并前六日亦爲九日與厥相應故期之旦日夜半愈後三日脉之而脉數其熱不罷者此爲熱氣有餘必􅀤癰膿也始􅀤熱邪在表也至六日邪傳厥隂隂氣勝者作厥而利厥反九日隂寒氣多當不能食而反能食者恐爲除中除去也中胃氣也言邪氣大甚除去胃氣胃欲引食自救故暴能食此欲勝也食以索餅試之若胃氣絶得麫則必􅀤􅀬􅀂不􅀤􅀬者胃氣尚在也恐是寒極變􅀬因暴􅀬來而復去使之能食非除中也金匱要畧曰病人素不能食而反暴思之必􅀤􅀬後三日脉之其􅀬續在者陽氣勝也期之旦日夜半愈若旦日不愈後三日脉數而􅀬不罷者爲􅀬氣有餘必􅀤癰膿經曰數脉不時則生惡瘡傷寒脉遲六七日而反與黄芩湯徹其􅀬脉遲爲寒今與黄芩湯復除其􅀬腹中應冷當不能食今反能食此名除中必死傷寒脉遲六七日爲寒氣已深反與黄芩湯寒藥兩寒相􅅮腹中當冷冷不消榖則不能食反能食者除中也四時皆以胃氣爲本胃氣已絶故云必死傷寒先厥後􅀤熱下利必自止而反汗岀咽中痛者其喉爲痺􅀤熱無汗而利必自止若不止必便膿血便膿血者其喉不痺傷寒先厥而利隂寒氣勝也寒極變熱後􅀤熱下利必自止而反汗岀咽中痛其喉爲痺者熱氣上行也􅀤熱無汗而利必自止利不止必便膿血者熱氣下行也熱氣下而不上其喉亦不痺也傷寒一二日至四五日而厥者必􅀤熱前熱者後必厥厥深者熱亦深厥㣲者熱亦㣲厥應下之而反發汗者必口傷爛赤前厥後􅀤熱者寒極生熱也前熱後厥者陽氣内䧟也厥深熱深厥㣲熱㣲隨陽氣䧟之深淺也熱之伏深必須下去之反􅀤汗者引熱上行必口傷爛赤内經曰火氣内􅀤上爲口糜傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈隂勝則厥陽勝則􅀬先厥五日爲隂勝至六日陽復勝􅀬亦五日後復厥者隂復勝若不厥爲陽全勝故自愈經曰􅀤􅀬四日厥反三日復􅀬四日厥少􅀬多其病爲愈凡厥者隂陽氣不相順接便爲厥厥者手足逆冷是也手之三隂三陽相接於手十指足之三隂三陽相接於足十指陽氣内䧟陽不與隂相順接故手足爲之厥冷也復寒脉㣲而厥至七八日膚冷其人躁無暫安時者此爲藏厥非爲蚘厥也蚘厥者其人當􅄍蚘令病者静而復時煩此爲藏寒蚘上入膈故煩須􅁷復止得食而嘔又煩者蚘聞食臭岀其人當自􅄍蚘蚘厥者烏梅圓主之又主乆利方藏厥者死陽氣絶也蚘厥雖厥而煩􅄍蚘巳則静不若藏厥而躁無暫安時也病人藏寒胃虚蚘動上膈聞食臭岀因而􅄍蚘與烏梅圓温藏安蟲烏梅圓方烏梅三百箇味酸温細辛六两辛􅀬乾薑十两辛􅀬黄連一斤苦寒當歸四两辛温附子六两炮辛􅀬蜀椒四两去子辛􅀬桂枝六两辛􅀬人參六兩甘温黄蘗六两苦寒肺主氣肺欲収急食酸以収之烏梅之酸以収肺氣脾欲緩急食甘以緩之人參之甘以緩脾氣寒滛於内以辛潤之以苦堅之當歸桂椒細辛之辛以潤内寒寒滛所勝平以辛􅀬薑附之辛􅀬以勝寒蚘得甘則動得苦則安黄連黄蘗之苦以安蚘右十味異搗篩合治之以苦酒漬烏梅一􅀫去核蒸之五升米下飯熟擣成埿和藥令相得内臼中與􅁡杵二千下貟如梧梧子大先食飲服十圓日三服稍加至二十圓禁生冷滑物臭食等傷寒􅀬少厥㣲指頭寒黙黙不欲食煩躁數日小便利色白者此􅀬除也欲得食其病爲愈若厥而嘔胷脇煩滿者其後必便血指頭寒者是厥㣲􅀬少也黙黙不欲食煩躁者邪􅀬􅀄傳裏也數日之後小便色白裏􅀬去欲得食爲胃氣巳和其病爲愈厥隂之脉挾胃貫膈市脇肋厥而嘔胷脇煩滿者傳邪之􅀬甚於裏也厥隂肝主血後數日􅀬不去又不得外泄迫血下行必致便血病者手足厥冷言我不結􅅐小腹滿按之痛者此冷結在膀胱關元也手足厥不結胷者無􅀬也小腹滿按之痛下焦冷結也傷寒􅀤􅀬四日厥反三日復􅀬四日厥少􅀬多其病當愈四日至七日􅀬不除者其後必便膿血先􅀬後厥者陽氣邪傳裏也􅀤􅀬爲邪氣在表至四日後厥者傳之隂也後三日復傳陽經則復􅀬厥少則邪㣲􅀬多爲陽勝其病爲愈至七日傳經盡􅀬除則愈􅀬不除者爲􅀬氣有餘内􅅮厥隂之血其後必大便膿血傷寒厥四日􅀬反三日復厥五日其病爲進寒多􅀬少陽氣退故爲進也傷寒隂勝者先厥至四日邪傳裏重隂必陽􅁍􅀬三日七日傳經盡當愈若不愈而復厥者傳作再經至四日則當復􅀬若不復􅀬至五日厥不除者隂勝於陽其病進也傷寒六七日脉㣲手足厥冷煩燥灸厥隂厥不還者死傷寒六七日則正氣當復邪氣當罷脉浮身􅀬爲欲解若反脉㣲而厥則隂勝陽也煩燥者陽虚而爭也灸厥隂以復其陽厥不還則陽氣巳絶不能復正而死傷寒􅀤􅀬下利厥逆躁不得卧者死傷寒􅀤􅀬邪在表也下利厥逆陽氣虚也躁不得卧者病勝藏也故死傷寒􅀤􅀬下利至甚厥不止者死金匱要畧曰六府氣絶於外者手足寒五藏氣絶於内者利下不禁傷寒􅀤􅀬爲邪氣獨甚下利至甚厥不止爲府藏氣絶故死傷寒六七日不利便􅀤􅀬而利其人汗岀不止者死有隂無陽故也傷寒至七日爲邪正爭之時正勝則生邪勝則死始不下利而暴忽􅀤􅀬下利汗岀不止者邪氣勝正陽氣脫也故死傷寒五六日不結胷腹濡脉虚復厥者不可下此爲亡血下之死傷寒五六日邪氣當作裏實之時若不結胷而腹濡者裏無􅀬也脉虚者亡血也復厥者陽氣少也不可下下之爲重虚故死金匱玉凾曰虚者重㵼真氣乃絶􅀤􅀬而厥七日下利者爲難治發􅀬而厥邪傳裏也至七日傳經盡則正氣勝邪當汗出而解反下利則邪氣勝裏氣虚則爲難治傷寒脉促手足厥逆者可灸之脉促則爲陽虚不相續厥逆則爲陽虚不相接灸之以􅂇陽氣傷寒脉滑而厥者裏有􅀬也白虎湯主之滑爲陽厥氣内䧟是裏熱也與白虎湯以散裏􅀬也手足厥寒脉細欲絶者當歸四逆湯主之手足厥寒者陽氣外虚不温四末脉細欲絶者隂血内弱脉行不利與當歸四逆湯􅂇陽生隂也當歸四逆湯方當歸三两辛温桂枝三两辛􅀬芍藥三两酸寒細辛三两辛􅀬大􅀥二十五箇甘温甘草二两炙甘平通草二两甘平内經曰脉者血之府也諸血者皆属心通脉者必先􅀘心益血苦先入心當歸之苦以􅂇心血心苦緩急食酸以收之芍藥之酸以收心氣肝苦急急食甘以緩之大􅀥甘草通草之甘以緩隂血右㭍味以水八升煑取三升去滓温服一升日三服若其人内有乆寒者宜當歸四逆加呉茱茰生薑湯主之茱茰辛温以散乆寒生薑辛温以行陽氣大汗岀􅀬不去内拘急四肢疼又下利厥逆而惡寒者四逆湯主之大汗岀則􅀬當去􅀬反不去者亡陽也内拘急下利者寒甚於裏四肢疼厥逆而惡寒者寒甚於表與四逆湯復陽散寒大汗若大下利而厥冷者四逆湯主之大汗若大下利内外雖殊其亡津液損陽氣則一也陽虚隂勝故生厥逆與四逆湯固陽退隂病人手足厥冷脉乍􅂃者邪結在胷中心中滿而煩飢不能食者病在胷中當須􅄍之宜􅀲蔕散手足厥冷者邪氣内䧟也脉􅂃牢者爲實邪氣入府則脉沉今脉乍􅂃知邪結在胷中爲實故心下滿而煩胃中無邪則喜飢以病在胷中雖飢而不能食與􅀲蔕散以􅄍胷中之邪傷寒厥而心下悸者宜先治水當服茯苓甘草湯􅁍治其厥不爾水漬入胃必作利也金匱要畧曰水停心下甚者則悸厥雖寒勝然以心下悸爲水飲内甚先與茯苓甘草湯治其水而後治其厥若先治厥則水飲浸漬入胃必作下利傷寒六七日大下後寸脉沉而遲手足厥逆下部脉不至咽喉不利唾膿血泄利不止者爲難治麻黄升麻湯主之傷寒六七日邪傳厥隂之時大下之後下焦氣虚陽氣内䧟寸脉遲而手足厥逆下部脉不至厥隂之脉貫膈上注肺循喉嚨在厥隂隨經射肺因亡津液遂成肺痿咽喉不利而唾膿血也金匱要畧曰肺痿之病從何得之􅀍快藥下利重亡津液故得之若泄利不止者爲裏氣大虚故云難治與麻黄升麻湯以調肝肺之氣麻黄升麻湯方麻黄二两半去節甘温升麻一两一分甘平當歸一两一分辛温知母苦寒黄芩苦寒萎㽔甘平各十八銖石膏碎綿褁甘寒白术甘温乾薑辛􅀬芍藥酸平天門冬去心甘平桂枝辛􅀬茯苓甘平甘草炙甘平各六銖玉凾曰大􅀬之氣寒以取之甚􅀬之氣以汗􅀤之麻黄升麻之甘以􅀤浮􅀬正氣虚者以辛潤之當歸桂薑之辛以散寒上􅀬者以苦泄之知毋黄芩之苦凉心去􅀬津液少者以甘潤之茯苓白术之甘緩脾生津肺燥氣􅀬以酸収之以甘緩之芍藥之酸以歛逆氣萎㽔門冬石膏甘草之甘潤肺除􅀬右十四味以水一斗先煑麻黄一兩沸去上沬内諸藥煑取三升去滓分温三服相去如炊三斗米頃令盡汗岀愈傷寒四五日腹中痛若轉氣下趣少腹者此欲自利也傷寒四五日邪氣傳裏之時腹中痛轉氣下趣少腹者裏虚遇寒寒氣下行欲作自利也傷寒本自寒下醫復􅄍下之寒格更逆􅄍下若食入口即􅄍乾薑黄連黄芩人參湯主之傷寒邪自傳表爲本自寒下醫反􅄍下損傷正氣寒氣内爲格拒經曰格則􅄍逆食入口即􅄍謂之寒格更復􅄍下則重虚而死是更逆􅄍下與乾薑黄連黄芩人參湯以通寒格乾薑黄連黄芩人參湯方乾薑辛􅀬黄連苦寒黄芩苦寒人參甘温各三两辛以散之甘以緩之乾薑人參之甘辛以􅀘正氣苦以泄之黄連黄芩之苦以通寒格右四味以水六升煑取二升去滓分温再服下利有㣲􅀬而渇脉弱者今自愈下利隂寒之疾反大􅀬者逆有㣲􅀬而渇裏氣方温也經曰諸弱􅀤􅀬脉弱者陽氣得復也今必自愈下利脉數有㣲􅀬汗岀今自愈設復􅂃爲未解下利隂病也脉數陽脉也隂病見陽脉者生㣲􅀬汗出陽氣得通也利必自愈諸􅂃爲寒設復脉􅂃隂氣猶勝故云未解下利手足厥冷無脉者灸之不温若脉不還反㣲喘者死下利手足厥逆無脉者隂氣獨勝陽氣大虚也灸之陽氣復手足温而脉還爲欲愈若手足不温脉不還者陽已絶也反㣲喘者陽氣脫也少隂􅀒趺陽者爲順也少隂腎水趺陽脾土下利爲腎邪干脾水不勝土則爲㣲邪故爲順也下利寸脉反浮數尺中自濇者必清膿血下利者脉當沉而遲反浮數者裏有􅀬也濇爲無血尺中自濇者腸胃血散也隨利下必便膿血清與圊通脉經曰清者厠也下利清榖不可攻表汗岀必脹滿下利者脾胃虚也胃爲津液之主􅀤汗亡津液則胃氣愈虚必脹滿下利脉沉弦者下重也脉大者爲未止脉㣲弱數者爲欲自止雖􅀤􅀬不死沉爲在裏弦爲拘急裏氣不足是主下重大則病進此利未止脉㣲弱數者邪氣㣲而陽氣復爲欲自止雖􅀤􅀬止由陽勝非大逆也下利脉沉而遲其人靣少赤身有㣲􅀬下利清榖者必鬰冒汗岀而解病人必㣲厥所以然者其靣戴陽下虚故也下利清榖脉沉而遲裏有寒也靣少赤身有㣲􅀬表未解也病人㣲厥針經曰下虚則厥表邪欲解臨汗之時以裏先虚必鬰冒然後汗岀而解也下利脉數而渇者今自愈設不差必清濃血以有􅀬故也經曰脉數不解而下不止必恊􅀬便膿血也下利後脉絶手足厥冷晬時脉還手足温者生脉不還者死下利後脉絶手足厥冷者無陽也晬時周時也周時厥愈脉岀爲陽氣復則生若手足不温脉不還者爲陽氣絶則死傷寒下利日十餘行脉反實者死下利者裏虚也脉當㣲弱反實者病勝藏也故死難經曰脉不應病病不應脉是爲死病下利清榖裏寒外􅀬汗岀而厥者通脉四逆湯主之下利清榖爲裏寒身􅀬不解爲外􅀬汗岀陽氣通行於外則未當厥其汗岀而厥者陽氣大虚也與通脉四逆湯以固陽氣􅀬利下重者白頭翁湯主之利則津液少􅀬則傷氣氣虚下利致後重也與白頭翁湯散􅀬厚腸白頭翁湯方白頭翁二兩苦寒黄栢苦寒黄連苦寒秦皮苦寒各三两内經曰腎欲堅急食苦以堅之利則下焦虚是以純苦之劑堅之右四味以水七升煑取二升去滓温服一升不愈更服一升下利腹脹滿身體疼痛者先温其裏乃攻其表温裏四逆湯攻表桂枝湯下利腹滿者裏有虚寒先與四逆湯温裏身疼痛爲表未解利止裏和與桂枝湯攻表下利欲飲水者以有􅀬故也白頭翁湯主之自利不渇爲藏寒與四逆以温藏下利飲水爲有􅀬與白頭翁湯以凉中下利讝語者有燥屎也宜小承氣湯經曰實則讝語有燥屎爲胃實下利爲腸虚與小承氣湯以下燥屎下利後更煩按之心下濡者爲虚煩也宜梔子豉湯下利後不煩爲欲解若更煩而心下堅者恐爲谷煩此煩而心下濡者是邪􅀬乘虚客於胷中爲虚煩也與梔子豉湯􅄍之則愈嘔家有癰膿者不可治嘔膿盡自愈胃脘有癰則嘔而􅄍膿不可治嘔得膿盡嘔亦自愈嘔而脉弱小便復利身有㣲􅀬見厥者難治四逆湯主之嘔而脉弱爲邪氣傳裏嘔則氣上逆而小便當不利小便復利者裏虚也身有㣲􅀬見厥者隂勝陽也爲難治與四逆湯温裏􅂇陽乾嘔􅄍涎沫頭痛者呉茱茰湯主之乾嘔􅄍涎沫者裏寒也頭痛者寒氣上攻也與呉茱茰湯温裏散寒嘔而􅀤􅀬者小柴胡湯主之經曰嘔而􅀤􅀬者柴胡證具傷寒大􅄍大下之極虚復極汗岀者以其人外氣怫鬰復與之水以􅀤其汗因得􅎪所以然者胃中寒冷故也大􅄍大下胃氣極虚復極􅀤汗又亡陽氣外邪怫鬰於表則身􅀬醫與之水以􅀤其汗胃虚得水虚寒相􅅮成􅎪也傷寒􅎪而腹滿視其前後知何部不利利之則愈􅎪而腹滿氣上而不下也視其前後部有不利者即利之以降其氣前部小便也後部大便也釋音踡音拳不伸也憤扶粉切懣也惡濕上烏路切耻也憎也撞宅江切撃也註解傷寒論卷第六
