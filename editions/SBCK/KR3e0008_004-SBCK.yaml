  text: 註解傷寒論卷第四
  hash: sha256:16ca3bd63b1830bf88b0e24e30db7f7177b5252e0bf8a6aaf166c8147de059a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0008_SBCK_004-1a}
body:
  text: 漢張仲景著􅀳王叔和撰次宋成無巳註明汪濟川校正辨太陽脉證并治下第七問曰病有結􅅐有藏結其狀何如荅曰按之痛寸脉浮關脉沉名曰結􅅐也何謂藏結荅曰如結􅅐狀飲食如故時時下利寸脉浮關脉小細沉􅂃名曰藏結舌上白胎滑者難治結􅅐者邪結在􅅐藏結者邪結在藏二者皆下後邪氣乘虚入裏所致下後邪氣入裏與陽相結者爲結􅅐以陽受氣於􅅐中故爾與隂相結者爲藏結以隂受之則入五藏故爾氣宜通而塞故痛邪結陽分則隂氣不得上通邪結隂分則陽氣不得下通是二者皆心下鞕痛寸脉浮關脉沉知邪結在陽也寸脉浮關脉小細沉􅂃知邪結在隂也隂結而陽不結雖心下結痛飲食亦自如故隂氣乘腸虚而下故時時自下利隂得陽則解藏結得􅀬證多則易治舌上白胎滑者邪氣結􅅐中亦寒故云難治藏結無陽證不徃來寒􅀬其人反靜舌上胎滑者不可攻也藏結於法當下無陽證爲表無􅀬不徃來寒􅀬爲半表半裏無􅀬其人反靜爲裏無􅀬經曰舌上如胎者以丹田有􅀬􅅐中有寒以表裏皆寒故不可攻病􅀤於陽而反下之􅀬入因作結􅅐病􅀤於隂而反下之因作痞所以成結􅅐者以下之太早故也􅀤􅀬惡寒者􅀤於陽也而反下之則表中陽邪入裏結於􅅐中爲結􅅐無􅀬惡寒者􅀤於隂也而反下之表中隂邪入裏結於心下爲痞結􅅐者項亦強如柔痓狀下之則和宜大䧟􅅐丸方結􅅐病項強者爲邪結􅅐中􅅐膈結滿心下􅂃實但能仰而不能俛是項強亦如柔痓之狀也與大䧟􅅐丸下結泄滿大䧟􅅐丸方大黄半斤味苦寒葶􅏣半升熬味苦寒芒硝半升味鹹寒杏人半升去皮尖熬黒味苦􅅴温大黄芒硝之苦鹹所以下􅀬葶藶杏人之苦􅅴所以泄滿􅅴遂取其直逹白􅁡取其潤利皆以下泄滿實物也右四味搗篩二味內杏人芒硝合研如脂和散取如彈丸一枚别搗􅅴遂末壹錢匕白􅁡二合水二升煑取一升温頓服之一宿乃下如不下更服取下爲效禁如藥法結􅅐證其脉浮大者不可下下之則死結􅅐爲邪結􅅐中属上焦之分得寸脉浮關脉沉者爲在裏則可下若脉浮大心下雖結是在表者猶多未全結也下之重虚邪氣復結則難可制故云下之則死結􅅐證悉具煩燥者亦死結􅅐證悉具邪結巳深也煩燥者正氣散亂也邪氣勝正病者必死太陽病脉浮而動數浮則爲風數則爲􅀬動則爲痛數則爲虚頭痛發􅀬㣲盗汗岀而反惡寒者表未解也醫反下之動數變遲膈内拒痛胃中空虚客氣動膈短氣躁煩心中懊憹陽氣内䧟心下因鞕則爲結􅅐大䧟􅅐湯主之若不結􅅐但頭汗岀餘無汗劑頸而還小便不利身必􅀤黄也動數皆陽脉也當責邪在表睡而汗岀者謂之盗汗爲邪氣在半表半裏則不惡寒此頭痛􅀤􅀬㣲盗汗岀反惡寒者表未解也當􅀤其汗醫反下之虚其胃氣表邪乘虚則䧟邪在表則見陽脉邪在裏則見隂脉邪氣内䧟動數之脉所以變遲而浮脉獨不變者以邪結􅅐中上焦陽結脉不得而沉也客氣者外邪乘胃中空虚入裏結於􅅐膈膈中拒痛者客氣動膈也金匱要畧曰短氣不足以息者實也短氣燥煩心中懊憹皆邪􅀬爲實陽氣内䧟氣不得通於膈壅於心下爲鞕滿而痛成結􅅐也與大䧟􅅐湯以下結􅀬若胃中空虚陽氣内䧟不結於􅅐膈下入於胃中者遍身汗出則爲􅀬越不能􅀤黄若但頭汗岀身無汗劑頸而還小便不利者􅀬不得越必􅀤黄也大䧟􅅐湯方大黄六兩去皮苦寒芒硝一升鹹寒􅅴遂一錢苦寒大黄謂之將軍以苦蕩滌芒硝一名硝石以其鹹能䎡鞕夫間有􅅴遂以通水也􅅴遂若夫間之遂其氣可以直逹透結䧟􅅐三物爲允右三味以水六升先煑大黄取二升去滓内芒消煑一兩沸内􅅴遂末温服一升得快利止後服傷寒六七日結􅅐􅀬實脉沉而􅂃心下痛按之石鞕者大䧟􅅐湯主之病在表而下之􅀬入因作結胷此不云下後而云傷寒六七日則是傳裏之實􅀬也沉爲在裏􅂃爲裏實以心下痛按之實鞕是以爲結􅅐與大䧟􅅐湯以下結􅀬傷寒十餘日􅀬結在裏復往來寒􅀬者與大柴胡湯但結􅅐無大􅀬者此爲水結在􅅐脇也但頭㣲汗出者大䧟􅅐湯主之傷寒十餘日􅀬結在裏是可下之證復往來寒􅀬爲正邪分爭未全歛結與大柴胡湯下之但結􅅐無大􅀬者非􅀬結也是水飲結於􅅐脇謂之水結胷周身汗出者是水飲外散則愈若但頭㣲汗出餘處無汗是水飲不得外泄停畜而不行也與大䧟􅅐湯以逐其水太陽病重􅀤汗而復下之不大便五六日舌上燥而渴日晡所小有潮􅀬從心下至少腹鞕滿而痛不可近者大䧟􅅐湯主之重􅀤汗而復下之則内外重亡津液而邪􅀬内結致不大便五六日舌上燥而渴也日晡潮􅀬者属胃此日晡小有潮􅀬非但在胃從心下至少腹鞕滿而痛不可近者是一腹之中上下邪氣俱甚也與大䧟􅅐湯以下其邪小結􅅐病正在心下按之則痛脉浮滑者小䧟􅅐湯主之心下鞕痛手不可近者結􅅐也正在心下按之則痛是􅀬氣猶淺謂之小結􅅐結􅅐脉沉􅂃或寸浮關沉今脉浮滑知􅀬未深結與小䧟􅅐湯以除􅅐膈上結􅀬也小䧟􅅐湯方黄連一兩苦寒半夏半升洗辛温括蔞實大者一箇味苦寒苦以泄之辛以散之黄連括蔞實苦寒以泄􅀬半夏之辛以散結右三味以水六升先煑括蔞取三升去滓内諸藥煑取二升去滓分温三服太陽病二三日不能卧但欲起心下必結脉㣲弱者此本有寒分也反下之若利止必作結􅅐未止者四日復下之此作恊􅀬利也太陽病二三日邪在表也不能卧但欲起心下必結者以心下結滿卧則氣壅而愈甚故不能卧而但欲起也心下結滿有水分有寒分有氣分今脉㣲弱知本有寒分醫見心下結而反下之則太陽表邪乘虚入裏利止則邪氣留結爲結􅅐利不止至次日復如前下利不止者是邪􅀬下攻腸胃爲挾􅀬利也太陽病下之其脉促不結􅅐者此爲欲解也脉浮者必結􅅐也脉􅂃者必咽痛脉弦者必兩脇拘急脉細數者頭痛未止脉沉􅂃者必欲嘔脉沉滑者恊􅀬利脉浮滑者必下血此太陽病下之後邪氣傳變其脉促者爲陽盛下後脉促爲陽勝隂也故不作結􅅐爲欲解下後脉浮爲上焦陽邪結而爲結􅅐也經曰結􅅐者寸脉浮關脉沉下後脉􅂃則太陽之邪傳於少隂經曰脉􅂃者属少隂内經曰邪客於少隂之絡令人咽痛不可内食所以脉􅂃者必咽痛脉弦則太陽之邪傳於少陽經曰尺寸俱弦者少陽受病也其脉循脇絡於耳所以脉弦者必兩脇拘急下後邪氣傳裏則頭痛當止脉細數爲邪未傳裏而傷氣也細爲氣少數爲在表故頭痛未止脉沉􅂃則太陽之邪傳於陽明爲裏實也沉爲在裏􅂃爲裏實陽明裏實故必欲嘔脉滑則太陽之邪傳於腸胃以滑爲隂氣有餘知邪氣入裏干於下焦也沉爲血勝氣虚是爲恊􅀬利浮爲氣勝血虚是知必下血經曰不宜下而便攻之諸變不可勝數此之謂也病在陽應以汗解之反以冷水潠之若灌之其􅀬􅀍􅁍不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散寒實結􅅐無􅀬證者與三物小䧟􅅐湯白散亦可服病在陽爲邪在表也法當汗出而解反以冷水潠之灌洗􅀬􅀍寒水外不得出則反攻其裏彌更益煩肉上粟起者水寒之氣客於皮膚也意欲飲水者裏有􅀬也反不渴者寒在表也與文蛤散以散表中水寒之氣若不差是水􅀬相􅅮欲傳於裏與五苓散􅀤汗以和之始􅀬在表因水寒制之不得外泄內攻於裏結於􅅐膈心下鞕痛本是水寒伏􅀬爲實故謂之寒實結􅅐無􅀬證者外無􅀬而􅀬悉収歛於裏也與小䧟􅅐湯以下逐之白散下􅀬故亦可攻文蛤散方文蛤五兩味鹹寒鹹走腎邪可以勝水氣右一味爲散以沸湯和一錢匕服湯用五合白散方桔梗三分味辛苦㣲温芭豆一分去皮心熬黒研如脂平温貝母三分味辛苦平辛散而苦泄桔梗貝母之苦辛用以下氣芭豆之辛用以散實右件三味爲末内芭豆更於臼中杵之以白飲和服強人半錢羸者减之病在膈上必􅄍在膈下必利不利進􅀬粥一杯利過不止進冷粥一杯身􅀬皮粟不解欲引衣自覆者若水以潠之洗之益令􅀬􅁍不得岀當汗而不汗則煩假令汗岀已腹中痛與芍藥三兩如上法太陽與少陽併病頭項強痛或眩冐時如結􅅐心下痞鞕者當刺大椎第一間肺俞肝俞慎不可􅀤汗􅀤汗則讝語脉弦五六日讝語不止當刺期門太陽之脉絡頭下頃頭項強痛者太陽表病也少陽之脉循􅅐絡脇如結􅅐心下痞鞕者少陽裏病也太陽少陽相併爲病不純在表故頭項不但強痛而或眩冐亦未全入裏故時如結􅅐心下痞鞕此邪在半表半裏之間也刺大椎第一間肺俞以㵼太陽之邪刺肝俞以㵼少陽之邪邪在表則可􅀤汗邪在半表半裏則不可􅀤汗􅀤汗則亡津液損動胃氣少陽之邪因干於胃土爲木刑必􅀤讝語脉弦至五六日傳經盡邪􅀬去而讝語當止若復不止爲少陽邪􅀬甚也刺期門以㵼肝膽之氣婦人中風􅀤􅀬惡寒經水適來得之七八日􅀬除而脉遲身凉􅅐脇下滿如結􅅐狀讝語者此爲􅀬入血室也當刺期門隨其實而㵼之中風􅀤􅀬惡寒表病也若經水不來表邪傳裏則入府而不入血室也因經水適來血室空虚至七八日邪氣傳裏之時更不入府乘虚而入於血室􅀬除脉遲身凉者邪氣内䧟而表證罷也􅅐脇下滿如結􅅐狀讝語者􅀬入血室而裏實期門者肝之募肝主血刺期門者㵼血室之􅀬審㸔何經氣實更隨其實而㵼之婦人中風七八日續得寒􅀬􅀤作有時經水適㫁者此爲􅀬入血室其血必結故使如􅒻狀􅀤作有時小柴胡湯主之中風七八日邪氣傳裏之時本無寒􅀬而續得寒􅀬經水適㫁者此爲表邪乘血室虚入於血室與血相􅅮而血結不行經水所以㫁也血氣與邪分爭致寒􅀬如􅒻而􅀤作有時與小柴胡湯以解傳經之邪婦人傷寒􅀤􅀬經水適來晝日明了暮則讝語如見􅀑狀者此爲􅀬入血室無犯胃氣及上二焦必自愈傷寒􅀤􅀬者寒已成􅀬也經水適來則血室虚空邪􅀬乘虚入於血室若晝日讝語爲邪客於府而陽爭也此晝日明了暮則讝語如見􅀑狀是邪不入府入於血室而隂爭也陽盛讝語則宜下此􅀬入血室不可與下藥犯其胃氣􅀬入血室血結實􅀬者與小柴胡湯散邪􅀤汗此雖􅀬入血室而不留結不可與􅀤汗藥犯其上焦􅀬入血室􅅐脇滿如結􅅐狀者可刺期門此雖􅀬入血室而無滿結不可刺期門犯其中焦必自愈者以經行則􅀬隨血去血下也已則邪􅀬悉除而愈矣所爲􅀤汗爲犯上焦者􅀤汗則動衛氣衛氣岀上焦故也刺期門爲犯中焦者刺期門則動榮氣榮氣岀中焦故也脉經曰無犯胃氣及上二焦必自愈豈謂藥不謂針􅁘傷寒六七日􅀤􅀬㣲惡寒支節煩疼㣲嘔心下支結外證未去者柴胡加桂枝湯主之傷寒六七日邪當傳裏之時支散也嘔而心下結者裏證也法當攻裏􅀤􅀬㣲惡寒支節煩疼爲外證未去不可攻裏與柴胡桂枝湯以和解之傷寒五六日巳􅀤汗而復下之􅅐脇滿㣲結小便不利渴而不嘔但頭汗岀往來寒􅀬心煩者此爲未解也柴胡桂枝乾薑湯主之傷寒五六日巳經汗下之後則邪當解今􅅐脇滿㣲結小便不利渴而不嘔但頭汗岀往來寒􅀬心煩者即邪氣猶在半表半裏之間爲未解也胷脇滿㣲結寒􅀬心煩者邪在半表半裏之間也小便不利而渴者汗下後亡津液内燥也若􅀬消津液令小便不利而渴者其人必嘔今渴而不嘔知非裏􅀬也傷寒汗岀則和今但頭汗岀而餘處無汗者津液不足而陽虚於上也與柴胡桂枝乾薑湯以解表裏之邪復津液而􅂇陽也柴胡桂枝乾薑湯方柴胡半斤苦平桂枝三兩去皮味辛􅀬乾薑三兩辛􅀬括蔞根四兩苦寒黄芩三兩苦寒牡蠣三兩熬醎寒􅅴草二兩炙味􅅴平内經曰􅀬􅁋於内以苦􅀤之柴胡黄芩之苦以解傳表之邪辛􅅴􅀤散爲陽桂枝􅅴草之辛􅅴以散在表之邪鹹以䎡之牡蠣之鹹以消􅅐脇之滿辛以潤之乾薑之辛以固陽虚之汗津液不足而爲渴苦以堅之括蔞之苦以生津液右七味以水一斗二升煑取六升去滓再煎取三升温服一升日三服􅀄服㣲煩復服汗岀便愈傷寒五六日頭汗岀㣲惡寒手足冷心下滿口不欲食大便鞕脉細者此爲陽㣲結必有表復有裏也脉沉亦在裏也汗岀爲陽㣲假令純隂結不得復有外證悉入在裏此爲半在裏半在外也脉雖沉􅂃不得爲少隂病所以然者隂不得有汗今頭汗岀故知非少隂也可與小柴胡湯設不了了者得屎而解傷寒五六日邪當傳裏之時頭汗岀㣲惡寒者表仍未解也手足冷心下滿口不欲食大便鞕脉細者邪結於裏也大便鞕爲陽結此邪􅀬雖傳於裏然以外帶表邪則􅀬結猶淺故曰陽㣲結脉沉雖爲在裏若純隂結則更無頭汗惡寒之表證諸隂脉皆至頸􅅐中而還不上循頭今頭汗岀知非少隂也與小柴胡湯以除半表半裏之邪服湯已外證罷而不了了者爲裏􅀬未除與湯取其㣲利則愈故云得屎而解傷寒五六日嘔而􅀤􅀬者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不爲逆必蒸蒸而振􅁍􅀤􅀬汗岀而解若心下滿而鞕痛者此爲結􅅐也大䧟􅅐湯主之但滿而不痛者此爲痞柴胡不中與之宜半夏㵼心湯傷寒五六日邪在半表半裏之時嘔而􅀤􅀬邪在半表半裏之證是爲柴胡證具以他藥下之柴胡證不罷者不爲逆􅁍與柴胡湯則愈若下後邪氣傳裏者邪在半表半裏則隂陽俱有邪至於下後邪氣傳裏亦有隂陽之異若下後陽邪傳裏者則結於􅅐中爲結􅅐以􅅐中爲陽受氣之分與大䧟􅅐湯以下其結隂邪傳裏者則留於心下爲痞以心下爲隂受氣之分與半夏㵼心湯以通其痞經曰病􅀤於陽而反下之􅀬入因作結􅅐病􅀤於隂而反下之因作痞此之謂也半夏㵼心湯方半夏半升洗辛平黄芩苦寒乾薑辛􅀬人參已上各三兩􅅴温黄連一兩苦寒大􅀥十二枚擘温􅅴􅅴草三兩炙􅅴平辛入肺而散氣半夏之辛以散結氣苦入心而泄􅀬黄芩黄連之苦以㵼痞􅀬脾欲緩急食􅅴以緩之人參􅅴草大􅀥之􅅴以緩之右七味以水一斗煑取六升去滓再煑取三升温服一升日三服太陽少陽併病而反下之成結􅅐心下鞕下利不止水漿不下其人心煩太陽少陽併病爲邪氣在半表半裏也而反下之二經之邪乘虚而入太陽表邪入裏結於􅅐中爲結􅅐心下鞕少陽裏邪乘虚下干腸胃遂利不止若邪結隂分則飲食如故而爲藏結此爲陽邪内結故水漿不下而心煩脉浮而􅂃而復下之􅂃反入裏則作痞按之自濡但氣痞耳浮而􅂃浮爲傷陽􅂃爲傷隂當􅀤其汗而反下之若浮入裏爲陽邪入裏則作結􅅐浮不入裏而􅂃入裏者隂邪入裏則作痞太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出􅀤作有時頭痛心下痞鞕滿引脇下痛乾嘔短氣汗出不惡寒者此表解裏未和也十􅀥湯主之下利嘔逆裏受邪也邪在裏者可下亦須待表解者乃可攻之其人漐漐汗出􅀤作有時不惡寒者表已解也頭痛心下痞鞕滿引脇下痛乾嘔短氣者邪􅀬内畜而有伏飲是裏未和也與十􅀥湯下􅀬逐飲十􅀥湯方芫花熬味辛苦􅅴遂苦寒大㦸苦寒大􅀥十枚擘􅅴温辛以散之芫花之辛以散飲苦以泄之􅅴遂大㦸之苦以泄水水者腎所主也􅅴者脾之味也大􅀥之􅅴者益土而勝水右上三味等分各别搗爲散以水一升半先煑大􅀥肥者十枚取八合去滓内藥末強人服一錢匕羸人服半錢温服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養太陽病醫􅀤汗遂􅀤􅀬惡寒因復下之心下痞表裏俱虚隂陽氣並竭無陽則隂獨復加燒針因􅅐煩靣色青黄膚瞤者難治今色㣲黄手足温者易愈太陽病因􅀤汗遂􅀤􅀬惡寒者外虚陽氣邪復不除也因復下之又虚其裏表中虚邪内䧟傳於心下爲痞􅀤汗表虚爲竭陽下之裏虚爲竭隂表證罷爲無陽裏有痞爲隂獨又加燒針虚不勝火火氣内攻致􅅐煩也傷寒之病以陽爲主其人靣色青膚肉瞤動者陽氣大虚故云難治若靣色㣲黄手足温者即陽氣得復故云易愈心下痞按之濡其脉關上浮者大黄黄連㵼心湯主之心下鞕按之痛關脉沉者實􅀬也心下痞按之濡其脉關上浮者虚􅀬也大黄黄連湯以導其虚􅀬大黄黄連㵼心湯方大黄二兩味苦寒黄連一兩味苦寒内經曰火􅀬受邪心病生焉苦入心寒除􅀬大黄黄連之苦寒以導㵼心下之虚􅀬但以麻沸湯漬服者取其氣薄而泄虚􅀬右二味以麻沸湯二升漬之湏􅁷絞去滓分温再服心下痞而復惡寒汗岀者附子㵼心湯主之心下痞者虚􅀬内伏也惡寒汗岀者陽氣外虚也與㵼心湯攻痞加附子以固陽本以下之故心下痞與㵼心湯痞不解其人渇而口燥煩小便不利者五苓散主之本因下後成痞當與㵼心湯除之若服之痞不解其人渇而口燥煩小便不利者爲水飲内畜津液不行非􅀬痞也與五苓散􅀤汗散水則愈一方忍之一日乃愈者不飲水者外水不入所停之水得行而痞亦愈也傷寒汗岀解之後胃中不和心下痞鞕乾噫食臭脇下有水氣腹中雷鳴下利者生薑㵼心湯主之胃爲津液之主陽氣之根大汗岀後外亡津液胃中空虚客氣上逆心下痞鞕金匱要畧曰中焦氣未和不能消榖故令噫乾噫食臭者胃虚而不殺榖也脇下有水氣腹中雷鳴土弱不能勝水也與㵼心湯以攻痞加生薑以益胃傷寒中風醫反下之其人下利日數十行榖不化腹中雷鳴心下痞鞕而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結􅀬但以胃中虚客氣上逆故使鞕也􅅴草㵼心湯主之傷寒中風是傷寒或中風也邪氣在表醫反下之虚其腸胃而氣内䧟也下利日數十行榖不化腹中雷鳴者下後裏虚胃弱也心下痞鞕乾嘔心煩不得安者胃中空虚客氣上逆也與㵼心湯以攻表加􅅴草以􅀘虚前以汗後胃虚是外傷陽氣故加生薑此以下後胃虚是内損隂氣故加􅅴草傷寒服湯藥下利不止心下痞鞕服㵼心湯巳復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘粮湯主之復利不止者當利其小便傷寒服湯藥下後利不止而心下痞鞕者氣虚而客氣上逆也與㵼心湯攻之則痞已醫復以他藥下之又虚其裏致利不止也理中丸脾胃虚寒下利者服之愈此以下焦虚故與之其利益甚聖濟經曰滑則氣脫欲其収也如開腸洞泄便溺遺失澁劑所以収之此利由下焦不約與赤石脂禹餘粮湯以澁洞泄下焦主分清濁下利者水榖不分也若服澁劑而利不止當利小便以分其氣赤石脂禹餘粮湯方赤石脂一斤碎味􅅴温禹餘粮一斤碎味􅅴平本草云澁可去脫石脂之澁以収歛之重可去怯餘粮之重以鎭固已上二味以水六升煑取二升去滓三服傷寒􅄍下後􅀤汗虚煩脉甚㣲八九日心下痞鞕脇下痛氣上衝咽喉眩冒經脉動􅅥者乆而成痿傷寒􅄍下後􅀤汗則表裏之氣俱虚虚煩脉甚㣲爲正氣内虚邪氣獨在至七八日正氣當復邪氣當罷而心下痞脇下痛氣上衝咽喉眩冐者正氣内虚而不復邪氣留結而不去經脉動􅅥者經絡之氣虚極乆則􅀬氣還經必成痿弱傷寒􅀤汗若􅄍若下解後心下痞鞕噫氣不除者旋復代赭石湯主之大邪雖解以曽􅀤汗􅄍下胃氣弱而未和虚氣上逆故心下痞鞕噫氣不除與旋復代赭石湯降虚氣而和胃旋復代赭石湯方旋復花三兩味醎温人參二兩味􅅴温生薑五兩切味辛温半夏半升洗味辛温代赭石一兩味苦寒大􅀥十二枚擘􅅴温􅅴草三兩炙味􅅴平鞕則氣堅鹹味可以䎡之旋復之鹹以䎡痞鞕虚則氣浮重劑可以鎭之代赭石之重以鎭虚逆辛者散也生薑半夏之辛以散虚痞􅅴者緩也人參􅅴草大􅀥之􅅴以􅀘胃弱右件七味以水一斗煑取六升去滓再煎取三升温服一升日三服下後不可更行桂枝湯若汗岀而喘無大􅀬者可與麻黄杏子􅅴草石膏湯前第三卷十六證云􅀤汗後不可更行桂枝湯汗岀而喘無大􅀬者爲與此證治法同汗下雖殊旣不當損正氣則一邪氣所傳旣同遂用一法治之經所謂若􅀤汗若下若􅄍後是矣太陽病外證未除而數下之遂恊􅀬而利利下不止心下痞鞕表裏不解者桂枝人參湯主之外證未除而數下之爲重虚其裏邪􅀬乘虚而入裏虚恊􅀬遂利不止而心下痞若表解而下利心下痞者可與㵼心湯若不下利表不解而心下痞者可先解表而後攻痞以表裏不解故與桂枝人參湯和裏解表桂枝人參湯方桂枝四兩去皮味辛􅀬􅅴草四兩炙味􅅴平白术三兩味􅅴平人參三兩味􅅴温乾薑三兩味辛􅀬表未解者辛以散之裏不足者􅅴以緩之此以裏氣大虚表裏不解故加桂枝􅅴草於理中湯也右伍味以水九升先煑四味取五升内桂更煑取三升温服一升日再夜一服傷寒大下後復􅀤汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黄黄連㵼心湯大下後復􅀤汗則表裏之邪當悉巳此心下爲痞惡寒者表裏之邪俱不解也因表不解而下之爲心下痞先與桂枝湯解表表解乃與大黄黄連㵼心湯攻痞内經曰從外之内而盛於内者先治其外而後調其内傷寒􅀤􅀬汗岀不解心中痞鞕嘔􅄍而下利者大柴胡湯主之傷寒􅀤􅀬寒已成􅀬也汗岀不解表和而裏病也吐利心腹濡䎡爲裏虚嘔􅄍而下利心腹痞鞕者是裏實也與大柴胡湯以下裏􅀬病如桂枝證頭不痛項不強寸脉㣲浮􅅐中痞鞕氣上衝咽喉不得息者此爲􅅐有寒也當􅄍之宜􅀲蔕散病如桂枝證爲􅀤􅀬汗岀惡風言邪在表也頭痛項強爲桂枝湯證具若頭不痛項不強則邪不在表而傳裏也浮爲在表沉爲在裏今寸脉㣲浮則邪不在表亦不在裏而在􅅐中也􅅐中與表相應故知邪在􅅐中者猶如桂枝證而寸脉㣲浮也以􅅐中痞鞕上衝咽喉不得息知寒邪客於􅅐中而不在表也千金曰氣浮上部塡塞心􅅐􅅐中滿者􅄍之則愈與􅀲蔕散以􅄍􅅐中之邪􅀲蔕散方􅀲蔕一分熬黄味苦寒赤小豆一分味酸温其高者越之越以􅀲蔕豆豉之苦在上者湧之湧以赤小豆之酸内經曰酸苦湧泄爲隂右二味各别搗篩爲散已合治之取一錢匕以香豉一合用􅀬湯七合煑作稀糜去滓取汁和散温頓服之不􅄍者少少加得快􅄍乃止諸亡血虚家不可與􅀲蔕散病脇下素有痞連在臍傍痛引少腹入隂筋者此名藏結死素有􅀫昔之積結於脇下爲痞今因傷寒邪氣入裏與􅀫積相􅂇使藏之眞氣結而不通致連在臍傍痛引少腹入隂筋而死傷寒病若􅄍若下後七八日不解􅀬結在裏表裏俱􅀬時時惡風大渇舌上乾燥而煩欲飲水數升者白虎加人參湯主之若􅄍若下後七八日則當解復不解而􅀬結在裏表􅀬者身􅀬也裏􅀬者内􅀬也本因􅄍下後邪氣乘虚内䧟爲結􅀬若無表􅀬而純爲裏􅀬則邪􅀬結而爲實此以表􅀬未罷時時惡風若邪氣純在表則惡風無時若邪氣純在裏則更不惡風以時時惡風知表裏俱有􅀬也邪􅀬結而爲實者則無大渇邪􅀬散漫則渇今雖􅀬結在裏表裏俱􅀬未爲結實邪氣散漫熏烝焦膈故大渇舌上乾燥而煩欲飲水數升與白虎加人參湯散􅀬生津傷寒無大􅀬口燥渇心煩背㣲惡寒者白虎加人參湯主之無大􅀬者爲身無大􅀬也口燥渇心煩者當作陽明病然以背㣲惡寒爲表未全罷所以属大陽也背爲陽背惡寒口中和者少隂病也當與附子湯今口燥而渇背雖惡寒此裏􅀬也則惡寒亦不至甚故云㣲惡寒與白虎湯和表散􅀬加人參止渇生津傷寒脉浮􅀤􅀬無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之傷寒脉浮􅀤􅀬無汗其表不解不渇者宜麻黄湯渇者宜五苓散非白虎所宜大渇欲水無表證者乃可與白虎加人參湯以散裏􅀬臨病之工大宜精别太陽少陽併病心下鞕頸項強而眩者當刺大椎肺俞肝俞慎勿下之心下痞鞕而眩者少陽也頸項強者太陽也刺大椎肺俞以㵼太陽之邪以太陽脉下項俠脊故􅈛肝俞以㵼少陽之邪以膽爲肝之府故􅈛太陽爲在表少陽爲在裏即是半表半裏證前第五證云不可􅀤汗􅀤汗則讝語是􅀤汗攻太陽之邪少陽之邪益甚干胃必􅀤讝語此云慎勿下之攻少陽之邪太陽之邪乘虚入裏必作結􅅐經曰太陽少陽併病而反下之成結􅅐太陽與少陽合病自下利者與黄芩湯若嘔者黄芩加半夏生薑湯主之太陽陽明合病自下利爲在表當與􅁑根湯􅀤汗陽明少陽合病自下利爲在裏可與承氣湯下之此太陽少陽合病自下利爲在半表半裏非汗下所冝故與黄芩湯以和解半表半裏之邪嘔者胃氣逆也故加半夏生薑以散逆氣黄芩湯方黄芩三兩味苦寒􅅴草二兩炙味􅅴平芍藥二兩味酸平大􅀥十二枚擘味􅅴温虚而不實者苦以堅之酸以収之黄芩芍藥之苦酸以堅歛腸胃之氣弱而不足者􅅴以􅀘之􅅴草大􅀥之􅅴以􅀘固腸胃之弱右四味以水一斗煑取三升去滓温服一升日再夜一服若嘔者加半夏半升生薑三兩傷寒􅅐中有􅀬胃中有邪氣腹中痛欲嘔􅄍者黄連湯主之濕家下後舌上如胎者以丹田有􅀬􅅐中有寒是邪氣入裏而爲下􅀬上寒也此傷寒邪氣傳裏而爲下寒上􅀬也胃中有邪氣使隂陽不交隂不得升而獨治於下爲下寒腹中痛陽不得降而獨治於上爲􅅐中􅀬欲嘔􅄍與黄連湯升降隂陽之氣黄連湯方黄連味苦寒􅅴草炙味􅅴平乾薑味辛􅀬桂枝去皮味辛􅀬各三兩人參二兩味􅅴温半夏半升洗味辛温大􅀥十二枚擘味􅅴温上􅀬者泄之以苦黄連之苦以降陽下寒者散之以辛桂薑半夏之辛以升隂脾欲緩急食􅅴以緩之人參􅅴草大􅀥之􅅴以益胃右七味以水一斗煑取六升去滓温服一升日三服夜二服傷寒八九日風濕相􅅮身體疼煩不能自轉側不嘔不渴脉浮虚而濇者桂枝附子湯主之傷寒與中風家至七八日再經之時則邪氣多在裏身必不苦疼痛今日數多復身體疼煩不能自轉側者風濕相􅅮也煩者風也身疼不能自轉側者濕也經曰風則浮虚脉經曰脉來濇者爲病寒濕也不嘔不渴裏無邪也脉得浮虚而濇身有疼煩知風濕但在經也與桂枝附子湯以散表中風濕若其人大便鞕小便自利者去桂枝加白术湯主之桂􅀤汗走津液此小便利大便鞕爲津液不足去桂加术桂枝附子湯方桂枝四兩去皮味辛􅀬附子三枚炮去皮破八片辛􅀬生薑三兩切辛温􅅴草二兩炙味􅅴温大􅀥十二枚擘味􅅴温風在表者散以桂枝􅅴草之辛􅅴濕在經者逐以附子之辛􅀬薑􅀥辛􅅴行榮衛通津液以和表也右五味以水六升煑取二升去滓分温三服風濕相􅅮骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身㣲腫者􅅴草附子湯主之風則傷衛濕流關節風濕相􅅮兩邪亂經故骨節疼煩掣痛不得屈伸近之則痛劇也風勝則衛氣不固汗出短氣惡風不欲去衣爲風在表濕勝則水氣不行小便不利或身㣲腫爲濕外薄也與甘草附子湯散濕固衛氣􅅴草附子湯方􅅴草二兩炙味􅅴平附子二枚炮去皮破味辛􅀬白术二兩味􅅴温桂枝四兩去皮味辛􅀬桂枝􅅴草之辛􅅴􅀤散風邪而固衛附子白术之辛􅅴解濕氣而温經右四味以水六升煑取三升去滓温服一升日三服􅀄服得㣲汗則解能食汗岀復煩者服五合恐一升多者宜服六七合爲妙傷寒脉浮滑此表有􅀬裏有寒白虎湯主之浮爲在表滑爲在裏表有􅀬外有􅀬也裏有寒有邪氣傳裏也以邪未入府故止言寒如􅀲蔕散證云􅅐上有寒者是矣與白虎湯以解内外之邪白虎湯方知母六兩味苦寒石膏一斤碎味􅅴寒􅅴草二兩􅅴平粳米六合味􅅴平内經曰􅀬􅁋所勝佐以苦􅅴知母石膏之苦􅅴以散􅀬􅀬則傷氣􅅴以緩之􅅴草粳米之􅅴以益氣右四味以水一斗煑米熟湯成去滓温服一升日三服傷寒脉結代心動悸炙􅅴草湯主之結代之脉動而中出能自還者名曰結不能自還者名曰代由血氣虚衰不能相續也心中悸動知眞氣内虚也與炙􅅴草湯益虚􅀘血氣而復脉炙􅅴草湯方􅅴草四兩炙味􅅴平生薑三兩切味辛温桂枝三兩去皮味辛􅀬人參二兩味􅅴温生地黄一斤味􅅴寒阿膠二兩味温􅅴麥門冬半升去心味􅅴平麻子人半升味􅅴平大􅀥十二枚擘味􅅴温􅀘可以去弱人參􅅴草大􅀥之􅅴以􅀘不足之氣桂枝生薑之辛以益正氣聖濟經曰津耗散爲枯五藏痿弱榮衛涸流温劑所以潤之麻人阿膠麥門冬地黄之􅅴潤經益血復脉通心也右九味以清酒七升水八升先煑八味取三升去滓内膠烊消盡温服一升日三服一名復脉湯脉按之來緩而時一止復來者名曰結又脉來動而中止更來小數中有還者反動名曰結隂也脉來動而中止不能自還因而復動名曰代隂也得此脉者必難治結代之脉一爲邪氣留結一爲眞氣虚衰脉來動而中止若能自還更來小數止是邪氣留結名曰結隂若動而中止不能自還因其呼吸隂陽相引復動者是眞氣衰極名曰代隂爲難治之脉經曰脉結者生代者死此之謂也釋音俛音免俯也瞤水倫切目動也匱求位切匣也痿於危切痺病也䎡音軟柔也椎音槌掣昌列切涸乎各切竭也烊音羊註解傷寒論卷第四
