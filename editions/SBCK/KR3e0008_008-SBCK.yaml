front:
  text: 註解傷寒論卷第九
  hash: sha256:599188faa149e22339180050fb6cb904d0602936d6e4fd031d7596159bf0eb9d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0008_SBCK_008-1a}
body:
  text: 漢張仲景著􅀳王叔和撰次宋成無已註明汪濟川校正辨不可下病脉證并治第二十脉濡而弱弱反在關濡反在巔㣲反在上澁反在下㣲則陽氣不足澁則無血陽氣反㣲中風汗岀而反躁煩澁則無血厥而且寒陽㣲不可下下之則心下痞鞕陽㣲下之陽氣已虚隂氣内甚故心下痞鞕動氣在右不可下下之則津液内竭咽燥鼻乾頭眩心悸也動氣在右肺之動也下之傷胃動肺津液内竭咽燥鼻乾者肺属金主燥也頭眩心悸者肺主氣而虚也動氣在左不可下下之則腹内拘急食不下動氣更劇雖有身􅀬卧則欲踡動氣在左肝之動也下之損脾而肝氣益勝復行於脾故腹内拘急食不下動氣更劇也雖有身􅀬以裏氣不足故卧則欲踡動氣在上不可下下之則掌握􅀬煩身上浮冷􅀬汗自泄欲得水自灌動氣在上心之動也下之則傷胃内動心氣心爲火主􅀬鍼經曰心所生病者掌中􅀬肝爲藏中之隂病則雖有身􅀬卧則欲踡作表􅀬裏寒也心爲藏中之陽病則身上浮冷􅀬汗自泄欲得水自􅈅作表寒裏􅀬也二藏隂陽寒􅀬明可見焉動氣在下不可下下之則腹脹滿卒起頭眩食則下清榖心下痞也動氣在下腎之動也下之則傷脾腎氣則動腎寒乘脾故有腹滿頭眩下淸榖心下痞之證也咽中閉塞不可下下之則上輕下重水漿不下卧則欲踡身急痛下利日數十行咽中閉塞胃巳不和也下之則閉塞之邪爲上輕復傷胃氣爲下重至水漿不下卧則欲踡身急痛下利日數十行知虚寒也諸外實者不可下下之則􅀤㣲􅀬亡脉厥者當臍握􅀬外實者表􅀬也汗之則愈下之爲逆下後裏虚表􅀬内䧟故發㣲􅀬厥深者􅀬亦深亡脉厥者則陽氣深䧟客於下焦故當臍握􅀬諸虚者不可下下之則大渇求水者易愈惡水者劇金匱玉凾曰虚者十􅀘勿一㵼之虚家下之爲重虚内竭津液故令大渇求水者陽氣未竭而猶可愈惡水者陽氣已竭則難可制脉濡而弱弱反在關濡反在巔弦反在上㣲反在下弦爲陽運㣲爲隂寒上實下虚意欲得温㣲弦爲虚虚者不可下也虚家下之是爲重虚難經曰實實虚虚損不足益有餘此者是中工所害也㣲則爲逆欬則􅄍涎下之則欬止而利因不休利不休則胷中如蟲齧粥入則岀小便不利兩脇拘急喘息爲難頸背相引擘則不仁極寒反汗岀身冷若氷眼睛不慧語言不休而榖氣多入此爲除中口雖欲言舌不得前内經曰感於寒則受病㣲則爲欬甚則爲泄爲痛肺感㣲寒爲欬則脉亦㣲也下之氣下欬雖止而因利不休利不休則奪正氣而成危惡胷中如蟲齧粥入則岀小便不利兩脇拘急喘息爲難者裏氣損也頸背相引臂爲不仁極寒反汗岀身冷如冰者表氣損也表裏損極至隂陽俱脫眼睛不慧語言不休難經曰脫陽者見􅀑脫隂者目盲隂陽脫者應不能食而榖多入者此爲除中是胃氣除去也口雖欲言舌不得前氣已衰脫不能運也脉濡而弱弱反在關濡反在巔浮反在上數反在下浮爲陽虚數爲無血浮爲虚數爲􅀬浮爲虚自汗岀而惡寒數爲痛振寒而慄㣲弱在關􅅐下爲急喘汗而不得呼吸呼吸之中痛在於脇振寒相􅅮形如􅒻狀醫反下之故令脉數􅀤􅀬狂走見􅀑心下爲痞小便淋􅄋小腹甚硬小便則尿血也弱在關則隂氣内弱濡在巔則陽氣外弱浮爲虚浮在上則衞不足也故云陽虚陽虚不固故腠理汗岀惡寒數亦爲虚數在下則榮不及故云亡血亡血則不能温潤腑臟脉數而痛振而寒慄㣲弱在關邪氣傳裏也裏虚遇邪胷下爲急喘而汗岀脇下引痛振寒如􅒻此裏邪未實表邪未解醫反下之裏氣益虚邪􅀬内䧟故脉數􅀤􅀬狂走見􅀑心下爲痞此􅀬䧟於中焦者也若􅀬氣深䧟則客於下焦使小便淋􅄋小腹甚鞕小便尿血也脉濡而􅂃濡則胃氣㣲緊則榮中寒陽㣲衞中風􅀤􅀬而惡寒榮􅂃胃氣冷㣲嘔心内煩醫爲有大􅀬解飢而􅀤汗亡陽虚煩躁心下苦痞堅表裏俱虚竭卒起而頭眩客􅀬在皮膚悵怏不得眠不知胃氣冷􅂃寒在關元技巧無所施汲水灌其身客􅀬應時罷慄慄而振寒重􅀍而覆之汗岀而冐巔體惕而又振小便爲㣲難寒氣因水􅀤清榖不容間嘔變反腸岀顛倒不得安手足爲㣲逆身冷而内煩遲欲從後救安可復追還胃冷榮寒陽㣲中風􅀤􅀬惡寒㣲嘔心煩醫不温胃反爲有􅀬解飢􅀤汗則表虚亡陽煩躁心下痞堅先裏不足􅀤汗又虚其表表裏俱虚竭卒起頭眩客􅀬在表悵怏不得眠醫不救裏但責表􅀬汲水灌洗以􅁍􅀬客􅀬易罷裏寒益増慄而振寒復以重􅀍覆之表虚遂汗岀愈使陽氣虚也巔頂也顛冒而體振寒小便難者亡陽也寒因水􅀤下爲清榖上爲嘔􅄍外有厥逆内爲燥煩顛倒不安雖欲拯救不可得也本草曰病􅀔已過命將難全脉浮而大浮爲氣實大爲血虚血虚爲無隂􅀌陽獨下隂部者小便當赤而難胞中當虚今反小便利而大汗岀法應衞家當㣲今反更實津液四射榮竭血盡乾煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此爲重虚客陽去有期必下如汚埿而死衞爲陽榮爲隂衞氣強實隂血虚弱陽乘隂虚下至隂部隂部下焦也陽爲􅀬則消津液當小便赤而難今反小便利而大汗岀者隂氣内弱也經曰隂弱者汗自岀是以衞家不㣲而反更實榮竭血盡乾煩而不眠血薄則肉消而成暴液者津液四射也醫反下之又虚其裏是爲重虚􅀌陽因下而又脫去氣血皆竭胃氣内盡必下如汚埿而死也脉數者乆數不止止則邪結正氣不能復正氣􅁍結於藏故邪氣浮之與皮毛相得脉數者不可下下之則必煩利不止數爲􅀬止則邪氣結於經絡之間正氣不能復行於表則􅁍結於藏邪氣獨浮於皮毛下之虚其裏邪􅀬乘虚而入裏虚叶􅀬必煩利不止脉浮大應􅀤汗醫反下之此爲大逆浮大属表故不可下病欲􅄍者不可下嘔多雖有陽明證不可攻之爲邪猶在胷中也太陽病外證未解不可下下之爲逆表未解者雖有裏證亦不可下當先解外爲順若反下之則爲逆也經曰本􅀤汗而復下之此爲逆也若先􅀤汗治不爲逆夫病陽多者􅀬下之則鞕陽􅀬證多則津液少下之雖除􅀬復損津液必便難也或謂陽多者表􅀬也下之則心下鞕無陽隂強大便鞕者下之則必清榖腹滿無陽者亡津液也隂強者寒多也大便鞕則爲隂結下之虚胃隂寒内甚必清榖腹滿傷寒􅀤􅀬頭痛㣲汗岀􅀤汗則不識人熏之則喘不得小便心腹滿下之則短氣小便難頭痛背強加温針則衂傷寒則無汗􅀤􅀬頭痛㣲汗岀者寒邪變􅀬欲傳於裏也􅀤汗則亡陽増􅀬故不識人若以火熏之則火􅀬傷氣内消津液結爲裏實故喘不得小便心腹滿若反下之則内虚津液邪欲入裏外動經絡故短氣小便難頭痛背強若加温針益陽増􅀬必動其血而爲衂也傷寒脉隂陽俱􅂃惡寒􅀤􅀬則脉欲厥厥者脉􅀄來大漸漸小更來漸漸大是其候也如此者惡寒甚者翕翕汗岀喉中痛􅀬多者目赤脉多睛不慧醫復􅀤之咽中則傷若復下之則兩目閉寒多者便清榖􅀬多者便膿血若熏之則身􅀤黄若熨之則咽燥若小便利者可救之小便難者爲危殆脉隂陽俱􅂃則清邪中上濁邪中下太陽少隂俱感邪也惡寒者少隂􅀤􅀬者太陽脉欲厥者表邪欲傳裏也惡寒甚者則變􅀬翕翕汗岀喉中痛以少隂之脉循喉嚨故也􅀬多者太陽多也目赤脉多者睛不慧以太陽之脉起於目故也􅀤汗攻陽則少隂之􅀬因發而上行故咽中傷若復下之則太陽之邪因虚而内䧟故兩目閉隂邪下行爲寒多必便清榖陽邪下行爲􅀬多必便膿血熏之則火􅀬甚身必􅀤黄熨之則火􅀬輕必爲咽燥小便利者爲津液未竭猶可救之小便難者津液巳絶則難可制而危殆矣傷寒􅀤􅀬口中勃勃氣岀頭痛目黄衂不可制貪水者必嘔惡水者厥若下之咽中生瘡假令手足温者必下重便膿血頭痛目黄者若下之則兩目閉貪水者脉必厥其聲嚶咽喉塞若􅀤汗則戰慄隂陽俱虚惡水者若下之則裏冷不􅄝食大便完榖岀若􅀤汗則口中傷舌上白胎煩燥脉數實不大便六七日後必便血若􅀤汗則小便自利也傷寒􅀤􅀬寒變􅀬也口中勃勃氣岀􅀬客上膈也頭痛目黄血不可制者􅀬烝於上也千金曰無陽即厥無隂即嘔貪水者必嘔則隂虚也惡水者厥則陽虚也􅀤􅀬口中勃勃氣岀者咽中已􅀬也若下之亡津液則咽中生瘡􅀬因裏虚而下若􅀬氣内結則手足必厥設手足温者􅀬氣不結而下行作叶􅀬利下重便膿血也頭痛目黄者下之􅀬氣内伏則目閉也貪水爲隂虚下之又虚其裏陽氣内䧟故脉厥聲嚶咽喉閉塞隂虚􅀤汗又虚其陽使隂陽俱虚而戰慄也惡水爲陽虚下之又虚胃氣虚寒内甚故裏冷不􅄝食陽虚􅀤汗則上焦虚燥故口中傷爛舌上白胎而煩燥也經曰脉數不解合􅀬則消榖喜飢至六七日不大便者此有瘀血此脉數實不大便六七日􅀬畜血於内也七日之後邪􅀬漸解迫血下行必便血也便血􅀤汗隂陽俱虚故小便利下利脉大者虚也以其強下之故也設脉浮革因爾腸鳴者屬當歸四逆湯主之脉大爲虚以未應下而下之利因不休也浮者按之不足也革者實大而長㣲弦也浮爲虚革爲寒寒虚相􅅮則腸鳴與當歸四逆湯􅀘虚散寒辨可下病脉證并治第二十一大法秋宜下秋時陽氣下行則邪亦在下故宜下凡服下藥用湯勝丸中病即止不必盡劑也湯之爲言蕩也滌蕩腸胃漑􅈅藏府推陳燥結􅁍􅀬下寒破散邪疫理導􅃳澤枯槁恱人皮膚益人血氣水能净萬物故勝丸散中病即止者如承氣湯證云􅀂一服利而止後服又曰􅀂一服讝語止更莫復服是不盡劑也下利三部脉皆平按之心下鞕者急下之宜大承氣湯下利者脉當㣲厥今反和者此爲内實也下利三部脉平者巳爲實而又按之心下鞕者則邪甚也故宜大承氣湯下之下利脉遲而滑者内實也利未欲止當下之宜大承氣湯經曰脉遲者食乾物得之金匱要略曰滑則榖氣實下利脉遲而滑者胃有􅀫食也脾胃傷食不消水榖是致下利者爲内實􅀂但以温中厚腸之藥利必不止可與大承氣湯下去􅀫食利自止矣問曰人病有􅀫食何以別之師曰寸口脉浮而大按之反澁尺中亦㣲而澁故知有􅀫食當下之宜大承氣湯寸以候外尺以候内浮以􅀱表沉以􅀱裏寸口脉浮大者氣實血虚也按之反澁尺中亦㣲而澁者胃有􅀫食裏氣不和也與大承氣湯以下􅀫食下利不欲食者以有􅀫食故也當宜下之與大承氣湯傷食則惡食故不欲食如傷風惡風傷寒惡寒之􅁼也下利差後至其年月日復􅀤者以病不盡故也當下之宜大承氣湯乗春則肝先受之乗夏則心先受之乗至隂則脾先受之乗秋則肺先受之假令春時受病氣必傷肝治之難愈邪有不盡者至春時元受月日内外相感邪必復動而痛也下利爲腸胃疾􅀫積不盡故當下去之下利脉反滑當有所去下之乃愈宜大承氣湯脉經曰脉滑者爲病食也下利脉滑則内有􅀫食故云當有所去與大承氣湯以下􅀫食病腹中滿痛者此爲實也當下之宜大承氣湯金匱要略曰病者腹滿按之不痛爲虚痛爲實可下之腹中滿痛者裏氣壅實也故可下之傷寒後脉沉沉者内實也下解之宜大柴胡湯傷寒後爲表巳解脉沉爲裏未和與大柴胡湯以下内實經曰傷寒差巳後更􅀤􅀬脉沉實者以下解之脉􅀟弦而遲者必心下鞕脉大而􅂃者陽中有隂也可以下之宜大承氣湯金匱要略曰脉􅀟弦者寒也經曰遲爲在藏脉􅀟弦而遲者隂中伏陽也必心下鞕大則爲陽􅂃則爲寒脉大而􅂃者陽中伏隂也與大承氣湯以分隂陽釋音齧魚結切噬也盥音貫澡手也悵怏上丑亮切望恨也下於亮切不服也嚶於耕切鳥鳴也溉灌上居代切下音貫注也註解傷寒論卷第九
