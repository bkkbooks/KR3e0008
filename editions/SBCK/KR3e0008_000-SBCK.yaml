front:
  text: 圖解運氣圖經曰夫天地之氣勝復之作不形於證診脉法曰天地之變無以脉診此之謂也右曰隨其氣所在期於左右從其氣則和違其氣則病迭移其位者病失守其位者危寸尺交反者死隂陽交者死經曰夫隂陽交者謂􅀊當陽在左而反於右謂􅀊當隂在右而反於左左交者死若左右獨然非交是謂不應惟寅申巳亥辰戌丑未八年有應也謂寸尺反者死謂􅀊當隂在寸而反見於尺謂􅀊當陽在尺而反見於寸若寸尺反者死若寸尺獨然非反見謂不應唯子午􅆗酉四年應之今依夫素問正經直言圖局又言脉法先立其年以知其氣左右應見然後乃言死生也凡三隂司天在泉上下南北二政或右兩手寸尺不相應皆爲脉沉下者仰手而沉覆手則沉爲浮細大者也若不明此法如過淵海問津豈不愚乎區區白首不能曉明也况因旬月邪僕亦留入式之法加臨五運六氣三隂三陽摽本南北之政司天在泉主病立成圖局易曉其義又何不逹於聖意哉夫五運六氣主病隂陽虚實無越此圖經曰上天也下地也周天謂天周也五行之位天垂六氣地布五行天順地而左回地承天而東轉木運之後天氣常餘餘氣不加君火却退一歩加臨相火之上是以毎五􅀊巳退一位而右遷故曰左右周天餘而復㑹㑹遇也言天地之道常五􅀊畢則以餘氣遷加復與五行座位再相㑹合而爲􅀊法也周天謂天周地位非周天之六氣也經曰加臨法曰先立其年以知其氣左右應見然後乃言生死也新刻傷寒論序傷寒論爲文簡嚴而寓意淵奥離爲六經法有詳畧詳者義例甄明非長餘也畧者指趣該洽非闕落也散之若截然殊科融之則約于一貫顧讀而用之者何如耳儒者旣不暇讀醫流又鮮能讀是以㣲辭要義秘而不宣至謂此非全書直欲分門平敘續臆􅀃以爲竒雜群方而云備使礦鏐合冶貂犬同裘如活人殺車等書皆仲景之螟螣也余觀成氏注蓋能獨䆒遺經與之終始多所發明間雖依文順釋如傳大將之令扵三軍不敢妄爲増易聽者惟謹行自得之其有功於是書不淺也顧世未有遺其聲而徒逐其響者於是論注同湮惜哉夫醫流相沿如是則無望其岀神竒以上契千載之妙用不幸有得是疾而能逃醫僇於喉吻者其㡬人哉余里人汪君處敬爲是愍惻務購善本反復校讐懼其傳之不逺也則遂鋟刻以爲公噫醫之素問靈樞視儒之六經若傷寒論可視語孟六經語孟之書具存非讀之不能曉析而司活民之􅀉者顧有舎之而忍其溝壑之盈至如此書世旣罕見卒讀而通之不易矧非有活人之􅀉而務好之以杜夫醫僇之􅁈斯二者用心之爲異豈不逺哉余故竊有感焉而爲之序嘉靖二十四年嵗在乙巳夏六月望歙巖鎮吕濵鄭佐書註解傷寒論序夫前聖有作後必有􅁇而述之者則其教乃得著于世矣醫之道源自炎黃以至神之妙始興經方􅁇而伊尹以元聖之才撰成湯液俾黎庻之疾疚咸遂蠲除使萬代之生靈普蒙拯濟後漢張仲景又廣湯液爲傷寒卒病論十數卷然後醫方大備玆先聖後聖􅀂合符節至􅀳大醫令王叔和以仲景之書撰次成叙得爲完秩昔人以仲景方一部爲衆方之祖盖能􅁇述先聖之所作迄今千有餘年不墜於地者又得王氏闡明之力也傷寒論十卷其言精而奥其法簡而詳非寡聞淺見所能􅄨䆒後雖有學者又各自名家未見􅀤明僕沗醫業自㓜徂老躭味仲景之書五十餘年矣雖粗得其門而近升乎堂然未入於室常爲之慊然昨者觧后聊攝成公議論該愽術業精通而有家學註成傷寒十卷出以示僕其三百九十七法之内分析異同彰明􅀮奥調陳脉理區别隂陽使表裏以昭然俾汗下而灼見百一十二方之後通明名號之由彰顯藥性之主十劑輕重之攸分七精制用之斯見别氣味之所冝明􅀘㵼之所適又皆引内經旁牽衆􅀃方法之辨莫不􅁢當寔前賢所未言後學所未識是得仲景之深意者也昔所謂慊然者今悉達其奥矣親覿其書誠難黙黙不揆荒蕪聊序其畧時甲子中秋日洛陽嚴噐之序傷寒論序夫傷寒論蓋祖述大聖人之意諸家莫其倫擬故晉皇甫謐序甲乙鍼經云伊尹以元聖之才撰用神農夲草以為湯液漢張仲景論廣湯液為十數卷用之多驗近世太醫令王叔和撰次仲景遺論甚精皆可施用是仲景本伊尹之法伊尹本神農之經得不謂祖述大聖人之意乎張仲景漢書無傳見名醫錄云南陽人名機仲景乃其字也舉孝廉官至長沙太守始受術於同郡張伯祖時人言識用精㣲過其師􅀁著論其言精而奥其法簡而詳非淺聞寡見者􅀁能及自仲景于今八百餘年惟王叔和能學之其間如􅁑洪陶景胡洽徐之才孫思邈軰非不才也但各自名家而不能􅁱明之開寶中節度使髙􅁇沖曽編錄進上其文理舛錯未嘗考正歷代雖藏之書府亦闕於讐校是使治病之流舉天下無或知者國家詔儒臣校正醫書臣竒續􅀍其選以為百病之急無急於傷寒今先校定張仲景傷寒論十卷總二十二篇證外合三百九十七法除􅃨重定有一百一十二方今請頒行太子右賛善大夫臣髙保衡尚書屯田員外郎臣孫竒尚書司封郎中祕閣校理臣林億等謹上國子監准尚書禮部元祐三年八月八日符元祐三年八月七日酉時准都省送下當月六日勑中書省勘會下項醫書册數重大􅁓墨價髙民間難以買置八月一日奉聖㫖令國子監别作小字雕印内有浙路小字本者令􅀁屬官司校對别無差錯即摹印雕版並候了日廣行印造只収官􅁓工墨本價許民間請買仍送諸路出賣奉勑如右牒到奉行前批八月七日未時付禮部施行續准禮部符元祐三年九月二十日准都省送下當月十七日勑中書省尚書省送到國子監状據書庫状准朝旨雕印小字傷寒論等醫書出賣契勘工錢約支用五千餘貫未委於是何官錢支給應副使用本監比欲依雕四子等體例於書庫賣書錢内借支又緣􅀁降朝㫖候雕造了日令只収官􅁓工墨本價即别不収息慮日後難以撥還欲乞朝廷特賜應副上件錢數支使候指揮尚書省勘當欲用本監見在賣書錢候􅀅来成書出賣毎部只収息壹分餘依元降指揮奉聖㫖依國子監主者一依勑命指揮施行
