body:
  text: 治平二年二月四日進呈奉聖㫖鏤版施行朝奉郎守太子右贊善大夫同校正醫書飛􅀐尉賜緋魚袋臣髙保衡宣徳郎守尚書都官員外郎同校正醫書􅀐都尉臣孫竒朝奉郎守尚書司封郎中充祕閣校理判登聞檢院護軍賜緋魚袋臣林億翰林學士朝散大夫給事中知制誥充史館修撰宗正寺脩玉牒官兼判太常寺兼禮儀事兼判祕閣祕書省同提舉集禧觀公事兼提舉校正醫書􅀁輕車都尉汝南郡開國侯食邑一千三百户賜􅂵金魚袋臣范鎮推忠協謀佐理功臣金􅂵光祿大夫行尚書吏部侍郎叅知政事柱國天水郡開國公食邑三千户食實封八百户臣趙槩推忠恊謀佐理功臣金􅂵光祿大夫行尚書吏部侍郎叅知政事柱國樂安郡開國公食邑二千八百户食實封八百户臣歐陽脩推忠協謀同德佐理功臣特進行中書侍郎兼户部尚書同中書門下平章事集賢殿大學士上柱國廬陵郡開國公食邑七千一百户食實封二千二百户臣曾公亮推忠恊謀同徳守正佐理功臣開府儀同三司行尚書右僕射兼門下侍郎同中書門下平章事昭文館大學士監脩國史兼譯經潤文使上柱國衛國公食邑一萬七百户食實封三千八百户臣韓􅄾知兖州錄事參軍監國子監書庫臣郭直卿奉議郎國子監主簿雲􅀐尉臣孫凖朝奉郎行國子監丞上􅀐都尉賜緋魚袋臣何宗元朝奉郎守國子司業輕車都尉賜緋魚袋臣豐稷朝請郎守國子司業上輕車都尉賜緋魚袋臣盛僑朝請大夫試國子祭酒直集賢院兼徐王府翊善護軍臣鄭穆中大夫守尚書右丞上輕車都尉保定縣開國男食邑三百户賜􅂵金魚袋臣胡宗愈中大夫守尚書左丞上護軍太原郡開國矦食邑一千八百户食實封二百户賜􅂵金魚袋臣王存中大夫守中書侍郎護軍彭城郡開國矦食邑一千一百户食實封二百户賜􅂵金魚袋臣劉摯正議大夫守門下侍郎上柱國樂安郡開國公食邑四千户食實封九百户臣孫固太中大夫守尚書右僕射兼中書侍郎上柱國髙平郡開國侯食邑一千六百户食實封五百户臣范純仁太中大夫守尚書左僕射兼門下侍郎上柱國汲郡開國公食邑二千九百户食實封六百户臣吕大防傷寒論十卷目録卷之一辨脉法平脉法卷之二傷寒例辨痓濕暍脉證辨太陽病脉證并治上卷之三辨太陽病脉證并治中卷之四辨太陽病脉證并治下卷之五辨陽明病脉證并治辨少陽病脉證并治卷之六辨太隂病脉證并治辨少隂病脉證并治辨厥隂病脉證并治卷之七辨霍亂病脉證并治辨隂陽易差病脉證并治辨不可􅀤汗病脉證并治辨可􅀤汗病脉證并治卷之八辨􅀤汗後病脉證并治辨不可􅄍辨可􅄍卷之九辨不可下病脉證并治辨可下病脉證并治卷之十辨􅀤汗􅄍下後病脉證并治傷寒論目録終傷寒論藥方目録卷第一無方卷第二方六道桂枝湯桂枝二越婢一湯􅅴草乾薑湯芍藥􅅴草湯調胃承氣湯四逆湯卷第三方二十七道葛根湯葛根黄芩黄連湯麻黄湯大青龍湯小青龍湯乾薑附子湯麻黄杏仁􅅴草石膏湯桂枝􅅴草湯茯苓桂枝􅅴草大􅀥湯厚朴生薑半夏􅅴草人參湯茯苓桂枝白术􅅴草湯芍藥􅅴草附子湯茯苓四逆湯五苓散茯苓􅅴草湯梔子豉湯梔子厚朴湯梔子乾薑湯小柴胡湯小建中湯大柴胡湯桃核承氣湯柴胡加龍骨牡蠣湯救逆湯桂枝􅅴草龍骨牡蠣湯抵當湯抵當丸卷第四方一十九道大䧟􅅐丸大䧟胷湯小䧟􅅐湯文蛤散白散柴胡桂枝乾薑湯半夏㵼心湯十􅀥湯大黄黄連㵼心湯赤石脂禹餘粮湯旋伏代赭石湯桂枝人參湯􅀲蔕散黄芩湯黄連湯桂枝附子湯􅅴草附子湯白虎湯炙􅅴草湯卷第五方十道大承氣湯小承氣湯猪苓湯􅁡煎導方猪膽汁方茵蔯蒿湯呉茱茰湯麻仁丸梔子蘗皮湯麻黄連軺赤小豆湯卷第六方二十道麻黄附子細辛湯麻黄附子􅅴草湯黄連阿膠湯附子湯桃花湯猪膚湯􅅴草湯桔梗湯苦酒湯半夏散及湯白通湯白通加猪膽汁湯眞武湯通脉四逆湯四逆散烏梅丸當歸四逆湯麻黄升麻湯乾薑黄芩黄連人參湯白頭翁湯卷第七方五道理中丸理中湯附燒裩散枳實梔子湯牡蠣澤㵼散竹葉石膏湯卷第八無方卷第九無方卷第十無方此下二十五方雖於隨證下有之縁多以加减爲文似未詳俻故復載方在末卷桂枝加葛根湯桂枝加厚朴杏子湯桂枝加附子湯术附湯附桂枝去芍藥湯桂枝去芍藥加附子湯桂枝麻黄各半湯桂枝二麻黄一湯白虎加人參湯桂枝去桂加茯苓白术湯􅁑根加半夏湯桂枝加芍藥生薑人參新加湯梔子􅅴草豉湯梔子生薑豉湯柴胡加芒硝湯桂枝加桂湯柴胡桂枝湯附子㵼心湯生薑㵼心湯􅅴草㵼心湯黄芩加半夏生薑湯桂枝加大黄湯桂枝加芍藥湯四逆加呉茱茰生薑湯四逆加人參湯四逆加猪膽汁湯巳上十卷内計方一百一十二道此經方劑並按古法錙銖分兩與今不同謂如㕮咀者即今之剉如麻豆大是也云一升者即今之大白盞也云銖者六銖爲一分即二錢半也二十四銖爲一兩也云三兩者即今之一兩云二兩即傷寒卒病論集論曰余每覽越人入虢之診望齊侯之色未嘗不慨然歎其才秀也怪當今居世之士曽不留神醫藥精究方術上以療君親之疾下以救貧賤之厄中以保身長全以養其生但競逐榮􅀔企踵權豪孜孜汲汲惟名利是務崇飾其末忽棄其本華其外而悴其内皮之不存毛􅀅安附焉卒然遭邪風之氣嬰非常之疾患及禍至而方震慄降志屈節欽望巫祝告窮歸天束手受敗賫百年之壽命持至貴之重器委付凡醫恣其􅀁措咄嗟嗚呼厥身巳斃神明消滅變為異物幽潜重泉徒為啼泣痛夫舉世昏迷莫能覺悟不惜其命若是􅁿生彼何榮勢之云哉而進不能愛人知人退不能愛身知巳遇災值禍身居厄地蒙蒙昧昧憃若遊魂哀乎趨世之士馳競浮華不固根本忘軀徇物危若冰谷至於是也余宗族素多向餘二百建安紀年以来猶未十稔其死亡者三分有二傷寒十居其七感往昔之淪䘮傷横天之莫救乃勤求古訓博采衆方撰用素問九卷八十一難隂陽大論胎臚藥錄并平脉辨證為傷寒雜病論合十六卷雖未能盡愈諸病庻可以見病知源若能尋余􅀁集思過半矣夫天布五行以運萬􅀋人禀五常以有五藏􅀴絡府俞隂陽㑹通玄冥幽㣲變化難極自非才髙識妙豈能探其理致哉上古有神農黄帝岐伯伯髙雷公少俞少師仲文中世有長桑扁鵲漢有公乘陽慶及倉公下此以往未之聞也觀今之醫不念思求經㫖以演其􅀁知各承家技終始順舊省疾問病務在口給相對斯須便處湯藥按寸不及尺握手不及足人迎趺陽三部不參動數􅀤息不滿五十短期未知決診九􅃸曽無髣髴明堂闕庭盡不見察􅀁謂窺管而巳夫欲視死别生實爲難矣孔子云生而知之者上學則亞之多聞博識知之次也余宿尚方術請事斯語
