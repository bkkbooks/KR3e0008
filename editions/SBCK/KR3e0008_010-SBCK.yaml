front:
  text: 刻傷寒論序
  hash: sha256:6dbdb8e024dbe212df956822eb5bb9e317976b14bd6f278025abc0416c780fe9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0008_SBCK_010-1a}
body:
  text: 新安篁南江瓘撰序曰毉自軒岐之學不傳惟素難二書又多舛缺遺文奥㫖代寡玄叅末學昧於原本任疑用獨而經乃樊亂逮後漢張長沙氏始因素問􅀬論廣伊尹湯液肆爲論􅀃􅀤其疑義而經復一明旣而撰次於王叔和註釋於成無巳厥後龎朱韓許之流因亦互有開􅀤提綱掲要無越乎􅄍汗下温四法而已盖一證一方萬選萬中􅅆生起􅂮千載合符陶隱居稱爲群方之祖孫真人嘆其特有神功豈無徵哉然方􅁟異冝古今殊運隂陽虚實之交錯其候至微發汗􅄍下之相反其禍至速兼以庸工固滯迷誤弗省致微痾成膏肓之變沉痼絶蘇起之望有由然矣大都此書條貫雖明詞㫖雅奥時俗難入具眼㡬何故毉門罕讀鬻者莫售矧張經王傳又徃徃反覆後先魯魚相􅄂板本漫缺好古者致憾于斯嗟乎脉訣岀而脉經隱百問行而傷寒論乖譬之俗儒專誦時文而昧經傳其失均也汪子希􅀃氏以慱雅名家􅁣俗學之惛迷愍烝民之夭札岀其家藏善本視汪處敬氏三復讐校乃命入梓而問序於余余故以多病好毉而未能也然躭味仲景之論有年矣輙援古炤今遡其流委于卷後且以嘉二子之有功於長沙也學者誠能潜精斯籍討其指歸斯可以凌駕前賢仁壽當代矣嘉靖乙巳之吉
  hash: sha256:48c7f5a3c923caa106b290d94dea89cb9a7d90ddb4b2358681710da63c5e165f
