  text: 註解傷寒論卷第三
  hash: sha256:9efb3f34574a6961b3a7d1bdf88806eed0197c5bc56ff15d87625d0d52b9fcfa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0008_SBCK_003-1a}
body:
  text: 漢張仲景著􅀳王叔和撰次宋成無巳註明汪濟川校正辨太陽病脉證并治第六太陽病項背強几几無汗惡風葛根湯主之太陽病項背強几几汗出惡風者中風表虚也項背強几几無汗惡風者中風表實也表虚宜解肌表實宜發汗是以葛根湯發之也葛根湯方葛根四兩麻黄三兩去節桂二兩去皮芍藥二兩㓛􅅴草二兩炙生薑三兩切大􅀥十二枚擘本草云輕可去實麻黄葛根之属是也此以中風表實故加二物於桂枝湯中也右㭍味㕮咀以水一斗先煑麻黄葛根减二升去沫内諸藥煑取三升去滓温服一升覆取㣲似汗不須啜粥餘如桂枝法將息及禁忌太陽與陽明合病者必自下利葛根湯主之傷寒有合病有併病本太陽病不解併於陽明者謂之併病三經俱受邪相合病者謂之合病合病者邪氣甚也太陽陽明合病者與太陽少陽合病陽明少陽合病皆言必自下利者以邪氣併於隂則隂實而陽虚邪氣併於陽則陽實而隂虚寒邪氣甚客於二陽二陽方外實而不主裏則裏氣虚故必下利與葛根湯以散經中甚邪太陽與陽明合病不下利但嘔者葛根加半夏湯主之邪氣外甚陽不王裏裏氣不和氣下而不上者但下利而不嘔裏氣上逆而不下者但嘔而不下利與葛根湯以散其邪加半夏以下逆氣􅁑根加半夏湯方􅁑根四两麻黄三两去節湯泡去黄汁焙乾称生薑三两切􅅴草二两炙芍藥二两桂枝二两去皮大􅀥十二枚擘半夏半斤洗右八味以水一斗先煑葛根麻黄减二升去白沫内諸藥煑取三升去滓温服一升覆取㣲似汗太陽病桂枝證醫反下之利遂不止脉促者表未解也喘而汗岀者葛根黄連黄芩湯主之經曰不宜下而便攻之内虚􅀬入恊􅀬遂利桂枝證者邪在表也而反下之虚其膓胃爲􅀬所乘遂利不止邪在表則見陽脉邪在裏則見隂脉下利脉㣲遲邪在裏也促爲陽盛雖下利而脉促者知表未解也病有汗出而喘者爲自汗出而喘也即邪氣外甚所致喘而汗出者爲因喘而汗出也即裏􅀬氣逆所致與葛根黄芩黄連湯散表邪除裏􅀬葛根黄芩黄連湯方葛根半斤􅅴草二兩炙味􅅴平黄芩二兩味苦寒黄連三兩味苦寒内經曰􅅴發散爲陽表未解者散以葛根􅅴草之􅅴苦以堅裏氣弱者堅以黄芩黄連之苦右四味以水八升先煑葛根减二升内諸藥煑取二升去滓分温再服太陽病頭痛發􅀬身疼腰痛骨節疼痛惡風無汗而喘者麻黄湯主之此太陽傷寒也寒則傷榮頭痛身疼腰痛以至牽連骨節疼痛者太陽經榮血不利也内經曰風寒客於人使人毫毛畢直皮膚閉而爲􅀬者寒在表也風并於衞衞實而榮虚者自汗出而惡風寒也寒并於榮榮實而衞虚者無汗而惡風也以榮強衞弱故氣逆而喘與麻黄湯以發其汗麻黄湯方麻黄三兩味甘温去節桂枝二兩去皮味辛􅀬􅅴草一兩炙味􅅴平杏仁七十箇湯去皮尖味辛温内經曰寒滛於内治以􅅴􅀬佐以苦辛麻黄􅅴草開肌發汗桂枝杏人散寒下氣右四味以水九升先煑麻黄减二升去上沫内諸藥煑取二升半去滓温服八合覆取㣲似汗不須啜粥餘如桂枝法將息太陽與陽明合病喘而􅇩滿者不可下宜麻黄湯主之陽受氣於􅅐中喘而􅇩滿者陽氣不宜發壅而逆也心下滿腹滿皆為實當下之此以為􅇩滿非裏實故不可下雖有陽明然與太陽合病爲属表是與麻黄湯發汗太陽病十日以去脉浮細而嗜卧者外巳解也設􅇩滿脇痛者與小柴胡湯脉但浮者與麻黄湯十日以去向解之時也脉浮細而嗜卧者表邪巳罷也病雖巳和解之若脉但浮而不細者則邪氣但在表也與麻黄湯發散之太陽中風脉浮􅂃發􅀬惡寒身疼痛不汗出而煩躁者大青龍湯主之若脉㣲弱汗出惡風者不可服服之則厥逆筋􅅥肉瞤此爲逆也此中風見寒脉也浮則爲風風則傷衞􅂃則爲寒寒則傷榮榮衞俱病故發􅀬惡寒身疼痛也風并於衞者爲榮弱衞強寒并於榮者爲榮強衞弱今風寒兩傷則榮衞俱實故不汗出而煩躁也與大青龍湯發汗以除榮衞風寒若脉㣲弱汗出惡風者爲榮衞俱虚反服青龍湯則必亡陽或生厥逆筋􅅥肉瞤此治之逆也大青龍湯方麻黄六兩去節味􅅴温桂枝二兩去皮味辛􅀬􅅴草二兩炙味􅅴平杏人四十箇去皮尖味苦􅅴温生薑三兩切味辛温大􅀥十二枚擘味􅅴温石膏如鷄子大碎味􅅴㣲寒辛􅅴均爲發散然風宜辛散寒宜􅅴發辛􅅴相合乃能發散榮衞之風寒麻黄􅅴草石膏杏人以發散榮中之寒桂枝薑􅀥以解除衞中之風右七味以水九升先煑麻黄减二升去上沫内諸藥煑取三升去滓温服一升取㣲似汗汗岀多者温粉撲之一服汗者停後服汗多亡陽遂虚惡風煩躁不得眠也傷寒脉浮緩身不疼但重乍有輕時無少隂證者大青龍湯發之此傷寒見風脉也傷寒者身疼此以風勝故身不疼中風者身重此以兼風故乍有輕時不􅀤厥􅄍利無少隂裏證者爲風寒外甚也與大青龍湯以發散表中風寒傷寒表不解心下有水氣乾嘔發􅀬而欬或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之傷寒表不解心下有水飲則水寒相搏肺寒氣逆故乾嘔發􅀬而欬鍼經曰形寒飲冷則傷肺以其兩寒相感中外皆傷故氣逆而上行此之謂也與小青龍湯發汗散水水氣内漬則所傳不一故有或爲之證隨證增損以解化之小青龍湯方麻黄三兩去節味􅅴温芍藥三兩味酸㣲寒五味子半升味酸温乾薑三兩味辛􅀬􅅴草三兩炙味􅅴平桂枝三兩去皮味辛􅀬半夏半升湯洗味辛㣲温細辛三兩味辛溫寒邪在表非􅅴辛不能散之麻黄桂枝􅅴草之辛􅅴以發散表邪水停心下而不行則腎氣燥内經曰腎苦燥急食辛以潤之乾薑細辛半夏之辛以行水氣而潤腎欬逆而喘則肺氣逆内經曰肺欲􅀵急食酸以􅀵之芍藥五味子之酸以􅀵逆氣而安肺右八味以水一斗先煑麻黄减二升去上沫内諸藥煑取三升去滓溫服一升加减法若㣲利者去麻黄加蕘花如鷄子大熬令赤色下利者不可攻其表汗岀必脹滿麻黄發其陽水漬入胃必作利蕘花下十二水水去利則止若渴者去半夏加括蔞根三兩辛燥而苦潤半夏辛而燥津液非渴者所冝故去之括蔞味苦而生津液故加之若噎者去麻黄加附子一枚炮經曰水得寒氣冷必相􅅮其人即䭇加附子温散水寒病人有寒復發汗胃中冷必􅄍蚘去麻黄惡發汗若小便不利少腹滿去麻黄加茯苓四兩水畜下焦不行為小便不利少腹滿麻黄發津液於外非所冝也茯苓泄畜水於下加所當也若喘者去麻黄加杏人半升去皮尖金匱要畧曰其人形腫故不内麻黄内杏子以麻黄發其陽故也喘呼形腫水氣摽夲之疾傷寒心下有水氣欬而㣲喘發􅀬不渴服湯巳渴者此寒去欲解也小青龍湯主之欬而㣲喘者水寒射肺也發􅀬不渴者表證未罷也與小青龍湯發表散水服湯巳渴者裏氣温水氣散爲欲解也太陽病外證未解脉浮弱者當以汗解宜桂枝湯脉浮弱者榮弱衞強也太陽病下之㣲喘者表未解故也桂枝加厚朴杏人湯主之下後大喘則爲裏氣太虚邪氣傳裏正氣將脫也下後㣲喘則爲裏氣上逆邪不能傳裏猶在表也與桂枝湯以解外加厚朴杏人以下逆氣太陽病外證未解者不可下也下之爲逆欲解外者宜桂枝湯主之經曰本發汗而復下之爲逆也若先發汗治不爲逆太陽病先發汗不解而復下之脉浮者不愈浮爲在外而反下之故令不愈今脉浮故知在外當須解外則愈宜桂枝湯主之經曰柴胡湯證具而以他藥下之柴胡湯證仍在者復與柴胡湯此雖巳下之不爲逆則其類矣太陽病脉浮􅂃無汗發􅀬身疼痛八九日不解表證仍在此當發其汗服藥巳㣲除其人發煩目瞑劇者必衂衂乃解所以然者陽氣重故也麻黄湯主之脉浮􅂃無汗發􅀬身疼痛太陽傷寒也雖至八九日而表證仍在亦當發其汗旣服温暖發散湯藥雖未作大汗亦㣲除也煩者身􅀬也邪氣不爲汗解欝而變􅀬蒸於經絡發於肌表故生􅀬煩肝受血而能視始者氣傷榮寒旣變􅀬則血爲􅀬􅅮肝氣不治故目瞑也劇者􅀬甚於經迫血妄行而爲衂得衂則􅀬隨血散而解陽氣重者􅀬氣重也與麻黄湯以解前太陽傷寒之邪也太陽病脉浮􅂃發􅀬身無汗自衂者愈風寒在經不得汗解欎而變􅀬衂則􅀬隨血散故云自衂者愈二陽併病太陽􅀄得病時發其汗汗先岀不徹因轉屬陽明續自㣲汗岀不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設靣色縁縁正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗岀不徹故也更發汗則愈何以知汗岀不徹以脉濇故知也太陽病未解傳併入陽明而太陽證未罷者名曰併病續自㣲汗岀不惡寒者爲太陽證罷陽明證具也法當下之若太陽證未罷者爲表未解則不可下當小發其汗先解表也陽明之經循靣色縁縁正赤者陽氣怫欝在表也當解之熏之以取其汗若發汗不徹者不足言陽氣怫欝止是當汗不汗陽氣不得越散邪無從岀擁甚於經故燥煩也邪循經行則痛無常處或在腹中或在四肢按之不可得而短氣但責以汗岀不徹更發汗則愈内經曰諸過者切之濇者陽氣有餘爲身􅀬無汗是以脉濇知陽氣擁欝而汗岀不徹脉浮數者法當汗岀而愈若下之身重心悸者不可發汗當自汗岀乃解所以然者尺中脉㣲此裏虚須表裏實津液自和便自汗岀愈經曰諸脉浮數當發􅀬而灑淅惡寒言邪氣在表也是當汗岀愈若下之身重心悸者損其津液虚其胃氣若身重心悸而尺脉實者則下後裏虚邪氣乘虚傳裏也今尺脉㣲身重心悸者知下後裏虚津液不足邪氣不傳裏但在表也然以津液不足則不可發汗須裏氣實津液足便自汗岀而愈脉浮􅂃者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之然以榮氣不足血少故也鍼經曰奪血者無汗尺脉遲者爲榮血不足故不可發汗脉浮者病在表可發汗宜麻黄湯浮爲輕手得之以􅀱皮膚之氣内經曰其在皮者汗而發之脉浮而數者可發汗宜麻黄湯浮則傷衞數則傷榮榮衞受邪爲病在表故當汗散病常自汗岀者此爲榮氣和榮氣和者外不諧以衞氣不共榮氣和諧故爾以榮行脉中衞行脉外復發其汗榮衞和則愈宜桂枝湯風則傷衞寒則傷榮衞受風邪而榮不病者爲榮氣和也衞旣客邪則不能與榮氣和諧亦不能衞護皮腠是以常自汗岀與桂枝湯解散風邪調和榮衞則愈病人藏無他病時發􅀬自汗岀而不愈者此衞氣不和也先其時發汗則愈宜桂枝湯主之藏無他病裏和也衞氣不和表病也外臺云裏和表病汗之則愈所謂先其時者先其發􅀬汗岀之時發汗則愈傷寒脉浮􅂃不發汗因致衂者麻黄湯主之傷寒脉浮􅂃邪在表也當與麻黄湯發汗若不發汗則邪無從岀擁甚於經迫血妄行因致衂也傷寒不大便六七日頭痛有􅀬者與承氣湯其小便清者知不在裏仍在表也當須發汗若頭痛者必衂宜桂枝湯不大便六七日頭痛有􅀬者故宜當下若小便清者知裏無􅀬則不可下經曰小便數者大便必鞕不更衣十日無所苦也况此不大便六七日小便清者不可責邪在裏是仍在表也與桂枝湯以解外若頭疼不巳爲表不罷欝甚於經迫血妄行上爲衂也傷寒發汗解半日許復煩脉浮數者可更發汗宜桂枝湯主之煩者􅀬也發汗身凉爲巳解至半日許身復􅀬脉浮數者邪不盡也可更發汗與桂枝湯凡病若發汗若􅄍若下若亡津液隂陽自和者必自愈重亡津液則不能作汗必待隂陽自和乃自愈矣大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈因亡津液而小便不利者不可以藥利之俟津液足小便利必自愈也下之後復發汗必振寒脉㣲細所以然者以内外俱虚故也發汗則表虚而亡陽下之則裏虚而亡血振寒者陽氣㣲也脉㣲細者隂血弱也下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脉沉㣲身無大􅀬者乾薑附子湯主之下之虚其裏汗之虚其表旣下又汗則表裏俱虚陽王於晝陽欲復虚不勝邪正邪交爭故晝日煩燥不得眠夜隂王陽虚不能與之爭是夜則安靜不嘔不渇者裏無􅀬也身無大􅀬者表無􅀬也又無表證而脉沉㣲知陽氣大虚隂寒氣勝與乾薑附子湯退隂復陽乾薑附子湯方乾薑一兩味辛􅀬附子一枚生用去皮破八片味辛􅀬内經曰寒滛所勝平以辛􅀬虚寒大甚是以辛􅀬劑勝之也右二味以水三升煑取一升去滓頓服發汗後身疼痛脉沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之汗後身疼痛邪氣未盡也脉沉遲榮血不足也經曰其脉沉者榮氣㣲也又曰遲者榮氣不足血少故也與桂枝湯以解未盡之邪加芍藥生薑人參以益不足之血發汗後不可更行桂枝湯汗岀而喘無大􅀬者可與麻黄杏仁􅅴草石膏湯主之發汗後喘當作桂枝加厚朴杏人湯汗岀則喘愈今汗岀而喘爲邪氣擁甚桂枝湯不能發散故不可更行桂枝湯汗岀而喘有大􅀬者内􅀬氣甚也無大􅀬者表邪必甚也與麻黄杏子􅅴草石膏湯以散其邪麻黄杏人􅅴草石膏湯方麻黄四兩去節味􅅴温杏人五十箇去皮尖味􅅴温􅅴草二兩炙味􅅴平石膏半斤碎綿褁味􅅴寒内經曰肝苦急急食􅅴以緩之風氣通於肝風邪外甚故以純􅅴之劑􅀤之右四味以水七升先煑麻黄减二升去上沫内諸藥煑取二升去滓温服一升夲云黄耳柸發汗過多其人义手自冒心心下悸欲得按者桂枝􅅴草湯主之發汗過多亡陽也陽受氣於胷中胷中陽氣不足故病义手自冒心心下悸欲得按者與桂枝􅅴草湯以調不足之氣桂枝􅅴草湯方桂枝四兩去皮味辛􅀬􅅴草二兩炙味􅅴平桂枝之辛走肺而益氣􅅴草之􅅴入脾而緩中右二味以水三升煑取一升去滓蝢服發汗後其人臍下悸者欲作奔豚茯苓桂枝􅅴草大􅀥湯主之汗者心之液發汗後臍下悸者心氣虚而腎氣發動也腎之積名曰奔豚發則從少腹上至心下爲腎氣逆欲上凌心今臍下悸爲腎氣發動故云欲作奔豚與茯苓桂枝􅅴草大􅀥湯以降腎氣茯苓桂枝􅅴草大􅀥湯方茯苓半斤味􅅴平􅅴草二兩炙味􅅴平大􅀥十五枚擘味􅅴平桂枝四兩去皮茯苓以伐腎邪桂枝能泄奔豚􅅴草大􅀥之􅅴滋􅂇脾􅁟以平腎氣煎用􅅴爛水者揚之無力取不􅂇腎氣也右四味以􅅴爛水一斗先煑茯苓减二升内諸藥煑取三升去滓温服一升日三服作􅅴爛水法取水二斗置大盆内以杓揚之水上有珠子五六千顆相逐取用之發汗後腹脹滿者厚朴生薑􅅴草半夏人參湯主之􅄍後腹張與下後腹滿皆爲實言邪氣乘虚入裏爲實發汗後外巳解也腹脹滿知非裏實由脾胃津液不足氣濇不通壅而爲滿與此湯和脾胃而降氣厚朴生薑􅅴草半夏人參湯方厚朴半斤去皮炙味苦温生薑半斤切味辛温半夏半斤洗味辛平人參一兩味温􅅴草二兩炙味􅅴平内經曰脾欲緩急食􅅴以緩之用苦泄之厚朴之苦以泄腹滿人參􅅴草之􅅴以益脾胃半夏生薑之辛以散滯氣右五味以水一斗煑取三升去滓温服一升日三服傷寒若􅄍若下後心下逆滿氣上衝胷起則頭眩脉沉􅂃發汗則動經身爲振振揺者茯苓桂枝白术􅅴草湯主之􅄍下後裏虚氣上逆者心下逆滿氣上衝胷表虚陽不足起則頭眩脉浮􅂃爲邪在表當發汗脉沉􅂃爲邪在裏則不可發汗發汗則外動經絡損傷陽氣陽氣外虚則不能主持諸脉身爲振振揺也與此湯以和經益陽茯苓桂枝白术􅅴草湯方茯苓四兩味􅅴平桂枝三兩去皮味辛􅀬白术二兩味苦􅅴温􅅴草二兩炙味􅅴平陽不足者􅀘之以􅅴茯苓白术生津液而益陽也裏氣逆者散之以辛桂枝􅅴草行陽散氣右四味以水六升煑取三升去滓分溫參服發汗病不解反惡寒者虚故也芍藥􅅴草附子湯主之發汗病解則不惡寒發汗病不解表實者亦不惡寒今發汗病且不解又反惡寒者榮衞俱虚也汗出則榮虚惡寒則衞虚與芍藥􅅴草附子湯以補榮衞芍藥􅅴草附子湯方芍藥三兩味酸㣲寒􅅴草三兩炙味􅅴平附子一枚炮去皮破八片味辛􅀬芍藥之酸収歛津液而益榮附子之辛温固陽氣而􅀘衞􅅴草之􅅴調和辛酸而安正氣巳上三味以水伍升煑取一升伍合去滓分温服疑非仲景意發汗若下之病仍不解煩躁者茯苓四逆湯主之發汗若下病宜解也若病仍不解則發汗外虚陽氣下之内虚隂氣隂陽俱虚邪獨不解故生煩躁與茯苓四逆湯以復隂陽之氣茯苓四逆湯方茯苓六兩味􅅴平人參一兩味􅅴温􅅴草二兩炙味􅅴平乾薑一兩半味辛􅀬附子一枚生用去皮破八片味辛􅀬四逆湯以􅀘陽加茯苓人參以益隂右伍味以水伍升煑取三升去滓温服七合日三服發汗後惡寒者虚故也不惡寒但􅀬者實也當和胃氣與調胃承氣湯汗岀而惡寒者表虚也汗岀而不惡寒但􅀬者裏實也經曰汗岀不惡寒者此表解裏未和與調胃承氣湯和胃氣太陽病發汗後大汗出胃中乾煩燥不得眠欲得飲水者少少與飲之令胃氣和則愈若脉浮小便不利㣲􅀬消渴者與五苓散主之發汗巳解胃中乾煩燥不得眠欲飲水者少少與之胃氣得􅃳則愈若脉浮者表未解也飲水多而小便少者謂之消渴裏􅀬甚實也㣲􅀬消渴者􅀬未成實上焦燥也與五苓散生津液和表裏五苓散方猪苓十八銖味􅅴平去皮澤㵼一兩六銖半味酸鹹茯苓十入銖味􅅴平桂半两去皮味辛􅀬白术十八銖味􅅴平淡者一也口入一而爲􅅴􅅴甚而反淡􅅴緩而淡滲猪苓白术茯苓三味之􅅴潤虚燥而利津液鹹味下泄爲隂澤㵼之鹹以泄伏水辛􅅴發散爲陽桂枝之辛􅅴以和肌表右伍味爲末以白飮和服方寸匕日三服多飮暖水汗岀愈發汗巳脉浮數煩渴者五苓散主之發汗巳脉浮數者表邪未盡也煩渴亡津液胃燥也與五苓散和表潤燥傷寒汗出而渴者五苓散主之不渴者茯苓􅅴草湯主之傷寒汗岀而渴者亡津液胃燥邪氣漸傳裏也五苓散以和表裏若汗岀不渴者邪氣不傳裏但在表而表虚也與茯苓􅅴草湯和表合衞茯苓􅅴草湯方茯苓二兩味甘平桂枝二兩去皮味辛􅀬生薑三兩切味辛温􅅴草一兩炙味􅅴平茯苓􅅴草之􅅴益津液而和衞桂枝生薑之辛􅂇陽氣而解表右四味以水四升煑取二升去滓分温三服中風發􅀬六七日不解而煩有表裏證渴欲飲水水入則吐者名曰水逆五苓散主之中風發􅀬至六七日則當解若不解煩者邪在表也渴欲飲水邪傳裏也裏􅀬甚則能消水水入則不􅄍裏􅀬少則不能消水停積不散飲而􅄍水也以其因水而􅄍故名水逆與五苓散和表裏散停飮未持脉時病人手义自冒心師因教試令欬而不欬者此必兩耳聾無聞也所以然者以重發汗虚故如此發汗多亡陽胷中陽氣不足者病人手义自冒心師見外證知陽氣不足也又試令欬而不即欬者耳聾也知陽氣虚明矣耳聾者陽氣虚精氣不得上通於耳故也發汗後飲水多必喘以水灌之亦喘喘肺疾飲水多喘者飮冷傷肺也以冷水灌洗而喘者形寒傷肺也發汗後水藥不得入口爲逆若更發汗必􅄍下不止發汗後水藥不得入口爲之􅄍逆發汗亡陽胃中虚冷也若更發汗則愈損陽氣胃氣大虚故􅄍下不止發汗􅄍下後虚煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之發汗􅄍下後邪􅀬乘虚客於胷中謂之虚煩者􅀬也􅇩中煩􅀬鬱悶而不得發散者是也􅀬氣伏於裏者則喜睡今􅀬氣浮於上煩擾陽氣故不得眠心惡􅀬􅀬甚則必神昏是以劇者反覆顛倒而不安心中懊憹而憒悶懊憹者俗謂鶻突是也内經曰其高者因而越之與梔子豉湯以􅄍胷中之邪梔子豉湯方梔子十四枚擘味苦寒香豉四合綿褁味苦寒酸苦湧泄爲隂苦以湧􅄍寒以勝􅀬梔子豉湯相合􅄍劑宜矣右二味以水四升先煑梔子得二升半内豉煑取一升半去滓分爲二服溫進一服得􅄍者止後服若少氣者梔子􅅴草豉湯主之若嘔者梔子生薑豉湯主之少氣者􅀬傷氣也加􅅴草以益氣嘔者􅀬煩而氣逆也加生薑以散氣少氣則氣爲􅀬􅅮散而不収者􅅴以補之可也嘔則氣爲􅀬􅅮逆而不散者辛以散之可也發汗若下之而煩􅀬胷中窒者梔子豉湯主之陽受氣於胷中發汗若下使陽氣不足邪􅀬客於胷中結而不散故煩􅀬而胷中窒塞與梔子豉湯以􅄍胷中之邪傷寒五六日大下之後身􅀬不去心中結痛者未欲解也梔子豉湯主之傷寒五六日邪氣在裏之時若大下後身􅀬去心胷空者爲欲解若大下後身􅀬去而心結痛者結胷也身􅀬不去心中結痛者虚煩也結􅅐爲􅀬結胷中爲實是􅀬氣巳収歛於内則外身􅀬去虚煩爲􅀬客胷中未結爲實散漫為煩是以身􅀬不去六七日爲欲解之時以􅀬爲虚煩故云未欲解也與梔子豉湯以􅄍除之傷寒下後心煩腹滿卧起不安者梔子厚朴湯主之下後但腹滿而不心煩即邪氣入裏爲裏實但心煩而不腹滿即邪氣在胷中爲虚煩旣煩且滿則邪氣壅於胷腹之間也滿則不能坐煩則不能卧故卧起不安與梔子厚朴湯􅄍煩泄滿梔子厚朴湯方梔子十四枚擘味苦寒厚朴四兩姜炙苦温枳實四枚水浸去穣炒味苦寒酸苦湧泄梔子之苦以湧虚煩厚朴枳實之苦以泄腹滿巳上三味以水三升半煑取一升半去滓分二服温進一服得􅄍者止後服傷寒醫以丸藥大下之身􅀬不去㣲煩者梔子乾薑湯主之丸藥不能除􅀬但損正氣邪氣乘虚留於胷中而未入深者則身􅀬不去而㣲煩與梔子乾薑湯􅄍煩正氣梔子乾薑湯方梔子十四枚擘味苦寒乾薑二兩味辛􅀬苦以湧之梔子之苦以􅄍煩辛以􅃳之乾薑之辛以益氣右貳味以水三升半煑取一升半去滓分二服温進一服得􅄍者止後服凡用梔子湯病人舊㣲溏者不可與服之病人舊㣲溏者裏虚而寒在下也雖煩則非藴􅀬故不可與梔子湯内經曰先泄而後生他病者治其夲必且調之後乃治其他病太陽病發汗汗岀不解其人仍發􅀬心下悸頭眩身瞤動振振欲擗地者眞武湯主之發汗不解仍發􅀬邪氣未解也心下悸頭眩身瞤動振振欲擗地者汗岀亡陽也裏虚爲悸上虚爲眩經虚爲身瞤振振摇與眞武湯主之温經復陽咽喉乾燥者不可發汗津液不足也淋家不可發汗發汗必便血膀胱裏􅀬則淋反以湯藥發汗亡津液増益客􅀬膀胱虚燥必小便血瘡家雖身疼痛不可發汗發汗則痓表虚聚􅀬則生瘡瘡家身疼如傷寒不可發汗發汗則表氣愈虚􅀬􅀔愈甚生風故變痓也衂家不可發汗汗岀必額上䧟脉急􅂃直視不能眴不得眠衂者上焦亡血也若發汗則上焦津液枯竭經絡乾澁故額上䧟脉急􅂃諸脉者皆屬於目筋脉􅂃急則牽引其目故直視不能眴眴瞬合目也鍼經曰隂氣虚則目不􅉂亡血爲隂虚是以不得眠也亡血家不可發汗發汗則寒慄而振鍼經曰奪血者無汗奪汗者無血亡血發汗則隂陽俱虚故寒慄而振摇汗家重發汗必恍愡心亂小便巳隂疼與禹餘糧丸闕汗者心之液汗家重發汗則心虚恍愡心亂奪汗則無水故小便巳隂中疼病人有寒復發汗胃中冷必􅄍蚘病人有寒則當溫散反發汗損陽氣胃中冷必􅄍蚘也夲發汗而復下之此爲逆也若先發汗治不爲逆本先下之而反汗之爲逆若先下之治不爲逆病在表者汗之爲宜下之爲逆病在裏者下之爲宜汗之為逆經曰陽盛隂虚汗之則死下之則愈陽虚隂盛汗之則愈下之則死傷寒醫下之續得下利清榖不止身疼痛者急當救裏後身疼痛清便自調者急當救表救裏宜四逆湯救表宜桂枝湯傷寒下之續得下利清榖不止身疼痛者急當救裏者以裏氣不足必先救之急與四逆湯得清便自調知裏氣巳和然後急與桂枝湯以救表身疼者表邪也内經曰病發而不足標而夲之先治其標後治其夲此以寒爲卒也病發􅀬頭痛脉反沉若不差身體疼痛當救其裏宜四逆湯發􅀬頭痛表病也脉反沉者裏脉也經曰表有病者脉當浮大今脉反沉遲故知愈也見表病而得裏脉則當差若不差爲内虚寒甚也與四逆湯救其裏太陽病先下之而不愈因復發汗以此表裏俱虚其人因致冒冒家汗岀自愈所以然者汗岀表和故也得裏未和然後復下之冒者欝也下之則裏虚而亡血汗之則表虚而亡陽表裏俱虚寒氣拂欝其人因致冒金匱要畧曰亡血復汗寒多故令欝冒汗岀則拂欝之邪得解則冒愈金匱要畧曰冒家欲解必大汗岀汗岀表和而裏未和者然後復下之太陽病未解脉隂陽俱停必先振慄汗岀而解但陽脉㣲者先汗岀而解但隂脉㣲者下之而解若欲下之宜調胃承氣湯主之脉隂陽停無偏勝者隂陽氣和也經曰寸口關上尺中三處大小浮沉遲數同等此脉隂陽爲和平雖劇當愈今隂陽旣和必先振慄汗岀而解但陽脉㣲者陽不足而隂有餘也經曰陽虚隂盛汗之則愈隂脉㣲者隂不足而陽有餘也經曰陽盛隂虚下之則愈太陽病發􅀬汗岀者此爲榮弱衞強故使汗岀欲救邪風者宜桂枝湯太陽中風風併於衞則衞實而榮虚榮者隂也衞者陽也發􅀬汗岀隂弱陽強也内經曰隂虚者陽必湊之故少氣時􅀬而汗岀與桂枝湯解散風邪調和榮衞傷寒五六日中風徃來寒􅀬胷脇苦滿黙黙不欲飲食心煩喜嘔或胷中煩而不嘔或渴或腹中痛或脇下痞鞕或心下悸小便不利或不渴身有㣲􅀬或欬者與小柴胡湯主之病有在表者有在裏者有在表裏之間者此邪氣在表裏之間謂之半表半裏證五六日邪氣自表傳裏之時中風者或傷寒至五六日也玉凾曰中風五六日傷寒徃來寒􅀬即是或中風或傷寒非是傷寒再中風中風復傷寒也經曰傷寒中風有柴胡證但見一證便是不必悉具者正是謂或中風或傷寒也邪在表則寒邪在裏則􅀬今邪在半表半裏之間未有定處是以寒􅀬徃來也邪在表則心腹不滿邪在裏則心腹脹滿今止言胷脇苦滿知邪氣在表裏之間未至於心腹滿言胷脇苦滿知邪氣在表裏也黙黙靜也邪在表則呻吟不安邪在裏則煩悶亂内經曰陽入之隂則靜黙黙者邪方自表之裏在表裏之間也邪在表則能食邪在裏則不能食不欲食者邪在表裏之間未至於必不能食也邪在表則不煩不嘔邪在裏則煩滿而嘔煩喜嘔者邪在表方傳裏也邪􅀄入裏未有定處則所傳不一故有或爲之證有柴胡證但見一證便是即是此或爲之證小柴胡湯方柴胡半斤味苦㣲寒黄芩三兩味苦寒人參三兩味􅅴温􅅴草三兩味􅅴平半夏半升洗味辛温生薑三兩切味辛温大􅀥十三枚擘味甘温内經曰􅀬滛于内以苦發之柴胡黄芩之苦以發傳邪之􅀬裏不足者以􅅴緩之人參􅅴草之􅅴以緩中和之氣邪半入裏則裏氣逆辛以散之半夏以除煩嘔邪半在表則榮衞争之辛􅅴解之薑􅀥以和榮衞右㭍味以水一斗二升煑取六升去滓再煎取三升温服一升日三服後加减法若􅅐中煩而不嘔去半夏人參加括蔞實一枚􅅐中煩而不嘔􅀬聚而氣不逆也􅅴者令人中滿方􅀬聚無用人參之補辛散逆氣旣不嘔無用半夏之辛温􅀬宜寒療聚宜苦括蔞實苦寒以泄胷中藴􅀬若渴者去半夏加人參合前成肆兩半括蔞根肆兩半夏燥津液非渴者所宜人參􅅴而潤括蔞根苦而凉徹􅀬生津二物爲當若腹中痛者去黄苓加芍藥三兩去黄苓惡寒中加芍藥以通壅若脇下痞鞕去大􅀥加牡蠣肆兩􅅴令人中滿痞者去大􅀥之􅅴醎以䎡之痞鞕者加牡蠣之醎若心下悸小便不利者去黄苓加茯苓肆兩飲而水畜不行爲悸小便不利内經曰腎欲堅急食苦以堅腎則水益堅故去黄芩淡味滲泄爲陽茯苓􅅴淡以泄伏水若不渴外有㣲􅀬者去人參加桂三兩温覆取㣲汗愈不渴者裏和也故去人參外有㣲􅀬表未解也加桂以發汗若欬者去人參大􅀥生薑加五味子半升乾薑二兩欬者氣逆也􅅴則壅氣故去人參大􅀥内經曰肺欲収急食酸以􅀵之五味子之酸以収逆氣肺寒則欬散以辛􅀬故易生薑以乾薑之􅀬也血弱氣盡腠理開邪氣因入與正氣相􅅮結於脇下正邪分爭往來寒􅀬休作有時黙黙不欲飲食藏府相連其痛必下邪高痛下故使嘔也小柴胡湯主之人之氣血隨時盛衰當月郭空之時則爲血弱氣盡腠理開踈之時也邪氣乘虚傷人則深鍼經曰月郭空則海水東盛人血氣虚衞氣去形獨居肌肉减皮膚緩腠理開毛髪殘瞧理薄垢落當是時遇賊風則其入深者是矣邪因正虚自表之裏而結於脇下與正分爭作往來寒􅀬黙黙不欲飲食下爲自外之内經絡與藏府相連氣隨經必傳於裏故曰其痛下痛一作病邪在上焦爲邪高邪漸傳裏爲痛下裏氣與邪氣相􅅮逆而上行故使嘔也與小柴胡湯以解半表半裏之邪服柴胡湯巳渴者屬陽明也以法治之服小柴胡湯表邪巳而渴裏邪傳於陽明也以陽明治之得病六七日脉遲浮弱惡風寒手足温醫二三下之不能食而脇下滿痛靣目及身黄頸項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食榖者􅎪得病六七日脉遲浮弱惡風寒手足温則邪氣在半表半裏未爲實反二三下之虚其胃氣損其津液邪藴於裏故不能食而脇下滿痛胃虚爲􅀬烝之熏發於外靣目及身悉黄也頸項強者表仍未解也小便難者内亡津液雖夲柴胡湯證然以裏虚下焦氣澁而小便難若與柴胡湯又走津液後必下重也不因飲水而嘔者柴胡湯證若夲因飲而嘔者水停心下也金匱要畧曰先渴􅁍嘔者爲水停心下此属飲家飲水者水停而嘔食榖者物聚而􅎪皆非小柴胡湯所宜二者皆柴胡湯之戒不可不識也傷寒四五日身􅀬惡風頸項強脇下滿手足溫而渴者小柴胡湯主之身􅀬惡風頸項強者表未解也脇下滿而渇者裏不和也邪在表則手足通􅀬邪在裏則手足厥寒今手足温者知邪在表裏之間也與小柴胡湯以解表裏之邪傷寒陽脉澁隂脉弦法當腹中急痛者先與小建中湯不差者與小柴胡湯主之脉陽澁隂弦而腹中急痛者當作裏有虚寒治之與小建中湯温中散寒若不差者非裏寒也必由邪氣自表之裏裏氣不利所致與小柴胡湯去黄芩加芍藥以除傳裏之邪小建中湯方桂枝三兩去皮味辛􅀬􅅴草三兩炙味􅅴平大􅀥十二枚擘味􅅴温芍藥六兩味酸㣲寒生薑三兩切味辛温膠飴一升味􅅴温建中者建脾也内經曰脾欲緩急食􅅴以緩之膠飴大􅀥􅅴草之􅅴以緩中也辛潤散也榮衞不足潤而散之桂枝生薑之辛以行榮衞酸􅀵也泄也正氣虚弱􅀵而行之芍藥之酸以􅀵正氣右六味以水七升煑取三升去滓内膠飴更上㣲火消解温服一升日三服嘔家不可用建中湯以甜故也傷寒中風有柴胡證但見一證便是不必悉具柴胡證是邪氣在表裏之間也或胷中煩而不嘔或渴或腹中痛或脇下痞鞕或心下悸小便不利或不渴身有㣲􅀬或欬但見一證便宜與柴胡湯治之不必待其證候全具也凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振却發􅀬汗岀而解邪在半表半裏之間爲柴胡證即未作裏實醫便以藥下之若柴胡證仍在者雖下之不爲逆可復與柴胡湯以和解之得湯邪氣還表者外作蒸蒸而􅀬先經下裏虚邪氣欲岀内則振振然也正氣勝陽氣生却復發􅀬汗岀而解也傷寒二三日心中悸而煩者小建中湯主之傷寒二三日邪氣在表未當傳裏之時心中悸而煩是非邪氣􅅮所致心悸者氣虚也煩者血虚也以氣血内虚與小建中湯先建其裏太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急欝欝㣲煩者爲未解也與大柴胡湯下之則愈日數過多累經攻下而柴胡證不罷者亦須先與小柴胡湯以解其表經曰凡柴胡湯疾證而下之若柴胡證不罷者復與柴胡者是也嘔止者表裏和也若嘔不止鬱鬱㣲煩者裏􅀬巳甚結於胃中也與大柴胡湯下其裏􅀬則愈大柴胡湯方柴胡半斤味􅅴平黄芩三兩味苦寒芍藥三兩味酸㣲寒半夏半升洗味辛温生薑五兩切味辛温枳實四枚炙味苦寒大􅀥十二枚擘􅅴溫大黄二兩味苦寒柴胡黄芩之苦入心而折􅀬枳實芍藥之酸苦湧泄而扶隂辛者散也半夏之辛以散逆氣辛􅅴和也薑􅀥之辛􅅴以和榮衞右七味以水一斗二升煑取六升去滓再煎温服一升日三服一方用大黄二兩若不加大黄恐不爲大柴胡湯也傷寒十三日不解胷脇滿而嘔日晡所發潮􅀬巳而㣲利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮􅀬者實也先宜小柴胡湯以解外後以柴胡加芒消湯主之傷寒十三日再傳經盡當解之時也若不解胷脇滿而嘔者邪氣猶在表裏之間此爲柴胡湯證若以柴胡湯下之則更無潮􅀬自利醫反以丸藥下之虚其膓胃邪氣乘虚入府日晡所􅀤潮􅀬􅀬巳而利也潮􅀬雖爲􅀬實然胷脇之邪未巳故先與小柴胡湯以解外後以柴胡加芒消以下胃􅀬傷寒十三日不解過經讝語者以有􅀬也當以湯下之若小便利者大便當鞕而反下利脉調和者知醫以丸藥下之非其治也若自下利者脉當㣲厥今反和者此爲内實也調胃承氣湯主之傷寒十三日再傳經盡謂之過經讝語者陽明胃􅀬也當以諸承氣湯下之若小便利者津液偏滲大便當鞕反下利者知醫以丸藥下之也下利脉㣲而厥者虚寒也今脉調和則非虚寒由膓虚胃􅀬恊􅀬而利也與調胃承氣湯以下胃􅀬太陽病不解􅀬結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解巳但少腹急結者乃可攻之宜桃核承氣湯方太陽膀胱經也太陽經邪􅀬不解隨經入府爲􅀬結膀胱其人如狂者爲未至於狂但不寜尔經曰其人如狂者以􅀬在下焦太陽多􅀬􅀬在膀胱必與血相􅅮若血不爲畜爲􅀬迫之則血自下血下則􅀬隨血岀而愈若血不下者則血爲􅀬􅅮畜積於下而少腹急結乃可攻之與桃核承氣湯下􅀬散血内經曰從外之内而盛於内者先治其外後調其内此之謂也桃核承氣湯方桃人五十箇去皮尖味􅅴平桂枝二兩去皮味辛􅀬大黄四兩芒硝二兩􅅴草二兩炙􅅴以緩之辛以散之少腹急結緩以桃人之􅅴下焦畜血散以桂枝辛􅀬之氣寒以取之􅀬甚􅅮血故加二物於調胃承氣湯中也右伍味以水七升煑取二升半去滓内芒硝更上火㣲沸下火先食温服伍合日三服當㣲利傷寒八九日下之胷滿煩驚小便不利讝語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之傷寒八九日邪氣巳成􅀬而復傳陽經之時下之虚其裏而􅀬不除胷滿而煩者陽􅀬客於胷中也驚者心惡􅀬而神不守也小便不利者裏虚津液不行也讝語者胃􅀬也一身盡重不可轉側者陽氣内行於裏不營於表也與柴胡湯以除胷滿而煩加龍骨牡蠣鈆丹収歛神氣而鎮驚加茯苓以行津液利小便加大黄以逐胃􅀬止讝語加桂枝以行陽氣而解身重錯雜之邪斯悉愈矣柴胡加龍骨牡蠣湯方半夏二合洗大􅀥六枚柴胡四兩生薑一兩半人參一兩半龍骨一兩半鈆丹一兩半桂枝一兩半去皮茯苓一兩半大黄二兩牡蠣一兩半煆右十一味以水八升煑取四升内大黄切如碁子更煑一二沸去滓温服一升傷寒腹滿讝語寸口脉浮而􅂃此肝乘脾也名曰縱刺期門腹滿讝語者脾胃疾也浮而􅂃者肝脉也脾病見肝脉木行乘土也經曰水行乘火木行乘土名曰縱此其􅁼矣期門者肝之募刺之以㵼肝經盛氣傷寒􅀤􅀬嗇嗇惡寒大渇欲飮水其腹必滿自汗岀小便利其病欲解此肝乘肺也名曰横刺期門傷寒發􅀬嗇嗇惡寒肺病也大渴欲飮水肝氣勝也玉凾曰作大渇欲飮酢漿是知肝氣勝也傷寒欲飲水者愈若不愈而腹滿者此肝行乘肺水不得行也經曰木行乘金名横刺期門以㵼肝之盛氣肝肺氣平水散而津液得通外作自汗岀内爲小便利而解也太陽病二日反躁反熨其背而大汗岀大􅀬入胃胃中水竭躁煩必􅀤讝語十餘日振慄自下利者此爲欲解也故其汗從腰巳下不得汗欲小便不得反嘔欲失溲足下惡風大便鞕小便當數而反不數及多大便巳頭卓然而痛其人足心必􅀬榖氣下流故也太陽病二日則邪在表不當發躁而反躁者􅀬氣行於裏也反熨其背而發汗大汗岀則胃中乾燥火􅀬入胃胃中燥􅀬躁煩而讝語至十餘日振慄自下利者火邪􅀔㣲隂氣復生津液得復也故爲欲解火邪去大汗岀則愈若從腰以下不得汗則津液不得下通故欲小便不得􅀬氣上逆而反嘔也欲失溲足下惡風者氣不得通於下而虚也津液偏滲令大便鞕者小便當數經曰小便數者大便必鞕也此以火􅀬内燥津液不得下通故小便不數及不多也若火􅀬消津液和則結鞕之便得􅃳因自大便也便巳頭卓然而痛者先大便鞕則陽氣不得下通旣得大便則陽氣降下頭中陽虚故卓然而痛穀氣者陽氣也先陽氣不通於下之時足下惡風今陽氣得下故足心􅀬也太陽病中風以火刼發汗邪風被火􅀬血氣流溢失其常度兩陽相熏灼其身􅀤黄陽盛則欲衂隂虚則小便難隂陽俱虚竭身體則枯燥但頭汗岀劑頸而還腹滿㣲喘口乾咽爛或不大便乆則讝語甚者至􅎪手足躁擾捻衣摸􅇃小便利者其人可治風為陽邪因火􅀬之氣則邪風愈甚迫於血氣使血氣流溢失其常度風與火氣謂之兩陽兩陽相熏灼􅀬發於外必發身黄若􅀬􅅮於經絡爲陽盛外􅀬迫血上行必衂􅀬􅅮於内者爲隂虚内􅀬必小便難若􅀬消血氣血氣少爲隂陽俱虚血氣虚少不能榮於身體為之枯燥三陽經絡至頸三隂至胷中而還但頭汗岀劑頸而還者􅀬氣炎上􅅮陽而不􅅮於隂也内經曰諸脹腹大皆屬於􅀬腹滿㣲喘者􅀬氣内欝也内經曰火氣内發上爲口乾咽爛者火􅀬上熏也􅀬氣上而不下者則大便不鞕若􅀬氣下入胃消耗津液則大便鞕故云或不大便乆則胃中躁􅀬必􅀤讝語内經曰病深者其聲􅎪火氣大甚正氣逆亂則􅎪内經曰四肢者諸陽之夲也陽盛則四肢實火􅀬大甚故手足躁擾捻衣摸牀擾亂也小便利者爲火未劇津液未竭而猶可治也傷寒脉浮醫以火迫刼之亡陽必驚狂起卧不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之傷寒脉浮責邪在表醫以火刼發汗汗大岀者亡其陽汗者心之液亡陽則心氣虚心惡􅀬火邪内迫則心神浮越故驚狂起卧不安與桂枝湯解未盡表邪去芍藥以芍藥益隂非亡陽所宜也火邪錯逆加蜀漆之辛以散之陽氣亡脫加龍骨牡蠣之澁以固之夲草云澁可去脫龍骨牡蠣之属是也桂枝去芍藥加蜀􅃮龍骨牡蠣救逆湯方桂枝三兩去皮􅅴草二兩炙生薑三兩切牡蠣五兩熬味酸醎龍骨四兩味􅅴平大􅀥十二枚擘蜀􅃮三兩洗去脚味辛平右爲末以水一斗二升先煑蜀􅃮减二升内諸藥煑取三升去滓温服一升形作傷寒其脉不弦􅂃而弱弱者必渴􅀍火者必讝語弱者發􅀬脉浮解之當汗岀愈形作傷寒謂頭痛身􅀬也脉不弦􅂃則無傷寒表脉也經曰諸弱發􅀬則脉弱爲裏􅀬故云弱者必渴若被火氣兩􅀬相合􅅮於胃中胃中躁煩必發讝語脉弱發􅀬者得脉浮爲邪氣還表當汗岀而解矣太陽病以火熏之不得汗其人必躁到不解必清血名爲火邪此火邪迫血而血下行者也太陽病用火熏之不得汗則􅀬無從岀隂虚􅀍火必發躁也六日傳經盡至七日再到太陽經則􅀬氣當解若不解􅀬氣迫血下行必清血清厠也脉浮􅀬甚反灸之此爲實實以虚治因火而動必咽燥唾血此火邪迫血而血上行者也脉浮􅀬甚爲表實醫以脉浮爲虚用火灸之因火氣動血迫血上行故咽燥唾血㣲數之脉慎不可灸因火爲邪則爲煩逆追虚逐實血散脉中火氣雖㣲内攻有力焦骨傷筋血難復也㣲數之脉則爲􅀬也灸則除寒不能散􅀬是慎不可灸也若反灸之􅀬因火則甚遂爲煩逆灸夲以追虚而復逐􅀬爲實􅀬則傷血又加火氣使血散脉中氣主呴之血主濡之氣血消散不能濡潤筋骨致骨焦筋傷血散而難復也脉浮宜以汗解用火灸之邪無從岀因火而盛病從腰以下必重而痺名火逆也脉浮在表宜以汗解之醫以火灸取汗而不得汗邪無從出又加火氣相􅂇則􅀬愈甚身半以上同天之陽半身以下同地之隂火性炎上則腰巳下隂氣獨治故從腰以下必重而痺也欲自解者必當先煩乃有汗而解何以知之脉浮故知汗岀解也煩􅀬也邪氣還表則爲煩􅀬汗岀而解以脉浮故爲邪還表也燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂二兩燒針發汗則損隂血而驚動心氣針處􅀍寒氣聚而成核心氣因驚而虚腎氣乘寒氣而動發爲奔豚金匱要畧曰病有奔豚從驚􅀤得之腎氣欲上乘心故其氣從少腹上衝心也先灸核上以散其寒與桂枝加桂湯以泄奔豚之氣火逆下之因燒針煩躁者桂枝􅅴草龍骨牡蠣湯主之先火為逆復以下除之裏氣因虚又加燒針裏虚而爲火􅀬所煩故生煩躁與桂枝􅅴草龍骨牡蠣湯以散火邪桂枝􅅴草龍骨牡蠣湯方桂枝一兩􅅴草二兩牡蠣二兩熬龍骨二兩辛􅅴􅀤散桂枝􅅴草之辛􅅴以􅀤散經中之火邪澁可去脫龍骨牡蠣之澁以収歛浮越之正氣右爲末以水伍升煑取二升半去滓温服八合日三服太陽傷寒者加溫針必驚也寒則傷榮榮氣㣲者加燒針則血留不行驚者温針損榮血而動心氣金匱要畧曰血氣少者屬於心太陽病當惡寒􅀤􅀬今自汗岀不惡寒發􅀬關上脉細數者以醫􅄍之過也一二日􅄍之者腹中飢口不能食三四日􅄍之者不喜糜粥欲食冷食朝食暮􅄍以醫􅄍之所致也此爲小逆惡寒􅀤􅀬爲太陽表病自汗岀不惡寒􅀤􅀬者陽明證夲太陽表病醫反􅄍之傷動胃氣表邪乘虚傳於陽明也以關脉細數知醫􅄍之所致病一二日爲表邪尚寒而未成􅀬􅄍之則表寒傳於胃中胃中虚寒故腹中飢而口不能食病三四日則表邪巳傳成􅀬􅄍之則表􅀬乘虚入胃胃中虚􅀬故不喜糜粥欲食冷食朝食暮􅄍也朝食暮􅄍者晨食入胃胃虚不能剋化即知至暮胃氣行裏與邪氣相􅅮則胃氣反逆而以胃氣尚在故止云小逆太陽病􅄍之但太陽病當惡寒今反不惡寒不欲近衣此為􅄍之内煩也太陽表病醫反􅄍之傷於胃氣邪􅀬乘虚入胃胃爲邪􅀬内煩故不惡寒不欲近衣也病人脉數數爲􅀬當消穀引食而反􅄍者此以發汗令陽氣㣲膈氣虚脉乃數也數爲客􅀬不能消榖以胃中虚冷故􅄍也陽受氣於胷中􅀤汗外虚陽氣是令陽氣㣲膈氣虚也數爲􅀬夲􅀬則合消榖客􅀬則不能消榖因發汗外損陽氣致胃中虚冷故􅄍也太陽病過經十餘日心下溫温欲􅄍而胷中痛大便反溏腹㣲滿鬰鬰㣲煩先此時自極􅄍下者與調胃承氣湯若不尓者不可與但欲嘔胷中痛㣲溏者此非柴胡證以嘔故知極􅄍下也心下温温欲􅄍欝欝㣲煩胷中痛當責邪􅀬客於胷中大便反溏腹㣲滿則邪􅀬巳下於胃也日數雖多若不經􅄍下止是傳邪亦未可下當與柴胡湯以除上中二焦之邪若曾􅄍下傷損胃氣胃虚則邪乘虚入胃爲實非柴胡湯所能去調胃承氣湯下胃􅀬以嘔知胃氣先曾傷動也太陽病六七日表證仍在脉㣲而沉反不結胷其人發狂者以􅀬在下焦少腹當鞕滿小便自利者下血乃愈所以然者以太陽隨經瘀􅀬在裏故也抵當湯主之太陽經也膀胱府也此太陽隨經入府者也六七日邪氣傳裏之時脉㣲而沉邪氣在裏之脉也表證仍在者則邪氣猶淺當結於胷中若不結於胷中其人發狂者􅀬結在膀胱也經曰􅀬結膀胱其人如狂此􅀤狂則􅀬又深也少腹鞕滿小便不利者爲無血也小便自利者血證諦也與抵當湯以下畜血抵當湯方水蛭三十箇熬味醎苦寒蝱蟲三十箇熬去趐足味苦㣲寒桃人二十箇去皮尖味苦􅅴平大黄三兩酒浸味苦寒苦走血鹹勝血蝱蟲水蛭之鹹苦以除畜血􅅴緩結苦泄􅀬桃人大黄之苦以下結􅀬右四味爲末以水伍升煑取三升去滓温服一升不下再服太陽病身黄脉沉結少腹鞕小便不利者爲無血也小便自利其人如狂者血證諦也抵當湯主之身黄脉沉結少腹鞕小便不利者胃􅀬􅀤黄也可與茵陳湯身黄脉沉結少腹鞕小便自利其人如狂者非胃中瘀􅀬爲􅀬結下焦而爲畜血也與抵當湯以下畜血傷寒有􅀬少腹滿應小便不利今反利者爲有血也當下之不可餘藥宜抵當丸傷寒有􅀬少腹滿是畜血於下焦若􅀬畜津液不通則小便不利其􅀬不畜津液而畜血不行小便自利者乃爲畜血當與桃人承氣湯抵當湯下之然此無身黄屎黒又無喜忘􅀤狂是未至於甚故不可餘駛峻之藥也可與抵當丸小可下之也抵當丸方水蛭二十箇味苦寒蝱蟲二十五箇味苦㣲寒桃人二十箇去皮尖大黄三兩右四味杵分爲四丸以水一升煑一丸取七合服之晬時當下血若不下者更服太陽病小便利者以飲水多必心下悸小便少者必苦裏急也飲水多而小便自利者則水不内畜但腹中水多令心下悸金匱要畧曰食少飲多水停心下甚者則悸飲水多而小便不利則水畜於内而不行必苦裏急也釋音内諸藥上音納啜粥上昌恱切飲水也恊􅀬上音挾見風脉上音現漬疾智切漚也蚘音囘人腹中長蟲也茈音柴瞑音􅄀視不明也悸其季切心動也人葠下音參吺咀上音父下才與㓛㕮咀嚼也剉如麻豆也更衣音庚改也沫音末懊憹上於刀切下奴刀切又女江切心亂也懊憹痛悔聲窒陟栗切塞也擗脾入切眴音縣目摇也慄音栗懼也藴紆問切積也嘿音墨靜也但見下音現飴音怡餳也蒸諸仍切火氣上行也募音墓滲色䕃切諦音帝審也水蛭音質蝱音肓駃峻上音决下思俊切險也悍音汗鈆音賢註解傷寒論卷第三
