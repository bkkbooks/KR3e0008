front:
  text: 註解傷寒論卷第七之八漢張仲景著晋王叔和撰次
  hash: sha256:738ffb180b49d3c72988de822661dc46a8ef94d5e4fc62f1ce0778d60498d058
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0008_SBCK_007-1a}
body:
  text: 宋成無巳註明汪濟川校正辨霍亂病脉證并治第十三問曰病有霍亂者何荅曰嘔􅄍而利名曰霍亂三焦者水榖之道路邪在上焦則􅄍而不利邪在下焦則利而不􅄍邪在中焦則旣􅄍且利以飲食不節寒􅀬不調清濁相干隂陽乖隔遂成霍亂輕者止曰􅄍利重者揮霍撩亂名曰霍亂問曰病􅀤􅀬頭痛身疼惡寒􅄍利者此屬何病荅曰此名霍亂自􅄍下又利止復更􅀤􅀬也􅀤􅀬頭痛身疼惡寒者本是傷寒因邪入裏傷於脾胃上􅄍下利令爲霍亂利止裏和復更􅀤􅀬者還是傷寒必汗岀而解傷寒其脉㣲澁者本是霍亂今是傷寒􅁍四五日至隂經上轉入隂必利本嘔下利者不可治也欲似大便而反失氣仍不利者属陽明也便必鞕十三日愈所以然者經盡故也㣲爲亡陽澁爲亡血傷寒脉㣲澁則本是霍亂􅄍利亡陽亡血􅄍利止傷寒之邪未巳還是傷寒􅁍四五日邪傳隂經之時裏虚遇邪必作自利本嘔者邪甚於上又利者邪甚於下先霍亂裏氣大虚又傷寒之邪再傳爲􅄍利是重虚也故爲不治若欲似大便而反失氣仍不利者利爲虚不利爲實欲大便而反失氣裏氣􅀬也此属陽明便必鞕也十三日愈者傷寒六日傳遍三隂三陽後六日再傳經盡則隂陽之氣和大邪之氣去而愈也下利後當便鞕鞕則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也下利後亡津液當便鞕能食爲胃和必自愈不能食者爲未和到後經中爲復過一經言七日後再經也頗能食者胃氣方和過一日當愈不愈者暴􅀬使之能食非陽明氣和也惡寒脉㣲而復利利止亡血也四逆加人參湯主之惡寒脉㣲而利者陽虚隂勝也利止則津液内竭故云亡血金匱玉凾曰水竭則無血與四逆湯温經􅂇陽加人參生津液益血霍亂頭痛􅀤􅀬身疼痛􅀬多欲飲水者五苓散主之寒多不用水者理中丸主之頭痛發􅀬則邪自風寒而來中焦爲寒􅀬相半之分邪稍高者居陽分則爲􅀬􅀬多欲飲水者與五苓散以散之邪稍下者居隂分則爲寒寒多不用水者與理中丸温之理中丸方人參甘温甘草炙甘平白术甘温乾薑辛􅀬已上各三两内經曰脾欲緩急食甘以緩之用甘􅀘之人參白术甘草之甘以緩脾氣調中寒滛所勝平以辛􅀬乾薑之辛以温胃散寒右四味搗篩爲末􅁡和丸如鷄黄大以沸湯數合和一丸研碎温服之日三四夜二服腹中未􅀬益至三四丸然不及湯湯法以四物依兩數切用水八升煑取三升去滓温服一升日三服加减法若臍上築者腎氣動也去术加桂四两脾虚腎氣動者臍上築動内經曰甘者令人中滿术甘壅􅀘桂泄奔豚是相易也􅄍多者去术加生薑三兩嘔家不喜甘故去术嘔家多服生薑以辛散之下多者還用术悸者加茯苓二兩下多者用术以去濕悸加茯苓以導氣渴欲得水者加术足前成四兩半津液不足則渇术甘以緩之腹中痛者加人參足前成四兩半裏虚則痛加人參以􅀘之寒者加乾薑足前成四兩半寒滛所勝平以辛􅀬腹滿者去术加附子一枚服湯後如食頃飲􅀬粥一升許㣲自温勿􅀤掲衣􅀍胃虚則氣壅腹滿甘令人中滿是去术也附子之辛以􅀘陽散壅􅄍利止而身痛不休者當消息和解其外宜桂枝湯小和之􅄍利止裏和也身痛不休表未解也與桂枝湯小和之外臺云裏和表病汗之則愈􅄍利汗岀􅀤􅀬惡寒四肢拘急手足厥冷者四逆湯主之上􅄍下利裏虚汗岀􅀤􅀬惡寒表未解也四肢拘急手足厥冷陽虚隂勝也與四逆湯􅂇陽退隂旣􅄍且利小便復利而大汗岀下利清榖内寒外􅀬脉㣲欲絶者四逆湯主之􅄍利亡津液則小便當少小便復利而大汗岀津液不禁陽氣大虚也脉㣲為亡陽若無外􅀬但内寒下利清榖爲純隂此以外􅀬爲陽未絶猶可與四逆湯救之􅄍巳下㫁汗岀而厥四肢拘急不解脉㣲欲絶者通脉四逆加猪膽汁湯主之􅄍巳下㫁津液内竭則不當汗岀汗岀者不當厥今汗岀而厥四肢拘急不解脉㣲欲絶者陽氣大虚隂氣獨勝也若純與陽藥恐隂爲格拒或嘔或躁不得復入也與通脉四逆湯加猪膽汁膽苦入心而通脉膽寒􅀘肝而和隂引置湯藥不􅀍格拒内經曰㣲者逆之甚者從之此之謂也􅄍利􅀤汗脉平小煩者以新虚不勝榖氣故也内經曰食入於隂長氣於陽新虚不勝榖氣是生小煩辨隂陽易差後勞復病證并治第十四傷寒隂陽易之爲病其人身體重少氣少腹裏急或引隂中拘攣􅀬上衝胷頭重不欲舉眼中生花􅂰脛拘急者燒裩散主之大病新差血氣未復餘􅀬未盡強合隂陽得病者名曰易男子病新差未平復而婦人與之交得病名曰陽易婦人病新差未平復男子與之交得病名曰隂易以隂陽相感動其餘毒相染著如換易也其人病身體重少氣者損動真氣也少腹裏急引隂中拘攣􅂰脛拘急隂氣極也􅀬上衝胷頭重不欲舉眼中生花者感動之毒所易之氣薫蒸於上也與燒裩散以道隂氣燒裩散方右取婦人中裩近隱處剪燒􅁅以水和服方寸匕日三服小便即利隂頭㣲腫則愈婦人病取男子裩當燒􅁅大病差後勞復者枳實梔子湯主之若有􅀫食者加大黄如慱碁子大五六枚病有勞復有食復傷寒新差血氣未平餘􅀬未盡早作勞動病者名曰勞復病􅀬少愈而強食之􅀬有所藏因其榖氣留􅅮兩陽相合而病者名曰食復勞復則􅀬氣浮越與枳實梔子豉湯以解之食復則胃有􅀫積加大黄以下之枳實梔子豉湯方枳實三枚炙苦寒梔子十四枚擘苦寒豉一升綿褁苦寒枳實梔子豉湯則應􅄍劑此云覆令㣲似汗岀者以其􅀬聚於上苦則􅄍之􅀬散於表者苦則􅀤之内經曰火滛所勝以苦􅀤之此之謂也右三味以清漿水七升空煑取四升内枳實梔子煑取二升下豉更煑五六沸去滓温分再服覆令㣲似汗傷寒差巳後更發􅀬者小柴胡湯主之脉浮者以汗解之脉沉實者以下解之差後餘􅀬未盡更發􅀬者與小柴胡湯以和解之脉浮者􅀬在表也故以汗解脉沉者􅀬在裏也故以下解之大病差後從腰已下有水氣者牡礪澤㵼散主之大病差後脾胃氣虚不能制約腎水水溢下焦腰以下爲腫也金匱要畧曰腰以下腫當利小便與牡礪澤㵼散利小便而散水也牡礪澤㵼散方牡礪醎平熬澤㵼醎寒括蔞根苦寒蜀􅃮辛平洗去脚葶􅏣苦寒熬商陸根熬辛酸醎平海藻醎寒洗去醎巳上各等分鹹味勇泄牡礪澤㵼海藻之鹹以泄水氣内經曰濕滛於内平以苦佐以酸辛以苦泄之蜀漆葶􅏣括蔞商陸之酸辛與苦以導腫濕右七味異搗下篩爲散更入臼中治之白飲和服方寸匕小便利止後服日三大病差後喜唾乆不了了者胃上有寒當以丸藥温之宜理中丸汗後陽氣不足胃中虚寒不内津液故喜唾不了了與理中丸以温其胃傷寒解後虚羸少氣氣逆欲􅄍者竹葉石膏湯主之傷寒解後津液不足而虚羸餘􅀬未盡􅀬則傷氣故少氣氣逆欲􅄍與竹葉石膏湯調胃散􅀬竹葉石膏湯方竹葉二把辛平石膏一斤甘寒半夏半升洗辛温人參三两甘温甘草二两甘平炙粳米半升甘㣲寒麥門冬一升甘平去心辛甘發散而除􅀬竹葉石膏甘草之甘辛以􅀤散餘􅀬甘緩脾而益氣麥門冬人參粳米之甘以􅀘不足辛者散也氣逆者欲其散半夏之辛以散逆氣右七味以水一斗煑取六升去滓内粳米煑米熟湯成去米温服一升日三服病人脉已解而日暮㣲煩以病新差人強與榖脾胃氣尚弱不能消榖故令㣲煩損榖則愈陽明王於申酉戌􅀫食在胃故日暮㣲煩當小下之以損􅀫榖辨不可􅀤汗病脉證并治第十五夫以爲疾病至急倉卒尋按要者難得故重集諸可與不可方治比之三隂三陽篇中此易見也又時有不止是三隂三陽岀在諸可與不可中也諸不可汗不可下病證藥方前三隂三陽篇中經注已具者更不復岀其餘無者於此已經後注備見脉濡而弱弱反在關濡反在巔㣲反在上濇反在下㣲則陽氣不足濇則無血陽氣反㣲中風汗岀而反躁煩濇則無血厥而且寒陽㣲􅀤汗躁不得眠寸關爲陽脉當浮盛弱反在關則裏氣不及濡反在巔則表氣不逮衞行脉外浮爲在上以􅀱衞㣲反在上是陽氣不足榮行脉中沉爲在下以􅀱榮澁反在下是無血也陽㣲不能固外腠理開踈風因客之故令汗岀而躁煩無血則隂虚不與陽相順接故厥而且寒陽㣲無津液則不能作汗若􅀤汗則必亡陽而躁經曰汗多亡陽遂虚惡風煩躁不得眠也動氣在右不可􅀤汗􅀤汗則衂而渇心苦煩飲即􅄍水動氣者築築然氣動也在右者在臍之右也難經曰肺内證臍右有動氣按之牢若痛肺氣不治正氣内虚氣動於臍之右也􅀤汗則動肺氣肺主氣開竅於鼻氣虚則不能衞血血溢妄行隨氣岀於鼻爲衂亡津液胃燥則煩渇而心苦煩肺惡寒飲冷則傷肺故飲即􅄍水動氣在左不可􅀤汗􅀤汗則頭眩汗不止筋惕肉瞤難經曰肝内證臍左有動氣按之牢若痛肝氣不治正氣内虚氣動於臍之左也肝爲隂之主􅀤汗汗不止則亡陽外虚故頭眩筋惕肉瞤鍼經曰上虚則眩動氣在上不可􅀤汗􅀤汗則氣上衝正在心端難經曰心内證臍上有動氣按之牢若痛心氣不治正氣内虚氣動於臍之上也心爲陽􅀤汗亡陽則愈損心氣腎乘心虚欲上凌心故氣上衝正在心端動氣在下不可􅀤汗􅀤汗則無汗心中大煩骨節苦疼目運惡寒食則反􅄍榖不得前難經曰腎内證臍下有動氣按之牢若痛腎氣不治正氣内虚動氣􅀤於臍之下也腎者主水􅀤汗則無汗者水不足也心中大煩者腎虚不能制心火也骨節苦疼者腎主骨也目運者腎病則目􅑩􅑩如無所見惡寒者腎主寒也食則反􅄍榖不得前者腎水乾也王氷曰病嘔而􅄍食乆反岀是無水也咽中閑塞不可􅀤汗􅀤汗則􅄍血氣欲絶手足厥冷欲得踡卧不能自温咽門者胃之系胃經不和則咽内不利􅀤汗攻陽血隨􅀤散而上必􅄍血也胃經不和而反攻表則陽虚於外故氣欲絶手足冷欲踡而不能自温諸脉得數動㣲弱者不可􅀤汗􅀤汗則大便難腹中乾胃燥而煩其形相􅁚根本異源動數之脉爲􅀬在表㣲弱之脉爲􅀬在裏􅀤汗亡津液則􅀬氣愈甚胃中乾燥故大便難腹中乾胃燥而煩根本雖有表裏之異逆治之後􅀬傳之則一是以病形相􅁚也脉㣲而弱弱反在關濡反在巔弦反在上㣲反在下弦爲陽運㣲爲隂寒上實下虚意欲得温㣲弦爲虚不可􅀤汗􅀤汗則寒慄不能自還弦在上則風傷氣風勝者陽爲之運動㣲在下則寒傷血血傷者裏爲之隂寒外氣沸鬰爲上實裏有隂寒爲下虚表􅀬裏寒意欲得温若反􅀤汗亡陽隂獨故寒慄不能自還欬者則劇數􅄍涎沫咽中必乾小便不利心中飢煩晬時而􅀤其形似􅒻有寒無􅀬虚而寒慄欬而􅀤汗踡而苦滿腹中復堅肺寒氣逆欬者則劇􅄍涎沫亡津液咽中必乾小便不利膈中陽氣虚心中飢而煩一日一夜氣大㑹於肺邪正相撃晬時而􅀤形如寒􅒻但寒無􅀬虚而寒慄􅀤汗攻陽則陽氣愈虚隂寒愈甚故踡而苦滿腹中復堅厥脉􅂃不可􅀤汗􅀤汗則聲亂咽嘶舌萎聲不得前厥而脉􅂃則少隂傷寒也法當温裏而反􅀤汗則損少隂之氣少隂之脉入肺中循喉嚨挾舌本腎爲之本肺爲之標本虚則標弱故聲亂咽嘶舌萎聲不得前諸逆發汗病㣲者難差劇者言亂目眩者死命將難全不可􅀤汗而強􅀤之輕者因􅀤汗而重而難差重者脫其隂陽之氣言亂目眩而死難經曰脫陽者見􅀑是此言亂也脫隂者目肓是此目眩也眩非玄而見玄是近於肓也欬而小便利若失小便者不可􅀤汗汗岀則四肢厥逆冷肺經虚冷上虚不能治下者欬而小便利或失小便上虚􅀤汗則陽氣外亡四肢者諸陽之本陽虚則不與隂相接故四肢厥逆冷傷寒頭痛翕翕􅀤􅀬形􅁚中風常㣲汗岀自嘔者下之益煩心中懊憹如飢發汗則致痓身強難以屈伸熏之則􅀤黄不得小便灸則􅀤欬唾傷寒當無汗惡寒今頭痛􅀤􅀬㣲汗岀自嘔則傷寒之邪傳而爲􅀬欲行於裏若反下之邪􅀬乘虚流於胷中爲虚煩心懊憹如飢若發汗則虚表􅀬歸經絡􅀬甚生風故身強直而成痓若熏之則火􅀬相合消爍津液故小便不利而􅀤黄肺惡火灸則火􅀬傷肺必􅀤欬嗽而唾膿辨可發汗證并治第十六大法春夏宜發汗春夏陽氣在外邪氣亦在外故可􅀤汗凡􅀤汗欲令手足俱周時岀以漐漐然一時間許亦佳不可令如水流漓若病不解當重􅀤汗汗多必亡陽陽虚不得重發汗也汗緩緩岀則表裏之邪悉去汗大岀則邪氣不除但亡陽也陽虚爲無津液故不可重發汗凡服湯􅀤汗中病便止不必盡劑汗多則亡陽凡云可􅀤汗無湯者丸散亦可用要以汗岀爲解然不如湯隨證良驗聖濟經曰湯液主治本乎腠理壅欝除邪氣者於湯爲宜金匱玉凾曰水能凈萬物故用湯也夫病脉浮大問病者言但便鞕爾設利者爲大逆鞕爲實汗岀而解何以故脉浮當以汗解經曰脉浮大應􅀤汗醫反下之爲大逆便鞕難雖爲裏實亦當先解其外若行利藥是爲大逆結胷雖急脉浮大猶不可下下之即死况此便難乎經曰本􅀤汗而復下之此爲逆若先􅀤汗治不爲逆下利後身疼痛清便自調者急當救表冝桂枝湯􅀤汗外臺云裏和表病汗之則愈辨􅀤汗後病脉證并治第十七􅀤汗多亡陽讝語者不可下與柴胡桂枝湯和其榮衛以通津液後自愈胃爲水榖之海津液之主􅀤汗多亡津液胃中燥必􅀤讝語此非實􅀬則不可下與柴胡桂枝湯和其榮衞通行津液津液生則胃潤讝語自止此一卷第十七篇凡三十一證前有詳􅀃辨不可􅄍第十八合四證已具太陽篇中辨可􅄍第十九大法春宜􅄍春時陽氣在上邪氣亦在上故宜􅄍凡用􅄍湯中病即止不必盡劑也要在適當不欲過也病􅅐上諸實胷中欝欝而痛不能食欲使人按之而反有涎唾下利日十餘行其脉反遲寸口脉㣲滑此可􅄍之􅄍之利則止胷上諸實或痰實或􅀬欝或寒結胷中欝而痛不能食欲使人按之反有涎唾者邪在下按之氣下而無涎唾此按之反有涎唾者知邪在􅅐中經曰下利脉遲而滑者内實也今下利日十餘行其脉反遲寸口脉㣲滑是上實也故可􅄍之玉凾曰上盛不已􅄍而奪之􅀫食在上脘者當􅄍之􅀫食在中下脘者則宜下􅀫食在上脘則當􅄍内經曰其高者因而越之其下者引而竭之病人手足厥冷脉乍結以客氣在胷中心下滿而煩欲食不能食者病在胷中當􅄍之此與第六卷厥隂門􅀲蔕散證同彼云脉乍􅂃此云脉乍結惟此有異􅂃爲内實乍􅂃則實未深是邪在胷中結爲結實乍結則結未深是邪在胷中所以證治俱同也釋音拒音巨抑也函音含又音咸書函􅑩音荒目不明也腕音管胃府也竭渠孽切盡也蔕音帝􅀲帝也註解傷寒論卷第七之八
