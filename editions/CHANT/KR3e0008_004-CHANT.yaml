body:
  text: 辨痓濕暍脈證第四傷寒所致太陽痓濕暍三種宜應別論以為與傷寒相似故此見之太陽病發熱無汗反惡寒者名曰剛痓太陽病發熱汗出不惡寒者名曰柔痓太陽病發熱脈沉而細者名曰痓太陽病發汗太多因致痓病身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痓病也太陽病關節疼痛而煩脈沉而細者此名濕痺濕痺之候其人小便不利大便反快但當利其小便濕家之為病一身盡疼發熱身色如似熏黃濕家其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如胎者以丹田有熱胸中有寒渴欲得水而不能飲則口燥煩也濕家下之額上汗出微喘小便利者死若下利不止者亦死問曰風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也太陽中熱者暍是也其人汗出惡寒身熱而渴也太陽中暍者身熱疼重而脈微弱此亦夏月傷冷水水行皮中所致也太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚
