body:
  text: 辨可發汗證并治第十六大法春夏宜發汗凡發汗欲令手足俱周時出以漐漐然一時間許亦佳不可令如水流漓若病不解當重發汗汗多必亡陽陽虛不得重發汗也凡服湯發汗中病便止不必盡劑凡云可發汗無湯者丸散亦可用要以汗出為解然不如湯隨證良驗夫病脈浮大問病者言但便硬爾設利者為大逆硬為實汗出而解何以故脈浮當以汗解下利後身疼痛清便自調者急當救表宜桂枝湯發汗
