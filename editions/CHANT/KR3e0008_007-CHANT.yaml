body:
  text: 辨太陽脈證并治下第七問曰病有結胸有藏結其狀何如荅曰按之痛寸脈浮關脈沉名曰結胸也何謂藏結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰藏結舌上白胎滑者難治藏結無陽證不往來寒熱其人反靜舌上胎滑者不可攻也病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也結胸者項亦強如柔痓狀下之則和宜大陷胸丸方大陷胸丸方大黃半斤味苦寒葶藶半升熬味苦寒芒硝半升味鹹寒杏人半升去皮尖熬黑味苦甘溫右四味搗篩二味內杏人芒硝合研如脂和散取如彈丸一枚別搗甘遂末壹錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法結胸證其脈浮大者不可下下之則死結胸證悉具煩燥者亦死太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出餘無汗劑頸而還小便不利身必發黃也大陷胸湯方大黃六兩去皮苦寒芒硝一升鹹寒甘遂一錢苦寒右三味以水六升先煮大黃取二升去滓內芒消煮一兩沸內甘遂末溫服一升得快利止後服傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之傷寒十餘日熱結在裏復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之小陷胸湯方黃連一兩苦寒半夏半升洗辛溫括蔞實大者一箇味苦寒右三味以水六升先煮括蔞取三升去滓內諸藥煮取二升去滓分溫三服太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸也脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血病在陽應以汗解之反以冷水潠之若灌之其熱被卻不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服文蛤散方文蛤五兩味醎寒右一味為散以沸湯和一錢匕服湯用五合白散方桔梗三分味辛苦微溫芭豆一分去皮心熬黑研如脂平溫貝母三分味辛苦平右件三味為末內芭豆更於臼中杵之以白飲和服強人半錢羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆者若水以潠之洗之益令熱卻不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法太陽與少陽併病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則讝語脈弦五六日讝語不止當刺期門婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀讝語者此為熱入血室也當刺期門隨其實而瀉之婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之婦人傷寒發熱經水適來晝日明了暮則讝語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡加桂枝湯主之傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝乾薑湯主之柴胡桂枝乾薑湯方柴胡半斤苦平桂枝三兩去皮味辛熱乾薑三兩辛熱括蔞根四兩苦寒黃芩三兩苦寒牡蠣三兩醎寒甘草二兩炙味甘平右七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有裏也脈沉亦在裏也汗出為陽微假令純陰結不得復有外證悉入在裏此為半在裏半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯半夏瀉心湯方半夏半升洗辛平黃芩苦寒乾薑辛熱人參已上各三兩甘溫黃連一兩苦寒大棗十二枚擘溫甘甘草三兩炙甘平右七味以水一斗煮取六升去滓再煮取三升溫服一升日三服太陽少陽併病而反下之成結胸心下硬下利不止水漿不下其人心煩脈浮而緊而復下之緊反入裏則作痞按之自濡但氣痞耳太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解裏未和也十棗湯主之十棗湯方芫花熬味辛苦甘遂苦寒大戟苦寒大棗十枚擘甘溫右上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓內藥末強人服一錢匕羸人服半錢溫服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養太陽病醫發汗遂發熱惡寒因復下之心下痞表裏俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之大黃黃連瀉心湯方大黃二兩味苦寒黃連一兩味苦寒右二味以麻沸湯二升漬之須臾絞去滓分溫再服心下痞而復惡寒汗出者附子瀉心湯主之本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便赤石脂禹餘糧湯方赤石脂一斤碎味甘溫禹餘糧一斤碎味甘平已上二味以水六升煮取二升去滓三服傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿傷寒發汗若吐若下解後心下痞硬噫氣不除者旋復代赭石湯主之旋復代赭石湯方旋復花三兩味醎溫人參二兩味甘溫生薑五兩切味辛溫半夏半升洗味辛溫代赭石一兩味苦寒大棗十二枚擘甘溫甘草三兩炙味甘平右件七味以水一斗煮取六升去滓再煎取三升溫服一升日三服下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏子甘草石膏湯太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裏不解者桂枝人參湯主之桂枝人參湯方桂枝四兩去皮味辛熱甘草四兩炙味甘平白朮三兩味甘平人參三兩味甘溫乾薑三兩味辛熱右伍味以水九升先煮四味取五升內桂更煮取三升溫服一升日再夜一服傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯傷寒發熱汗出不解心中痞硬嘔吐而下利者大柴胡湯主之病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蔕散瓜蔕散方瓜蔕一分熬黃味苦寒赤小豆一分味酸溫右二味各別搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與瓜蔕散病脅下素有痞連在臍傍痛引少腹入陰筋者此名藏結死傷寒病若吐若下後七八日不解熱結在裏表裏俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之太陽少陽併病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之黃芩湯方黃芩三兩味苦寒甘草二兩炙味甘平芍藥二兩味酸平大棗十二枚擘味甘溫右四味以水一斗煮取三升去滓溫服一升日再夜一服若嘔者加半夏半升生薑三兩傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之黃連湯方黃連味苦寒甘草炙味甘平乾薑味辛熱桂枝去皮味辛熱各三兩人參二兩味甘溫半夏半升洗味辛溫大棗十二枚擘味甘溫右七味以水一斗煮取六升去滓溫服一升日三服夜二服傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而濇者桂枝附子湯主之若其人大便硬小便自利者去桂枝加白朮湯主之桂枝附子湯方桂枝四兩去皮味辛熱附子三枚炮去皮破八片辛熱生薑三兩切辛溫甘草二兩炙味甘溫大棗十二枚擘味甘溫右五味以水六升煮取二升去滓分溫三服風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之甘草附子湯方甘草二兩炙味甘平附子二枚炮去皮破味辛熱白朮二兩味甘溫桂枝四兩去皮味辛熱右四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者宜服六七合為妙傷寒脈浮滑此表有熱裏有寒白虎湯主之白虎湯方知母六兩味苦寒石膏一斤碎味甘寒甘草二兩甘平粳米六合味甘平右四味以水一斗煮米熟湯成去滓溫服一升日三服傷寒脈結代心動悸炙甘草湯主之炙甘草湯方甘草四兩炙味甘平生薑三兩切味辛溫桂枝三兩去皮味辛熱人參二兩味甘溫生地黃一斤味甘寒阿膠二兩味溫甘麥門冬半升去心味甘平麻子人半升味甘平大棗十二枚擘味甘溫右九味以清酒七升水八升先煮八味取三升去滓內膠烊消盡溫服一升日三服一名復脈湯脈按之來緩而時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動名曰代陰也得此脈者必難治
