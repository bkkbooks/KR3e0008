body:
  text: 辨太陽病脈證并治法上第五太陽之為病脈浮頭項強痛而惡寒太陽病發熱汗出惡風脈緩者名為中風太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒傷寒一日太陽受之脈若靜者為不傳頗欲吐若燥煩脈數急者為傳也傷寒二三日陽明少陽證不見者為不傳也太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘈瘲若火熏之一逆尚引日再逆促命期病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也太陽病頭痛至七日已上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈太陽病欲解時從巳至未上風家表解而不了了者十二日愈病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之桂枝湯方桂枝三兩去皮味辛熱芍藥三兩味苦酸微寒甘草二兩炙味甘平生薑三兩切味辛溫大棗十二枚擘味甘溫右伍味㕮咀以水柒升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升餘以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服小促伇其間半日許令叄服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二叄劑禁生冷粘滑肉麵五辛酒酪臭惡等物太陽病頭痛發熱汗出惡風者桂枝湯主之太陽病項背強几几反汗出惡風者桂枝加葛根湯主之太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也常須識此勿令誤也若酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也喘家作桂枝湯加厚朴杏子佳凡服桂枝湯吐者其後必吐膿血也太陽病發汗遂漏不止其人惡風小便難四支微急難以屈伸者桂枝加附子湯主之太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯方桂枝二越婢一湯方桂枝去皮芍藥甘草各十八銖生薑一兩三錢切大棗四枚擘麻黃十八銖去節石膏二十四銖碎綿裹右柒味㕮咀以五升水煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升本方當裁為越婢湯桂枝湯合飲一升今合為一方桂枝二越婢一服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝湯去桂加茯苓白朮湯主之傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中乾煩燥吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和讝語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之甘草乾薑湯方甘草四兩炙味甘平乾薑二兩炮味辛熱右㕮咀以水叄升煮取一升五合去滓分溫再服芍藥甘草湯方白芍藥四兩味酸微寒甘草四兩炙甘平右二味㕮咀以水叄升煮取一升半去滓分溫再服之調胃承氣湯方大黃四兩去皮清酒浸甘草二兩炙味甘平芒硝半斤味醎苦大寒右三味㕮咀以水叄升煮取一升去滓內芒硝更上火微煮令沸少少溫服之四逆湯方甘草二兩炙味甘平乾薑一兩半味辛熱附子一枚生用去皮破八片辛大熱右三味㕮咀以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩問曰證象陽旦按法治之而增劇厥逆咽中乾兩脛拘急而讝語師曰言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣病證象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中乾煩燥陽明內結讝語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其讝語故知病可愈
