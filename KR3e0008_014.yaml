body:
  text: 辨陰陽易差後勞復病證并治第十四傷寒陰陽易之為病其人身體重少氣少腹裏急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之燒裩散方右取婦人中裩近隱處剪燒灰以水和服方寸匕日三服小便即利陰頭微腫則愈婦人病取男子裩當燒灰大病差後勞復者枳實梔子湯主之若有宿食者加大黃如博碁子大五六枚枳實梔子豉湯方枳實三枚炙苦寒梔子十四枚擘苦寒豉一升綿裹苦寒右三味以清漿水七升空煮取四升內枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗傷寒差已後更發熱者小柴胡湯主之脈浮者以汗解之脈沉實者以下解之大病差後從腰已下有水氣者牡礪澤瀉散主之牡礪澤瀉散方牡礪醎平熬澤瀉醎寒括蔞根苦寒蜀漆辛平洗去腳葶藶苦寒熬商陸根熬辛酸醎平海藻醎寒洗去醎已上各等分右七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服日三大病差後喜唾久不了了者胃上有寒當以丸藥溫之宜理中丸傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之竹葉石膏湯方竹葉二把辛平石膏一斤甘寒半夏半升洗辛溫人參三兩甘溫甘草二兩甘平炙粳米半升甘微寒麥門冬一升甘平去心右七味以水一斗煮取六升去滓內粳米煮米熟湯成去米溫服一升日三服病人脈已解而日暮微煩以病新差人強與穀脾胃氣尚弱不能消穀故令微煩損穀則愈
