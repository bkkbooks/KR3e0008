body:
  text: 辨霍亂病脈證并治第十三問曰病有霍亂者何答曰嘔吐而利名曰霍亂問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂自吐下又利止復更發熱也傷寒其脈微澀者本是霍亂今是傷寒卻四五日至陰經上轉入陰必利本嘔下利者不可治也欲似大便而反失氣仍不利者屬陽明也便必硬十三日愈所以然者經盡故也下利後當便硬硬則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也惡寒脈微而復利利止亡血也四逆加人參湯主之霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之理中丸方人參甘溫甘草炙甘平白朮甘溫乾薑辛熱已上各三兩右四味搗篩為末蜜和丸如雞黃大以沸湯數合和一丸研碎溫服之日三四夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服加減法若臍上築者腎氣動也去朮加桂四兩吐多者去朮加生薑三兩下多者還用朮悸者加茯苓二兩渴欲得水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被吐利止而身痛不休者當消息和解其外宜桂枝湯小和之吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之吐利發汗脈平小煩者以新虛不勝穀氣故也
