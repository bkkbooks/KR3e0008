  - {type: variant, offset: 1070, length: 0, content: '', krp: 筋惕肉瞤難經曰肝内證臍左有動氣按之牢若痛肝氣不治正氣内虚氣動於臍之左也肝爲隂之主發汗汗不止則亡陽外虚故頭眩筋惕肉瞤鍼經曰上虚則眩動氣在上不可發汗發汗則氣上衝正在心端難經曰心内證臍上有動氣按之牢若痛心氣不治正氣内虚氣動於臍之上也心爲陽發汗亡陽則愈損心氣腎乘心虚欲上凌心故氣上衝正在心端動氣在下不可發汗發汗則無汗心中大煩骨節苦疼目運惡寒食則反吐榖不得前難經曰腎内證臍下有動氣按之牢若痛腎氣不治正氣内虚動氣發於臍之下也腎者主水發汗則無汗者水不足也心中大煩者腎虚不能制心火也骨節苦疼者腎主骨也目運者腎病則目􅑩􅑩如無所見惡寒者腎主寒也食則反吐榖不得前者腎水乾也王氷曰病嘔而吐食乆反岀是無水也咽中閑塞不可發汗發汗則吐血氣欲絶手足厥冷欲得踡卧不能自温咽門者胃之系胃經不和則咽内不利發汗攻陽血隨發散而上必吐血也胃經不和而反攻表則陽虚於外故氣欲絶手足冷欲踡而不能自温諸脉得數動㣲弱者不可發汗發汗則大便難腹中乾胃燥而煩其形相象根本異源動數之脉爲熱在表㣲弱之脉爲熱在裏發汗亡津液則熱氣愈甚胃中乾燥故大便難腹中乾胃燥而煩根本雖有表裏之異逆治之後熱傳之則一是以病形相象也脉㣲而弱弱反在關濡反在巔弦反在上㣲反在下弦爲陽運㣲爲隂寒上實下虚意欲得温㣲弦爲虚不可發汗發汗則寒慄不能自還弦在上則風傷氣風勝者陽爲之運動㣲在下則寒傷血血傷者裏爲之隂寒外氣沸鬰爲上實裏有隂寒爲下虚表熱裏寒意欲得温若反發汗亡陽隂獨故寒慄不能自還欬者則劇數吐涎沫咽中必乾小便不利心中飢煩晬時而發其形似􅒻有寒無熱虚而寒慄欬而發汗踡而苦滿腹中復堅肺寒氣逆欬者則劇吐涎沫亡津液咽中必乾小便不利膈中陽氣虚心中飢而煩一日一夜氣大㑹於肺邪正相撃晬時而發形如寒􅒻但寒無熱虚而寒慄發汗攻陽則陽氣愈虚隂寒愈甚故踡而苦滿腹中復堅厥脉緊不可發汗發汗則聲亂咽嘶舌萎聲不得前厥而脉緊則少隂傷寒也法}
  - {type: variant, offset: 1071, length: 5, content: 刺期門婦人, krp: 温裏而反發汗則損少隂之氣少隂之脉入肺中循喉嚨挾舌本腎爲之本肺爲之標本虚則標弱故聲亂咽嘶舌萎聲不得前諸逆發汗病㣲者難差劇者言亂目眩者死命將難全不可發汗而強發之輕者因發汗而重而難差重者脫其隂陽之氣言亂目眩而死難經曰脫陽者見鬼是此言亂也脫隂者目肓是此目眩也眩非玄而見玄是近於肓也欬而小便利若失小便者不可發汗汗岀則四肢厥逆冷肺經虚冷上虚不能治下者欬而小便利或失小便上虚發汗則陽氣外亡四肢者諸陽之本陽虚則不與隂相接故四肢厥逆冷傷寒頭痛翕翕發熱形象}
