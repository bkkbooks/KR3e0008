  - {type: 'tls:seg', offset: 1398, content: '', id: KR3e0008_CHANT_007-26a.5}
  - {type: variant, offset: 1398, length: 0, content: '', SBCK: 飲冷則傷肺故飲即􅄍水動氣在左不可􅀤汗􅀤汗則頭眩汗不止筋惕肉瞤難經曰肝内證臍左有動氣按之牢若痛肝氣不治正氣内虚氣動於臍之左也肝爲隂之主􅀤汗汗不止則亡陽外虚故頭眩筋惕肉瞤鍼經曰上虚則眩動氣在上不可􅀤汗􅀤汗則氣上衝正在心端難經曰心内證臍上有動氣按之牢若痛心氣不治正氣内虚氣動於臍之上也心爲陽􅀤汗亡陽則愈損心氣腎乘心虚欲上凌心故氣上衝正在心端動氣在下不可􅀤汗􅀤汗則無汗心中大煩骨節苦疼目運惡寒食則反􅄍榖不得前難經曰腎内證臍下有動氣按之牢若痛腎氣不治正氣内虚動氣􅀤於臍之下也腎者主水􅀤汗則無汗者水不足也心中大煩者腎虚不能制心火也骨節苦疼者腎主骨也目運者腎病則目􅑩􅑩如無所見惡寒者腎主寒也食則反􅄍榖不得前者腎水乾也王氷曰病嘔而􅄍食乆反岀是無水也咽中閑塞不可􅀤汗􅀤汗則􅄍血氣欲絶手足厥冷欲得踡卧不能自温咽門者胃之系胃經不和則咽内不利􅀤汗攻陽血隨􅀤散而上必􅄍血也胃經不和而反攻表則陽虚於外故氣欲絶}
