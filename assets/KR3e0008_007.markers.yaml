  - {type: 'tls:seg', offset: 1426, content: '', id: KR3e0008_CHANT_007-26a.13}
  - {type: variant, offset: 1426, length: 2, content: 脈沉, SBCK: 脫隂者目肓是此目眩也眩非玄而見玄是近於肓也欬而小便利若失小便者不可􅀤汗汗岀則四肢厥逆冷肺經虚冷上虚不能治下者欬而小便利或失小便上虚􅀤汗則陽氣外亡四肢者諸陽之本陽虚則不與隂相接故四肢厥逆冷傷寒頭痛翕翕􅀤􅀬形􅁚中風常㣲汗岀自嘔者下之益煩心中懊憹如飢發汗則致痓身強難以屈伸熏之則􅀤黄不得小便灸則􅀤欬唾傷寒當無汗惡寒今頭痛􅀤􅀬㣲汗岀自嘔則傷寒之邪傳而爲􅀬欲行於裏若反下之邪􅀬乘虚流於胷中爲虚煩心懊憹如飢若發汗則虚表􅀬歸經絡􅀬甚生風故身強直而成痓若熏之則火􅀬相合消爍津液故小便不利而􅀤黄肺惡火灸則火􅀬傷肺必􅀤欬嗽而唾膿辨可發汗證并治第十六大法春夏宜發汗春夏陽氣在外邪氣}
  - {type: page-break, offset: 1426, content: '', id: KR3e0008_SBCK_007-14a}
