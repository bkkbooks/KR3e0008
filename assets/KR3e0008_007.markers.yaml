  - {type: variant, offset: 1394, length: 2, content: 出微, SBCK: 躁不得眠寸關爲陽脉當浮盛弱反在關則裏氣不及濡反在巔則表氣不逮衞行脉外浮爲在上以􅀱衞㣲反在上是陽氣不足榮行脉中沉爲在下以􅀱榮澁反在下是無血也陽㣲不能固外腠理開踈風因客之故令汗岀而躁煩無血則隂虚不與陽相順接故厥而且寒陽㣲無津液則不能作汗若􅀤汗則必亡陽而躁經曰汗多亡陽遂虚惡風煩躁不得眠也動氣在右不可􅀤汗􅀤汗則衂而渇心苦煩飲即􅄍水動氣者築築然氣動也在右者在臍之右也難經曰肺内證臍右有動氣按之牢若痛肺氣不治正氣内虚氣動於臍之右也􅀤汗則動肺氣肺主氣開竅於鼻氣虚則不能衞血血溢妄行隨氣岀於鼻爲衂亡津液胃燥則煩渇而心苦煩肺}
