  - {type: variant, offset: 634, length: 1, content: 三, krp: 七}
  - {type: variant, offset: 635, length: 707, content: 味以水六升先煮括蔞取三升去滓內諸藥煮取二升去滓分溫三服太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸也脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血病在陽應以汗解之反以冷水潠之若灌之其熱被卻不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服文蛤散方文蛤五兩味醎寒右一味為散以沸湯和一錢匕服湯用五合白散方桔梗三分味辛苦微溫芭豆一分去皮心熬黑研如脂平溫貝母三分味辛苦平右件三味為末內芭豆更於臼中杵之以白飲和服強人半錢羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆者若水以潠之洗之益令熱卻不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法太陽與少陽併病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則讝語脈弦五六日讝語不止當刺期門婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀讝語者此為熱入血室也當刺期門隨其實而瀉之婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之婦人傷寒發熱經水適來晝日明了暮則讝語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡加桂枝湯主之傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝乾薑湯主之柴胡桂枝乾薑湯方柴胡半斤苦平桂枝三兩去皮味辛熱乾薑三兩辛熱括蔞根四兩苦寒黃芩三兩苦寒牡蠣三兩醎寒, SBCK: 两甘温}
