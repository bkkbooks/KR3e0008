  - {type: variant, offset: 1430, length: 1, content: 裏, SBCK: 外故可􅀤汗凡􅀤汗欲令手足俱周時岀以漐漐然一時間許亦佳不可令如水流漓若病不解當重􅀤汗汗多必亡陽陽虚不得重發汗}
  - {type: variant, offset: 1430, length: 128, content: 裏也汗出為陽微假令純陰結不得復有外證悉入在裏此為半在裏半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若, krp: 胷中}
