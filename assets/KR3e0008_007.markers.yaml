  - {type: 'tls:seg', offset: 1422, content: '', id: KR3e0008_CHANT_007-26a.12}
  - {type: variant, offset: 1422, length: 0, content: '', SBCK: 裏之異逆治之後􅀬傳之則一是以病形相􅁚也脉㣲而弱弱反在關濡反在巔弦反在上㣲反在下弦爲陽運㣲爲隂寒上實下虚意欲得温㣲弦爲虚不可􅀤汗􅀤汗則寒慄不能自還弦在上則風傷氣風勝者陽爲之運動㣲在下則寒傷血血傷者裏爲之隂寒外氣沸鬰爲上實裏有隂寒爲下虚表􅀬裏寒意欲得温若反􅀤汗亡陽隂獨故寒慄不能自還欬者則劇數􅄍涎沫咽中必乾小便不利心中飢煩晬時而􅀤其形似􅒻有寒無􅀬虚而寒慄欬而􅀤汗踡而苦滿腹中}
  - {type: page-break, offset: 1422, content: '', id: KR3e0008_SBCK_007-12b}
  - {type: variant, offset: 1423, length: 1, content: 有, SBCK: 堅肺寒氣逆欬者則劇􅄍涎沫亡津液咽中必乾小便不利膈中陽氣虚心中飢而煩一日一夜氣大㑹於肺邪正相撃晬時而􅀤形如寒􅒻但寒無􅀬虚而寒慄􅀤汗攻陽則陽氣愈虚隂寒愈甚故踡而苦滿腹中復堅厥脉􅂃不可􅀤汗􅀤汗則聲亂咽嘶舌萎聲不得前厥而脉􅂃則少隂傷寒也法當温}
  - {type: page-break, offset: 1423, content: '', id: KR3e0008_SBCK_007-13a}
  - {type: variant, offset: 1425, length: 0, content: '', SBCK: 而反􅀤汗則損少隂之氣少隂之脉入肺中循喉嚨挾舌本腎爲之本肺爲之標本虚則標弱故聲亂咽嘶舌萎聲不得前諸逆發汗病㣲者難差劇者言亂目眩者死命將難全不可􅀤汗而強􅀤之輕者因􅀤汗而重而難差重者脫其隂陽之氣言亂目眩而死難經曰脫陽者見􅀑是此言亂}
  - {type: page-break, offset: 1425, content: '', id: KR3e0008_SBCK_007-13b}
