  - {type: variant, offset: 453, length: 4, content: 一升得快, SBCK: 覆令㣲似汗傷寒差巳後更發􅀬者小柴胡湯主之脉浮者以汗解之脉沉實者以下解之差後餘􅀬未盡更發􅀬者與小柴胡湯以和解之脉浮者􅀬在表也故以汗解脉沉者􅀬在裏也故以下解之大病差後從腰已下有水氣者牡礪澤㵼散主之大病差後脾胃氣虚不能制約腎水水溢下焦腰以下爲腫也金匱要畧曰腰以下腫當利小便與牡礪澤㵼散利小便而散水也牡礪澤㵼散方牡礪醎平熬澤㵼醎寒括蔞根苦寒蜀􅃮辛平洗去脚葶􅏣苦寒熬商陸根熬辛酸醎平海藻醎寒洗去醎巳上各等分鹹味勇泄牡礪澤㵼海藻之鹹以泄水氣内經曰濕滛於内平以苦佐以酸辛以苦泄之蜀漆葶􅏣括蔞商陸之酸辛與苦以導腫濕右七味異搗下篩爲散更入臼中治之白飲和服方寸匕小便}
