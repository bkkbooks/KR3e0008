  - {type: variant, offset: 1375, length: 23, content: 三服初服微煩復服汗出便愈傷寒五六日頭汗出微惡寒, krp: 十餘行其脉反遲寸口脉㣲滑是上實也故可吐之玉凾曰上盛不已吐而奪之宿食在上脘者當吐之宿食在中下脘者則宜下宿食在上脘則當吐内經曰其高者因而越之其下者引而竭之病人}
