  - {type: variant, offset: 2793, length: 840, content: 日不解熱結在裏表裏俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之太陽少陽併病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之黃芩湯方黃芩三兩味苦寒甘草二兩炙味甘平芍藥二兩味酸平大棗十二枚擘味甘溫右四味以水一斗煮取三升去滓溫服一升日再夜一服若嘔者加半夏半升生薑三兩傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之黃連湯方黃連味苦寒甘草炙味甘平乾薑味辛熱桂枝去皮味辛熱各三兩人參二兩味甘溫半夏半升洗味辛溫大棗十二枚擘味甘溫右七味以水一斗煮取六升去滓溫服一升日三服夜二服傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而濇者桂枝附子湯主之若其人大便硬小便自利者去桂枝加白朮湯主之桂枝附子湯方桂枝四兩去皮味辛熱附子三枚炮去皮破八片辛熱生薑三兩切辛溫甘草二兩炙味甘溫大棗十二枚擘味甘溫右五味以水六升煮取二升去滓分溫三服風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之甘草附子湯方甘草二兩炙味甘平附子二枚炮去皮破味辛熱白朮二兩味甘溫桂枝四兩去皮味辛熱右四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者宜服六七合為妙傷寒脈浮滑此表有熱裏有寒白虎湯主之白虎湯方知母六兩味苦寒石膏一斤碎味甘寒甘草二兩甘平粳米六合味甘平右四味以水一斗煮米熟湯成去滓溫服一升日三服傷寒脈結代心動悸炙甘草湯主之炙甘草湯方甘草四兩炙味甘平生薑三兩切味辛溫桂枝三兩去皮味辛熱人參二兩味甘溫生地黃一斤味甘寒阿膠二兩味溫甘麥門冬半升去心味甘平麻子人半升味甘平大棗十二枚擘味甘溫右九味以清酒七升水八升先煮八味取三升去滓內膠烊消盡溫服一升日三服一名復脈湯脈按之來緩而時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動名曰代陰也得此脈者必難治, krp: ''}
