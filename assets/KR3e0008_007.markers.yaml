  - {type: variant, offset: 1381, length: 0, content: '', SBCK: 以病新差人強與榖脾胃氣尚弱不能消榖故令㣲煩損榖則愈陽明王於申酉戌􅀫食在胃故日暮㣲煩當小下之以損􅀫榖辨不可􅀤汗病脉證并治第十五夫以爲疾病至急倉卒尋按要者難得故重集諸可與不可方治比之三隂三陽篇中此易見也又時有不止是三隂三陽岀在諸可與不可中也諸不可汗不可下病證藥方前三隂三陽篇中經注已具者更不}
