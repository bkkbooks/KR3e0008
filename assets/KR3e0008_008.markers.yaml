  - {type: variant, offset: 874, length: 0, content: '', SBCK: 識人若以火熏之則火􅀬傷氣内消津液結爲裏實故喘不得小便心腹滿若反下之則内虚津液邪欲入裏外動經絡故短氣小便難頭痛背強若加温針益陽増􅀬必動其血而爲衂也傷寒脉隂陽俱􅂃惡寒􅀤􅀬則脉欲厥厥者脉􅀄來大漸漸小更來漸漸大是其候也如此者惡寒甚者翕翕汗岀喉中痛􅀬多者目赤脉多睛不慧醫復􅀤之咽中則傷若復下之則兩目閉寒多者便清榖􅀬多者便膿血若熏之則身􅀤黄若熨之則咽燥若小便}
