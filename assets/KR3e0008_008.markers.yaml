  - {type: variant, offset: 358, length: 1, content: 脈, krp: 㣲嘔心煩醫不温胃反爲有熱解飢發汗則表虚亡陽煩躁心下痞堅先裏不足發汗又虚其表表裏俱虚竭卒起頭眩客熱在表悵怏不得眠醫不救裏但責表熱汲水灌洗以却熱客熱易罷裏寒益増慄而振寒復以重𬒳覆之表虚遂汗岀愈使陽氣虚也巔頂也顛冒而體振寒小便難者亡陽也寒因水發下爲清榖上爲嘔吐外有厥逆内爲燥煩顛倒不安雖欲拯救不可得也本草曰病勢已過命將難全脉}
  - {type: variant, offset: 361, length: 2, content: 緊若, krp: 大浮爲氣實大爲血虚血虚爲無隂孤陽獨下隂部者小便當赤而難胞中當虚今反小便利而大汗岀法應衞家當㣲今反更實津液四射榮竭血盡乾煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此爲重虚客陽去有期必下如汚埿而死衞爲陽榮爲隂衞氣強實隂血虚弱陽乘隂虚下至隂部隂部下焦也陽爲熱則消津液當小便赤而難今反小便利而大汗岀者隂氣内弱也經曰隂弱者汗自岀是以衞家不㣲而反更實榮竭血盡乾煩而不眠血薄則肉消而成暴液者津液四射也醫反下之又虚其裏是爲重虚孤陽因下而又脫去氣血皆竭胃氣内盡必下如汚埿而死也脉數者乆數不止止則邪結正氣不能復正氣却結於藏故邪氣浮之與皮毛相得脉數者不可下}
