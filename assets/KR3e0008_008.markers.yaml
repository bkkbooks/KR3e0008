  - {type: variant, offset: 1162, length: 1, content: 恐, SBCK: 後必便血若􅀤汗則小便自利也傷寒􅀤􅀬寒變􅀬也口中勃勃氣岀􅀬客上膈也頭痛目黄血不可制者􅀬烝於上也千金曰無陽即厥無隂即嘔貪水者必嘔則隂虚也惡水者厥則陽虚也􅀤􅀬口中勃勃氣岀者咽中已􅀬也若下之亡津液則咽中生瘡􅀬因裏虚而下若􅀬氣内結則手足必厥設手足温者􅀬氣不結而下行作叶􅀬利下重便膿血也頭痛目黄者下之􅀬氣内伏則目閉也貪水爲隂虚下之又虚其裏陽氣内䧟故脉厥聲嚶咽喉閉塞隂虚􅀤汗又虚其陽使隂陽俱虚而戰慄也惡水爲陽虚下之又虚胃氣虚寒内甚故裏冷不􅄝食陽虚􅀤汗則上焦虚燥故口中傷爛舌上白胎而煩燥也經曰脉數不解合􅀬則消榖喜飢至六七日不大便者此}
  - {type: page-break, offset: 1162, content: '', id: KR3e0008_SBCK_008-9b}
  - {type: page-break, offset: 1162, content: '', id: KR3e0008_SBCK_008-10a}
  - {type: variant, offset: 1162, length: 1, content: 恐, krp: 後必便血若發汗則小便自利也傷寒發熱寒變熱也口中勃勃氣岀熱客上膈也頭痛目黄血不可制者熱烝於上也千金曰無陽即厥無隂即嘔貪水者必嘔則隂虚也惡水者厥則陽虚也發熱口中勃勃氣岀者咽中已熱也若下之亡津液則咽中生瘡熱因裏虚而下若熱氣内結則手足必厥設手足温者熱氣不結而下行作叶熱利下重便膿血也頭痛目黄者下之熱氣内伏則目閉也貪水爲隂虚下之又虚其裏陽氣内䧟故脉厥聲嚶咽喉閉塞隂虚發汗又虚其陽使隂陽俱虚而戰慄也惡水爲陽虚下之又虚胃氣虚寒内甚故裏冷不嗜食陽虚發汗則上焦虚燥故口中傷爛舌上白胎而煩燥也經曰脉數不解合熱則消榖喜飢至六七日不大便者此}
  - {type: variant, offset: 1164, length: 0, content: '', SBCK: 瘀血此脉數實不大便六七日􅀬畜血於内也七日之後邪􅀬漸解迫血下行必便血也便血􅀤汗隂陽俱虚故小便利下利脉大者虚也以其強下之故也設脉浮革因爾腸鳴者屬當歸四逆湯主之脉大爲虚以未應下而下之利因不休也浮者按之不足也革者實大而長㣲弦也浮爲虚革爲寒寒虚相􅅮則腸鳴與當歸四逆湯􅀘虚散寒辨可下病脉證并治第二十一大法秋宜下秋時陽氣下行則邪亦在下故宜下凡服下藥用湯勝丸中病即止不必盡劑也湯之爲言蕩也滌蕩腸胃漑􅈅藏府推陳}
  - {type: page-break, offset: 1164, content: '', id: KR3e0008_SBCK_008-10b}
  - {type: variant, offset: 1164, length: 0, content: '', krp: 瘀血此脉數實不大便六七日熱畜血於内也七日之後邪熱漸解迫血下行必便血也便血發汗隂陽俱虚故小便利下利脉大者虚也以其強下之故也設脉浮革因爾腸鳴者屬當歸四逆湯主之脉大爲虚以未應下而下之利因不休也浮者按之不足也革者實大而長㣲弦也浮爲虚革爲寒寒虚相搏則腸鳴與當歸四逆湯𥙷虚散寒辨可下病脉證并治第二十一大法秋宜下秋時陽氣下行則邪亦在下故宜下凡服下藥用湯勝丸中病即止不必盡劑也湯之爲言蕩也滌蕩腸胃漑灌藏府推陳}
