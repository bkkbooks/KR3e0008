  - {type: variant, offset: 2107, length: 720, content: 氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導蜜煎導方蜜七合一味內銅器中微火煎之稍凝似飴狀攪之勿令焦著欲可丸併手捻作挺令頭銳大如指長二寸許當熱時急作冷則硬以內穀道中以手急抱欲大便時乃去之豬膽汁方大豬膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明病脈浮無汗而喘者發汗則愈宜麻黃湯陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裏身必發黃茵蔯蒿湯主之茵蔯蒿湯方茵蔯蒿六兩苦微寒梔子十四枚擘苦寒大黃二兩去皮苦寒右三味以水一斗先煮茵蔯減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也陽明證其人喜忘者必有畜血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯病人不大便五六日繞臍痛煩燥發作有時者此有燥屎故使不大便也病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯食穀欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也吳茱萸湯方吳茱萸一升洗辛熱人參三兩甘溫生薑六兩切辛溫大棗十二枚擘甘溫右四味以水七升煮取二升去滓溫服七合日三服太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但, SBCK: ''}
