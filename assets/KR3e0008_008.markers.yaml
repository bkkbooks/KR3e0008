  - {type: variant, offset: 2829, length: 448, content: 痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散脈陽微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過為陽絕於裏亡津液大便因硬也脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絕趺陽脈浮而濇浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約麻仁丸主之麻仁丸方麻子仁二升甘平芍藥半斤酸平枳實半斤炙苦寒大黃一斤去皮苦寒厚朴一斤炙去皮苦寒杏仁一斤去皮尖熬別作脂甘溫右六味為末煉蜜為丸桐子大飲服十丸日三服漸加以和為度太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之傷寒吐後腹脹滿者與調胃承氣湯太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之愈得病二三日脈弱無太陽柴胡證煩燥心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯傷寒六七日目中不了了睛不和無表裏證大便難身微熱者此為實也急下之宜大承氣湯陽明病發熱汗多, SBCK: 鞕}
