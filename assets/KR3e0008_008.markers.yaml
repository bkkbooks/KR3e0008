  - {type: variant, offset: 1654, length: 203, content: 陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿發汗則讝語下之則額上生汗手足逆冷若自汗出者白虎湯主之二陽併病太陽證罷但發潮熱手足漐漐汗出大便難而讝語者下之則愈宜大承氣湯陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則燥心憒憒反讝語若加燒鍼必怵惕煩燥不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之豬苓湯方豬苓去皮甘, SBCK: 部脉皆}
