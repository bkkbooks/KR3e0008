  body:
  - {type: punctuation, offset: 0, content: 《, id: KR3e0008_CHANT_008-bkkpn1}
  - {type: variant, offset: 1, length: 3, content: 陽明脈, SBCK: 不可下病脉}
  - {type: variant, offset: 1, length: 3, content: 陽明脈, krp: 不可下病脉}
  - {type: variant, offset: 8, length: 2, content: 八問, SBCK: 二十脉濡而弱弱反在關濡反在巔㣲反在上澁反在下㣲則陽氣不足澁則無血陽氣反㣲中風汗岀而反躁煩澁則無血厥而且寒陽㣲不可下下之則心下痞鞕陽㣲下之陽氣已虚隂氣内甚故心下痞鞕動氣在右不可下下之則津液内竭咽燥鼻乾頭眩心悸也動氣在右肺之動也下之傷胃動肺津液内竭咽燥鼻乾者肺属金主燥也頭眩心悸者肺主氣而虚也動氣在左不可下下之則腹内拘急食不下動氣更劇雖有身􅀬卧則欲踡動氣在左肝之動也下之損脾而肝氣益勝復行於脾故腹内拘急食不下動氣更劇也雖有身􅀬以裏氣不足故卧則欲踡動氣在上不可下下之則掌握􅀬煩身上浮冷􅀬汗自泄欲得水自灌動氣在上心之動也下之則傷胃内動心氣心爲火主􅀬鍼經}
  - {type: page-break, offset: 8, content: '', id: KR3e0008_SBCK_008-1b}
  - {type: page-break, offset: 8, content: '', id: KR3e0008_SBCK_008-2a}
