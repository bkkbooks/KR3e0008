  - {type: variant, offset: 146, length: 0, content: '', krp: 可下下之則腹脹滿卒起頭眩食則下清榖心下痞也動氣在下腎之動也下之則傷脾腎氣則動腎寒乘脾故有腹滿頭眩下淸榖心下痞之證也咽中閉塞不可下下之則上輕下重水漿不下卧則欲踡身急痛下利日數十行咽中閉塞胃巳不和也下之則閉塞之邪爲上輕復傷胃氣爲下重至水漿不下卧則欲踡身急痛下利日數十行知虚寒也諸外實者不可下下之則發㣲熱亡脉厥者當臍握熱外實者表熱也汗之則愈下之爲逆下後裏虚表熱内䧟故發㣲熱厥深者熱亦深亡脉厥者則陽氣深䧟客於下焦故當臍握熱諸虚者不可下下之則大渇求水者易愈惡水者劇金匱玉凾曰虚者十𥙷勿一㵼之虚家下之爲重虚内竭津液故令大渇求水者陽氣未竭而猶可愈惡水者陽氣已竭則難可制脉濡而弱弱反在關濡反在巔弦反在上㣲反在下弦爲陽運㣲爲隂寒上實下虚意欲得温㣲弦爲虚虚者不可下也虚家下之是爲重虚難經曰實實虚虚損不足益有餘此者是中工所害也㣲則爲逆欬則吐涎下之則欬止而利因不休利不休則胷中如蟲齧粥入則岀小便不利兩脇拘急喘息爲難頸背相引擘則不仁極寒反汗岀身冷若氷眼睛不慧語言不休而榖氣多入此爲除中口雖欲言舌不得前内經曰感於寒則受病㣲則爲欬甚則爲泄爲痛肺感㣲寒爲欬則脉亦㣲也下之氣下欬雖止而因利不休利不休則奪正氣而成危惡胷中如蟲齧粥入則岀小便不利兩脇拘急喘息爲難者裏氣損也頸背相引臂爲不仁極寒反汗岀身冷如冰者表氣損也表裏損極至隂陽俱脫眼睛不慧語言不休難經曰脫陽者見鬼脫隂者目盲隂陽脫者應不能食而榖多入者此爲除中是胃氣除去也口雖欲言舌不得前氣已衰脫不能運也脉濡而弱弱反在關濡反在巔浮反在上數反在下浮爲陽虚數爲無血浮爲虚數爲熱浮爲虚自汗岀而}
