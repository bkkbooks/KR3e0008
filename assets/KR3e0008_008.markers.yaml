  - {type: variant, offset: 551, length: 267, content: 之腹滿如故所以然者脈遲故也陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也陽明病反無汗而小便利二三日嘔而欬手足厥者必苦頭痛若不欬不嘔手足不厥者頭不痛陽明病但頭眩不惡寒故能食而欬其人必咽痛若不欬者咽不痛陽明病無汗小便不利心中懊憹者身必發黃陽明病被火額上微汗出小便不利者必發黃陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出陽明病口燥但欲漱水不欲嚥者此必衂陽明病本自汗出醫更重發汗病已差尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也傷寒, SBCK: ''}
