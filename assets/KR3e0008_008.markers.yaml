  - {type: variant, offset: 13, length: 1, content: 太, SBCK: 身􅀬卧則欲踡作表􅀬裏寒也心爲藏中之}
  - {type: variant, offset: 15, length: 0, content: '', SBCK: 病則身上浮冷􅀬汗自泄欲得水自􅈅作表寒裏􅀬也二藏隂}
  - {type: variant, offset: 15, length: 0, content: '', krp: 氣不足澁則無血}
  - {type: variant, offset: 16, length: 0, content: '', SBCK: 寒􅀬}
  - {type: variant, offset: 16, length: 3, content: 明有正, krp: 氣反㣲中風汗岀而反躁煩澁則無血厥而且寒}
