  - {type: 'tls:seg', offset: 17, content: '', id: KR3e0008_CHANT_008-1a.4}
  - {type: variant, offset: 17, length: 0, content: '', SBCK: 可見焉動氣在下不可下下之則腹脹滿卒起頭眩食則下清榖心下痞也動氣在下腎之動也下之則傷脾腎氣則動腎寒乘脾故}
  - {type: page-break, offset: 17, content: '', id: KR3e0008_SBCK_008-2b}
  - {type: variant, offset: 18, length: 1, content: 正, SBCK: 腹滿頭眩下淸榖心下痞之證也咽中閉塞不可下下之則上輕下重水漿不下卧則欲踡身急痛下利日數十行咽中閉塞胃巳不和也下之則閉塞之邪爲上輕復傷胃氣爲下重至水漿不下卧則欲踡身急痛下利日數十行知虚寒也諸外實者不可下下之則􅀤㣲􅀬亡脉厥者當臍握􅀬外實者表􅀬也汗之則愈下之爲逆下後裏虚表􅀬内䧟故發㣲􅀬厥深者􅀬亦深亡脉厥者則}
  - {type: page-break, offset: 18, content: '', id: KR3e0008_SBCK_008-3a}
  - {type: variant, offset: 20, length: 0, content: '', SBCK: 氣深䧟客於下焦故當臍握􅀬諸虚者不可下下之則大渇求水者易愈惡水者劇金匱玉凾曰虚者十􅀘勿一㵼之虚家下之爲重虚内竭津液故令大渇求水者}
  - {type: variant, offset: 20, length: 0, content: '', krp: 㣲不可下下之則心下痞鞕}
  - {type: variant, offset: 21, length: 1, content: 明, SBCK: 氣未竭而猶可愈惡水者陽氣已竭則難可制脉濡而弱弱反在關濡反在巔弦反在上㣲反在下弦爲陽運㣲爲隂寒上實下虚意欲得温㣲弦爲虚虚者不可下也虚家下之是爲重虚難經曰實實虚虚損不足益}
