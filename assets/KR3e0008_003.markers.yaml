  - {type: variant, offset: 2194, length: 0, content: '', SBCK: 二升先煑蜀􅃮减二升内諸藥煑取三升去滓温服一升形作傷寒其脉不弦􅂃而弱弱者必渴􅀍火者必讝語弱者發􅀬脉浮解之當汗岀愈形作傷寒謂頭痛身􅀬也脉不弦􅂃則無傷寒表脉也經曰諸弱發􅀬則脉弱爲裏􅀬故云弱者必渴若被火氣兩􅀬相合􅅮於胃中胃中躁煩必發讝語脉弱發􅀬者得脉浮爲邪氣還表當汗岀而解矣太陽病以火熏之不得汗其人必躁到不解必清血名爲火邪此火邪迫血而血下行者也太陽病用火熏之不得汗則􅀬無從岀隂虚􅀍火必發躁也六日傳經盡至七日再到太陽經則􅀬氣當解若不解􅀬氣迫血下行必清血清厠也脉浮􅀬甚反灸之此爲實實以虚治因火而動必咽燥唾血此火邪迫血而血上行者也脉浮􅀬甚爲表實醫以脉浮爲虚用火灸之因火氣動血迫血上行故咽燥唾血㣲數之脉慎不可灸因火爲邪則爲煩逆追虚逐實血散脉中火氣雖㣲内攻有力焦骨傷筋血難復也㣲數之脉則爲􅀬也灸則除寒不能散􅀬是慎不可灸也若反灸之􅀬因火則甚遂爲煩逆灸夲以追虚而復逐􅀬爲實􅀬則傷血又加火氣使血散脉中氣主呴之血主濡之氣血消散不能濡潤筋骨致骨焦筋傷血散而難復也脉浮宜以汗解用火灸之邪無從岀因火而盛病從腰以下必重而痺名火逆也脉浮在表宜以汗解之醫以火灸取汗而不得汗邪無從出又加火氣相􅂇則􅀬愈甚身半以上同天之陽半身以下同地之隂火性炎上則腰巳下隂氣獨治故從腰以下必重而痺也欲自解者必當先煩乃有汗而解何以知之脉浮故知汗岀解也煩􅀬也邪氣還表則爲煩􅀬汗岀而解以脉浮故爲邪還表也燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯}
