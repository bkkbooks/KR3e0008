  - {type: variant, offset: 2197, length: 0, content: '', krp: 煑取二升半去滓温服八合日三服太陽傷寒者加溫針必驚也寒則傷榮榮氣㣲者加燒針則血留不行驚者温針損榮血而動心氣金匱要畧曰血氣少者屬於心太陽病當惡寒發熱今自汗岀不惡寒發熱關上脉細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此爲小逆惡寒發熱爲太陽表病自汗岀不惡寒發熱者陽明證夲太陽表病醫反吐之傷動胃氣表邪乘虚傳於陽明也以關脉細數知醫吐之所致病一二日爲表邪尚寒而未成熱吐之則表寒傳於胃中胃中虚寒故腹中飢而口不能食病三四日則表邪巳傳成熱吐之則表熱乘虚入胃胃中虚熱故不喜糜粥欲食冷食朝食暮吐也朝食暮吐者晨食入胃胃虚不能剋化即知至暮胃氣行裏與邪氣相搏則胃氣反逆而以胃氣尚在故止云小逆太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之内煩也太陽表病醫反吐之傷於胃氣邪熱乘虚入胃胃爲邪熱内煩故不惡寒不欲近衣也病人脉數數爲熱當消穀引食而反吐者此以發汗令陽氣㣲膈氣虚脉乃數也數爲客熱不能消榖以胃中虚冷故吐也陽受氣於胷中發汗外虚陽氣是令陽氣㣲膈氣虚也數爲熱夲熱則合消榖客熱則不能消榖因發汗外損陽氣致胃中虚冷故吐也太陽病過經十餘日心下溫温欲吐而胷中痛大便反溏腹㣲滿鬰鬰㣲煩先此時自極吐下者與調胃承氣湯}
  - {type: variant, offset: 2198, length: 1, content: 飲, SBCK: 不尓者不可與但欲嘔胷中痛㣲溏者此非柴胡證以嘔故知極􅄍下也心下温温欲􅄍欝欝㣲煩胷中痛當責邪􅀬客於胷中大便反溏腹㣲滿則邪􅀬巳下於胃也日數雖多若不經􅄍下止是傳邪亦未可下當與柴胡湯以除上中二焦之邪若曾􅄍下傷損胃氣胃虚則邪乘虚入胃爲實非柴胡湯所能去調胃承氣湯下胃􅀬以嘔知胃氣先曾傷動也太陽病六七日表證仍在脉㣲}
