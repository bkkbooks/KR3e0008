  - {type: variant, offset: 2174, length: 3, content: 當依證, SBCK: 可治也傷寒脉浮醫以火迫刼之亡陽必驚狂起卧不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之傷寒脉浮責邪在表醫以火刼發汗汗大岀者亡其陽汗者心之液亡陽則心氣虚心惡􅀬火邪内迫則心神浮越故驚狂起卧不安}
