  - {type: variant, offset: 2131, length: 0, content: '', SBCK: 也玉凾曰中風五六日傷寒徃來寒􅀬即是或中風或傷寒非是傷寒再中風中風復傷寒也經曰傷寒中風有柴胡證但見一證便是不必悉具者正是謂或中風或傷寒也邪在表則寒邪在裏則􅀬今邪在半表半裏之間未有定處是以寒􅀬徃來也邪在表則心腹不滿邪在裏則心腹脹滿今止言胷脇苦滿知邪氣在表裏之間未至於心腹滿言胷脇苦滿知邪氣在表裏也黙黙靜也邪在表則呻吟不安邪在裏則煩悶亂内經曰陽入之隂則靜黙黙者邪方自表之裏在表裏之間也邪在表則能食邪在裏則不能食不欲食者邪在表裏之間未至於必不能食也邪在表則不煩不嘔邪在裏則煩滿而嘔煩喜嘔者邪在表方傳裏也邪􅀄入裏未有定處則所傳不一故有或爲之證有柴胡證但見一證便是即是此或爲之證小柴胡湯方柴胡半斤味苦㣲寒黄芩三兩味苦寒人參三兩味􅅴温􅅴草三兩味􅅴平半夏半升洗味辛温生薑三兩切味辛温大􅀥十三枚擘味甘温内經曰􅀬滛于内以苦發之柴胡黄芩之苦以發傳邪之􅀬裏不足者以􅅴緩之人參􅅴草之􅅴以緩中和之氣邪半入裏則裏氣逆辛以散之半夏以除煩嘔邪半在表則榮衞争之辛􅅴解之薑􅀥以和榮衞右㭍味以水一斗二升煑取六升去滓再煎取三升温服一升日三服後加减法若􅅐中煩而不嘔去半夏人參加括蔞實一枚􅅐中煩而不嘔􅀬聚而氣不逆也􅅴者令人中滿方􅀬聚無用人參之補辛散逆氣旣不嘔無用半夏之辛温􅀬宜寒療聚宜苦括蔞實苦寒以泄胷中藴􅀬若渴者去半夏加人參合前成肆兩半括蔞根肆兩半夏燥津液非渴者所宜人參􅅴而潤括蔞根苦而凉徹􅀬生津二物爲當若腹中痛者去黄苓加芍藥三兩去黄苓惡寒中加芍藥以通壅若脇下痞鞕去大􅀥加牡蠣肆兩􅅴令人中滿痞者去大􅀥之􅅴醎以䎡之痞鞕者加牡蠣之醎若心下悸小便不利者去黄苓加茯苓肆兩飲而水畜不行爲悸小便不利内經曰腎欲堅急食苦以堅腎則水益堅故去黄芩淡味滲泄爲陽茯苓􅅴淡以泄伏水若不渴外有㣲􅀬者去人參加桂三兩温覆取㣲汗愈不渴者裏和也故去人參外有㣲􅀬表未解也加桂以發汗若欬者去人參大􅀥生薑加五味子半升乾薑二兩欬者氣逆也􅅴則壅氣故去人參大􅀥内經曰肺欲収急食酸以􅀵之五味子之酸以収逆氣肺寒則欬散以辛􅀬故易生薑以乾薑之􅀬也血弱氣盡腠理開邪氣因入與正氣相􅅮結於脇下正邪分爭往來寒􅀬休作有時黙黙不欲飲食藏府相連其痛必下邪高痛下故使嘔也小柴胡湯主之人之氣血隨時盛衰當月郭空之時則爲血弱氣盡腠理開踈之時也邪氣乘虚傷人則深鍼經曰月郭空則海水東盛人血氣虚衞氣去形獨居肌肉减皮膚緩腠理開毛髪殘瞧理薄垢落當是時遇賊風則其入深者是矣邪因正虚自表之裏而結於脇下與正分爭作往來寒􅀬黙黙不欲飲食下爲自外之内經絡與藏府相連氣隨經必傳於裏故曰其痛下痛一作病邪在上焦爲邪高邪漸傳裏爲痛下裏氣與邪氣相􅅮逆而上行故使嘔也與小柴胡湯以解半表半裏之邪服柴胡湯巳渴者屬陽明也以法治之服小柴胡湯表邪巳}
