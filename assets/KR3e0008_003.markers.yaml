  - {type: variant, offset: 1749, length: 0, content: '', krp: 發汗虚故如此發汗多亡陽胷中陽氣不足者病人手义自冒心師見外證知陽氣不足也又試令欬而不即欬者耳聾也知陽氣虚明矣耳聾者陽氣虚精氣不得上通於耳故也發汗後飲水多必喘以水灌之亦喘喘肺疾飲水多喘者飮冷傷肺也以冷水灌洗而喘者形寒傷肺也發汗後水藥不得入口爲逆若更發汗必吐下不止發汗後水藥不得入口爲之吐逆發汗亡陽胃中虚冷也若更發汗則愈損陽氣胃氣大虚故吐下不止發汗吐下後虚煩不得眠若劇}
  - {type: variant, offset: 1751, length: 1, content: 死, SBCK: 反覆顛倒心中懊憹梔子豉湯主之發汗􅄍下後邪􅀬乘虚客於胷中謂之虚煩者􅀬也􅇩中煩􅀬鬱悶而不得發散者是也􅀬氣伏於裏者則喜睡今􅀬氣浮於上煩擾陽氣故不得眠心惡􅀬􅀬甚則必神昏是以劇者反覆顛倒而不安心中懊憹而憒悶懊憹者俗謂鶻突是也内經曰其高者因而越之與梔子豉湯以􅄍胷中之邪梔子豉湯方梔子十四枚擘味苦寒香豉四合綿褁味苦寒酸苦湧泄爲隂苦以湧􅄍寒以勝􅀬梔子豉湯相合􅄍劑宜}
  - {type: page-break, offset: 1751, content: '', id: KR3e0008_SBCK_003-23a}
  - {type: variant, offset: 1751, length: 1, content: 死, krp: 反覆顛倒心中懊憹梔子豉湯主之發汗吐下後邪熱乘虚客於胷中謂之虚煩者熱也匈中煩熱鬱悶而不得發散者是也熱氣伏於裏者則喜睡今熱氣浮於上煩擾陽氣故不得眠心惡熱熱甚則必神昏是以劇者反覆顛倒而不安心中懊憹而憒悶懊憹者俗謂鶻突是也内經曰其高者因而越之與梔子豉湯以吐胷中之邪梔子豉湯方梔子十四枚擘味苦寒香豉四合綿褁味苦寒酸苦湧泄爲隂苦以湧吐寒以勝熱梔子豉湯相合吐劑宜}
