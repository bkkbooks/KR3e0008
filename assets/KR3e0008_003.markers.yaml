  - {type: variant, offset: 2195, length: 1, content: 五, krp: 桂枝加桂湯更加桂二兩燒針發汗則損隂血而驚動心氣針處𬒳寒氣聚而成核心氣因驚而虚腎氣乘寒氣而動發爲奔豚金匱要畧曰病有奔豚從驚發得之腎氣欲上乘心故其氣從少腹上衝心也先灸核上以散其寒與桂枝加桂湯以泄奔豚之氣火逆下之因燒針煩躁者桂枝丼草龍骨牡蠣湯主之先火為逆復以下除之裏氣因虚又加燒針裏虚而爲火熱所煩故生煩躁與桂枝丼草龍骨牡蠣湯以散火邪桂枝丼草龍骨牡蠣湯方桂枝一兩丼草二兩牡蠣二兩熬龍骨二兩辛丼發散桂枝丼草之辛丼以發散經中之火邪澁可去脫龍骨牡蠣之澁以収歛浮越之正氣右爲末以水伍}
