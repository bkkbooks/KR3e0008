  - {type: variant, offset: 1753, length: 1, content: 夫, SBCK: 右二味以水四升先煑梔子得二升半内豉煑取一升半去滓分爲二服溫進一服得􅄍者止後服若少氣者梔子􅅴草豉湯主之若嘔者梔子生薑豉湯主之少氣者􅀬傷氣也加􅅴草以益氣嘔者􅀬煩而氣逆也加生薑以散氣少氣則氣爲􅀬􅅮散而不収者􅅴以補之可也嘔則氣爲􅀬􅅮逆而不散者辛以散之可也發汗若下之而煩􅀬胷中窒者梔子豉湯主之陽受氣於胷中發汗若下使陽氣不足邪􅀬客於胷中結而不散故煩􅀬而胷中窒塞與梔子豉湯以􅄍胷中之邪傷寒五六日大下之後身􅀬不去心中結痛者未欲解也梔子豉湯主之傷寒五六日邪氣在裏之時若大下後身􅀬去心胷空者爲欲解若大下後身􅀬去而心結痛者結胷也身􅀬不去心中結痛者虚煩也結􅅐爲􅀬結胷中爲實是􅀬氣巳収歛於内則外身􅀬去虚煩爲􅀬客胷中未結爲實散漫為煩是以身􅀬不去六七日爲欲解之時以􅀬爲虚煩故云未欲解也與梔子豉湯以􅄍除之傷寒下後心煩腹滿卧起不安者梔子厚朴湯主之下後但腹滿而不心煩即邪氣入裏爲裏實但心煩而不腹滿即邪氣在胷中爲虚煩旣煩且滿則邪氣壅於胷腹之間也滿則不能坐煩則不能卧故卧起不安與梔子厚朴湯􅄍煩泄滿梔子厚朴湯方梔子十四枚擘味苦寒厚朴四兩姜炙苦温枳實四枚水浸去穣炒味苦寒酸苦湧泄梔子之苦以湧虚煩厚朴枳實之苦以泄腹滿巳上三味以水三升半煑取一升半去滓分二服温進一服得􅄍者止後服傷寒醫以丸藥大下之身􅀬不去㣲煩者梔子乾薑湯主之丸藥不能除􅀬但損正氣邪氣乘虚留於胷中而未入深者則身􅀬不去而㣲煩與梔子乾薑湯􅄍煩正氣梔子乾薑湯方梔子十四枚擘味苦寒乾薑二兩味辛􅀬苦以湧之梔子之苦以􅄍煩辛以􅃳之乾薑之辛以益氣右貳味以水三升半煑取一升半去滓分二服温進一服得􅄍者止後服凡用梔子湯病人舊㣲溏者不可與服之病人舊㣲溏者裏虚而寒在下也雖煩則非藴􅀬故不可與梔子湯内經曰先泄而後生他病者治其夲必且調之後乃治其他病太陽病發汗汗岀不解其人仍發􅀬心下悸頭眩身瞤動振振欲擗地者眞武湯主之發汗不解仍發􅀬邪氣未解也心下悸頭眩身瞤動振振欲擗地者汗岀亡陽也裏虚爲悸上虚爲眩經虚爲身瞤振振摇與眞武湯主之温經復陽咽喉乾燥者不可發汗津液不足也淋家不可發汗發汗必便血膀胱裏􅀬則淋反以湯藥發汗亡津液増益客􅀬膀胱虚燥必小便血瘡家雖身疼痛不可發汗發汗則痓表虚聚􅀬則生瘡瘡家身疼如傷寒不可發汗發汗則表氣愈虚􅀬􅀔愈甚生風故變痓也衂家不可發汗汗岀必額上䧟脉急􅂃直視不能眴不得眠衂者上焦亡血也若發汗則上焦津液枯竭經絡乾澁故額上䧟脉急􅂃諸脉者皆屬於目筋脉􅂃急則牽引其目故直視不能眴眴瞬合目也鍼經曰隂氣虚則目不􅉂亡血爲隂虚是以不得眠也亡血家不可發汗發汗則寒慄而振鍼經曰奪血者無汗奪汗者無血亡血發汗則隂陽俱虚故寒慄而振摇汗家重發汗必恍愡心亂小便巳隂疼與禹餘糧丸闕汗者心之液汗家重發汗則心虚恍愡心亂奪汗則無水故小便巳隂中疼病人有寒復發汗胃中冷必􅄍蚘病人有寒則當溫散反發汗損陽氣胃中冷必􅄍蚘也夲發汗而復下之此爲逆也若先發汗治不爲逆本先下之而反汗之爲逆若先下之治不爲逆病在表者汗之爲宜下之爲逆病在裏者下之爲宜汗之為逆經曰}
