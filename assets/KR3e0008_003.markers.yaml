  - {type: variant, offset: 1399, length: 270, content: 病而治之若脈陰陽俱盛重感於寒者變為溫瘧陽脈浮滑陰脈濡弱者更遇於風變為風溫陽脈洪數陰脈實大者遇溫熱變為溫毒溫毒為病最重也陽脈濡弱陰脈弦緊者更遇溫氣變為溫疫以此冬傷於寒發為溫病脈之變證方治如說凡人有疾不時即治隱忍冀差以成痼疾小兒女子益以滋甚時氣不和便當早言尋其邪由及在腠理以時治之罕有不愈者患人忍之數日乃說邪氣入藏則難可制此為家有患備慮之要凡作湯藥不可避晨夜覺病須臾即宜便治不等早晚則易愈矣若或差遲病即傳變雖欲除治必難為力服藥正如方法縱意違師不須治之凡傷寒之病多從風寒得之始表中風寒入裏則不消矣未有溫覆而當不消散者不在證治擬欲攻之猶當先解表乃可, SBCK: 醫反}
