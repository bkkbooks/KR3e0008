  - {type: variant, offset: 1742, length: 1, content: 勝, krp: 更行桂枝湯汗岀而喘無大熱者可與麻黄杏仁丼草石膏湯主之發汗後喘當作桂枝加厚朴杏人湯汗岀則喘愈今汗岀而喘爲邪氣擁甚桂枝湯不能發散故不可更行桂枝湯汗岀而喘有大熱者内熱氣甚也無大熱者表邪必甚也與麻黄杏子丼草石膏湯以散其邪麻黄杏人丼草石膏湯方麻黄四兩去節味丼温杏人五十箇去皮尖味丼温丼草二兩炙味丼平石膏半斤碎綿褁味丼寒内經曰肝苦急急食丼以緩之風氣通於肝風邪外甚故以純丼之劑發之右四味以水七升先煑麻黄减二升去上沫内諸藥煑取二升去滓温服一升夲云黄耳柸發汗過多其人义手自冒心心下悸欲得按者桂枝丼草湯主之發汗過多亡陽也陽受氣於胷中胷中陽氣不足故病义手自冒心心下悸欲得按者與桂枝丼草湯以調不足之氣桂枝丼草湯方桂枝四兩去皮味辛熱丼草二兩炙味丼平桂枝之辛走肺而益氣丼草之丼入脾而緩中右二味以水三升煑取一升去滓蝢服發汗後其人臍下悸者欲作奔豚茯苓桂枝丼草大棗湯主之汗者心之液發汗後臍下悸者心氣虚而腎氣發動也腎之積名曰奔豚發則從少腹上至心下爲腎氣逆欲上凌心今臍下悸爲腎氣發動故云欲作奔豚與茯苓桂枝丼草大棗湯以降腎氣茯苓桂枝丼草大棗湯方茯苓半斤味丼平丼草二兩炙味丼平大棗十五枚擘味丼平桂枝四兩去皮茯苓以伐腎邪桂枝能泄奔豚丼草大棗之丼滋助脾土以平腎氣煎用丼爛水者揚之無力取不助腎氣也右四味以丼爛水一斗先煑茯苓减二升内諸藥煑取三升去滓温服一升日三服作丼爛水法取水二斗置大盆内以杓揚之水上有珠子五六千顆相逐取用之發汗後腹脹滿者厚朴生薑丼草半夏人參湯主之吐後腹張與下後腹滿皆爲實言邪氣乘虚入裏爲實發汗後外巳解也腹脹滿知非裏實由脾胃津液不足氣濇不通壅而爲滿與此湯和脾胃而降氣厚朴生薑丼草半夏人參湯方厚朴半斤去皮炙味苦温生薑半斤切味辛温半夏半斤洗味辛平人參一兩味温丼草二兩炙味丼平内經曰脾欲緩急食丼以緩之用苦泄之厚朴之苦以泄腹滿人參丼草之丼以益脾胃半夏生薑之辛以散滯氣右五味以水一斗煑取三升去滓温服一升日三服傷寒若吐若下後心下逆滿氣上衝胷起則頭眩脉沉緊發汗則動經身爲振振揺者茯苓桂枝白术丼草湯主之吐下後裏虚氣上逆者心下逆滿氣上衝胷表虚陽不足起則頭眩脉浮緊爲邪在表當發汗脉沉緊爲邪在裏則不可發汗發汗則外動經絡損傷陽氣陽氣外虚則不能主持諸脉身爲振振揺也與此湯以和經益陽茯苓桂枝白术丼草湯方茯苓四兩味丼平桂枝三兩去皮味辛熱白术二兩味苦丼温丼草二兩炙味丼平陽不足者𥙷之以丼茯苓白术生津液而益陽也裏氣逆者散之以辛桂枝丼草行陽散氣右四味以水六升煑取三升去滓分溫參服發汗病不解反惡寒者虚故也芍藥丼草附子湯主之發汗病解則不惡寒發汗病不解表實者亦不惡寒今發汗病且不解又反惡寒者榮衞俱虚也汗出則榮虚惡寒則衞虚與芍藥丼草附子湯以補榮衞芍藥丼草附子湯方芍藥三兩味酸㣲寒丼草三兩炙味丼平附子一枚炮去皮破八片味辛熱芍藥之酸収歛津液而益榮附子之辛温固陽氣而𥙷衞丼草之丼調和辛酸而安正氣巳上三味以水伍升煑取一升伍合去滓分温服疑非仲景意發汗若下之病仍不解煩躁者茯苓四逆湯主之發汗若下病宜解也若病仍不解則發汗外虚陽氣下之内虚隂氣隂陽俱虚邪獨不解故生煩躁與茯苓四逆湯以復隂陽之氣茯苓四逆湯方茯苓六兩味丼平人參一兩味丼温丼草二兩炙味丼平乾薑一兩半味辛熱附子一枚生用去皮破八片味辛熱四逆湯以𥙷陽加茯苓人參以益隂右伍味以水伍升煑取三升去滓温服七合日三服發汗後惡寒者虚故也不惡寒但熱者實也當和胃氣與調胃承氣湯汗岀而惡寒者表虚也汗岀而不惡寒但熱者裏實也經曰汗岀不惡寒者此表解裏未和與調胃承氣湯和胃氣太陽病發汗後大汗出胃中乾煩燥不得眠欲得飲水者少少與飲之令胃氣和則愈若脉浮小便不利㣲熱消渴者與五苓散主之發汗巳解胃中乾煩燥不得眠欲飲水者少少與之胃氣得潤則愈若脉浮者表未解也飲水多而小便少者謂之消渴裏熱甚實也㣲熱消渴者熱未成實上焦燥也與五苓散生津液和表裏五苓散方猪苓十八銖味丼平去皮澤㵼一兩六銖半味酸鹹茯苓十入銖味丼平桂半两去皮味辛熱白术十八銖味丼平淡者一也口入一而爲丼丼甚而反淡丼緩而淡滲猪苓白术茯苓三味之丼潤虚燥而利津液鹹味下泄爲隂澤㵼之鹹以泄伏水辛丼發散爲陽桂枝之辛丼以和肌表右伍味爲末以白飮和服方寸匕日三服多飮暖水汗岀愈發汗巳脉浮}
