  - {type: variant, offset: 2136, length: 1, content: 飲, SBCK: 嘔者柴胡湯不中與也食榖者􅎪得病六七日脉遲浮弱惡風寒手足温則邪氣在半表半裏未爲實反二三下之虚其胃氣損其津液邪藴於裏故}
  - {type: variant, offset: 2136, length: 1, content: 飲, krp: 嘔者柴胡湯不中與也食榖者􅎪得病六七日脉遲浮弱惡風寒手足温則邪氣在半表半裏未爲實反二三下之虚其胃氣損其津液邪藴於裏故}
  - {type: variant, offset: 2139, length: 0, content: '', SBCK: 食而脇下滿痛胃虚爲􅀬烝之熏發於外靣目及身悉黄也頸項強者表仍未解也小便難者内亡津液雖夲柴胡湯證然以裏虚下焦氣澁而小便難若與柴胡湯又走津液後必下重也不因飲水而嘔者柴胡湯證若夲因飲而嘔者水停心下也金匱要畧曰先渴􅁍嘔者爲水停心下此属飲家飲水者水停而嘔食榖者物聚而􅎪皆非小柴胡湯所宜二者皆柴胡湯之戒不可不識也傷寒四五日身􅀬惡風頸項強脇下滿手足溫而渴者小柴胡湯主之身􅀬惡風頸項強者表未解也脇下滿而渇者裏不和也邪在表則手足通􅀬邪在裏則手足厥寒今手足温者知邪在表裏之間也與小柴胡湯以解表裏之邪傷寒陽脉澁隂脉弦法當腹中急痛者先與小建中湯不差者與小柴胡湯主之脉陽澁隂弦而腹中急痛者當作裏有虚寒治之與小建中湯温中散寒若不差者非裏寒也必由邪氣自表之裏裏氣不利所致與小柴胡湯去黄芩加芍藥以除傳裏之邪小建中湯方桂枝三兩去皮味辛􅀬􅅴草三兩炙味􅅴平大􅀥十二枚擘味􅅴温芍藥六兩味酸㣲寒生薑三兩切味辛温膠飴一升味􅅴温建中者建脾也内經曰脾欲緩急食􅅴以緩之膠飴大􅀥􅅴草之􅅴以緩中也辛潤散也榮衞不足潤而散之桂枝生薑之辛以行榮衞酸􅀵也泄也正氣虚弱􅀵而行之芍藥之酸以􅀵正氣右六味以水七升煑取三升去滓内膠飴更上㣲火消解温服一升日三服嘔家不可用建中湯以甜故也傷寒中風有柴胡證但見一證便是不必悉具柴胡證是邪氣在表裏之間也或胷中煩而不嘔或渴或腹中痛或脇下痞鞕或心下悸小便不利或不渴身有㣲􅀬或欬但見一證便宜與柴胡湯治之不必待其證候全具也凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振却發􅀬汗岀而解邪在半表半裏之間爲柴胡證即未作裏實醫便以藥下之若柴胡證仍在者雖下之不爲逆可復與柴胡湯以和解之得湯邪氣還表者外作蒸蒸而􅀬先經下裏虚邪氣欲岀内則振振然也正氣勝陽氣生却復發􅀬汗岀而解也傷寒二三日心中悸而煩者小建中湯主之傷寒二三日邪氣在表未當傳裏之時心中悸而煩是非邪氣􅅮所致心悸者氣虚也煩者血虚也以氣血内虚與小建中湯先建其裏太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急欝欝㣲煩者爲未解也與大柴胡湯下之則愈日數過}
