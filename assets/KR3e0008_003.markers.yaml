  - {type: variant, offset: 2206, length: 4, content: 若喘若噦, SBCK: 者爲無血也小便自利者血證諦也與抵當湯以下畜血抵當湯方水蛭三十箇熬味醎苦寒蝱蟲三十箇熬去趐足味苦㣲寒桃人二十箇去皮尖味苦􅅴平大黄三兩酒浸味苦寒苦走血鹹勝血蝱蟲水蛭之鹹苦以除畜血􅅴緩結苦泄􅀬桃人大黄之苦以下結􅀬右四味爲末以水伍升煑取三升去滓温服一升不下再服太陽病身黄脉沉結少腹鞕小便不利者爲無血也小便自利其人如狂者血證諦也抵當湯主之身黄脉沉結少腹鞕小便不利者胃􅀬􅀤黄也可與茵陳湯身黄脉沉結少腹鞕小便自利其人如狂者非胃中瘀􅀬爲􅀬結下焦而爲畜血也與抵當湯以下畜血傷寒有􅀬少腹滿應小便不利今反利者爲有血也當下之}
