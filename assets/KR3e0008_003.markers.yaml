  - {type: variant, offset: 1053, length: 232, content: 而已尺寸俱沉細者太陰受病也當四五日發以其脈布胃中絡於嗌故腹滿而嗌乾尺寸俱沉者少陰受病也當五六日發以其脈貫腎絡於肺繫舌本故口燥舌乾而渴尺寸俱微緩者厥陰受病也當六七日發以其脈循陰器絡於肝故煩滿而囊縮此三經皆受病已入於府可下而已若兩感於寒者一日太陽受之即與少陰俱病則頭痛口乾煩滿而渴二日陽明受之即與太陰俱病則腹滿身熱不欲食讝語三日少陽受之即與厥陰俱病則耳聾囊縮而厥水漿不入不知人者六日死若三陰三陽五藏六府皆受病則榮衛不行府藏不通則死矣其不兩感於寒更不傳經不加異氣者至七日, SBCK: ''}
