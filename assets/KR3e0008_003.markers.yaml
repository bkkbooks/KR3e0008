  - {type: variant, offset: 1746, length: 2, content: 困篤, SBCK: 五苓散主之發汗巳脉浮數者表邪未盡也煩渴亡津液胃燥也與五苓散和表潤燥傷寒汗出而渴者五苓散主之不渴者茯苓􅅴草湯主之傷寒汗岀而渴者亡津液胃燥邪氣漸傳裏也五苓散以和表裏若汗岀不渴者邪氣不傳裏但在表而表虚也與茯苓􅅴草湯和表合衞茯苓􅅴草湯方茯苓二兩味甘平桂枝二兩去皮味辛􅀬生薑三兩切味辛温􅅴草一兩炙味􅅴平茯苓􅅴草之􅅴益津液而和衞桂枝生薑之辛􅂇陽氣而解表右四味以水四升煑取二升去滓分温三服中風發􅀬六七日不解而煩有表裏證渴欲飲水水入則吐者名曰水逆五苓散主之中風發􅀬至六七日則當解若不解煩者邪在表也渴欲飲水邪傳裏也裏􅀬甚則能消水水入則不􅄍裏􅀬少則不能消水停積不散飲而􅄍水也以其因水而􅄍故名水逆與五苓散和表裏散停飮未持脉時病人手义自冒心師因教試令欬而不欬者此必兩耳聾無聞也所以然者以}
