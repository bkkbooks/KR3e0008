  - {type: variant, offset: 2201, length: 0, content: '', SBCK: 當鞕滿小便自利者下血乃愈所以然者以太陽隨經瘀􅀬在裏故也抵當湯主之太陽經也膀胱府也此太陽隨經入府者也六七日邪氣傳裏之時脉㣲而沉邪氣在裏之脉也表證仍在者則邪氣猶淺當結於胷中若不結於胷中其人發狂者􅀬結在膀胱也經曰􅀬結膀胱其人如狂此􅀤狂則􅀬又深也少腹鞕}
