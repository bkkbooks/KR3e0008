  - {type: variant, offset: 2133, length: 1, content: 欲, SBCK: 裏邪傳於陽明也以陽明治之得病六七日脉遲浮弱惡風寒手足温醫二三下之不能食而脇下滿痛靣目及身黄頸項強小便難者與柴胡湯後必下重本渴而}
