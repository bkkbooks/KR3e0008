  - {type: variant, offset: 2197, length: 0, content: '', SBCK: 煑取二升半去滓温服八合日三服太陽傷寒者加溫針必驚也寒則傷榮榮氣㣲者加燒針則血留不行驚者温針損榮血而動心氣金匱要畧曰血氣少者屬於心太陽病當惡寒􅀤􅀬今自汗岀不惡寒發􅀬關上脉細數者以醫􅄍之過也一二日􅄍之者腹中飢口不能食三四日􅄍之者不喜糜粥欲食冷食朝食暮􅄍以醫􅄍之所致也此爲小逆惡寒􅀤􅀬爲太陽表病自汗岀不惡寒􅀤􅀬者陽明證夲太陽表病醫反􅄍之傷動胃氣表邪乘虚傳於陽明也以關脉細數知醫􅄍之所致病一二日爲表邪尚寒而未成􅀬􅄍之則表寒傳於胃中胃中虚寒故腹中飢而口不能食病三四日則表邪巳傳成􅀬􅄍之則表􅀬乘虚入胃胃中虚􅀬故不喜糜粥欲食冷食朝食暮􅄍也朝食暮􅄍者晨食入胃胃虚不能剋化即知至暮胃氣行裏與邪氣相􅅮則胃氣反逆而以胃氣尚在故止云小逆太陽病􅄍之但太陽病當惡寒今反不惡寒不欲近衣此為􅄍之内煩也太陽表病醫反􅄍之傷於胃氣邪􅀬乘虚入胃胃爲邪􅀬内煩故不惡寒不欲近衣也病人脉數數爲􅀬當消穀引食而反􅄍者此以發汗令陽氣㣲膈氣虚脉乃數也數爲客􅀬不能消榖以胃中虚冷故􅄍也陽受氣於胷中􅀤汗外虚陽氣是令陽氣㣲膈氣虚也數爲􅀬夲􅀬則合消榖客􅀬則不能消榖因發汗外損陽氣致胃中虚冷故􅄍也太陽病過經十餘日心下溫温欲􅄍而胷中痛大便反溏腹㣲滿鬰鬰㣲煩先此時自極􅄍下者與調胃承氣湯}
