  - {type: variant, offset: 1736, length: 0, content: '', krp: 桂枝證者邪在表也而反下之虚其膓胃爲熱所乘遂利不止邪在表則見陽脉邪在裏則見隂脉下利脉㣲遲邪在裏也促爲陽盛雖下利而脉促者知表未解也病有汗出而喘者爲自汗出而喘也即邪氣外甚所致喘而汗出者爲因喘而汗出也即裏熱氣逆所致與葛根黄芩黄連湯散表邪除裏熱葛根黄芩黄連湯方葛根半斤丼草二兩炙味丼平黄芩二兩味苦寒黄連三兩味苦寒内經曰丼發散爲陽表未解者散以葛根丼草之丼苦以堅裏氣弱者堅以黄芩黄連之苦右四味以水八升先煑葛根减二升内諸藥煑取二升去滓分温再服太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黄湯主之此太陽傷寒也寒則傷榮頭痛身疼腰痛以至牽連骨節疼痛者太陽經榮血不利也内經曰風寒客於人使人毫毛畢直皮膚閉而爲熱者寒在表也風并於衞衞實而榮虚者自汗出而惡風寒也寒并於榮榮實而衞虚者無汗而惡風也以榮強衞弱故氣逆而喘與麻黄湯以發其汗麻黄湯方麻黄三兩味甘温去節桂枝二兩去皮味辛熱丼草一兩炙味丼平杏仁七十箇湯去皮尖味辛温内經曰寒滛於内治以丼熱佐以苦辛麻黄丼草開肌發汗桂枝杏人散寒下氣右四味以水九升先煑麻黄减二升去上沫内諸藥煑取二升半去滓温服八合覆取㣲似汗不須啜粥餘如桂枝法將息太陽與陽明合病喘而匈滿者不可下宜麻黄湯主之陽受氣於胸中喘而匈滿者陽氣不宜發壅而逆也心下滿腹滿皆為實當下之此以為匈滿非裏實故不可下雖有陽明然與太陽合病爲属表是與麻黄湯發汗太陽病十日以去脉浮細而嗜卧者外巳解也設匈滿脇痛者與小柴胡湯脉但浮者與麻黄湯十日以去向解之時也脉浮細而嗜卧者表邪巳罷也病雖巳和解之若脉但浮而不細者則邪氣但在表也與麻黄湯發散之太陽中風脉浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脉㣲弱汗出惡風者不可服服之則厥逆筋惕肉瞤此爲逆也此中風見寒脉也浮則爲風風則傷衞緊則爲寒寒則傷榮榮衞俱病故發熱惡寒身疼痛也風并於衞者爲榮弱衞強寒并於榮者爲榮強衞弱今風寒兩傷則榮衞俱實故不汗出而煩躁也與大青龍湯發汗以除榮衞風寒若脉㣲弱汗出惡風者爲榮衞俱虚反服青龍湯則必亡陽或生厥逆筋惕肉瞤此治之逆也大青龍湯方麻黄六兩去節味丼温桂枝二兩去皮味辛熱丼草二兩炙味丼平杏人四十箇去皮尖味苦丼温生薑三兩切味辛温大棗十二枚擘味丼温石膏如鷄子大碎味丼㣲寒辛丼均爲發散然風宜辛散寒宜丼發辛丼相合乃能發散榮衞之風寒麻黄丼草石膏杏人以發散榮中之寒桂枝薑棗以解除衞中之風右七味以水九升先煑麻黄减二升去上沫内諸藥煑取三升去滓温服一升取㣲似汗汗岀多者温粉撲之一服汗者停後服汗多亡陽遂虚惡風煩躁不得眠也傷寒脉浮緩身不疼但重乍有輕時無少隂證者大青龍湯發之此傷寒見風脉也傷寒者身疼此以風勝故身不疼中風者身重此以兼風故乍有輕時不發厥吐利無少隂裏證者爲風寒外甚也與大青龍湯以發散表中風寒傷寒表不解心下有水氣乾嘔發熱而欬或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之傷寒表不解心下有水飲則水寒相搏肺寒氣逆故乾嘔發熱而欬鍼經曰形寒飲冷則傷肺以其兩寒相感中外皆傷故氣逆而上行此之謂也與小青龍湯發汗散水水氣内漬則所傳不一故有或爲之證隨證增損以解化之小青龍湯方麻黄三兩去節味丼温芍藥三兩味酸㣲寒五味子半升味酸温乾薑三兩味辛熱丼草三兩炙味丼平桂枝三兩去皮味辛熱半夏半升湯洗味辛㣲温細辛三兩味辛溫寒邪在表非丼辛不能散之麻黄桂枝丼草之辛丼以發散表邪水停心下而不行則腎氣燥内經曰腎苦燥急食辛以潤之乾薑細辛半夏之辛以行水氣而潤腎欬逆而喘則肺氣逆内經曰肺欲收急食酸以收之芍藥五味子之酸以收逆氣而安肺右八味以水一斗先煑麻黄减二升去上沫内諸藥煑取三升去滓溫服一升加减法若㣲利者去麻黄加蕘花如鷄子大熬令赤色下利者不可攻其表汗岀必脹滿麻黄發其陽水漬入胃必作利蕘花下十二水水去利則止若渴者去半夏加括蔞根三兩辛燥而苦潤半夏辛而燥津液非渴者所冝故去之括蔞味苦而生津液故加之若噎者去麻黄加附子一枚炮經曰水得寒氣冷必相搏其人即䭇加附子温散水寒病人有寒復發汗胃中冷必吐蚘去麻黄惡發汗若小便不利少腹滿去麻黄加茯苓四兩水畜下焦不行為小便不利少腹滿麻黄發津液於外非所冝也茯苓泄畜水於下加所當也若喘者去麻黄加杏人半升去皮尖金匱要畧曰其人形腫故不内麻黄内杏子以麻黄發其陽故也喘呼形腫水氣摽夲之疾傷寒心下有水氣欬而㣲喘發熱不渴服湯巳渴者此寒去欲解也小青龍湯主之欬而㣲喘者水寒射肺也發熱不渴者表證未罷也與小青龍湯發表散水服湯巳渴者裏氣温水氣散爲欲解也太陽病外證未解脉浮弱者當以汗解宜桂枝湯脉浮弱者榮弱衞強也太陽病下之㣲喘者表未解故也桂枝加厚朴杏人湯主之下後大喘則爲裏氣太虚邪氣傳裏正氣將脫也下後㣲喘則爲裏氣上逆邪不能傳裏猶在表也與桂枝湯以解外加厚朴杏人以下逆氣太陽病外證未解者不可下也下之爲逆欲解外者宜桂枝湯主之經曰本發汗而復下之爲逆也若先發汗治不爲逆太陽病先發汗不解而復下之脉浮者不愈浮爲在外而反下之故令不愈今脉浮故知在外當須解外則愈宜桂枝湯主之經曰柴胡湯證具而以他藥下之柴胡湯證仍在者復與柴胡湯此雖巳下之不爲逆則其類矣太陽病脉浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥巳㣲除其人發煩目瞑劇者必衂衂乃解所以然者陽氣重故也麻黄湯主之脉浮緊無汗發熱身疼痛太陽傷寒也雖至八九日而表證仍在亦當發其汗旣服温暖發散湯藥雖未作大汗亦㣲除也煩者身熱也邪氣不爲汗解欝而變熱蒸於經絡發於肌表故生熱煩肝受血而能視始者氣傷榮寒旣變熱則血爲熱搏肝氣不治故目瞑也劇者熱甚於經迫血妄行而爲衂得衂則熱隨血散而解陽氣重者熱氣重也與麻黄湯以解前太陽傷寒之邪也太陽病脉浮緊發熱身無汗自衂者愈風寒在經不得汗解欎而變熱衂則熱隨血散故云自衂者愈二陽併病太陽𥘉得病時發其汗汗先岀不徹因轉屬陽明續自㣲汗岀不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設靣色縁縁正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗岀不徹故也更發汗則愈何以知汗岀不徹以脉濇故知也太陽病未解傳併入陽明而太陽證未罷者名曰併病續自㣲汗岀不惡寒者爲太陽證罷陽明證具也法當下之若太陽證未罷者爲表未解則不可下當小發其汗先解表也陽明之經循靣色縁縁正赤者陽氣怫欝在表也當解之熏之以取其汗若發汗不徹者不足言陽氣怫欝止是當汗不汗陽氣不得越散邪無從岀擁甚於經故燥煩也邪循經行則痛無常處或在腹中或在四肢按之不可得而短氣但責以汗岀不徹更發汗則愈内經曰諸過者切之濇者陽氣有餘爲身熱無汗是以脉濇知陽氣擁欝而汗岀不徹脉浮數者法當汗岀而愈若下之身重心悸者不可發汗當自汗岀乃解所以然者尺中脉㣲此裏虚須表裏實津液自和便自汗岀愈經曰諸脉浮數當發熱而灑淅惡寒言邪氣在表也是當汗岀愈若下之身重心悸者損其津液虚其胃氣若身重心悸而尺脉實者則下後裏虚邪氣乘虚傳裏也今尺脉㣲身重心悸者知下後裏虚津液不足邪氣不傳裏但在表也然以津液不足則不可發汗須裏氣實津液足便自汗岀而愈脉浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之然以榮氣不足血少故也鍼經曰奪血者無汗尺脉遲者爲榮血不足故不可發汗脉浮者病在表可發汗宜麻黄湯浮爲輕手得之以候皮膚之氣内經曰其在皮者汗而發之脉浮而數者可發汗宜麻黄湯浮則傷衞數則傷榮榮衞受邪爲病在表故當汗散病常自汗岀者此爲榮氣和榮氣和者外不諧以衞氣不共榮氣和諧故爾以榮行脉中衞行脉外復發其汗榮衞和則愈宜桂枝湯風則傷衞寒則傷榮衞受風邪而榮不病者爲榮氣和也衞旣客邪則不能與榮氣和諧亦不能衞護皮腠是以常自汗岀與桂枝湯解散風邪調和榮衞則愈病人藏無他病時發熱自汗岀而不愈者此衞氣不和也先其時發汗則愈宜桂枝湯主之藏無他病裏和也衞氣不和表病也外臺云裏和表病汗之則愈所謂先其時者先其發熱汗岀之時發汗則愈傷寒脉浮緊不發汗因致衂者麻黄湯主之傷寒脉浮緊邪在表也當與麻黄湯發汗若不發汗則邪無從岀擁甚於經迫血妄行因致衂也傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裏仍在表也當須發汗若頭痛者必衂宜桂枝湯不大便六七日頭痛有熱者故宜當下若小便清者知裏無熱則不可下經曰小便數者大便必鞕不更衣十日無所苦也况此不大便六七日小便清者不可責邪在裏是仍在表也與桂枝湯以解外若頭疼不巳爲表不罷欝甚於經迫血妄行上爲衂也傷寒發汗解半日許復煩脉浮數者可更發汗宜桂枝湯主之煩者熱也發汗身凉爲巳解至半日許身復熱脉浮數者邪不盡也可更發汗與桂枝湯凡病若發汗若吐若下若亡津液隂陽自和者必自愈重亡津液則不能作汗必待隂陽自和乃自愈矣大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈因亡津液而小便不利者不可以藥利之俟津液足小便利必自愈也下之後復發汗必振寒脉㣲細所以然者以内外俱虚故也發汗則表虚而亡陽下之則裏虚而亡血振寒者陽氣㣲也脉㣲細者隂血弱也下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脉沉㣲身無大熱者乾薑附子湯主之下之虚其裏汗之虚其表旣下又汗則表裏俱虚陽王於晝陽欲復虚不勝邪正邪交爭故晝日}
  - {type: variant, offset: 1738, length: 2, content: 諸變, SBCK: 不得眠夜隂王陽虚不能與之爭是夜則安靜不嘔不渇者裏無􅀬也身無大􅀬者表無􅀬也又無表證而脉沉㣲知陽氣大虚隂寒氣勝與乾薑附子湯退隂復陽乾薑附子湯方乾薑一兩味辛􅀬附子一枚生用去皮破八片味辛􅀬内經曰寒滛所勝平以辛􅀬虚寒大甚是以辛􅀬劑勝之也右二味以水三升煑取一升去滓頓服發汗後身疼痛脉沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之汗後身疼痛邪氣未盡也脉沉遲榮血不足也經曰其脉沉者榮氣㣲也又曰遲者榮氣不足血少故也與桂枝湯以解未盡之邪加芍藥生薑人參以益不足之血發汗後}
