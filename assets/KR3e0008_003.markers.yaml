  - {type: variant, offset: 550, length: 502, content: 但治有殊耳十五日得一氣於四時之中一時有六氣四六名為二十四氣也然氣候亦有應至而不至或有未應至而至者或有至而太過者皆成病氣也但天地動靜陰陽鼓擊者各正一氣耳是以彼春之暖為夏之暑彼秋之忿為冬之怒是故冬至之後一陽爻升一陰爻降也夏至之後一陽氣下一陰氣上也斯則冬夏二至陰陽合也春秋二分陰陽離也陰陽交易人變病焉此君子春夏養陽秋冬養陰順天地之剛柔也小人觸冒必嬰暴疹須知毒烈之氣留在何經而發何病詳而取之是以春傷於風夏必飱泄夏傷於暑秋必病瘧秋傷於濕冬必咳嗽冬傷於寒春必病溫此必然之道可不審明之傷寒之病逐日淺深以施方治今世人傷寒或始不早治或治不對病或日數久淹困乃告醫醫人又不依次第而治之則不中病皆宜臨時消息制方無不效也今搜採仲景舊論錄其證候診脈聲色對病真方有神驗者擬防世急也又土地溫涼高下不同物性剛柔飡居亦異是黃帝興四方之問岐伯舉四治之能以訓後賢開其未悟者臨病之工宜須兩審也凡傷於寒則為病熱熱雖甚不死若兩感於寒而病者必死尺寸俱浮者太陽受病也當一二日發以其脈上連風府故頭項痛腰脊強尺寸俱長者陽明受病也當二三日發以其脈俠鼻絡於目故身熱目疼鼻乾不得臥尺寸俱弦者少陽受病也當三四日發以其脈循脅絡於耳故胸脅痛而耳聾此三經皆受病未入於府者可, SBCK: ''}
