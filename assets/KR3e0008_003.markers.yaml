  - {type: variant, offset: 1746, length: 2, content: 困篤, krp: 五苓散主之發汗巳脉浮數者表邪未盡也煩渴亡津液胃燥也與五苓散和表潤燥傷寒汗出而渴者五苓散主之不渴者茯苓丼草湯主之傷寒汗岀而渴者亡津液胃燥邪氣漸傳裏也五苓散以和表裏若汗岀不渴者邪氣不傳裏但在表而表虚也與茯苓丼草湯和表合衞茯苓丼草湯方茯苓二兩味甘平桂枝二兩去皮味辛熱生薑三兩切味辛温丼草一兩炙味丼平茯苓丼草之丼益津液而和衞桂枝生薑之辛助陽氣而解表右四味以水四升煑取二升去滓分温三服中風發熱六七日不解而煩有表裏證渴欲飲水水入則吐者名曰水逆五苓散主之中風發熱至六七日則當解若不解煩者邪在表也渴欲飲水邪傳裏也裏熱甚則能消水水入則不吐裏熱少則不能消水停積不散飲而吐水也以其因水而吐故名水逆與五苓散和表裏散停飮未持脉時病人手义自冒心師因教試令欬而不欬者此必兩耳聾無聞也所以然者以}
  - {type: punctuation, offset: 1748, content: ，, id: KR3e0008_CHANT_003-bkkpn349}
  - {type: 'tls:seg', offset: 1748, content: '', id: KR3e0008_CHANT_003-18a.27}
  - {type: variant, offset: 1749, length: 0, content: '', SBCK: 發汗虚故如此發汗多亡陽胷中陽氣不足者病人手义自冒心師見外證知陽氣不足也又試令欬而不即欬者耳聾也知陽氣虚明矣耳聾者陽氣虚精氣不得上通於耳故也發汗後飲水多必喘以水灌之亦喘喘肺疾飲水多喘者飮冷傷肺也以冷水灌洗而喘者形寒傷肺也發汗後水藥不得入口爲逆若更發汗必􅄍下不止發汗後水藥不得入口爲之􅄍逆發汗亡陽胃中虚冷也若更發汗則愈損陽氣胃氣大虚故􅄍下不止發汗􅄍下後虚煩不得眠若劇}
