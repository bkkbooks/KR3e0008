  - {type: variant, offset: 2139, length: 0, content: '', krp: 食而脇下滿痛胃虚爲熱烝之熏發於外靣目及身悉黄也頸項強者表仍未解也小便難者内亡津液雖夲柴胡湯證然以裏虚下焦氣澁而小便難若與柴胡湯又走津液後必下重也不因飲水而嘔者柴胡湯證若夲因飲而嘔者水停心下也金匱要畧曰先渴却嘔者爲水停心下此属飲家飲水者水停而嘔食榖者物聚而􅎪皆非小柴胡湯所宜二者皆柴胡湯之戒不可不識也傷寒四五日身熱惡風頸項強脇下滿手足溫而渴者小柴胡湯主之身熱惡風頸項強者表未解也脇下滿而渇者裏不和也邪在表則手足通熱邪在裏則手足厥寒今手足温者知邪在表裏之間也與小柴胡湯以解表裏之邪傷寒陽脉澁隂脉弦法當腹中急痛者先與小建中湯不差者與小柴胡湯主之脉陽澁隂弦而腹中急痛者當作裏有虚寒治之與小建中湯温中散寒若不差者非裏寒也必由邪氣自表之裏裏氣不利所致與小柴胡湯去黄芩加芍藥以除傳裏之邪小建中湯方桂枝三兩去皮味辛熱丼草三兩炙味丼平大棗十二枚擘味丼温芍藥六兩味酸㣲寒生薑三兩切味辛温膠飴一升味丼温建中者建脾也内經曰脾欲緩急食丼以緩之膠飴大棗丼草之丼以緩中也辛潤散也榮衞不足潤而散之桂枝生薑之辛以行榮衞酸收也泄也正氣虚弱收而行之芍藥之酸以收正氣右六味以水七升煑取三升去滓内膠飴更上㣲火消解温服一升日三服嘔家不可用建中湯以甜故也傷寒中風有柴胡證但見一證便是不必悉具柴胡證是邪氣在表裏之間也或胷中煩而不嘔或渴或腹中痛或脇下痞鞕或心下悸小便不利或不渴身有㣲熱或欬但見一證便宜與柴胡湯治之不必待其證候全具也凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振却發熱汗岀而解邪在半表半裏之間爲柴胡證即未作裏實醫便以藥下之若柴胡證仍在者雖下之不爲逆可復與柴胡湯以和解之得湯邪氣還表者外作蒸蒸而熱先經下裏虚邪氣欲岀内則振振然也正氣勝陽氣生却復發熱汗岀而解也傷寒二三日心中悸而煩者小建中湯主之傷寒二三日邪氣在表未當傳裏之時心中悸而煩是非邪氣搏所致心悸者氣虚也煩者血虚也以氣血内虚與小建中湯先建其裏太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急欝欝㣲煩者爲未解也與大柴胡湯下之則愈日數過}
  - {type: punctuation, offset: 2140, content: ，, id: KR3e0008_CHANT_003-bkkpn429}
  - {type: 'tls:seg', offset: 2140, content: '', id: KR3e0008_CHANT_003-22a.6}
  - {type: variant, offset: 2140, length: 0, content: '', SBCK: 累經攻下而柴胡證}
  - {type: variant, offset: 2140, length: 0, content: '', krp: 累經攻下而柴胡證}
  - {type: variant, offset: 2141, length: 0, content: '', SBCK: 罷者亦須先與小柴胡湯以解其表經曰凡柴胡湯疾證而下之若柴胡證不罷者復與柴胡者是也嘔止者表裏和也若嘔不止鬱鬱㣲煩者裏􅀬巳甚結於胃中也與大柴胡湯下其裏􅀬則愈大柴胡湯方柴胡半斤味􅅴平黄芩三兩味苦寒芍藥三兩味酸㣲寒半夏半升洗味辛温生薑五兩切味辛温枳實四枚炙味苦寒大􅀥十二枚擘􅅴溫大黄二兩味苦寒柴胡黄芩之苦入心而折􅀬枳實芍藥之酸苦湧泄而扶隂辛者散也半夏之辛以散逆氣辛􅅴和也薑􅀥之辛􅅴以和榮衞右七味以水一斗二升煑取六升去滓再煎温服一升日三服一方用大黄二兩若不加大黄恐不爲大柴胡湯也傷寒十三日不解胷脇滿而嘔日晡所發潮􅀬巳而㣲利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮􅀬者實也先宜小柴胡湯以解外後以柴胡加芒消湯主之傷寒十三日再傳經盡}
  - {type: page-break, offset: 2141, content: '', id: KR3e0008_SBCK_003-36b}
  - {type: page-break, offset: 2141, content: '', id: KR3e0008_SBCK_003-37a}
  - {type: variant, offset: 2141, length: 0, content: '', krp: 罷者亦須先與小柴胡湯以解其表經曰凡柴胡湯疾證而下之若柴胡證不罷者復與柴胡者是也嘔止者表裏和也若嘔不止鬱鬱㣲煩者裏熱巳甚結於胃中也與大柴胡湯下其裏熱則愈大柴胡湯方柴胡半斤味丼平黄芩三兩味苦寒芍藥三兩味酸㣲寒半夏半升洗味辛温生薑五兩切味辛温枳實四枚炙味苦寒大棗十二枚擘丼溫大黄二兩味苦寒柴胡黄芩之苦入心而折熱枳實芍藥之酸苦湧泄而扶隂辛者散也半夏之辛以散逆氣辛丼和也薑棗之辛丼以和榮衞右七味以水一斗二升煑取六升去滓再煎温服一升日三服一方用大黄二兩若不加大黄恐不爲大柴胡湯也傷寒十三日不解胷脇滿而嘔日晡所發潮熱巳而㣲利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒消湯主之傷寒十三日再傳經盡}
  - {type: variant, offset: 2142, length: 0, content: '', SBCK: 解之時也若不解胷脇滿而嘔者邪氣猶在表裏之間此爲柴胡湯證若以柴胡湯下之則更無潮􅀬自利醫反以丸藥下之虚其膓胃邪氣乘虚入府日晡所􅀤潮􅀬􅀬巳而利也潮􅀬雖爲􅀬實然胷脇之邪未巳故先}
  - {type: page-break, offset: 2142, content: '', id: KR3e0008_SBCK_003-37b}
  - {type: variant, offset: 2142, length: 0, content: '', krp: 解之時也若不解胷脇滿而嘔者邪氣猶在表裏之間此爲柴胡湯證若以柴胡湯下之則更無潮熱自利醫反以丸藥下之虚其膓胃邪氣乘虚入府日晡所發潮熱熱巳而利也潮熱雖爲熱實然胷脇之邪未巳故先}
  - {type: variant, offset: 2143, length: 2, content: 也何, SBCK: 小柴胡湯以解外後以柴胡加芒消以下胃􅀬傷寒十三日不解過經讝語}
  - {type: variant, offset: 2143, length: 2, content: 也何, krp: 小柴胡湯以解外後以柴胡加芒消以下胃熱傷寒十三日不解過經讝語}
  - {type: punctuation, offset: 2144, content: 。, id: KR3e0008_CHANT_003-bkkpn430}
  - {type: 'tls:seg', offset: 2144, content: '', id: KR3e0008_CHANT_003-22a.7}
  - {type: punctuation, offset: 2146, content: ？, id: KR3e0008_CHANT_003-bkkpn431}
  - {type: 'tls:seg', offset: 2146, content: '', id: KR3e0008_CHANT_003-22a.8}
  - {type: variant, offset: 2147, length: 0, content: '', SBCK: 有􅀬也當以湯下之若小便利者大便當鞕而反下利脉調和者知醫以丸藥下之非其治也若自下利者脉當㣲厥今反和者此爲内實也調胃承氣湯主之傷寒十三日再傳經盡謂之過經讝語者陽明胃􅀬也當以諸承氣湯下之若小便利者津液偏滲大便當鞕反下利者知醫以丸藥下之也下利脉㣲而厥者虚寒也今脉調和則非虚寒由膓虚胃􅀬恊􅀬而利也與調胃承氣湯以下胃􅀬太陽病不解􅀬結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解巳但少}
  - {type: page-break, offset: 2147, content: '', id: KR3e0008_SBCK_003-38a}
  - {type: variant, offset: 2147, length: 0, content: '', krp: 有熱也當以湯下之若小便利者大便當鞕而反下利脉調和者知醫以丸藥下之非其治也若自下利者脉當㣲厥今反和者此爲内實也調胃承氣湯主之傷寒十三日再傳經盡謂之過經讝語者陽明胃熱也當以諸承氣湯下之若小便利者津液偏滲大便當鞕反下利者知醫以丸藥下之也下利脉㣲而厥者虚寒也今脉調和則非虚寒由膓虚胃熱恊熱而利也與調胃承氣湯以下胃熱太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解巳但少}
  - {type: variant, offset: 2148, length: 0, content: '', SBCK: 急結者乃可攻之宜桃核承氣湯方太陽膀胱經也太陽經邪􅀬不解隨經入府爲􅀬結膀胱其人如狂者爲未至於狂但不寜尔經曰其人如狂者以􅀬在下焦太陽多􅀬􅀬在膀胱必與血相􅅮若血不爲畜爲􅀬迫之則血自下血下則􅀬隨血岀而愈若血不下者則血爲􅀬􅅮畜積於下而少腹急結乃可攻之與桃核承氣湯下􅀬散血内經曰從外之内而盛於内者先治其外後調其内此之謂也桃核承氣湯方桃人五十箇去皮尖味􅅴平桂枝二兩去皮味辛􅀬大黄四兩芒硝二兩􅅴草二兩炙􅅴以緩之辛以散之少腹急結緩以桃人之􅅴下焦畜血散以桂枝辛􅀬之氣寒以取之􅀬甚􅅮血故加二物於調胃承氣湯}
  - {type: page-break, offset: 2148, content: '', id: KR3e0008_SBCK_003-38b}
  - {type: page-break, offset: 2148, content: '', id: KR3e0008_SBCK_003-39a}
  - {type: variant, offset: 2148, length: 0, content: '', krp: 急結者乃可攻之宜桃核承氣湯方太陽膀胱經也太陽經邪熱不解隨經入府爲熱結膀胱其人如狂者爲未至於狂但不寜尔經曰其人如狂者以熱在下焦太陽多熱熱在膀胱必與血相搏若血不爲畜爲熱迫之則血自下血下則熱隨血岀而愈若血不下者則血爲熱搏畜積於下而少腹急結乃可攻之與桃核承氣湯下熱散血内經曰從外之内而盛於内者先治其外後調其内此之謂也桃核承氣湯方桃人五十箇去皮尖味丼平桂枝二兩去皮味辛熱大黄四兩芒硝二兩丼草二兩炙丼以緩之辛以散之少腹急結緩以桃人之丼下焦畜血散以桂枝辛熱之氣寒以取之熱甚搏血故加二物於調胃承氣湯}
  - {type: variant, offset: 2149, length: 3, content: 熱尚少, SBCK: 也右伍味以水七升煑取二升半去滓内芒硝更上火㣲沸下火先食温服伍合日三服當㣲利傷寒八九日下之胷滿煩驚小便}
  - {type: variant, offset: 2149, length: 0, content: '', krp: 也右伍味以水七升煑取二升半去滓内芒硝更上火㣲沸下火先食温服伍合日三服當㣲利傷寒八九日下之胷滿煩驚小便不利讝語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之傷寒八九日邪氣巳成}
  - {type: variant, offset: 2150, length: 2, content: 尚少, krp: 而復傳陽經之時下之虚其裏而熱}
  - {type: punctuation, offset: 2152, content: ，, id: KR3e0008_CHANT_003-bkkpn432}
  - {type: 'tls:seg', offset: 2152, content: '', id: KR3e0008_CHANT_003-22a.9}
  - {type: variant, offset: 2153, length: 2, content: 能消, SBCK: 利讝語一身盡重不可轉側者柴胡加龍骨牡蠣湯主}
  - {type: variant, offset: 2153, length: 2, content: 能消, krp: 除胷滿而煩者陽熱客於胷中也驚者心惡熱而神不守也小便不利者裏虚津液不行也讝語者胃熱也一身盡重不可轉側者陽氣内行於裏不營於表也與柴胡湯以除胷滿而煩加龍骨牡蠣鈆丹収歛神氣而鎮驚加茯苓以行津液利小便加大黄以逐胃熱止讝語加桂枝以行陽氣而解身重錯雜}
  - {type: punctuation, offset: 2156, content: ，, id: KR3e0008_CHANT_003-bkkpn433}
  - {type: 'tls:seg', offset: 2156, content: '', id: KR3e0008_CHANT_003-22a.10}
  - {type: variant, offset: 2156, length: 0, content: '', SBCK: 傷寒八九日邪氣巳成􅀬而復傳陽經之時下之虚其裏而􅀬不除胷滿而煩者陽􅀬客於胷中也驚者心惡􅀬而神不守也小}
  - {type: variant, offset: 2156, length: 0, content: '', krp: 邪斯悉愈矣柴胡加龍骨牡蠣湯方半夏二合洗大棗六枚柴胡四兩生薑一兩半人參一兩半龍骨一兩半鈆丹一兩半桂枝一兩半去皮茯苓一兩半大黄二兩牡蠣一兩半煆右十一味以水八升煑取四升内大黄切如碁子更煑一二沸去滓温服一升傷寒腹滿讝語寸口脉浮而緊此肝乘脾也名曰縱刺期門腹滿讝語者脾胃疾也浮而緊者肝脉也脾病見肝脉木行乘土也經曰水行乘火木行乘土名曰縱此其類矣期門者肝之募刺之以㵼肝經盛氣傷寒發熱嗇嗇惡寒大渇欲飮水其腹必滿自汗岀小}
  - {type: variant, offset: 2157, length: 0, content: '', SBCK: 不利者裏虚津液不行也讝語者胃􅀬也一身盡重不可轉側者陽氣内行於裏不營於表也與柴胡湯以除胷滿而煩加龍骨牡蠣鈆丹収歛神氣而鎮驚加茯苓以行津液利小便加大黄以逐胃􅀬止讝語加桂枝以行陽氣而解身重錯雜之邪斯悉愈矣柴胡加龍骨牡蠣湯方半夏二合洗大􅀥六枚柴胡四兩生薑一兩半人參一兩半龍骨一兩半鈆丹一兩半桂枝一兩半去皮茯苓一兩半大黄二兩牡蠣一兩半煆右十一味以水八升煑取四升内大黄切如碁子}
  - {type: page-break, offset: 2157, content: '', id: KR3e0008_SBCK_003-39b}
  - {type: page-break, offset: 2157, content: '', id: KR3e0008_SBCK_003-40a}
  - {type: variant, offset: 2157, length: 4, content: 更與人作, krp: 利其病欲解此肝乘肺也名曰横刺期門傷寒發熱嗇嗇惡寒肺}
  - {type: variant, offset: 2158, length: 3, content: 與人作, SBCK: 煑一二沸去滓温服一升傷寒腹滿讝語寸口脉浮而􅂃此肝乘脾也名曰縱刺期門腹滿讝語者脾胃疾也浮而􅂃者肝脉也脾病見肝脉木行乘土也經曰水行乘火木行乘土名曰縱此其􅁼矣期門者肝之募刺之以㵼肝經盛氣傷寒􅀤􅀬嗇嗇惡寒大渇欲飮水其腹必滿自汗岀小便利其病欲解此肝乘肺也名曰横刺期門傷寒發􅀬嗇嗇惡寒肺}
  - {type: punctuation, offset: 2163, content: 。, id: KR3e0008_CHANT_003-bkkpn434}
