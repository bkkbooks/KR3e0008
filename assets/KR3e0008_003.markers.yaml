  - {type: variant, offset: 2173, length: 0, content: '', SBCK: 愈若不愈而腹滿者此肝行乘肺水不得行也經曰木行乘金名横刺期門以㵼肝之盛氣肝肺氣平水散而津液得通外作自汗岀内爲小便利而解也太陽病二日反躁反熨其背而大汗岀大􅀬入胃胃中水竭躁煩必􅀤讝語十餘日振慄自下利者此爲欲解也故其汗從腰巳下不得汗欲小便不得反嘔欲失溲足下惡風大便鞕小便當數而反不數及多大便巳頭卓然而痛其人足心必􅀬榖氣下流故也太陽病二日則邪在表不當發躁而反躁者􅀬氣行於裏也反熨其背而發汗大汗岀則胃中乾燥火􅀬入胃胃中燥􅀬躁煩而讝語至十餘日振慄自下利者火邪􅀔㣲隂氣復生津液得復也故爲欲解火邪去大汗岀則愈若從腰以下不得汗則津液不得下通故欲小便不得􅀬氣上逆而反嘔也欲失溲足下惡風者氣不得通於下而虚也津液偏滲令大便鞕者小便當數經曰小便數者大便必鞕也此以火􅀬内燥津液不得下通故小便不數及不多也若火􅀬消津液和則結鞕之便得􅃳因自大便也便巳頭卓然而痛者先大便鞕則陽氣不得下通旣得大便則陽氣降下頭中陽虚故卓然而痛穀氣者陽氣也先陽氣不通於下之時足下惡風今陽氣得下故足心􅀬也太陽病中風以火刼發汗邪風被火􅀬血氣流溢失其常度兩陽相熏灼其身􅀤黄陽盛則欲衂隂虚則小便難隂陽俱虚竭身體則枯燥但頭汗岀劑頸而還腹滿㣲喘口乾咽爛或不大便乆則讝語甚者至􅎪手足躁擾捻衣摸􅇃小便利者其人可治風為陽邪因火􅀬之氣則邪風愈甚迫於血氣使血氣流溢失其常度風與火氣謂之兩陽兩陽相熏灼􅀬發於外必發身黄若􅀬􅅮於經絡爲陽盛外􅀬迫血上行必衂􅀬􅅮於内者爲隂虚内􅀬必小便難若􅀬消血氣血氣少爲隂陽俱虚血氣虚少不能榮於身體為之枯燥三陽經絡至頸三隂至胷中而還但頭汗岀劑頸而還者􅀬氣炎上􅅮陽而不􅅮於隂也内經曰諸脹腹大皆屬於􅀬腹滿㣲喘者􅀬氣内欝也内經曰火氣内發上爲口乾咽爛者火􅀬上熏也􅀬氣上而不下者則大便不鞕若􅀬氣下入胃消耗津液則大便鞕故云或不大便乆則胃中躁􅀬必􅀤讝語内經曰病深者其聲􅎪火氣大甚正氣逆亂則􅎪内經曰四肢者諸陽之夲也陽盛則四肢實火􅀬大甚故手足躁擾捻衣摸牀擾亂也小便利者爲火未劇津液未竭而}
