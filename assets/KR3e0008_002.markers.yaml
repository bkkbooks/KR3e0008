  - {type: variant, offset: 389, length: 1, content: 脈, krp: 脉反沉細旣不愈則太陽中風重感於濕而爲痓也金匱要畧曰太陽病其證備身體強几几然脉}
  - {type: punctuation, offset: 393, content: ，, id: KR3e0008_CHANT_002-bkkpn99}
  - {type: 'tls:seg', offset: 393, content: '', id: KR3e0008_CHANT_002-2a.20}
  - {type: variant, offset: 393, length: 0, content: '', SBCK: 此爲痓括蔞桂枝湯主之太陽病發汗太多因致痓太陽病發汗太多則亡陽内經曰陽氣者精則養神柔則養筋陽㣲不能養筋則筋脉緊急而成痓也病身􅀬足寒頸項強急惡寒時頭􅀬靣赤目脉赤獨頭靣揺卒口噤背反張者痓病也太陽中風爲純中風也太陽傷寒爲純傷寒也皆不作痓惟是太陽中風重感寒濕乃變爲痓也身􅀬足寒者寒濕傷下也時頭􅀬靣赤目脉赤風傷於上也頭摇者風主動也獨頭揺者頭爲諸陽之㑹風傷陽也若純傷風者身亦爲之動摇手足爲之搐搦此皆内挾寒濕}
  - {type: page-break, offset: 393, content: '', id: KR3e0008_SBCK_002-24a}
  - {type: page-break, offset: 393, content: '', id: KR3e0008_SBCK_002-24b}
  - {type: variant, offset: 393, length: 0, content: '', krp: 此爲痓括蔞桂枝湯主之太陽病發汗太多因致痓太陽病發汗太多則亡陽内經曰陽氣者精則養神柔則養筋陽㣲不能養筋則筋脉緊急而成痓也病身熱足寒頸項強急惡寒時頭熱靣赤目脉赤獨頭靣揺卒口噤背反張者痓病也太陽中風爲純中風也太陽傷寒爲純傷寒也皆不作痓惟是太陽中風重感寒濕乃變爲痓也身熱足寒者寒濕傷下也時頭熱靣赤目脉赤風傷於上也頭摇者風主動也獨頭揺者頭爲諸陽之㑹風傷陽也若純傷風者身亦爲之動摇手足爲之搐搦此皆内挾寒濕}
  - {type: variant, offset: 394, length: 0, content: '', SBCK: 頭摇也口噤者寒主急也卒口噤者不常噤也有時而緩若風寒相􅅮則口噤而不時開此皆加之風濕故卒口噤也足太陽之脉起於目内眥上額交巔上其支别者從巔入絡腦還岀别下項循肩膞内夾脊抵腰中下貫臀以下至足風寒客於經中則筋脉拘急故頸項強急而背反張也太陽病關節疼痛而煩脉沉而細者此名濕痺之􅀱其人小便不利大便反快但當利其小便金匱要畧曰霧傷皮腠濕流關節疼痛而煩者濕氣内流也濕同水也脉沉而細者水性趣下也痺痛也因其關節煩疼而名曰濕痺非脚氣之痺也内經曰濕勝則濡泄小便不利大便反快者濕氣内勝也但當利其小便以宜泄腹中濕氣古云治濕之病不利小便非其治也濕家之爲病一身盡疼發􅀬身色如似熏黃身黃如橘子色者陽明瘀􅀬也此身色如似熏黃即非陽明瘀􅀬身黃發􅀬者梔子蘗皮湯主之爲表裏有􅀬則身不疼痛此一身盡疼非傷寒客􅀬也}
  - {type: page-break, offset: 394, content: '', id: KR3e0008_SBCK_002-25a}
  - {type: variant, offset: 394, length: 0, content: '', krp: 頭摇也口噤者寒主急也卒口噤者不常噤也有時而緩若風寒相搏則口噤而不時開此皆加之風濕故卒口噤也足太陽之脉起於目内眥上額交巔上其支别者從巔入絡腦還岀别下項循肩膞内夾脊抵腰中下貫臀以下至足風寒客於經中則筋脉拘急故頸項強急而背反張也太陽病關節疼痛而煩脉沉而細者此名濕痺之候其人小便不利大便反快但當利其小便金匱要畧曰霧傷皮腠濕流關節疼痛而煩者濕氣内流也濕同水也脉沉而細者水性趣下也痺痛也因其關節煩疼而名曰濕痺非脚氣之痺也内經曰濕勝則濡泄小便不利大便反快者濕氣内勝也但當利其小便以宜泄腹中濕氣古云治濕之病不利小便非其治也濕家之爲病一身盡疼發熱身色如似熏黃身黃如橘子色者陽明瘀熱也此身色如似熏黃即非陽明瘀熱身黃發熱者梔子蘗皮湯主之爲表裏有熱則身不疼痛此一身盡疼非傷寒客熱也}
  - {type: variant, offset: 395, length: 0, content: '', SBCK: 濕邪在經而使之脾惡濕濕傷則脾病而色見是以身發黃者爲其黃如煙熏非正黃色也濕家其人但頭汗岀背強欲得􅀍覆向火若下之早則􅎪􅇩滿小便不利舌上如胎者以丹田有􅀬􅇩中有寒渴欲得水而不能飲則口燥煩也濕家有風濕有寒濕此寒濕相􅅮者也濕勝則多汗傷寒則無汗寒濕相􅅮雖有汗而不能周身故但頭汗出也背陽也腹隂也太陽之脉夾脊抵腰太陽客寒濕表氣不利而背強也裏有邪者外不惡寒表有邪者則惡寒欲得􅀍覆向火者寒濕在表而惡寒也若下之早則傷動胃氣損其津液故致􅎪而􅇩滿小便不利下後裏虚上焦陽氣因虚而䧟於下焦爲丹田有􅀬表中寒乘而入於􅇩中爲􅇩上有寒使舌上生白胎滑也藏燥則欲飲水以􅇩上客寒濕故不能飲而但口燥煩也濕家下之額上汗岀㣲喘小便利者死若下利不止者亦死濕家發汗則愈金匱要畧曰濕家身煩疼可與麻黃加术四兩發其汗爲冝若妄下則大逆額上汗岀而㣲喘者乃陽氣上逆也小便自利或下利者隂氣下流也隂陽相離故云死矣内經曰隂陽離缺精氣乃絶問曰風濕相􅅮一身盡疼痛法當汗出而解值天隂雨不止醫云此可發汗汗之病不愈者何也荅曰發其汗汗大岀者但風氣去濕氣在是故不}
