  - {type: variant, offset: 646, length: 192, content: 雖爾今復欲下利問曰人病恐怖者其脈何狀師曰脈形如循絲纍纍然其面白脫色也問曰人不飲其脈何類師曰其脈自濇脣口乾燥也問曰人愧者其脈何類師曰脈浮而面色乍白乍赤問曰經說脈有三菽六菽重者何謂也師曰脈者人以指按之如三菽之重者肺氣也如六菽之重者心氣也如九菽之重者脾氣也如十二菽之重者肝氣也按之至骨者腎氣也假令下利寸口關上尺中悉不見脈然尺中時一小見脈再舉頭者腎氣也若見損脈來至為難治問曰脈有相乘有縱有橫有, SBCK: 嘔}
