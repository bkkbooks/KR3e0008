  - {type: variant, offset: 2375, length: 3, content: 乘臟師, SBCK: 病可愈陽旦桂枝湯别名也前證脉浮自汗岀小便數心煩㣲惡寒脚攣急與桂枝湯證相似是證􅁚陽旦也與桂枝湯而増劇得寸口脉浮大浮爲風邪大爲血虚即於桂枝湯加附子温經以􅀘虚増桂令汗出以祛風其有治之之逆而増厥者與􅅴草乾薑湯陽復而足温更與芍藥􅅴草湯隂和而脛伸表邪巳解隂陽巳復而有陽明内結讝語煩亂少與調胃承氣湯㣲溏泄以和其胃則隂陽之氣皆和内外之邪悉去故知病可愈釋音清凉上七正反疫音􅃥忿孚吻切疹之忍切癮疹也飱泄上音孫下音薛􅇟音信痎音皆瘧也䪼頞上音拙面骨也下音遏鼻也逮音代及也砭悲廉切石針也􅌊如劣切中病上音衆之長音掌嗌音益咽也沓徒合切俱見音現嚏丁計切瘳音抽病愈也痼音固迄許訖切至也狹懵上戸甲切下莫孔切殞羽粉功晬祖對切周􅀊也痏羽􅁤切􅈾於陵切􅇩也䯞音偶又音虞肩前也痓充至切惡也一}
