  - {type: variant, offset: 1798, length: 0, content: '', SBCK: 也經曰脉盛身寒得之傷寒脉隂陽俱緊者知其傷寒也傷寒一日太陽受之脉若靜者爲不傳頗欲􅄍若燥煩脉數急者爲傳也太陽主表一日則太陽受邪至二日當傳陽明若脉氣㣲而不傳陽明胃經受邪則喜􅄍寒邪傳裏者則變􅀬如頗欲􅄍若煩燥脉急數者爲太陽寒邪變􅀬傳於陽明也傷寒二三日陽明少陽證不見者爲不傳也傷寒二三日無陽明少陽證知邪不傳止在太陽經中也太陽病發􅀬而渴不惡寒者爲温病發􅀬而渴不惡寒者陽明也此太陽受邪知爲温病非傷寒也積温成􅀬所以發􅀬而渴不惡寒也若發汗巳身灼􅀬者名曰風温風温爲病脉隂陽俱浮自汗岀身重多眠睡息必鼾語言難岀若被下者小便不利直視失溲若􅀍火者㣲發黃色劇則如驚癎時瘈瘲若火熏之一逆尚引日再逆促命期傷寒發汗巳則身凉若發汗巳身灼􅀬者非傷寒爲風温也風傷於上而陽受風氣風與温相合則傷衞脉隂陽俱浮自汗岀者衞受邪也衞者氣也風則傷衞温則傷氣身重多眠睡者衞受風温而氣昏也鼻息必鼾語言難岀者風温外甚而氣擁不利也若􅀍下者則傷藏氣太陽膀胱經也内經曰膀胱不利爲癃不約爲遺溺癃者小便不利也太陽之脉起目内眥内經曰瞳子高者太陽不足戴眼者太陽巳絶小便不利直視失溲爲下後竭津液損藏氣風温外勝經曰欲絶也爲難治若被火者則火􅂇風温成􅀬㣲者􅀬瘀而發黃劇者􅀬甚生風如驚癎而時瘈瘲也先曽􅀍火爲一逆若更以火熏之是再逆也一逆尚猶延引時日而不愈其再逆者必致危殆故云促命期病有發􅀬惡寒者發於陽也無􅀬惡寒者發於隂也發於陽者七日愈發於隂者六日愈以陽數七隂數六故也陽爲􅀬也隂爲寒也發􅀬而惡寒寒傷陽也無􅀬而惡寒寒傷隂也陽法火隂法水火成數七水成數六陽病七日愈者火數足也隂病六日愈者水數足也太陽病頭痛至七日巳上自愈者以行其經盡故也若欲作再經者鍼足陽明使經不傳則愈傷寒自一日至六日傳三陽三隂經盡至七日當愈經曰七日太陽病衰頭痛少愈若七日不愈則太陽之邪再傳陽明鍼足陽明爲迎而奪之使經不傳則愈太陽病欲解時從巳至未上巳爲正陽則陽氣得以復也始於太陽終於厥隂六經各以三時爲解而太陽從巳至未陽明從申至戌少陽從寅至辰至於太隂從亥至丑少隂從子至寅厥隂從丑至卯者以陽行也速隂行也緩陽主於晝隂主於夜陽三經解時從寅至戌以陽道常饒也隂三經解時從亥至卯以隂道常乏也内經曰陽中之太陽通於夏氣則巳午未太陽乘王也風家表解而不了了者十二日愈中風家發汗解後未全快暢者十二日大邪皆去六經悉和則愈病人身大􅀬反欲得近衣者􅀬在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚􅀬在骨髓也皮膚言淺骨髓言深皮膚言外骨髓言内身􅀬欲得衣者表􅀬裏寒也身寒不欲衣者表寒裏􅀬也太陽中風陽浮而隂弱陽浮者􅀬自發隂弱者汗自出嗇嗇惡寒淅淅惡風翕翕發􅀬鼻鳴乾嘔者桂枝湯主之陽以􅀱衞隂以候}
