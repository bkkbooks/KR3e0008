  - {type: variant, offset: 7, length: 1, content: 脈, SBCK: 風寒客於人使人毫毛畢直皮膚閉而爲􅀬是傷寒爲病􅀬也鍼經曰多􅀬者易巳多寒者難巳是􅀬雖甚不死若兩感於寒而病者必死表裏俱病者謂之兩感尺寸俱浮者太陽受病也當一二日發以其脉上連風府故頭項痛腰脊強太陽爲三陽之長其氣浮於外故尺寸俱浮是邪氣初入皮膚外在表也當一二日發風府穴名也項中央太陽之脉從巔入絡腦還出別下項是以上連風府其經循肩膞内俠脊抵腰中故病頭項痛腰脊強尺寸俱長者陽明受病也當二三日發以其脉俠鼻絡於目故身􅀬目疼鼻乾不得卧陽明血氣俱多尺寸俱長者邪併陽明而血氣淖溢也太陽受邪不巳傳於陽明是當二三日發其脉俠鼻者陽明脉起於鼻交頸中絡於目陽明之脉正上䪼頞還岀繋目系身􅀬者陽明主身之肌肉鍼經曰陽明氣盛則身以前皆􅀬目疼鼻乾者經中客邪也不得卧者胃氣逆不得從其道也内經曰胃不和則卧不安尺寸俱弦者少陽受病也當三四日發以其脉循脇絡於耳故胷脇痛而耳聾内經曰陽中之少陽通於春氣春脉弦尺寸俱弦者知少陽受邪也二三日陽明之邪不巳傳於少陽是當三四日發胷脇痛而耳聾者經壅而不利也此三經皆受病未入於府者可汗而巳三陽受邪爲病在表法當汗解然三陽亦有便入府者入府則宜下故云未入於府者可汗而巳尺寸俱沉細者太隂受病也當四五日發以其脉布胃中絡於嗌故腹滿而嗌乾陽極則隂受之邪傳三陽旣遍次乃傳於隂經在陽爲在表在隂爲在裏邪在表則見陽脉邪在裏則見隂脉陽邪傳隂邪氣内䧟故太隂受病而脉尺寸俱沉細也自三陽傳於太隂是當四五日發也邪入於隂則漸成􅀬腹滿而嗌乾者脾經壅而成􅀬也尺寸俱沉者少隂受病也當五六日發以其脉貫腎絡於肺繋舌本故口燥舌乾而渴少隂腎水也性趣下少隂受病脉尺寸俱沉也四五日太隂之邪不巳至五六日則傳於少隂也是少隂病當五六日發人傷於寒則爲病􅀬謂始爲寒而終成􅀬也少隂爲病口燥舌乾而渴邪傳入裏􅀬氣漸深也尺寸俱㣲緩者厥隂受病也當六七日發以其脉循隂噐絡於肝故煩滿而囊縮緩者風脉也厥隂脉㣲緩者邪傳厥隂􅀬氣巳劇近於風也當六七日發以少隂邪傳於厥隂煩滿而囊縮者􅀬氣聚於内也此三經皆受病巳入於府可下而巳三隂受邪爲病在裏於法當下然三隂亦有在經者在經則冝汗故云巳入於府者可下而巳經曰臨病之工宜須兩審若兩感於寒者一日太陽受之即與少隂俱病則頭痛口乾煩滿而渴二日陽明受之即與太隂俱病則腹滿身􅀬不欲食讝語三日少陽受之即與厥隂俱病則耳聾囊縮而厥水漿不入不知人者六日死若三隂三陽五藏六府皆受病則榮衞不行府藏不通則死矣隂陽俱病表裏俱傷者爲兩感以其隂陽兩感病則兩證俱見至於傳經則亦隂陽兩經俱傳也始得一日頭痛者太陽口乾煩滿而渴者少隂至二日則太陽傳於陽明而少隂亦傳於太隂身􅀬讝語者陽明腹滿不欲食者太隂至三日陽明傳於少陽而太隂又傳於厥隂耳聾者少陽囊縮而厥者厥隂水漿不入不知人者胃氣不通也内經曰五藏巳傷六府不通榮衞不行如是之後三日乃死何也􅄮伯曰陽明者十二經脉之長也其血氣盛故云不知人三日其氣乃盡故死矣謂三日六經俱病榮衞之氣不得行於内外府藏之氣不得通於上下至六日府藏之氣俱盡榮衞之氣俱絶則死矣其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈也八日陽明病衰身􅀬少歇也九日少陽病衰耳聾㣲聞也十日太隂病衰腹减如故則思飲食十一日少隂病衰渴止舌乾巳而嚏也十二日厥隂病衰囊縱少腹㣲下大氣皆去病人精神爽慧也六日傳遍三隂三陽之氣皆和大邪之氣皆去病人精神爽慧也若過十三日以上不間尺寸䧟者大危間者瘳也十二日傳經盡則當瘳愈若過十三日巳上不瘳尺寸之脉沉䧟者即正氣内衰邪氣獨勝故云大危若更感異氣變爲他病者當依舊壞證病而治之若脉隂陽俱盛重感於寒者變爲温􅒻異氣者爲先病未巳又感别異之氣也兩邪相合變爲他病脉隂陽俱盛者傷寒之脉也難經曰傷寒之脉隂陽俱盛而􅂃濇經曰脉盛身寒得之傷寒則爲前病􅀬未巳再感於寒寒􅀬相􅅮變爲温􅒻陽脉浮滑隂脉濡弱者更遇於風變爲風溫此前􅀬未歇又感於風者也難經曰中風之脉陽浮而滑隂濡而弱風來乘􅀬故變風温陽脉洪數隂脉實大者遇温􅀬變為温毒温毒爲病最重也此前􅀬未巳又感温􅀬者也陽主表隂主裏洪數實大皆􅀬也兩􅀬相合變爲温毒以其表裏俱􅀬故爲病最重陽脉濡弱隂脉弦􅂃者更遇温氣變爲温疫以此冬傷於寒發爲温病脉之變証方治如說此前􅀬未巳又感温氣者也温􅀬相合變爲温疫凡人有疾不時即治隱忍兾差以成痼疾凡􅁴不佳急須求治苟延時日則邪氣入深難可復制千金曰凡有少苦似不如平常即須早道若隱忍不治兾望自差須􅁷之間以成痼疾此之謂也小兒女子益以滋甚小兒氣血未全女子血室多病凡所受邪易於滋蔓時氣不和便當早言㝷其邪由及在腠理以時治之罕有不愈者腠理者津液腠泄之所文理縫㑹之中也金匱要畧曰腠者是三焦通㑹元眞之處爲血氣所注理者是皮膚藏府之文理也邪客於皮膚則邪氣浮淺易爲散發若以時治之罕有不愈者矣金匱玉函曰主候長存形色未病未入腠理針藥及時服將調節委以良醫病無不愈患人忍之數日乃說邪氣入藏則難可制此爲家有患備慮之要邪在皮膚則外属陽而易治邪傳入裏則内属隂而難治内經曰善治者治皮毛其次治肌膚其次治筋脉其次治六府其次治五藏治五藏者半死半生也昔桓侯怠於皮膚之㣲疾以至骨髓之病家有患者可不備慮凡作湯藥不可避晨夜􅁴病須􅁷即冝便治不等早晩則易愈矣千金曰凡始􅁴不佳即須治療迄至於病湯食競進折其毒􅀔自然而差若或差遲病即傳變雖欲除治必難爲力傳有常也變無常也傳為循經而傳如太陽傳陽明是也變爲不常之變如陽證變隂證是也邪旣傳變病􅀔深也夲草曰病􅀔巳成可得半愈病􅀔巳過命將難全服藥正如方法縱意違師不須治之内經曰拘於􅀑神者不可與言至德惡於針石者不可與言至巧病不許治者病必不治治之無功矣凡傷寒之病多從風寒得之凡中風與傷寒爲病自古通謂之傷寒千金曰夫傷寒病者起自風寒入於腠理與精氣分爭榮衞偏隔周身不通而病始表中風寒入裏則不消矣始自皮膚入於經絡傳於藏府是也未有温覆而當不消散者風寒初客於皮膚便􅄬湯藥温暖發散而當者則無不消散之邪不在證治擬欲攻之猶當先解表乃可下之先解表而後下之則無復傳之邪也若表巳解而内不消非大滿猶生寒􅀬則病不除表證雖罷裏不至大堅滿者亦未可下之是邪未収歛成實下之則裏虚而邪復不除猶生寒􅀬也若表巳解而内不消大滿大實堅有燥屎自可除下之雖四五日不能爲禍也外無表證裏有堅滿爲下證悉具外臺云表和裏病下之則愈下證旣具則不必拘於日數若不宜下而便攻之内虚􅀬入恊􅀬遂利煩燥諸變不可勝數輕者困篤重者必死矣下之不當病輕者證猶變易而難治又矧重者乎夫陽盛隂虚汗之則死下之則愈陽虚隂盛汗之則愈下之則死表爲陽裏爲隂隂虚者陽必湊之陽盛之邪乘其裏虚而入於府者爲陽盛隂虚也經曰尺脉弱名曰隂不足陽氣下䧟入隂中則發􅀬者是矣下之除其内􅀬而愈若反汗之則竭其津液而死隂脉不足陽往從之陽脉不足隂往乘之隂邪乘其表虚客於榮衞之中者爲陽虚隂盛也經曰假令寸口脉㣲名曰陽不足隂氣上入陽中則灑淅惡寒者是矣汗之散其表寒則愈若反下之則脫其正氣而死經曰夲發汗而復下之此爲逆也夲先下之而反汗之爲逆夫如是則神丹安可以誤發􅅴遂何可以妄攻虚盛之治相背千里吉凶之機應若影響豈容易哉神丹者發汗之藥也􅅴遂者下藥也若汗下當則吉汗下不當則凶其應如影隨形如響應聲况桂枝下咽陽盛則斃承氣入胃隂盛以亡桂枝湯者發汗藥也承氣湯者下藥也金匱玉函曰不當汗而強與汗之者令人奪其津液枯槁而死不當下而強與下之者令人開膓洞泄便溺不禁而死死生之要在乎須􅁷視身之盡不暇計日􅄬湯不當則災禍立見豈暇計其日數哉此隂陽虚實之交錯其􅀱至㣲發汗􅄍下之相反其禍至速而醫術淺狹懵然不知病源爲治乃悮使病者殞殁自謂其分至今􅁈魂塞於􅄀路死屍盈於矌野仁者鑒此豈不痛歟凡兩感病俱作治有先後發表攻裏夲自不同而執迷妄意者乃云神丹􅅴遂合而飲之且解其表又除其裏言巧似是其理實違夫智者之舉錯也常審以愼愚者之動作也必果而速安危之變豈可詭哉世上之士但務彼翕習之榮而莫見此傾危之敗惟明者居然能護其本近取諸身夫何逺之有焉兩感病俱作欲成不治之疾醫者大冝消息審其先後次第而治之若妄意攻治以求速效者必致傾危之敗凡發汗温服湯藥其方雖言日三服若病劇不解當促其間可半日中盡三服若與病相阻即便有所􅁴重病者一日一夜當晬時觀之如服一劑病證猶在故當復作本湯服之至有不肯汗岀服三劑乃解若汗不岀者死病也發汗藥須温暖服者易爲發散也日三服者藥􅀔續也病􅀔稍重當促急服之以折盛􅀬不可拘於本方設藥病不相對湯入即便知之如隂多者􅄬以凉藥即寒逆隨生陽多者飮以温劑則􅀬毒即起是便有所􅁴晬時者周時也一日一夜服湯藥盡劑更㸔其傳如病證猶在當復作夲湯以發其汗若服三劑不解汗不出者邪氣大甚湯不能勝必成大疾千金曰􅀬病脉躁盛而不得汗者此陽脉之極也死凡得時氣病至五六日而渴欲飮水飮不能多不當與也何者以腹中􅀬尚少不能消之便更與人作病也至七八日大渇欲飮水者猶當依證與之與之常令不足勿極意也言能飮一斗與五升若飲而腹滿小便不利若喘若􅎪不可與之忽然大汗出是爲自愈也􅀬在上焦則爲消渴言􅀬消津液而上焦乾燥則生渇也大􅀬則能消水􅀬少不能消之若強飮則停飲變爲諸病至七八日陽勝氣温向解之時多尚生大渴亦須少少與之以􅃳胃氣不可極意飲也若飮而腹滿小便不利若喘若􅎪者爲水飮内停而不散不可更與之忽然陽氣通水氣散先發於外作大汗而解凡得病反能飲水此爲欲愈之病其不曉病者但聞病飮水自愈小渇者乃強與飮之因成其禍不可復數小渴者爲腹中􅀬少若強與水水飲不消復爲諸飲病也凡得病厥脉動數服湯藥更遲脉浮大减小初躁後静此皆愈證也動數之脉邪在陽也湯入而變遲者陽邪愈也浮大之脉邪在表也而復减小者表邪散也病初躁亂者邪所煩也湯入而安靜者藥勝病也是皆爲愈證凡治温病可刺五十九穴五十九穴者以㵼諸經之温􅀬鍼經曰􅀬病取之諸陽五十九穴刺以㵼其􅀬而岀其汗實其隂而􅀘其不足所謂五十九刺兩手内外側各三凡十二痏五指間各一凡八痏足亦如是頭入髪際一寸旁三分各三凡六痏更入髪三寸邉五凡十痏耳前後口下各一項中一穴凡六痏巔上一􅇟㑹一髪際一廉泉一風池二天柱二又内經曰􅀬俞五十九頭上五行行五者以㵼諸陽之􅀬逆也大杼􅈾俞缺盆背俞此八者以㵼胷中之􅀬也氣衝三里巨虚上下廉此八者以㵼胃中之􅀬也雲門䯞骨委中髓空此八者以㵼四支之􅀬也五藏俞旁五此十者以㵼五藏之􅀬也凡此五十九穴者皆􅀬之左右也又身之穴三百六十有五其三十九穴灸之有害七十九穴刺之爲災并中髓也穴}
