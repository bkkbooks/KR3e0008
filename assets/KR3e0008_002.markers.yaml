  - {type: variant, offset: 1798, length: 0, content: '', krp: 也經曰脉盛身寒得之傷寒脉隂陽俱緊者知其傷寒也傷寒一日太陽受之脉若靜者爲不傳頗欲吐若燥煩脉數急者爲傳也太陽主表一日則太陽受邪至二日當傳陽明若脉氣㣲而不傳陽明胃經受邪則喜吐寒邪傳裏者則變熱如頗欲吐若煩燥脉急數者爲太陽寒邪變熱傳於陽明也傷寒二三日陽明少陽證不見者爲不傳也傷寒二三日無陽明少陽證知邪不傳止在太陽經中也太陽病發熱而渴不惡寒者爲温病發熱而渴不惡寒者陽明也此太陽受邪知爲温病非傷寒也積温成熱所以發熱而渴不惡寒也若發汗巳身灼熱者名曰風温風温爲病脉隂陽俱浮自汗岀身重多眠睡息必鼾語言難岀若被下者小便不利直視失溲若𬒳火者㣲發黃色劇則如驚癎時瘈瘲若火熏之一逆尚引日再逆促命期傷寒發汗巳則身凉若發汗巳身灼熱者非傷寒爲風温也風傷於上而陽受風氣風與温相合則傷衞脉隂陽俱浮自汗岀者衞受邪也衞者氣也風則傷衞温則傷氣身重多眠睡者衞受風温而氣昏也鼻息必鼾語言難岀者風温外甚而氣擁不利也若𬒳下者則傷藏氣太陽膀胱經也内經曰膀胱不利爲癃不約爲遺溺癃者小便不利也太陽之脉起目内眥内經曰瞳子高者太陽不足戴眼者太陽巳絶小便不利直視失溲爲下後竭津液損藏氣風温外勝經曰欲絶也爲難治若被火者則火助風温成熱㣲者熱瘀而發黃劇者熱甚生風如驚癎而時瘈瘲也先曽𬒳火爲一逆若更以火熏之是再逆也一逆尚猶延引時日而不愈其再逆者必致危殆故云促命期病有發熱惡寒者發於陽也無熱惡寒者發於隂也發於陽者七日愈發於隂者六日愈以陽數七隂數六故也陽爲熱也隂爲寒也發熱而惡寒寒傷陽也無熱而惡寒寒傷隂也陽法火隂法水火成數七水成數六陽病七日愈者火數足也隂病六日愈者水數足也太陽病頭痛至七日巳上自愈者以行其經盡故也若欲作再經者鍼足陽明使經不傳則愈傷寒自一日至六日傳三陽三隂經盡至七日當愈經曰七日太陽病衰頭痛少愈若七日不愈則太陽之邪再傳陽明鍼足陽明爲迎而奪之使經不傳則愈太陽病欲解時從巳至未上巳爲正陽則陽氣得以復也始於太陽終於厥隂六經各以三時爲解而太陽從巳至未陽明從申至戌少陽從寅至辰至於太隂從亥至丑少隂從子至寅厥隂從丑至卯者以陽行也速隂行也緩陽主於晝隂主於夜陽三經解時從寅至戌以陽道常饒也隂三經解時從亥至卯以隂道常乏也内經曰陽中之太陽通於夏氣則巳午未太陽乘王也風家表解而不了了者十二日愈中風家發汗解後未全快暢者十二日大邪皆去六經悉和則愈病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也皮膚言淺骨髓言深皮膚言外骨髓言内身熱欲得衣者表熱裏寒也身寒不欲衣者表寒裏熱也太陽中風陽浮而隂弱陽浮者熱自發隂弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之陽以候衞隂以候}
  - {type: variant, offset: 1799, length: 1, content: 為, SBCK: 陽脉浮者衞中風也隂脉弱者榮氣弱也風并於衞則衞實而榮虚故發􅀬汗自出也經曰太陽病發􅀬汗岀者此爲榮弱衞強者是也嗇嗇者不足也惡寒之貌也淅淅者灑淅也惡風之貌也衞虚則惡風榮虚則惡寒榮弱衞強惡寒復惡風者以自汗岀則皮膚緩腠理踈是亦惡風也翕翕者熇熇然而􅀬也若合羽所覆言􅀬在表也鼻鳴乾嘔者風擁而氣逆也與桂枝湯和榮衞而散風邪也桂枝湯方桂枝三兩去皮味辛􅀬芍藥三兩味苦酸㣲寒􅅴草二兩炙味􅅴平生薑三兩切味辛温大􅀥十二枚擘味􅅴温内經曰辛􅅴發散爲陽桂枝湯辛􅅴之劑也所以發散風邪内經曰風滛所勝平以辛佐以苦􅅴以􅅴緩之以酸収之是以桂枝爲主芍藥􅅴草爲佐也内經曰風滛於内以􅅴緩之以辛散之是以生薑大􅀥爲使也右伍味㕮咀以水㭍升㣲火煑取三升去滓適寒温服壹升服巳湏􅁷歠􅀬稀粥壹升餘以􅂇藥力温覆令壹時許遍身漐漐㣲似有汗者益佳不可令如水流漓病必不除若壹服汗岀病差停後服不必盡劑若不汗更服依前法又不汗後服小促􅟕其間半日許令叄服盡若病重者壹日壹夜服周時觀之服壹劑盡病證猶在者更作服若汗不岀者乃服至貳叄劑禁生冷粘滑肉麵五辛酒酪臭惡等物太陽病頭痛發􅀬汗岀惡風者桂枝湯主之頭痛者太陽也發􅀬汗岀惡風者中風也與桂枝湯解散風邪太陽病項背強几几反汗岀惡風者桂枝加葛根湯主之几几者伸頸之貌也動則伸頸摇身而行項背強者動則如之項背几几者當無汗反汗岀惡風者中風表虚也與桂枝湯以和表加麻黃葛根以祛風且麻黃主表實後葛根湯證云太陽病項背強几几無汗惡風葛根湯主之藥味正與此方同其無汗者當用麻黃今自汗岀恐不加麻黃但加􅁑根也太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之太陽病属表而反下之則虚其裏邪欲乘虚傳裏若氣上衝者裏不受邪而氣逆上與邪爭也則邪仍在表故當復與桂枝湯解外其氣不上衝者裏虚不能與邪爭邪氣巳傳裏也故不可更與桂枝湯攻表太陽病三日巳發汗若􅄍若下若温鍼仍不解者此爲壞病桂枝不中與也觀其脉證知犯何逆隨證治之太陽病三日中曽經􅀤汗􅄍下温鍼虚其正氣病仍不解者謂之壞病言爲醫所壞病也不可復與桂枝湯審觀脉證知犯何逆而治之逆者隨所逆而救之桂枝本爲解肌若其人脉浮􅂃發􅀬汗不岀者不可與也常須識此勿令誤也脉浮發􅀬汗岀惡風者中風也可與桂枝湯解肌脉浮􅂃發􅀬不汗出者傷寒也可與麻黃湯常須識此勿妄治也若酒客病不可與桂枝湯得湯則嘔以酒客不喜􅅴故也酒客内􅀬喜辛而惡􅅴桂枝湯􅅴酒客得之則中滿而嘔喘家作桂枝湯加厚朴杏子佳太陽病爲諸陽主氣風甚氣擁則生喘也與桂枝湯以散風加厚朴杏仁以降氣凡服桂枝湯􅄍者其後必􅄍膿}
