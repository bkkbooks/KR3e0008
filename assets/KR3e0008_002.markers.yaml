  - {type: variant, offset: 1823, length: 1, content: 趺, SBCK: 傳經次第則三日傳遍三}
  - {type: variant, offset: 1823, length: 1, content: 趺, krp: 傳經次第則三日傳遍三}
  - {type: variant, offset: 1825, length: 1, content: 脈, SBCK: 至四日陽去入隂不入隂者爲欲解其傳隂經第六日傳遍三隂爲傳經盡而當解其不解傳爲再經者至九日又遍三陽陽不傳隂則解如􅒻發作有時也寒多者爲病進􅀬多者爲病退經曰厥少􅀬多其病爲愈寒多􅀬少陽氣退故爲進也今雖發􅀬惡寒而􅀬多寒少爲陽氣進而邪氣少也裏不和者嘔而利今不嘔清便自調者裏和也寒􅀬間日發者邪氣深也日一發者邪氣復常也日再發者邪氣淺也日二三發者邪氣㣲也内經曰大則邪至小則平言邪甚則脉大邪少則脉㣲今日數多而脉㣲緩者是邪氣㣲緩也故云欲愈脉㣲而惡寒者表裏俱虚也陽表也隂裏也脉㣲爲裏虚惡寒爲表虚以表裏俱虚故不可更發汗更下更􅄍也隂陽俱虚則靣色青白反有􅀬色者表未解也􅀬色爲赤色也得小汗則和不得汗則得邪氣外散皮膚而爲痒也與桂枝麻黃各半湯小發其汗以除表邪太陽病初服桂枝湯反煩不解者先刺風池風府却與桂枝湯則愈煩者􅀬也服桂枝湯後當汗岀而身凉和若反煩不解者風甚而未能散也先刺風池風府以通太陽之經而泄風氣却與桂枝湯解散則愈服桂枝湯大汗岀脉洪大者與桂枝湯如前法若形如􅒻日再發者汗岀必解宜桂枝二麻黃一湯經曰如服一劑病證猶在者故當復作本湯服之服桂枝湯汗岀後脉洪大者病猶在也若形如􅒻日再發者邪氣客於榮衞之間也與桂枝二麻黃一湯解散榮衞之邪服桂枝湯大汗岀後大煩渴不解脉洪大者白虎加人參湯主之大汗岀脉洪}
