  - {type: variant, offset: 6, length: 0, content: '', krp: 𡵨伯舉四治之能以訓後賢開其未悟者臨病之工宜須兩審也東方地氣温南方地氣熱西方地氣凉北方地氣寒西北方高東南方下是土地温凉高下不同也東方安居食魚西方陵居蕐食南方濕處而嗜酸北方野處而食乳是飡居之異也東方治宜砭石西方治冝毒藥南方治宜㣲針北方治宜灸􅡒是四方醫治不同也醫之治病當審其土地所冝凡傷於寒則爲病熱熱雖甚不死内經}
