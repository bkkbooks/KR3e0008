  - {type: variant, offset: 922, length: 224, content: 也問曰脈有災怪何謂也師曰假令人病脈得太陽與形證相應因為作湯比還送湯如食頃病人乃大吐若下利腹中痛師曰我前來不見此證今乃變異是名災怪又問曰何緣作此吐利答曰或有舊時服藥今乃發作故名災怪耳問曰東方肝脈其形何似師曰肝者木也名厥陰其脈微弦濡弱而長是肝脈也肝病自得濡弱者愈也假令得純弦脈者死何以知之以其脈如弦直是肝藏傷故知死也南方心脈其形何似師曰心者火也名少陰其脈洪大而長是心脈也心病自得洪大者愈也假令脈來微去大故名反病在裏也脈來頭小本大者故名覆病在表也上微頭小, SBCK: ''}
