  - {type: variant, offset: 5, length: 0, content: '', SBCK: 漢張仲景著􅀳王叔和撰次宋成無巳註明汪濟川校正傷寒例第三隂陽大論云春氣温和夏氣暑􅀬秋氣清凉冬氣冷冽此則四時正氣之序也春夏爲陽春温夏􅀬者陽之動始於温盛於暑故也秋冬爲隂秋凉而冬寒者以隂之動始於清盛於寒故也冬時嚴寒萬􅁼深藏君子固宻則不傷於寒觸冒之者乃名傷寒耳冬三月純隂用事陽乃伏藏水冰地坼寒氣嚴凝當是之時善攝生者岀處固宻去寒就温則不傷於寒其渉寒冷觸冐霜雪爲病者謂之傷寒也其傷於四時之氣皆能爲病春風夏暑秋濕冬寒謂之四時之氣以傷寒爲毒者以其最成殺厲之氣也􅀬爲陽陽主生寒爲隂隂主殺隂寒爲病最爲肅殺毒厲之氣中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變爲温病至夏變爲暑病暑病者􅀬極重於温也内經曰先夏至日爲温病後夏至日爲暑病温暑之病夲傷於寒而得之故太醫均謂之傷寒也是以辛苦之人春夏多温􅀬病皆由冬時觸寒所致非時行之氣也凡時行者春時應暖而復大寒夏時應大􅀬而反大凉秋時應凉而反大􅀬冬時應寒而反大温此非其時而有其氣是以一􅀊之中長㓜之病多相似者此則時行之氣也四時氣􅀱不正爲病謂之時行之氣時氣所行爲病非暴厲之氣感受必同是以一􅀊之中長㓜之病多相似也夫欲􅀱知四時正氣爲病及時行疫氣之法皆當按斗暦占之四時正氣者春風夏暑秋濕冬寒是也時行者時行之氣是也温者冬時感寒至春發者是也疫者􅁀厲之氣是也占前斗建審其時􅀱之寒溫察其邪氣之輕重而治之故下文曰九月霜降節後冝漸寒向冬大寒至正月雨水節後冝解也所以謂之雨水者以冰雪解而爲雨水故也至驚蟄二月節後氣漸和暖向夏大􅀬至秋便凉冬寒春温夏􅀬秋凉爲四時之正氣也從霜降以後至春分以前凡有觸冐霜露體中寒即病者謂之傷寒也九月十月寒氣尚㣲爲病則輕十一月十二月寒冽巳嚴爲病則重正月二月寒漸將解爲病亦輕此以冬時不調適有傷寒之人即爲病也此爲四時正氣中而即病者也其冬有非節之暖者名曰冬温冬温之毒與傷寒大異冬温復有先後更相重沓亦有輕重爲治不同證如後章此爲時行之氣前云冬時應寒而反大温者是也從立春節後其中無暴大寒又不冰雪而有人壯􅀬爲病者此屬春時陽氣發於冬時伏寒變爲温病此爲温病也内經曰冬傷於寒春必病温從春分以後至秋分節前天有暴寒者皆爲時行寒疫也三月四月或有暴寒其時陽氣尚弱爲寒所折病􅀬猶輕五月六月陽氣巳盛爲寒所折病􅀬則重七月八月陽氣巳衰爲寒所折病􅀬亦㣲其病與温及暑病相似但治有殊耳此爲疫氣也是數者以明前斗暦之法占其隨時氣􅀱發病寒􅀬輕重不同耳十五日得一氣於四時之中一時有六氣四六名爲二十四氣也節氣十二中氣十二共二十四内經曰五日謂之候三􅀱謂之氣六氣謂之時四時謂之歲然氣􅀱亦有應至而不至或有未應至而至者或有至而太過者皆成病氣也疑漏或有至而不去此一句按金匱要畧曰有未至而至有至而不至有至而不去有至而太過何故也師曰冬至之後甲子夜半少陽起少隂之時陽始生天得温和以未得甲子天因温和此爲未至而至也以得甲子而天未温和此爲至而不至也以得甲子天大寒不解此爲至而不去也以得甲子而天温如盛夏五六月時此爲至而太過也内經曰至而和則平至而甚則病至而反者病至而不至者病未至而至者病即是觀之脫漏明矣但天地動静隂陽鼓撃者各正一氣耳内經曰隂陽者天地之道清陽爲天動而不息濁隂爲地静而不移天地隂陽之氣鼓擊而生春夏秋冬寒􅀬溫凉各正一氣也是以彼春之暧爲夏之暑彼秋之忿爲冬之怒春暖爲夏暑從生而至長也秋忿爲冬怒從肅而至殺也是故冬至之後一陽爻升一隂爻降也夏至之後一陽氣下一隂氣上也十月六爻皆隂坤卦爲用隂極陽來陽生於子冬至之後一陽爻升一隂爻降於卦爲復言陽氣得復也四月六爻皆陽乾卦爲用陽極隂來隂生於午夏至之後一陽氣下一隂氣上於卦爲姤言隂則遇陽也内經曰冬至四十五日陽氣㣲上隂氣㣲下夏至四十五日隂氣㣲上陽氣㣲下斯則冬夏二至隂陽合也春秋二分隂陽離也陽生於子隂生於午是隂陽相接故曰合陽退於酉隂退於卯是隂陽相背故曰離内經曰氣至之謂至氣分之謂分至則氣同分則氣異隂陽交易人變病焉天地隂陽之氣旣交錯而不正人所以變病内經曰隂陽相錯而變由生也此君子春夏養陽秋冬養隂順天地之剛柔也内經曰養生者必順於時春夏養陽以凉以寒秋冬養隂以温以􅀬所以然者從其根故也小人觸冐必嬰暴疹湏知毒烈之氣留在何經而􅀤何病詳而取之不能順四時調養觸冐寒温者必成􅁀病醫者當在意審詳而治之是以春傷於風夏必飱泄夏傷於暑秋必病瘧秋傷於濕冬必咳嗽冬傷於寒春必病温此必然之道可不審明之當春之時風氣大行春傷於風風氣通於肝肝以春適王風雖入之不能即􅀤至夏肝衰然後始動風滛末疾則當􅀤於四肢夏以陽氣外盛風不能外􅀤故攻内而爲飱泄飱泄者下利米穀不化而色黄當秋之時濕氣大行秋傷於濕濕則干於肺肺以秋適王濕雖入之不能即發至冬肺衰然後濕始動也雨滛腹疾則當發爲下利冬以陽氣内固濕氣不能下行故上逆而爲咳嗽當夏之時暑氣大行夏傷於暑夏以隂爲主内暑雖入之􅀔未能動及秋隂出而陽爲内主然後暑動傳隂而爲痎􅒻痎者二日一發􅒻者一日一發當冬之時寒氣大行冬傷於寒冬以陽爲主内寒雖入之􅀔未能動及春陽岀而隂爲内主然後寒動傳陽而爲温病是感冐四時正氣爲病必然之道傷寒之病逐日淺深以施方治内經曰未滿三日者可汗而巳其滿三日者可泄而巳今世人傷寒或始不早治或治不對病或日數乆淹困乃告醫醫人又不依次第而治之則不中病皆冝臨時消息制方無不効也今搜採仲景舊論録其證􅀱診脉聲色對病眞方有神驗者擬防世急也仲景之書逮今千年而顯用於世者王叔和之力也又􅁟地温凉高下不同物性剛柔飡居亦異是黃帝興四方之}
