  - {type: variant, offset: 1205, length: 190, content: 遲者皆愈若得數者則劇何以知之數者南方火火剋西方金法當癰腫為難治也問曰二月得毛浮脈何以處言至秋當死師曰二月之時脈當濡弱反得毛浮者故知至秋死二月肝用事肝脈屬木應濡弱反得毛浮者是肺脈也肺屬金金來剋木故知至秋死他皆倣此師曰脈肥人責浮瘦人責沉肥人當沉今反浮瘦人當浮今反沉故責之師曰寸脈下不至關為陽絕尺脈上不至關為陰絕此皆不治決死也若計其餘命死生之期期以月節剋之也師曰脈病人不病名曰行尸以無王, SBCK: 寒令}
