  - {type: variant, offset: 1802, length: 0, content: '', SBCK: 􅄍膿血謂之肺痿金匱要畧曰􅀬在上焦爲肺痿謂或從汗或從嘔􅄍重亡津液故得之太陽病發汗遂漏不止其人惡風小便難四支㣲急難以屈伸者桂枝加附子湯主之太陽病因發汗遂汗漏不止而惡風者爲陽氣不足因發汗陽氣益虚而皮腠不固也内經曰膀胱者州都之官津液藏焉氣化則岀小便難者汗岀亡津液陽氣虚弱不能施化四肢者諸陽之夲也四肢㣲急難以屈伸者亡陽而脫液也鍼經曰液脫者骨屬屈伸不利與桂枝加附子湯以温經復陽太陽病下之後脉促胷滿者桂枝去芍藥湯主之若㣲惡寒者去芍藥方中加附子湯主之脉來數時一止復來者名曰促促爲陽盛則不因下後而脉促者也此下後脉促不得爲陽盛也太陽病下之其脉促不結胷者此爲欲解此下後脉促而復胷滿則不得爲欲解由下後陽虚表邪漸入而客於胷中也與桂枝湯以散客邪通行陽氣芍藥益隂陽虚者非所冝故去之陽氣巳虚若更加之㣲惡}
  - {type: page-break, offset: 1802, content: '', id: KR3e0008_SBCK_002-37b}
  - {type: page-break, offset: 1802, content: '', id: KR3e0008_SBCK_002-38a}
