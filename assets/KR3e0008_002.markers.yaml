  - {type: variant, offset: 1830, length: 0, content: '', SBCK: 表裏有􅀬不可更與桂枝湯可與白虎加人參湯生津止渴和表散􅀬太陽病發􅀬惡寒􅀬多寒少脉㣲弱者此無陽也不可更汗宜桂枝二越婢一湯方桂枝二越婢一湯方桂枝去皮芍藥􅅴草各十八銖生薑一兩三錢切大􅀥四枚擘麻黄十八銖去節石膏二十四銖碎綿褁胃爲十二經之主脾治水榖爲卑藏若婢内經曰脾主爲胃行其津液是湯所以謂之越脾者以發越脾氣通行津液外臺方一名越脾湯即此義也右㭍味㕮咀以五升水煑麻黄一二沸去上沫内諸藥煑取二升去滓温服一升夲方}
  - {type: page-break, offset: 1830, content: '', id: KR3e0008_SBCK_002-40b}
  - {type: variant, offset: 1830, length: 0, content: '', krp: 表裏有熱不可更與桂枝湯可與白虎加人參湯生津止渴和表散熱太陽病發熱惡寒熱多寒少脉㣲弱者此無陽也不可更汗宜桂枝二越婢一湯方桂枝二越婢一湯方桂枝去皮芍藥丼草各十八銖生薑一兩三錢切大棗四枚擘麻黄十八銖去節石膏二十四銖碎綿褁胃爲十二經之主脾治水榖爲卑藏若婢内經曰脾主爲胃行其津液是湯所以謂之越脾者以發越脾氣通行津液外臺方一名越脾湯即此義也右㭍味㕮咀以五升水煑麻黄一二沸去上沫内諸藥煑取二升去滓温服一升夲方}
  - {type: variant, offset: 1831, length: 0, content: '', SBCK: 裁爲越婢湯桂枝湯合飲一升今合爲一方桂枝二越婢一服桂枝湯或下之仍頭項強痛翕翕發􅀬無汗心下滿㣲痛小便不利者桂枝湯去桂加茯苓白术湯主之頭項強痛翕翕發􅀬雖經汗下爲邪氣仍在表也心下滿㣲痛小便利者則欲成結胷今外證未罷無汗小便不利則心下滿㣲痛爲停飮也與桂枝湯以解外加茯苓白术利小便行留飲傷寒脉浮自汗岀小便數心煩㣲惡寒脚攣急反與桂枝湯欲攻其表此誤也得之便厥咽中乾煩燥􅄍逆者作􅅴草乾薑湯與之以復其陽若厥愈足温者更作芍藥􅅴草湯與之其脚}
