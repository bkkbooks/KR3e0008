  - {type: variant, offset: 397, length: 2, content: 假令, SBCK: 若治風濕者發其汗但㣲㣲似欲汗出者風濕俱去也值天隂雨不止明其濕勝也内經曰陽受風氣隂受濕氣又曰傷於風者上先受之傷於濕者下先受之風濕相􅅮則風在外而濕在内汗大岀者其氣暴暴則外邪岀而裏邪不能岀故風去而濕在汗㣲㣲而岀者其氣緩緩則内外之邪皆岀故風濕俱去也濕家}
