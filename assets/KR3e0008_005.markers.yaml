  - {type: variant, offset: 1096, length: 2, content: 麻黃, krp: 苦寒大黄二兩去皮苦寒小熱之氣凉以和之大熱之氣寒以取之茵蔯梔子之苦寒以逐胃燥宜下必以苦宜𥙷必以酸大黄之苦寒以下瘀熱右三味以水一斗先煑茵蔯减六升内二味煑取三升去滓分温三服小便當利尿如皂角汁狀色正赤一宿腹减黄從小便去也陽明證其人喜忘者必有畜血所以然者本有乆瘀血故令喜忘屎雖鞕大便反易其色必黒宜抵當湯下之内經曰血并於下亂而喜忘此下本有乆瘀血所以喜忘也津液少大便鞕以畜血在内屎雖鞕大便反易其色黒也與抵當湯以下瘀血陽明病下之心中懊憹而煩胃中有燥屎者可攻腹㣲滿𥘉頭鞕後必溏不可攻之若有燥屎者宜大承氣湯下後心中懊憹而煩者虚煩也當與梔子豉湯若胃中有燥屎者非虚煩也可與大承氣湯下之其腹㣲滿𥘉鞕後溏是無燥屎此熱不在胃而在上也故不可攻病人不大便五六日繞臍痛煩燥發作有時者此有燥屎故使不大便也不大便五六日者則大便必結爲燥屎也胃中燥實氣不得下通故繞臍痛煩燥發作有時也病人煩熱汗岀則解又如􅒻狀日晡所發熱者属陽明也脉實者宜下之脉浮虚者宜發汗下之與大承氣湯發汗宜桂枝湯雖得陽明證未可便爲裏實審㸔脉候以别内外其脉實者熱巳入府爲實可與大承氣湯下之其脉浮虚者是熱未入府猶在表也可與桂枝湯發汗則愈大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯大下之後則胃弱不能消榖至六七日不大便則宿食巳結不消故使煩熱不解而腹滿痛是知有燥屎也與大承氣湯以下除之病人小便不利大便乍難乍易時有㣲熱喘冐不能卧者有燥屎也宜大承氣湯小便利則大便鞕此以有燥屎故小便不利而大便乍難乍易胃熱者發熱喘冐無時及嗜卧也此燥屎在胃故時有㣲熱喘冐不得卧也與大承氣湯以下燥屎食榖欲嘔者属陽明也呉茱茰湯主之得湯反劇者属上焦也上焦主内胃爲之市食榖欲嘔者胃不受也與呉茱茰湯以温胃氣得湯反劇者上焦不内也以治上焦法治之呉茱茰湯方呉茱茰一升洗辛熱人參三兩丼温生薑六兩切辛温大棗}
