  - {type: variant, offset: 1307, length: 2, content: 四逆, krp: 順也負者失也互相剋賊名爲負也脉滑而數者有宿食也當下之宜大承氣湯陽明土少陽木二經合病氣不相和則必下利少陽脉不勝陽明不負是不相剋爲順也若少陽脉勝陽明脉負者是鬼賊相剋爲正氣失也脉經曰脉滑者爲病食也又曰滑數則胃氣實下利者脉當㣲厥冷脉滑數知胃有宿食與大承氣湯以下除之病人無表裏證發熱七八日雖脉浮數者可下之假令已下脉數不解合熱則消榖善飢至六七日不大便者有瘀血宜抵當湯七八日邪入府之時病人無表裏證但發熱雖脉浮數亦可與大承氣湯下之浮爲熱客於氣數爲熱客於血下之邪熱去而浮數之脉俱當解若下後數脉去而脉但浮則是榮血間熱併於衛氣間也當爲邪氣獨留心中則飢邪熱不殺榖潮熱發渴之證此下之後浮脉去而數不解則是衛氣間熱合於榮血間也熱氣合併迫血下行胃虚恊熱消榖善飢血至下焦若大便利者下血乃愈若六七日不大便則血不得行畜積於下爲瘀血與抵當湯以下去之若脉數不解而下不止必恊熱而便膿血也下後脉數不解而不大便者是熱不得泄畜血於下爲瘀血也若下後脉數不解而下利不止者爲熱得下泄迫血下行必便膿血傷寒發汗已身目爲黄所以然者以寒濕在裏不解故也以爲不可下也於寒濕中求之金匱要畧曰黄家所起從濕得之汗出熱去則不能發黄發汗已身目爲黄者風氣去濕氣在也脾惡濕濕氣内著脾色外奪者身目爲黄若瘀血在裏發黄者則可下此以寒濕在裏故不可下當從寒濕法治之傷寒七八日身黄如橘子色小便不利腹㣲滿者茵蔯蒿}
