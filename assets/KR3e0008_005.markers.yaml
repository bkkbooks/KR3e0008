  - {type: variant, offset: 1298, length: 0, content: '', SBCK: 下胃􅀬傷寒􅄍後腹脹滿者與調胃承氣湯内經曰諸脹腹大皆属於􅀬􅀬在上焦則􅄍􅄍後不解復腹脹滿者邪􅀬入胃也與調胃承氣湯下其胃􅀬太陽病􅀂􅄍}
  - {type: variant, offset: 1298, length: 0, content: '', krp: 下胃熱傷寒吐後腹脹滿者與調胃承氣湯内經曰諸脹腹大皆属於熱熱在上焦則吐吐後不解復腹脹滿者邪熱入胃也與調胃承氣湯下其胃熱太陽病}
