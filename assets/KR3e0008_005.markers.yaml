  - {type: variant, offset: 34, length: 3, content: 風脈緩, krp: 寒邪旣入府則表證已罷故不惡寒但身熱汗出而惡熱也問曰病有得之一日不發熱而惡寒}
  - {type: punctuation, offset: 35, content: ，, id: KR3e0008_CHANT_005-bkkpn9}
