  - {type: variant, offset: 296, length: 0, content: '', krp: 堅故不减厚朴枳實也巳上三味以水四升煑取一升二合去滓分温二服𥘉服湯當更衣不爾者盡飲之若更衣者勿服之陽明病潮熱大便㣲鞕者可與大承氣湯不鞕者不與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣者此但𥘉頭鞕後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則􅎪其後發熱者必大便復鞕而少也以小承氣湯和之不轉失氣者愼不可攻也潮熱者實得大便㣲鞕者便可攻之若便不鞕者則熱}
  - {type: variant, offset: 297, length: 0, content: '', SBCK: 成實雖有潮􅀬亦未可攻若不大便六七日恐有燥屎當先與小承氣湯􅄨之如有燥屎小承氣湯藥􅀔緩不能宣泄必轉氣下失若不轉失氣是胃中無燥屎但腸間少鞕爾止􅀄頭鞕後必溏攻之則虚其胃氣致腹脹滿不能食也胃中乾燥則欲飲水水入胃中虚寒相􅅮氣逆則􅎪其後􅁍􅀤􅀬者則􅀬氣乘虚還復聚於胃中胃燥得􅀬必大便復鞕而少與小承氣湯㣲利與和之故以重云不轉失氣不可攻内愼之至也夫實則讝語虚則鄭聲鄭聲重語也内經曰邪氣盛則實精氣奪則虚讝語由邪氣盛而神識昬也鄭聲由精氣奪而聲不全也讝語者言語不次也鄭聲者鄭音不正也論語云惡鄭聲之亂雅樂又曰放鄭聲逺佞人鄭聲􅁋佞人殆言鄭聲不正也今新差氣虚人聲轉者是所謂重語者也若聲重亦聲轉之直視讝語喘滿者死下利者亦死直視讝語邪勝也喘滿爲氣}
