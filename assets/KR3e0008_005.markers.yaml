  - {type: variant, offset: 1274, length: 2, content: 甘草, SBCK: 半斤酸平枳實半斤炙苦寒大黄一斤去皮苦寒厚朴一斤炙去皮苦寒杏仁一斤去皮尖熬别作脂􅅴温内經曰脾欲緩急食􅅴以緩之麻子杏仁之􅅴緩脾而潤燥津液不足以酸収之芍藥之酸以歛津液腸燥胃強以苦泄之枳實厚朴大黄之苦下燥結而泄胃強也右六味爲末煉􅁡爲丸桐子大飲服十丸日三服漸加以和爲度太陽病三日􅀤汗不解蒸蒸􅀤􅀬者属胃也調胃承氣}
