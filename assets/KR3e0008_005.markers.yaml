  - {type: variant, offset: 1261, length: 1, content: 復, SBCK: 潤胃氣但審邪氣所在以法救之如渴不止與五苓散是也脉陽㣲而汗岀少者爲自和也汗岀多者爲太過脉陽㣲者邪氣少汗岀少者爲適當故自和汗岀多者反損正氣是汗出太過也陽脉實因􅀤其汗岀多者亦爲太過太過爲陽絶於裏亡津液大便因鞕也陽脉實者表􅀬甚也因􅀤汗􅀬乘虚蒸津液外泄致汗岀太過汗出多者亡}
