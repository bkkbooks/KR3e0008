  - {type: variant, offset: 301, length: 0, content: '', krp: 虚裏實故也下之則愈冝大承氣湯胃中有燥屎則讝語以汗岀爲表未罷故云風也燥屎在胃則當下以表未和則未可下須過太陽經無表證乃可下之若下之早燥屎雖除則表邪乘虚復䧟於裏爲表虚裏實胃虚熱甚語言必亂與大承氣湯却下胃中邪熱則止傷寒四五日脉沈而喘滿沈爲在裏而反發其汗津液越岀大便爲難表虚裏實乆則讝語邪氣入内之時得脉沈而喘滿裏證其也則當下之反發其汗令津液越岀胃中乾燥大便必難乆則屎燥胃實必發讝語三陽合病腹滿身重難以轉側口不仁而靣垢讝語遺尿發汗則讝語下之則額上生汗手足逆冷若自汗岀者白虎湯主之腹滿身重難以反側口不仁讝語者陽明也鍼經曰少陽病甚則靣㣲塵此靣垢者少陽也遺尿者太陽也三者以陽明證多故岀陽明篇中三陽合病爲表裏有邪若發汗攻表則燥熱益甚必愈讝語若下之攻裏表熱乘虚内䧟必額上汗岀手足逆冷其自汗岀者三陽經熱甚也内經曰熱則腠理開榮衛通汗大泄與白虎湯以}
  - {type: variant, offset: 302, length: 0, content: '', SBCK: 内外之􅀬二陽併病太陽證罷但􅀤潮􅀬手足漐漐汗岀大便難而讝語者下之則愈冝大承氣湯本太陽病併於陽明名曰併病太陽證罷是無表證但􅀤潮􅀬是􅀬併陽明一身汗岀爲􅀬越今手足漐漐汗岀是􅀬聚於胃也必大便難而讝語經曰手足漐然而汗岀者必大便已鞕也與大承氣湯以下胃中實􅀬陽明病脉浮而􅂃咽燥口苦腹滿而喘􅀤􅀬汗岀不惡寒反惡􅀬身重若􅀤汗則燥心憒憒反讝語若加燒鍼必怵􅅥煩燥不得眠若下之則胃中空虚客氣動隔心中懊憹舌上胎者梔子豉湯主之脉浮􅀤􅀬爲邪在表咽燥口苦爲􅀬在經脉􅂃腹滿而喘汗岀不惡寒反惡􅀬身重爲邪在裏此表裏俱有邪猶當􅀟解之若􅀤汗攻表表􅀬雖除而内􅀬益甚故燥而憒憒反讝語憒憒者心亂經曰榮氣㣲者加燒鍼則血不行更􅀤􅀬而躁煩此表裏有􅀬若加燒鍼則損動隂氣故怵􅅥煩燥不得眠也若下之裏􅀬雖去則胃中空虚表中客邪之氣乘虚䧟於上焦煩動於膈使心中懊憹}
  - {type: page-break, offset: 302, content: '', id: KR3e0008_SBCK_005-18a}
  - {type: page-break, offset: 302, content: '', id: KR3e0008_SBCK_005-18b}
  - {type: variant, offset: 302, length: 0, content: '', krp: 内外之熱二陽併病太陽證罷但發潮熱手足漐漐汗岀大便難而讝語者下之則愈冝大承氣湯本太陽病併於陽明名曰併病太陽證罷是無表證但發潮熱是熱併陽明一身汗岀爲熱越今手足漐漐汗岀是熱聚於胃也必大便難而讝語經曰手足漐然而汗岀者必大便已鞕也與大承氣湯以下胃中實熱陽明病脉浮而緊咽燥口苦腹滿而喘發熱汗岀不惡寒反惡熱身重若發汗則燥心憒憒反讝語若加燒鍼必怵惕煩燥不得眠若下之則胃中空虚客氣動隔心中懊憹舌上胎者梔子豉湯主之脉浮發熱爲邪在表咽燥口苦爲熱在經脉緊腹滿而喘汗岀不惡寒反惡熱身重爲邪在裏此表裏俱有邪猶當雙解之若發汗攻表表熱雖除而内熱益甚故燥而憒憒反讝語憒憒者心亂經曰榮氣㣲者加燒鍼則血不行更發熱而躁煩此表裏有熱若加燒鍼則損動隂氣故怵惕煩燥不得眠也若下之裏熱雖去則胃中空虚表中客邪之氣乘虚䧟於上焦煩動於膈使心中懊憹}
