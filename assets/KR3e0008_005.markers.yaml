  - {type: variant, offset: 294, length: 0, content: '', krp: 申至戌上四月爲陽土旺於申酉戌向王時是爲欲解陽明病不能食攻其熱必􅎪所以然者胃中虚冷故也以其人本虚故攻其熱必􅎪不能食胃中本寒攻其熱復虚其胃虚寒相搏故令􅎪也經曰關脉弱胃氣虚有熱不可大攻之熱去則寒起此之謂也陽明病脉遲食難用飽飽則㣲煩頭眩必小便難此欲作榖疸雖下之腹滿如故所以然者脉遲故也陽明病脉遲則邪方入裏熱未爲實也食入於隂長氣於陽胃中有熱食難用飽飽則㣲煩而頭眩者榖氣與熱氣相搏也兩熱相合消摶津液必小便難利者不能發黄言熱得泄也小便不利則熱不得泄身必發黄疸黄也以其發於榖氣之熱故名榖疸熱實者下之則愈脉遲爲熱氣未實雖下之腹滿亦不减也經曰脉遲尚未可攻陽明病法多汗反無汗其身如蟲行皮中狀者此以乆虚故也胃爲津液之府氣虚津液少病則反無汗胃候身之肌肉其身如蟲行皮中者知胃氣乆虚也陽明病反無汗而小便利二三日嘔而欬手足厥者必苦頭痛若不欬不嘔手足不厥者頭不痛陽明病法多汗反無汗而小便利者陽明傷寒而寒氣内攻也至二三日嘔欬而支厥者寒邪發於外也必苦頭痛若不欬不嘔手足不厥者是寒邪但攻裏而不外發其頭亦不痛也陽明病但頭眩不惡寒故能食而欬其人必咽痛若不欬者咽不痛陽明病身不重痛但頭眩而不惡寒者陽明中風而風氣内攻也經曰陽明病若能食名中風風邪攻胃胃氣上逆則欬咽門者胃之系欬甚則咽傷故必咽痛若胃氣不逆則不欬其咽亦不痛也陽明病無汗小便不利心中懊憹者身必發黄陽明病無汗而小便不利者熱藴於内而不得越心中懊憹者熱氣欝烝欲發於外而爲黄也陽明病𬒳火額上㣲汗出小便不利者必發黄陽明病則爲内熱𬒳火則火熱相合而甚若遍身汗岀而小便利者熱得泄越不能發黄今額上㣲汗岀而小便不利則熱不得越欝烝於胃必發黄也陽明病脉浮而緊者必潮熱發作有時但浮者必盗汗岀浮爲在經緊者裏實脉浮而緊者表熱裏實也必潮熱發作有時若脉但浮而不緊者止是表熱也必盗汗出盗汗者睡而汗出也陽明病裏熱者自汗表熱者盗汗陽明病口燥但欲漱水不欲嚥者此必衂陽明之脉起於鼻絡於口陽明裏熱則渇欲飲水此口燥但欲漱水不欲嚥者是熱在經而裏無熱也陽明氣血俱多經中熱甚迫血妄行必作衂也陽明病本自汗出醫更重發汗病已差尚㣲煩不了了者此大便必鞕故也以亡津液胃中乾燥故令大便鞕當問其小便日幾行若本小便日三四行今日再行故知大便不乆出今爲小便數少以津液當還入胃中故知不乆必大便也先亡津液使大便鞕小便數少津液分别大便必自下也傷寒嘔多雖有陽明證不可攻之嘔者熱在上焦未全入府故不可下陽明病心下鞕滿者不可攻之攻之利遂不止者死利止者愈陽明病腹滿者爲邪氣入府可下之心下鞕滿則邪氣尚淺未全入府不可便下之得利止者爲邪氣去正氣安正氣安則愈若因下利不止者爲正氣脫而死陽明病靣合赤色不可攻之必發熱色黄小便不利也合通也陽明病靣色通赤者熱在經也不可下之下之虚其胃氣耗其津液經中之熱乘虚入胃必發熱色黄小便不利也陽明病不吐不下心煩者可與調胃承氣湯吐後心煩謂之内煩下後心煩謂之虚煩今陽明病不吐不下心煩則是胃有欝熱也與調胃承氣湯以下欝熱陽明病脉遲雖汗岀不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裏也手足濈然而汗岀者此大便}
  - {type: variant, offset: 295, length: 0, content: '', SBCK: 鞕也大承氣湯主之若汗多㣲􅀤􅀬惡寒者外未解也其􅀬不潮未可與承氣湯若腹大滿不通者可與小承氣湯㣲和胃氣勿令大泄下陽明病脉遲若汗岀多㣲􅀤􅀬惡寒者表未解也若脉遲雖汗出而不惡寒者表證罷也身重短氣腹滿而喘有潮􅀬者􅀬入府也四肢諸陽之本津液足爲􅀬烝之則周身汗出津液不足爲􅀬烝之其手足濈然而汗岀知大便已鞕也與大承氣湯以下胃􅀬經曰潮􅀬者實也其􅀬不潮是􅀬未成實故不可便與大承氣湯雖有腹大滿不通之急亦不可與大承氣湯與小承氣湯㣲和胃氣大承氣湯方大黄四兩苦寒酒洗厚朴半斤苦温炙去皮枳實五枚苦寒炙芒硝三合醎寒内經曰燥􅁋所勝以苦下之大黄枳實之苦以潤燥除􅀬又曰燥􅁋於内治以苦温厚朴之苦下結燥又曰􅀬􅁋所勝治以鹹寒芒硝之鹹以攻藴􅀬右四味以水一斗先煑二物取五升去滓内大黄煑取二升去滓内芒硝更上火㣲一兩沸分温再服得下餘勿服小承氣湯方大黄四兩厚朴二兩炙去皮枳實三枚大者炙大􅀬結實者與大承氣湯小􅀬㣲結者與小承氣湯以􅀬不大甚故於大承氣湯去芒硝又以結不}
