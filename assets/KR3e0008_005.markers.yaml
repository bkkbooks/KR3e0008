  - {type: variant, offset: 1264, length: 5, content: 若厥愈足溫, SBCK: 陽絶於裏腸胃乾燥大便因鞕也脉浮而芤浮爲陽芤爲隂浮芤相􅅮胃氣生􅀬其陽則絶浮芤相􅅮隂陽不諧胃氣獨治欝而生􅀬消爍津液其陽爲絶趺陽脉浮而濇浮則胃氣強澁則小便數浮澁相􅅮大便則難其脾爲約麻仁丸主之趺陽}
