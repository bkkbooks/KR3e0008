  - {type: variant, offset: 1396, length: 0, content: '', krp: 濕熱相交民多病癉癉黄也傷寒爲寒濕在表發黄爲瘀熱在裏與麻黄連軺赤小豆湯除熱散濕麻黄連軺赤小豆湯方麻黄二两丼温去節赤小豆一升丼平連軺二两連翹根也苦寒杏仁四十箇丼温去皮尖大棗十二枚丼温生梓白皮一升苦寒生薑二两辛温切丼草二两炙丼平内經曰濕上甚而熱治以丼温佐以丼平以汗爲故正此之謂也又煎用潦水者亦取其水味薄則不助濕氣巳上八味以潦水一斗先煑麻黄再沸去上沫内諸藥煑取三升分温三服半日服盡辨少陽病脉證并治第九少陽之病口苦咽乾目眩也足少陽膽經也内經曰有病口苦者名曰膽癉甲乙經曰膽者中精之府五藏取决於膽咽爲之使少陽之脉起於目銳眥少陽受邪故口苦咽乾目眩少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚少陽之脉起於目眥走於耳中其支者下胸中貫膈風傷氣風則爲熱少陽中風氣壅而熱故耳聾目赤胸滿而煩邪在少陽爲半表半裏以吐除煩吐則傷氣氣虚者悸以下除滿下則亡血血虚者驚傷寒脉弦細頭痛發熱者属少陽少陽不可發汗發汗則讝語此属胃胃和則愈胃不和則煩而悸經曰三部俱弦者少陽受病脉細者邪漸傳裏雖頭痛發熱爲表未解以邪客少陽爲半在表半在裏則不可發汗發汗亡津液胃中乾燥少陽之邪因傳入胃必發讝語當與}
