  - {type: variant, offset: 1141, length: 0, content: '', SBCK: 七合日三服陽明病汗岀多而渇者不可與猪苓湯以汗多胃中燥猪苓湯復利其小便故也鍼經曰水榖入於口輸於腸胃其液别爲五天寒衣薄則爲溺天􅀬衣厚則爲汗是汗溺}
  - {type: variant, offset: 1141, length: 13, content: 一升本方當裁為越婢湯桂枝湯, krp: 七}
  - {type: variant, offset: 1142, length: 2, content: 升本, SBCK: 液也汗多爲津液外泄胃中乾燥故不可與猪苓湯利小便也脉浮而遲表􅀬裏寒下利清榖者四逆湯主之浮爲表􅀬遲爲裏寒下利清榖者裏寒甚也與四逆湯温裏散寒若胃中虚冷不能食者飲水則􅎪􅎪者欬逆是也千金曰咳逆者􅎪逆之名胃中虚冷得水則水寒相搏胃氣逆而􅎪脉浮􅀤􅀬口乾鼻燥能食者則衂脉浮發􅀬口乾鼻燥者􅀬在經也能食者裏和也􅀬甚於經迫血爲衂胃中虚冷隂勝也水入於經其血乃成飲水者􅂇隂氣逆爲􅎪􅀤􅀬口乾陽勝也食入於隂長氣於陽能食者􅂇陽血妄爲衂三者偏隂偏陽之疾也陽明病下之其外有􅀬手足温不結􅅐心中懊憹飢不能食但頭汗岀者梔子豉湯主之表未罷而下者應邪􅀬内䧟也􅀬内䧟者則外􅀬而無手足寒今外有􅀬而手足温者􅀬雖内䧟然而不深故不作結􅅐也心中懊憹飢不能食者􅀬客􅅐中爲虚煩也􅀬自􅅐中薫蒸於上故但頭汗岀而身無汗與梔子豉湯以􅄍􅅐中之虚煩陽明病􅀤潮􅀬大便溏小便自可􅅐脇滿不去者小柴胡湯主之陽明病潮􅀬爲胃實大便鞕而小便數今大便溏小便自可則胃􅀬未實而水榖不别也大便溏者應氣降而􅅐脇滿去今反不去者邪氣猶在半表半裏之間與小柴胡湯以去表裏之邪陽明病脇下鞕滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗岀解也陽明病腹滿不大便舌上胎黄者爲邪􅀬入府可下若脇下鞕滿雖不大便而嘔舌上曰胎者爲邪未入府在表裏之間與小柴胡湯以和解之上焦得通則嘔止津液得下則胃氣因和汗岀而解陽明中風脉弦浮大而短氣腹都滿脇下及心痛乆按之氣不通鼻乾不得汗􅄝卧一身及靣目悉黄小便難有潮􅀬時時􅎪耳前後腫刺之小差外不解病過十日脉續浮者與小柴胡湯脉但浮無餘證者與麻黄湯若不尿腹滿加􅎪者不治浮大爲陽風在表也弦則爲隂風在裏也短氣腹滿脇下及心痛風􅀬壅於腹中而不通也若寒客於内而痛者按之則寒氣散而痛止此以風􅀬内壅故雖乆按而氣亦不通陽明病鼻乾不得卧自汗岀者邪在表也此鼻乾不得汗而􅄝卧者風􅀬内攻不于表也一身面目悉黄小便難有潮􅀬時時􅎪者風􅀬攻於胃也陽明之脉岀大迎循頰車上耳前過客主人􅀬勝則腫此風􅀬在經故耳前後腫刺之經氣通腫則小差如此者外證罷則可攻􅀂外證不觧雖過十日脉續浮者邪氣猶在半表半裏與小柴胡湯以和解之若其脉但浮而不弦大無諸裏證者是邪但在表也可與麻黄湯以􅀤其汗􅀂不尿腹滿加􅎪者􅀜格之疾也故云不治難經曰􅀜格者不得盡其命而死陽明病自汗岀􅀂􅀤汗小便自利者此爲津液内竭雖硬不可攻之當湏自欲大便宜􅁡煎導而通之􅀂土􅀲根及與大猪膽汁皆可爲導津液内竭腸胃乾燥大便因硬此非結􅀬故不可攻宜以藥外治而導引之􅁡煎導}
