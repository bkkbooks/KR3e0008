  - {type: variant, offset: 298, length: 0, content: '', SBCK: 脫下利爲氣下脫是皆主死􅀤汗多若重􅀤汗者亡其陽讝語脉短者死脉自和者不死亡陽胃燥讝語者脉短津液已絶不可復治脉自和爲正氣未衰而猶可生也傷寒若􅄍若下後不解不大便五六日上至十餘日日晡所􅀤潮􅀬不惡寒獨語如見􅀑狀若劇者􅀤則不識人循衣摸􅇃惕而不安㣲喘直視脉弦者生濇者死㣲者但􅀤􅀬讝語者大承氣湯主之若一服利止後服若􅄍若下皆傷胃氣不大便五六日上至十餘日者亡津液胃氣虚邪􅀬内結也陽明王於申酉戌日晡所􅀤潮􅀬􅀬者陽明􅀬甚也不惡寒者表證罷也獨語如見􅀑狀者陽明内實也以爲􅀬氣有餘若劇者是􅀬氣甚大也􅀬大甚於内昬冐正氣使不識人至於循衣摸牀惕而不安㣲喘直視傷寒陽勝而隂絶者死隂勝而陽絶者死􅀬劇者爲陽勝脉弦爲隂有餘澁爲隂不足陽􅀬雖劇脉弦知隂未絶而猶可生脉澁則絶隂故不可治其邪􅀬㣲而未至於劇者但􅀤􅀬讝語可與大承氣湯以下胃中􅀬經曰凡服下藥中病即止不必盡劑此以􅀬未劇故云若一服利則止後服陽明病其人多汗以津液外岀胃中燥大便必鞕鞕則讝語小承氣湯主之若一服讝語止更莫復服亡津液胃燥大便鞕而讝語雖無大􅀬内結亦須與小承氣湯和其胃氣得一服讝語止則胃燥以潤更莫復與承氣湯以本無實􅀬故也陽明病讝語􅀤潮􅀬脉滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣勿更與之明日不大便脉反㣲澁者裏虚也爲難治不可更與承氣湯也陽明病讝語􅀤潮􅀬若脉沉實者内實者也則可下若脉滑疾爲裏􅀬未實則未可下先與小承氣湯和之湯入腹中得失氣者中有燥屎可更與小承氣湯一升以除之若不轉失氣者是無燥屎不可更與小承氣湯至明日邪氣傳時脉得沉實􅂃牢之􅁼是裏實也反得㣲澁者裏氣大虚也若大便利後脉㣲澁者止爲裏虚而猶可此不曽大便脉反㣲澁是正氣内衰爲邪氣所勝故云難治陽明病讝語有潮􅀬反不能食者胃中必有燥屎五六枚也若能食者但鞕􅈛冝大承氣湯下之讝語潮􅀬爲胃􅀬當消榖引食反不能食者胃中有燥屎而胃中實也若能食者胃中虚􅀬雖鞕不得爲有燥屎雜病虚爲不欲食實爲欲食傷寒則胃實􅀬甚者不能食胃中虚􅀬甚者能食與雜病爲異也大承氣湯以下燥屎逐結􅀬陽明病下血讝語者此爲􅀬入血室但頭汗岀者刺期門隨其實而㵼之濈然汗岀則愈陽明病􅀬入血室迫血下行使下血讝語陽明病法多汗以奪血者無汗故但頭汗岀也刺期門以散血室之􅀬隨其實而㵼之以除陽明之邪􅀬散邪除􅀬榮衛得通津液得復濈然汗岀而解汗岀讝語者以有燥屎在胃中此爲}
