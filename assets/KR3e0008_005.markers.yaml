  - {type: variant, offset: 1176, length: 7, content: 仍頭項強痛翕翕, krp: 也如其不下者病人不惡寒而渇者此轉属陽明也小便数者大便必鞕不更衣十日無所苦也渇欲飲水少少與之但以法救之渇者宜五苓散太陽病脉陽浮隂弱爲邪在表今寸緩關浮尺弱邪氣漸傳裏則}
