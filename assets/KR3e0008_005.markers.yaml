  - {type: variant, offset: 1146, length: 5, content: 裁為越婢湯, SBCK: 􅀬時急作冷則硬以内榖道中以手急抱欲大便時乃去之猪膽汁方大猪膽一枚㵼汁和醋少許以灌榖道中如一食頃當大便出陽明病脉遲汗出多㣲惡寒者表未解也可􅀤汗宜}
