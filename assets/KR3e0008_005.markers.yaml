  - {type: variant, offset: 1233, length: 0, content: '', SBCK: 􅀤汗則愈大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有􅀫食故也宜大承氣湯大下之後則胃弱不能消榖至六七日不大便則􅀫食巳結不消故使煩􅀬不解而腹滿痛是知有燥屎也與大承氣湯以下除之病人小便不利大便乍難乍易時有㣲􅀬喘冐不能卧者有燥屎也宜大承氣湯小便利則大便鞕此以有燥屎故小便不利而大便乍難乍易胃􅀬者􅀤􅀬喘冐無時及嗜卧也此燥屎在胃故時有㣲􅀬喘冐不得卧也與大承氣湯以下燥屎食榖}
