  - {type: variant, offset: 1240, length: 1, content: 得, SBCK: 如其不下者必漸不惡寒而渇太陽}
  - {type: variant, offset: 1242, length: 0, content: '', SBCK: 邪轉属陽明也若􅄍若下若􅀤汗後小}
  - {type: variant, offset: 1243, length: 2, content: 厥咽, SBCK: 數大便鞕者當與小承氣湯和之此不因􅄍下􅀤汗後小便數大便鞕若是無滿實雖不更衣十日無所苦也候津液還入胃}
