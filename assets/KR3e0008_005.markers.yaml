  - {type: variant, offset: 1307, length: 2, content: 四逆, SBCK: 順也􅀒者失也互相剋賊名爲􅀒也脉滑而數者有􅀫食也當下之宜大承氣湯陽明􅁟少陽木二經合病氣不相和則必下利少陽脉不勝陽明不􅀒是不相剋爲順也若少陽脉勝陽明脉􅀒者是􅀑賊相剋爲正氣失也脉經曰脉滑者爲病食也又曰滑數則胃氣實下利者脉當㣲厥冷脉滑數知胃有􅀫食與大承氣湯以下除之病人無表裏證􅀤􅀬七八日雖脉浮數者可下之假令已下脉數不解合􅀬則消榖善飢至六七日不大便者有瘀血宜抵當湯七八日邪入府之時病人無表裏證但􅀤􅀬雖脉浮數亦可與大承氣湯下之浮爲􅀬客於氣數爲􅀬客於血下之邪􅀬去而浮數之脉俱當解若下後數脉去而脉但浮則是榮血間􅀬併於衛氣間也當爲邪氣獨留心中則飢邪􅀬不殺榖潮􅀬􅀤渴之證此下之後浮脉去而數不解則是衛氣間􅀬合於榮血間也􅀬氣合併迫血下行胃虚恊􅀬消榖善飢血至下焦若大便利者下血乃愈若六七日不大便則血不得行畜積於下爲瘀血與抵當湯以下去之若脉數不解而下不止必恊􅀬而便膿血也下後脉數不解而不大便者是􅀬不得泄畜血於下爲瘀血也若下後脉數不解而下利不止者爲􅀬得下泄迫血下行必便膿血傷寒􅀤汗已身目爲黄所以然者以寒濕在裏不解故也以爲不可下也於寒濕中求之金匱要畧曰黄家所起從濕得之汗出􅀬去則不能􅀤黄􅀤汗已身目爲黄者風氣去濕氣在也脾惡濕濕氣内著脾色外奪者身目爲黄若瘀血在裏􅀤黄者則可下此以寒濕在裏故不可下當從寒濕法治之傷寒七八日身黄如橘子色小便不利腹㣲滿者茵蔯蒿}
