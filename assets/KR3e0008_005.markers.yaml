  - {type: variant, offset: 0, length: 0, content: '', SBCK: 註解傷寒論卷五漢張仲景著􅀳王叔和撰次宋成無巳註明汪濟川校正}
  - {type: page-break, offset: 0, content: '', id: KR3e0008_SBCK_005-1a}
  - {type: variant, offset: 0, length: 0, content: '', krp: 註解傷寒論卷五漢張仲景著晉王叔和撰次宋成無巳註明汪濟川校正}
  body:
  - {type: punctuation, offset: 0, content: 《, id: KR3e0008_CHANT_005-bkkpn1}
  - {type: variant, offset: 1, length: 0, content: '', SBCK: 陽明脉證并治第八問曰病有太陽陽明有正陽陽明有少陽陽明何謂也荅曰太陽陽明者脾約是也陽明胃也邪自太陽經傳之入府者謂之太陽陽明經曰}
  - {type: variant, offset: 1, length: 0, content: '', krp: 陽明脉證并治第八問曰病有太陽陽明有正陽陽明有少陽陽明何謂也荅曰太陽陽明者脾約是也陽明胃也邪自太陽經傳之入府者謂之太陽陽明經曰}
  - {type: variant, offset: 4, length: 8, content: 脈證并治法上第五, SBCK: 若􅄍若下若􅀤汗後㣲煩小便數大便因鞕者與小承氣湯即是太陽陽明脾約病也正陽陽明者胃家實是也邪自陽明經傳入府者謂之正陽陽明經曰陽明病脉遲雖汗岀不惡寒其身必重短氣腹滿而喘有潮􅀬者外欲解可攻裏也手足濈濈然汗岀者此大便巳鞕也大承氣湯主之即是正陽陽明胃家實也少陽陽明者􅀤汗利小便已胃中燥煩實大便難是也邪自少陽經傳之入府者謂之少陽陽明經曰傷寒脉弦細頭痛􅀤􅀬者属少陽少陽不可􅀤汗􅀤汗則讝語此属胃即是少陽陽明病也陽明之爲病胃家實也邪傳入胃􅀬毒留結則胃家爲實華陀曰􅀬毒入胃要須下去之不可留於胃中是知邪在陽明爲胃家實也問曰何縁得陽明病荅曰太陽病􅀤汗若下若利小便此亡津液胃中乾燥因轉属陽明不更衣内實大便難者此名陽明也本太陽病不解因汗利小便亡津液胃中乾燥}
  - {type: page-break, offset: 4, content: '', id: KR3e0008_SBCK_005-1b}
  - {type: page-break, offset: 4, content: '', id: KR3e0008_SBCK_005-2a}
  - {type: variant, offset: 4, length: 8, content: 脈證并治法上第五, krp: 若吐若下若發汗後㣲煩小便數大便因鞕者與小承氣湯即是}
  - {type: punctuation, offset: 12, content: 》, id: KR3e0008_CHANT_005-bkkpn2}
  - {type: xml-element, offset: 12, content: '', id: KR3e0008_CHANT_005-bkkxmlele1}
  - {type: 'tls:seg', offset: 12, content: '', id: KR3e0008_CHANT_005-1a.1}
  - {type: 'tls:seg', offset: 12, content: '', id: KR3e0008_CHANT_005-1a.2}
  - {type: variant, offset: 14, length: 0, content: '', krp: 陽明脾約病也正陽陽明者胃家實是也邪自陽明經傳入府者謂}
  - {type: variant, offset: 15, length: 1, content: 為, SBCK: 邪入府轉属陽明古人登厠必更衣不更衣者通爲不大便不更衣則胃中物不得泄故爲内實胃無津液加之畜􅀬大便則難爲陽明裏實也問曰陽明}
  - {type: page-break, offset: 15, content: '', id: KR3e0008_SBCK_005-2b}
  - {type: variant, offset: 15, length: 1, content: 為, krp: 正陽陽明經曰陽明}
  - {type: punctuation, offset: 17, content: ，, id: KR3e0008_CHANT_005-bkkpn3}
  - {type: 'tls:seg', offset: 17, content: '', id: KR3e0008_CHANT_005-1a.3}
  - {type: variant, offset: 17, length: 6, content: 脈浮頭項強痛, SBCK: 外證云何荅曰身􅀬汗自岀不惡寒反惡􅀬也陽明病爲邪入府也邪在表則身􅀬汗出}
  - {type: variant, offset: 17, length: 7, content: 脈浮頭項強痛而, krp: 脉遲雖汗岀不}
  - {type: punctuation, offset: 19, content: ，, id: KR3e0008_CHANT_005-bkkpn4}
  - {type: 'tls:seg', offset: 19, content: '', id: KR3e0008_CHANT_005-1a.4}
  - {type: punctuation, offset: 26, content: 。, id: KR3e0008_CHANT_005-bkkpn5}
  - {type: xml-element, offset: 26, content: '', id: KR3e0008_CHANT_005-bkkxmlele2}
  - {type: xml-element, offset: 26, content: '', id: KR3e0008_CHANT_005-bkkxmlele3}
  - {type: 'tls:seg', offset: 26, content: '', id: KR3e0008_CHANT_005-1a.5}
  - {type: variant, offset: 26, length: 0, content: '', SBCK: 邪旣入府則表證已罷故不惡寒但身􅀬汗出而惡􅀬也問曰病有得之一日不􅀤􅀬而惡寒者何也荅曰雖得之一日惡寒將自罷即自汗出而惡􅀬也邪客在陽明當􅀤􅀬而不惡寒今得之一日猶不􅀤􅀬而惡寒者即邪未全入府尚帶表邪若表邪全入則更無惡寒必自汗岀而惡􅀬也問曰惡寒何故自罷荅曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此爲陽明病也胃爲水榖之海主養四旁四旁有病皆能傳入於胃入胃則更不復傳如}
  - {type: page-break, offset: 26, content: '', id: KR3e0008_SBCK_005-3a}
  - {type: variant, offset: 26, length: 0, content: '', krp: 其身必重短氣腹滿而喘有潮熱者外欲解可攻裏也手足濈濈然汗岀者此大便巳鞕也大承氣湯主之即是正陽陽明胃家實也少陽陽明者發汗利小便已胃中燥煩實大便難是也邪自少陽經傳之入府者謂之少陽陽明經曰傷寒脉弦細頭痛發熱者属少陽少陽不可發汗發汗則讝語此属胃即是少陽陽明病也陽明之爲病胃家實也邪傳入胃熱毒留結則胃家爲實華陀曰熱毒入胃要須下去之不可留於胃中是知邪在陽明爲胃家實也問曰何縁得陽明病荅曰}
  - {type: variant, offset: 28, length: 0, content: '', SBCK: 傳之入胃則更不傳陽明陽明}
  - {type: punctuation, offset: 29, content: ，, id: KR3e0008_CHANT_005-bkkpn6}
  - {type: 'tls:seg', offset: 29, content: '', id: KR3e0008_CHANT_005-1a.6}
  - {type: variant, offset: 29, length: 13, content: 發熱汗出惡風脈緩者名為中風, SBCK: 傳之入胃則更不傳少陽少陽病傳之入胃則更不傳三隂本}
  - {type: variant, offset: 30, length: 0, content: '', krp: 汗若下若利小便此亡津液胃中乾燥因轉属陽明不更衣内實大便難者此名陽明也本太陽病不解因汗利小便亡津液胃中乾燥太陽之邪入府轉属陽明古人登厠必更衣不更衣者通爲不大便不更衣則胃中物不得泄故爲内實胃無津液加之畜熱大便則難爲陽明裏實也問曰陽明病外證云何荅曰身熱汗自岀不惡寒反惡熱也陽明病爲邪入府也邪在表則身}
  - {type: punctuation, offset: 31, content: ，, id: KR3e0008_CHANT_005-bkkpn7}
  - {type: 'tls:seg', offset: 31, content: '', id: KR3e0008_CHANT_005-1a.7}
