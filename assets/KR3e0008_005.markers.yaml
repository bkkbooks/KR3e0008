  - {type: variant, offset: 294, length: 0, content: '', SBCK: 申至戌上四月爲陽土旺於申酉戌向王時是爲欲解陽明病不能食攻其􅀬必􅎪所以然者胃中虚冷故也以其人本虚故攻其􅀬必􅎪不能食胃中本寒攻其􅀬復虚其胃虚寒相􅅮故令􅎪也經曰關脉弱胃氣虚有􅀬不可大攻之􅀬去則寒起此之謂也陽明病脉遲食難用飽飽則㣲煩頭眩必小便難此欲作榖疸雖下之腹滿如故所以然者脉遲故也陽明病脉遲則邪方入裏􅀬未爲實也食入於隂長氣於陽胃中有􅀬食難用飽飽則㣲煩而頭眩者榖氣與􅀬氣相􅅮也兩􅀬相合消摶津液必小便難利者不能􅀤黄言􅀬得泄也小便不利則􅀬不得泄身必􅀤黄疸黄也以其􅀤於榖氣之􅀬故名榖疸􅀬實者下之則愈脉遲爲􅀬氣未實雖下之腹滿亦不减也經曰脉遲尚未可攻陽明病法多汗反無汗其身如蟲行皮中狀者此以乆虚故也胃爲津液之府氣虚津液少病則反無汗胃候身之肌肉其身如蟲行皮中者知胃氣乆虚也陽明病反無汗而小便利二三日嘔而欬手足厥者必苦頭痛若不欬不嘔手足不厥者頭不痛陽明病法多汗反無汗而小便利者陽明傷寒而寒氣内攻也至二三日嘔欬而支厥者寒邪􅀤於外也必苦頭痛若不欬不嘔手足不厥者是寒邪但攻裏而不外􅀤其頭亦不痛也陽明病但頭眩不惡寒故能食而欬其人必咽痛若不欬者咽不痛陽明病身不重痛但頭眩而不惡寒者陽明中風而風氣内攻也經曰陽明病若能食名中風風邪攻胃胃氣上逆則欬咽門者胃之系欬甚則咽傷故必咽痛若胃氣不逆則不欬其咽亦不痛也陽明病無汗小便不利心中懊憹者身必􅀤黄陽明病無汗而小便不利者􅀬藴於内而不得越心中懊憹者􅀬氣欝烝欲􅀤於外而爲黄也陽明病􅀍火額上㣲汗出小便不利者必􅀤黄陽明病則爲内􅀬􅀍火則火􅀬相合而甚若遍身汗岀而小便利者􅀬得泄越不能􅀤黄今額上㣲汗岀而小便不利則􅀬不得越欝烝於胃必􅀤黄也陽明病脉浮而􅂃者必潮􅀬􅀤作有時但浮者必盗汗岀浮爲在經􅂃者裏實脉浮而􅂃者表􅀬裏實也必潮􅀬􅀤作有時若脉但浮而不􅂃者止是表􅀬也必盗汗出盗汗者睡而汗出也陽明病裏􅀬者自汗表􅀬者盗汗陽明病口燥但欲漱水不欲嚥者此必衂陽明之脉起於鼻絡於口陽明裏􅀬則渇欲飲水此口燥但欲漱水不欲嚥者是􅀬在經而裏無􅀬也陽明氣血俱多經中􅀬甚迫血妄行必作衂也陽明病本自汗出醫更重􅀤汗病已差尚㣲煩不了了者此大便必鞕故也以亡津液胃中乾燥故令大便鞕當問其小便日幾行若本小便日三四行今日再行故知大便不乆出今爲小便數少以津液當還入胃中故知不乆必大便也先亡津液使大便鞕小便數少津液分别大便必自下也傷寒嘔多雖有陽明證不可攻之嘔者􅀬在上焦未全入府故不可下陽明病心下鞕滿者不可攻之攻之利遂不止者死利止者愈陽明病腹滿者爲邪氣入府可下之心下鞕滿則邪氣尚淺未全入府不可便下之得利止者爲邪氣去正氣安正氣安則愈若因下利不止者爲正氣脫而死陽明病靣合赤色不可攻之必􅀤􅀬色黄小便不利也合通也陽明病靣色通赤者􅀬在經也不可下之下之虚其胃氣耗其津液經中之􅀬乘虚入胃必􅀤􅀬色黄小便不利也陽明病不􅄍不下心煩者可與調胃承氣湯􅄍後心煩謂之内煩下後心煩謂之虚煩今陽明病不􅄍不下心煩則是胃有欝􅀬也與調胃承氣湯以下欝􅀬陽明病脉遲雖汗岀不惡寒者其身必重短氣腹滿而喘有潮􅀬者此外欲解可攻裏也手足濈然而汗岀者此大便}
