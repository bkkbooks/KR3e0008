  - {type: page-break, offset: 1233, content: '', id: KR3e0008_SBCK_005-26a}
  - {type: variant, offset: 1234, length: 1, content: 攻, SBCK: 嘔者属陽明也呉茱茰湯主之得湯反􅇵者属上焦也上焦主内胃爲之市食榖欲嘔者胃不受也與呉茱茰湯以温胃氣得湯反􅇵者上焦不内也以治上焦法治之呉茱茰湯方呉茱茰一升洗辛􅀬人參三兩􅅴温生薑六兩切辛温大􅀥十二枚擘甘温内經曰寒􅁋於内治以􅅴􅀬佐以苦辛呉茱茰生姜之辛以温胃人參大􅀥之􅅴以緩脾右四味以水七升煑取二升去滓温服七合日三服太陽病寸緩關浮尺弱}
  - {type: page-break, offset: 1234, content: '', id: KR3e0008_SBCK_005-26b}
  - {type: variant, offset: 1236, length: 0, content: '', SBCK: 人􅀤􅀬汗岀復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渇者此轉属陽明也小便数者大便必鞕不更衣十日無所苦也渇欲飲水少少與之但以法救之渇者宜五苓散太陽病脉陽浮隂弱爲邪在}
  - {type: punctuation, offset: 1237, content: ，, id: KR3e0008_CHANT_005-bkkpn289}
  - {type: 'tls:seg', offset: 1237, content: '', id: KR3e0008_CHANT_005-18a.18}
  - {type: variant, offset: 1237, length: 0, content: '', SBCK: 今寸緩關浮尺弱邪氣漸傳裏則􅀤􅀬汗岀復惡寒者表未解也傳經之邪入裏裏不和者必嘔}
  - {type: page-break, offset: 1237, content: '', id: KR3e0008_SBCK_005-27a}
  - {type: variant, offset: 1237, length: 47, content: 此誤也得之便厥咽中乾煩燥吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若, krp: 邪已罷蒸蒸發熱}
  - {type: variant, offset: 1238, length: 1, content: 誤, SBCK: 不嘔但心下痞者醫下之早邪氣留於心下}
  - {type: punctuation, offset: 1240, content: 。, id: KR3e0008_CHANT_005-bkkpn290}
