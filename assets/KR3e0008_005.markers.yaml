  - {type: variant, offset: 1194, length: 0, content: '', krp: 數大便鞕者當與小承氣湯和之此}
  - {type: variant, offset: 1195, length: 1, content: 利, krp: 因吐下發汗後小便數大便鞕若是無滿實雖不更衣十日無所苦也候津液還入胃中小便數少大便必自岀也渇欲飲水}
  - {type: variant, offset: 1196, length: 0, content: '', SBCK: 渴引水􅄴}
  - {type: punctuation, offset: 1197, content: ，, id: KR3e0008_CHANT_005-bkkpn280}
  - {type: 'tls:seg', offset: 1197, content: '', id: KR3e0008_CHANT_005-18a.9}
  - {type: variant, offset: 1197, length: 0, content: '', SBCK: 此爲瘀􅀬在裏身必􅀤黄茵蔯湯主之但頭汗岀身無汗劑頸而還者􅀬不得越也小便不利渴引水􅄴者􅀬甚於胃津液内竭也胃爲土而色黄胃爲􅀬蒸則色奪於外必􅀤黄也與茵蔯湯逐􅀬退黄茵蔯蒿湯方茵蔯蒿六兩苦㣲寒梔子十四枚擘苦寒大黄二兩去皮苦寒小􅀬之氣凉以和之大􅀬之氣寒以取之茵蔯梔子之苦寒以逐胃燥宜下必以苦宜􅀘必以酸大黄之苦寒以下瘀􅀬右三味以水一斗先煑茵蔯减六升内二味煑取三升去滓分温三服小便當利尿如皂角汁狀色正赤一􅀫腹减黄從小便去也陽明證其人喜忘者必有畜血所以然者本有乆瘀血故令喜忘屎雖鞕大便反易其色必黒宜抵當湯下之内經曰血并於下亂而喜忘此下本有乆瘀血所以喜忘也津液少大便鞕以畜血在内屎雖鞕大便反易其色黒也與抵當湯以下瘀血陽明病下之心中懊憹而煩胃中有燥屎者可攻腹㣲滿􅀄頭鞕後必溏不可攻之􅀂有燥屎者宜大承氣湯下後心中懊憹而煩者虚煩也當與梔子豉湯􅀂胃中有燥屎者非虚煩也可與大承氣湯下之其腹㣲滿􅀄鞕後溏是無燥屎此􅀬不在胃而在上也故不可攻病人不大便五六日繞臍痛煩燥􅀤作有時者此有燥屎故使不大便也不大便五六日者則大便必結爲燥屎也胃中燥實氣不得下通故繞臍痛煩燥􅀤作有時也病人煩􅀬汗岀則解又如􅒻狀日晡所􅀤􅀬者属陽明也脉實者宜下之脉浮虚者宜􅀤汗下之與大承氣湯􅀤汗宜}
  - {type: page-break, offset: 1197, content: '', id: KR3e0008_SBCK_005-24a}
