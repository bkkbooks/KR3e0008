  - {type: variant, offset: 297, length: 0, content: '', krp: 成實雖有潮熱亦未可攻若不大便六七日恐有燥屎當先與小承氣湯賾之如有燥屎小承氣湯藥勢緩不能宣泄必轉氣下失若不轉失氣是胃中無燥屎但腸間少鞕爾止𥘉頭鞕後必溏攻之則虚其胃氣致腹脹滿不能食也胃中乾燥則欲飲水水入胃中虚寒相搏氣逆則􅎪其後却發熱者則熱氣乘虚還復聚於胃中胃燥得熱必大便復鞕而少與小承氣湯㣲利與和之故以重云不轉失氣不可攻内愼之至也夫實則讝語虚則鄭聲鄭聲重語也内經曰邪氣盛則實精氣奪則虚讝語由邪氣盛而神識昬也鄭聲由精氣奪而聲不全也讝語者言語不次也鄭聲者鄭音不正也論語云惡鄭聲之亂雅樂又曰放鄭聲逺佞人鄭聲淫佞人殆言鄭聲不正也今新差氣虚人聲轉者是所謂重語者也若聲重亦聲轉之直視讝語喘滿者死下利者亦死直視讝語邪勝也喘滿爲氣}
