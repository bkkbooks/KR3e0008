  - {type: variant, offset: 295, length: 0, content: '', krp: 鞕也大承氣湯主之若汗多㣲發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯㣲和胃氣勿令大泄下陽明病脉遲若汗岀多㣲發熱惡寒者表未解也若脉遲雖汗出而不惡寒者表證罷也身重短氣腹滿而喘有潮熱者熱入府也四肢諸陽之本津液足爲熱烝之則周身汗出津液不足爲熱烝之其手足濈然而汗岀知大便已鞕也與大承氣湯以下胃熱經曰潮熱者實也其熱不潮是熱未成實故不可便與大承氣湯雖有腹大滿不通之急亦不可與大承氣湯與小承氣湯㣲和胃氣大承氣湯方大黄四兩苦寒酒洗厚朴半斤苦温炙去皮枳實五枚苦寒炙芒硝三合醎寒内經曰燥淫所勝以苦下之大黄枳實之苦以潤燥除熱又曰燥淫於内治以苦温厚朴之苦下結燥又曰熱淫所勝治以鹹寒芒硝之鹹以攻藴熱右四味以水一斗先煑二物取五升去滓内大黄煑取二升去滓内芒硝更上火㣲一兩沸分温再服得下餘勿服小承氣湯方大黄四兩厚朴二兩炙去皮枳實三枚大者炙大熱結實者與大承氣湯小熱㣲結者與小承氣湯以熱不大甚故於大承氣湯去芒硝又以結不}
  - {type: variant, offset: 296, length: 0, content: '', SBCK: 堅故不减厚朴枳實也巳上三味以水四升煑取一升二合去滓分温二服􅀄服湯當更衣不爾者盡飲之若更衣者勿服之陽明病潮􅀬大便㣲鞕者可與大承氣湯不鞕者不與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣者此但􅀄頭鞕後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則􅎪其後􅀤􅀬者必大便復鞕而少也以小承氣湯和之不轉失氣者愼不可攻也潮􅀬者實得大便㣲鞕者便可攻之若便不鞕者則􅀬}
