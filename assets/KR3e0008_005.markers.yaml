  - {type: variant, offset: 1270, length: 2, content: 更作, SBCK: 脾胃之脉診浮爲陽知胃氣強澁爲隂知脾爲約約者儉約之約又約束之約内經曰飲入於胃游溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸於膀胱水精四布五經並行是脾主爲胃行其津液者也今胃強脾弱約束津液不得四布但輸膀胱致小便數大便難與脾約丸通腸潤燥麻仁丸方麻子仁二升􅅴平}
