  - {type: 'tls:seg', offset: 300, content: '', id: KR3e0008_CHANT_005-5a.5}
  - {type: variant, offset: 301, length: 0, content: '', SBCK: 虚裏實故也下之則愈冝大承氣湯胃中有燥屎則讝語以汗岀爲表未罷故云風也燥屎在胃則當下以表未和則未可下須過太陽經無表證乃可下之若下之早燥屎雖除則表邪乘虚復䧟於裏爲表虚裏實胃虚􅀬甚語言必亂與大承氣湯􅁍下胃中邪􅀬則止傷寒四五日脉沈而喘滿沈爲在裏而反􅀤其汗津液越岀大便爲難表虚裏實乆則讝語邪氣入内之時得脉沈而喘滿裏證其也則當下之反􅀤其汗令津液越岀胃中乾燥大便必難乆則屎燥胃實必􅀤讝語三陽合病腹滿身重難以轉側口不仁而靣垢讝語遺尿􅀤汗則讝語下之則額上生汗手足逆冷若自汗岀者白虎湯主之腹滿身重難以反側口不仁讝語者陽明也鍼經曰少陽病甚則靣㣲塵此靣垢者少陽也遺尿者太陽也三者以陽明證多故岀陽明篇中三陽合病爲表裏有邪若􅀤汗攻表則燥􅀬益甚必愈讝語若下之攻裏表􅀬乘虚内䧟必額上汗岀手足逆冷其自汗岀者三陽經􅀬甚也内經曰􅀬則腠理開榮衛通汗大泄與白虎湯以}
