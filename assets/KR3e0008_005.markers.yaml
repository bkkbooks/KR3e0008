  - {type: variant, offset: 1197, length: 3, content: 桂枝湯, krp: 少少與之以潤胃氣但審邪氣所在以法救之如渴不止與五苓散是也脉陽㣲而汗岀少者爲自和也汗岀多者爲太過脉陽㣲者邪氣少汗岀少者爲適當故自和汗岀多者反損正氣是汗出太過也陽脉實因發其汗岀多者亦爲太過太過爲陽絶於裏亡津液大便因鞕也陽脉實者表熱甚也因發汗熱乘虚蒸津液外泄致汗岀太過汗出多者亡其陽陽絶於裏腸胃乾燥大便因鞕也脉浮而芤浮爲陽芤爲隂浮芤相搏胃氣生熱其陽則絶浮芤相搏隂陽不諧胃氣獨治欝而生熱消爍津液其陽爲絶趺陽脉浮而濇浮則胃氣強澁則小便數浮澁相搏大便則難其脾爲約麻仁丸主之趺陽者脾胃之脉診浮爲陽知胃氣強澁爲隂知脾爲約約者儉約之約又約束之約内經曰飲入於胃游溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸於膀胱水精四布五經並行是脾主爲胃行其津液者也今胃強脾弱約束津液不得四布但輸膀胱致小便數大便難與脾約丸通腸潤燥麻仁丸方麻子仁二升丼平芍藥半斤酸平枳實半斤炙苦寒大黄一斤}
  - {type: variant, offset: 1200, length: 7, content: 去桂加茯苓白朮, SBCK: 雖得陽明證未可便爲裏實審㸔脉候以别内外其脉實者􅀬巳入府爲實可與大承氣}
  - {type: variant, offset: 1201, length: 1, content: 桂, krp: 皮苦寒厚朴一斤炙去皮苦寒杏仁一斤去皮尖熬别作脂丼温内經曰脾欲緩急食丼以緩之麻子杏仁之丼緩脾而潤燥津液不足以酸収之芍藥之酸以歛津液腸燥胃強以苦泄之枳實厚朴大黄之苦下燥結而泄胃強也右六味爲末煉蜜爲丸桐子大飲服十丸日三服漸}
  - {type: variant, offset: 1203, length: 4, content: 茯苓白朮, krp: 以和爲度太陽病三日發汗不解蒸蒸發熱者属胃也調胃承氣}
