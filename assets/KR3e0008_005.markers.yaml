  - {type: variant, offset: 38, length: 2, content: 名為, krp: 何也荅曰雖得之一日惡寒將自罷即自汗出而惡熱也邪客在陽明當發熱而不惡寒今得之一日猶不發熱而惡寒者即邪未全入府尚帶表邪若表邪全入則更無惡寒必自汗岀而惡熱也問曰惡寒何故自罷荅曰陽明居}
  - {type: variant, offset: 41, length: 1, content: 風, krp: 土也萬物所歸無所復傳始雖惡寒二日自止此爲陽明病也胃爲水榖之海主養四旁四旁有病皆能傳入於胃入胃則更不復傳如}
