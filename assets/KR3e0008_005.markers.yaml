  - {type: variant, offset: 1187, length: 5, content: 心下滿微痛, SBCK: 而喘者􅀤汗則愈宜麻黄湯陽明傷寒表實脉浮無汗而喘也與麻黄湯以􅀤汗陽明病􅀤􅀬汗出此爲􅀬越不能􅀤黄也但頭汗岀身無汗劑頸而還}
  - {type: page-break, offset: 1187, content: '', id: KR3e0008_SBCK_005-23b}
  - {type: variant, offset: 1187, length: 0, content: '', krp: 岀復惡寒者表未解也傳經之邪入裏裏不和者必嘔此不嘔但}
  - {type: variant, offset: 1189, length: 3, content: 滿微痛, krp: 痞者醫下之早邪氣留於心下也如其不下者必漸不惡寒而渇太陽之邪轉属陽明也若吐若下若發汗後}
  - {type: punctuation, offset: 1192, content: ，, id: KR3e0008_CHANT_005-bkkpn279}
