  - {type: variant, offset: 1032, length: 14, content: 太陽病發熱惡寒熱多寒少脈微弱, SBCK: 若下後邪􅀬客於上焦}
  - {type: variant, offset: 1032, length: 1, content: 太, krp: 若下後邪熱客於上焦者爲虚煩此下後邪熱不客於上焦而客於中焦者是爲乾燥煩渇與白虎加人參湯散熱潤燥若脉浮發熱渇欲飲水小便不利者猪苓湯主之此下後客熱客於下焦者也邪氣自表入裏客於下焦三焦俱帶熱也脉浮發熱者上焦熱也渇欲飲水者中焦熱也小便不利者邪客下焦津液不得下通也與猪苓湯利小便以㵼下焦之熱也猪苓湯方猪苓去皮丼平茯苓丼平阿膠丼平滑石碎丼寒澤㵼丼醎寒各一兩丼甚而反淡淡味滲泄爲}
  - {type: variant, offset: 1034, length: 0, content: '', krp: 猪苓茯苓之丼以行小便鹹味湧泄爲隂澤㵼之鹹以泄伏水滑利竅阿膠滑石之滑以利水道右伍味以水四升先煑四味取二升去滓内下阿膠烊消温服七合日三服陽明病汗岀多而渇者不可與猪苓湯以汗多胃中燥猪苓湯復利其小便故也鍼經曰水榖入於口輸於腸胃其液别爲五天寒衣薄則爲溺天熱衣厚則爲汗是汗溺一液也汗多爲津液外泄胃中乾燥故不可與猪苓湯利小便也脉浮而遲表熱裏寒下利清榖者四逆湯主之浮爲表熱遲爲裏寒下利清榖者裏寒甚也與四逆湯温裏散寒若胃中虚冷不能食者飲水則􅎪􅎪者欬逆是也千金曰咳逆者􅎪逆之名胃中虚冷得水則水寒相搏胃氣逆而􅎪脉浮發熱口乾鼻燥能食者則衂脉浮發熱口乾鼻燥者熱在經也能食者裏和也熱甚於經迫血爲衂胃中虚冷隂勝也水入於經其血乃成飲水者助隂氣逆爲􅎪發熱口乾陽勝也食入於隂長氣於陽能食者助陽血妄爲衂三者偏隂偏陽之疾也陽明病下之其外有熱手足温不結胸心中懊憹飢不能食但頭汗岀者梔子豉湯主之表未罷而下者應邪熱内䧟也熱内䧟者則外熱而無手足寒今外有熱而手足温者熱雖内䧟然而不深故不作結胸也心中懊憹飢不能食者熱客胸中爲虚煩也熱自胸中薫蒸於上故但頭汗岀而身無汗與梔子豉湯以吐胸中之虚煩陽明}
  - {type: punctuation, offset: 1035, content: ，, id: KR3e0008_CHANT_005-bkkpn239}
  - {type: 'tls:seg', offset: 1035, content: '', id: KR3e0008_CHANT_005-15a.8}
  - {type: variant, offset: 1036, length: 0, content: '', krp: 潮}
  - {type: variant, offset: 1037, length: 0, content: '', krp: 大便溏小便自可胸脇滿不去者小柴胡湯主之陽明病潮熱爲胃實大便鞕而小便數今大便溏小便自可則胃熱未實而水榖不别也大便溏者應氣降而胸脇滿去今反不去者邪氣猶在半表半裏之間與小柴胡湯以去表裏之邪陽明病脇下鞕滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗岀解也陽明病腹滿不大便舌上胎黄者爲邪熱入府可下若脇下鞕滿雖不大便而嘔舌上曰胎者爲邪未入府在表裏之間與小柴胡湯以和解之上焦得通則嘔止津液得下則胃氣因和汗岀而解陽明中風脉弦浮大而短氣腹都滿脇下及心痛乆按之氣不通鼻乾不得汗嗜卧一身及靣目悉黄小便難有潮熱時時􅎪耳前後腫刺之小差外不解病過十日脉續浮者與小柴胡湯脉但浮無餘證者與麻黄湯若不尿腹滿加􅎪者不治浮大爲陽風在表也弦則爲隂風在裏也短氣腹滿脇下及心痛風熱壅於腹中而不通也若寒客於内而痛者按之則寒氣散而痛止此以風熱内壅故雖乆按而氣亦不通陽明病鼻乾不得卧自汗岀者邪在表也此鼻乾不得汗而嗜卧者風熱内攻不于表也一身面目悉黄小便難有潮熱時時􅎪者風熱攻於胃也陽明之脉岀大迎循頰車上耳前過客主人熱勝則腫此風熱在經故耳前後腫刺之經氣通腫則小差如此者外證罷則可攻若外證不觧雖過十日脉續浮者邪氣猶在半表半裏與小柴胡湯以和解之若其脉但浮而不弦大無諸裏證者是邪但在表也可與麻黄湯以發其汗若不尿腹滿加􅎪者關格之疾也故云不治難經曰關格者不得盡其命而死陽明病自汗岀若發汗小便自利者此爲津液内竭雖硬不可攻之當湏自欲大便宜蜜煎導而通之若土瓜根及與大猪膽汁皆可爲導津液内竭腸胃乾燥大便因硬此非結熱故不可攻宜以藥外治而導引之蜜煎導方蜜七合一味内銅噐中㣲火煎之稍凝似飴狀攪之勿令焦著欲可丸併手捻作挺令頭銳大如指長二寸許當熱時急作冷則硬以内榖道中以手急抱欲大便時乃去之猪膽汁方大猪膽一枚㵼汁和醋少許以灌榖道中如一食頃當大便出陽明病脉遲汗出多㣲}
