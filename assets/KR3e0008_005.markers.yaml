  - {type: variant, offset: 1302, length: 0, content: '', SBCK: 㣲煩小便數大便因鞕者與小承氣湯和之愈􅄍下􅀤汗皆損津液表邪乘虚傳裏大煩者邪在表也㣲煩者邪入裏也小便數大便因鞕者其脾爲約也小承氣湯和之愈得病二三日脉弱無太陽柴胡證煩燥心下鞕至四五日雖能食以小承氣湯少少與㣲和之令小安至六日與承氣湯一升􅀂不大便六七日小便少者雖不能食但初頭鞕後必溏未定成鞕攻之必溏湏小便利屎定鞕乃可攻之宜大承氣湯針經曰脉軟者病將下弱爲隂脉當責邪在裏得病二三日脉弱是日數雖淺而邪氣已入裏也無太陽證爲表證已罷無柴胡證爲無半表半裏之證煩燥心下鞕者邪氣内甚也胃實􅀬甚則不能食胃虚􅀬甚至四五日雖能食亦當與小承氣湯㣲和之至六日則􅀬甚與大承氣湯一升若不大便六七日小便多者爲津液内竭大便必鞕則可下之小便少者則胃中水榖不别必􅀄鞕後溏雖不能食爲胃實以小便少則未定成鞕亦不可攻湏小便利屎定鞕乃可攻之傷寒六七日目中不了了睛不和無表裏證大便難身㣲􅀬者此爲實也急下之宜大承氣湯内經曰諸脉者皆属於目傷寒六七日邪氣入裏之時目中不了了睛不和者邪􅀬内甚上熏於目也無表裏證大便難者裏實也身大􅀬者表􅀬也身㣲􅀬者裏􅀬也針經曰􅀬病目不明􅀬不已者死此目中不了了睛不和則證近危惡也湏急與大承氣湯下之陽明􅀤􅀬汗多者急下之宜大承氣湯邪􅀬入府外􅀤􅀬汗多者􅀬迫津液將竭急與大承氣湯以下其府􅀬􅀤汗不解腹滿痛者急下之宜大承氣湯􅀤汗不解邪􅀬傳入府而成腹滿痛者傳之迅也是湏急下之腹滿不减减不足言當下之宜大承氣湯腹滿不减邪氣實也經曰大滿大實自可除下之大承氣湯下其滿實若腹滿時减非内實也則不可下金匱要畧曰腹滿時减}
