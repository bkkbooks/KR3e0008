  - {type: variant, offset: 1058, length: 1, content: 二, krp: 湯陽明病脉遲汗出多當責邪在裏以㣲惡寒知表未解與桂枝湯和表陽明病脉浮無汗而喘者發汗則愈宜麻黄湯陽明傷寒表實脉浮無汗而喘也與麻黄湯以發汗陽明病發熱汗出此爲熱}
  - {type: variant, offset: 1060, length: 2, content: 婢一, krp: 不能發黄也但頭汗岀身無汗劑頸而還小便不利渴引水漿者此爲瘀熱在裏身必發黄茵蔯湯主之但頭汗岀身無汗劑頸而還者熱不得越也小便不利渴引水漿者熱甚於胃津液内竭也胃爲土而色黄胃爲熱蒸則色奪於外必發黄也與茵蔯湯逐熱退黄茵蔯蒿}
