  - {type: variant, offset: 2241, length: 0, content: '', SBCK: 浮爲邪氣并於衞而衞氣勝滑爲邪氣并於榮而榮氣實邪氣勝實擁於榮衞則榮衞行速故脉數疾一息六至曰數平人脉一息四至衞氣行六寸今一息六至則衞氣行九寸計過平人之半是脉數疾知衞氣失其常度也浮滑數疾之脉發􅀬汗岀而當解若不解者精氣脫也必不可治經曰脉隂陽俱盛大汗岀不解者死}
