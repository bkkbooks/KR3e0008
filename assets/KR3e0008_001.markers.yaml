  - {type: 'tls:seg', offset: 119, content: '', id: KR3e0008_CHANT_001-3a.2}
  - {type: variant, offset: 119, length: 0, content: '', SBCK: 結者氣偏結固隂陽之氣不得而雜之隂中有陽陽中有隂隂陽相雜以爲和不相雜以爲結浮數陽脉也能食而不大便裏實也爲陽氣結固隂不得而雜之是名陽結沉遲隂脉也不能食身體重隂病也隂病見隂脉則當下利今大便鞕者爲隂氣結固陽不得而雜之是名隂結論其數者傷寒之病一日太陽二日陽明三日少陽四日太隂五日少隂六日厥隂至六日爲傳經盡七日當愈七日不愈者謂之再傳經言再傳經者再自太陽而傳至十二日再至厥隂爲傳經盡十三日當愈十三日不愈者謂之過經言再傳過太陽之經亦以次而傳之也陽結爲火至十七日傳少隂水水能制火火邪解散則愈隂結屬水至十四日傳陽明土土能制水水邪解散則愈彼邪氣結甚水又不能制火土又不能制水故當劇内經曰一􅀱後則病二􅀱後則病甚三􅀱後則病危也}
