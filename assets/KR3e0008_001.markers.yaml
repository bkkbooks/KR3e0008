  - {type: variant, offset: 2001, length: 2, content: 脈陰, krp: 浮爲陽沉爲隂陽脉緊則霧露之氣中於上焦隂脉緊則寒邪中於下焦上焦者太陽也下焦者少隂也發熱頭痛項強頸攣腰疼脛酸者霧露之氣中於太陽之經也濁邪中下隂氣爲慄足脛逆冷便溺妄岀者寒邪中於少隂也因表氣㣲虚邪入而客之又裏氣不守邪乘裏弱遂中於隂隂虚遇邪内爲懼慄致氣㣲急矣内經曰陽病者上行極而下隂病者下行極而上此上焦之邪甚則下干中焦下焦之邪甚則上干中焦由是三焦溷亂也三焦主持諸氣三焦旣相溷亂則内外之氣俱不得通膻中爲陽氣之海氣因不得通於内外怫欝於上焦而爲熱與藏相熏口爛食齗内經曰隔熱不便上爲口麋中焦爲上下二焦之邪溷亂則不得平治中焦在胃之中中焦失治胃氣因上衝也脾坤也坤助胃氣消磨水榖脾氣不轉則胃中水榖不得磨消故胃中濁也金匱要畧曰榖氣不消胃中苦濁榮者水榖之精氣也衞者水榖之悍氣也氣不能布散致榮衞不通血凝不流衞氣者陽氣也榮血者隂氣也陽主爲熱隂主爲寒衞氣前通者陽氣先通而熱氣得行也内經曰膀胱者津液藏焉化則能岀以小便赤黄知衞氣前通也熱氣與胃氣相搏而行岀入藏府遊於經絡經絡客熱則血凝肉腐而爲癰膿此見其熱氣得行若隂氣前通者則不然陽在外爲隂之使因陽氣厥㣲隂無所使遂隂氣前通也内經曰陽氣者衞外而爲固也陽氣厥㣲則不能衞外寒氣因而客之鼻者肺之候肺主聲寒氣内入者客於肺經則嚔而岀之聲嗢咽塞寒者外邪也厥者内邪也外内之邪合并相逐爲熱則血凝不流今爲熱所擁使血凝自下如豚肝也上焦陽氣厥下焦隂氣厥二氣俱厥不相順接則脾氣獨弱不能行化氣血滋養五藏致五藏俱虚而五液注下鍼經曰五藏不和使液溢而下流於隂闔合也清圊也下焦氣脫而不合故數便而下重臍爲生氣之原臍築湫痛則生氣欲絶故曰命將難全脉隂}
