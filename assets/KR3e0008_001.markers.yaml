  - {type: variant, offset: 2081, length: 2, content: 脈陰, krp: 脉隂陽俱緊爲表裏客寒寒爲隂得陽則解口中氣岀脣口乾燥者陽氣漸復正氣方温也雖爾然而隂未盡散踡卧足冷鼻中涕岀舌上滑胎知隂猶在也方隂陽未分之時不可妄治以偏隂陽之氣到七日巳來其人㣲發熱手足温者爲隂氣已絶陽氣得復是爲欲解若過七日不解到八日已上反發大熱者爲隂極變熱邪氣勝正故云難治陽脉緊者寒邪發於上焦上焦主外也隂脉緊者寒邪發於下焦下焦主内也設使惡寒者上焦寒氣勝是必欲嘔也腹内痛者下焦寒氣勝是必欲利也脉隂}
