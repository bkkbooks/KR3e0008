  - {type: variant, offset: 1203, length: 0, content: '', SBCK: 經常也趺陽之脉以􅀱脾胃故遲緩之脉爲常若脉浮數則爲醫妄下傷胃動脾邪氣乘虚内䧟也邪在表則見陽脉邪在裏則見隂脉邪在表之時脉浮而數也因下裏虚榮衞内䧟邪客於脾以數則動脾今數先㣲則是脾邪先䧟於裏也胃虚脾􅀬津液乾少大便必鞕鍼經曰脾病善噫得後出餘氣則快然而衰今脾客邪􅀬故氣噫而除脾能消磨水榖今邪氣獨留於脾脾氣不治心中雖飢而不能殺榖也脾主爲胃行其津液脾爲􅀬爍故潮􅀬而發渴也趺陽之脉本遲而緩因下之後變爲浮數榮衞内䧟數復改㣲是脉因前後度數如法邪􅀬内䧟於脾而心中善飢也數脉不時者爲數當改㣲而復不㣲如此則是邪氣不傳於裏但欝於榮衞之中必岀自肌皮爲惡瘡也}
