  - {type: variant, offset: 53, length: 0, content: '', SBCK: 内經曰㣲妙在脉不可不察察之有紀從隂陽始始之有經從五行生玆首論曰脉之隂陽者以脉從隂陽始故也陽脉有五隂脉有五以脉從五行生故也陽道常饒大浮數動滑五者比之平脉也有餘故謂之陽隂道常乏沉濇弱弦㣲五者比之平脉也不及故謂之隂傷寒之爲病邪在表則見陽脉邪在裏則見隂脉隂病見陽脉而主生者則邪氣自裏之表欲汗而解也如厥隂中風脉㣲浮爲欲愈不浮爲未愈者是也陽病見隂脉而主死者則邪氣自表入裏正虚邪勝如讝言妄語脉沉細者死是也金匱要略曰諸病在外者可治入裏者即死此之謂也}
