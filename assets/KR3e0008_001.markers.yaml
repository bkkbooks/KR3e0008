  - {type: variant, offset: 1732, length: 0, content: '', SBCK: 脉浮靣􅀬赤者邪氣外浮於表也脉遲戰惕者本氣不足也六七日爲傳經盡當汗岀而解之時若當汗不汗反發􅀬者爲裏虚津液不多不能作汗旣不汗邪無從岀是以差遲發􅀬爲邪氣浮於皮膚必作身痒也經曰以其不能得小汗岀故其身必痒也}
