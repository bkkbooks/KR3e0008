  - {type: variant, offset: 3797, length: 0, content: '', SBCK: 两半去節甘温升麻一两一分甘平當歸一两一分辛温知母苦寒黄芩苦寒萎㽔甘平各十八銖石膏碎綿褁甘寒白术甘温乾薑辛􅀬芍藥酸平天門冬去心甘平桂枝辛􅀬茯苓甘平甘草炙甘平各六銖玉凾曰大􅀬之氣寒以取之甚􅀬之氣以汗􅀤之麻黄升麻之甘以􅀤浮􅀬正氣虚者以辛潤之當歸桂薑之辛以散寒上􅀬者以苦泄之知毋黄芩之苦凉心去􅀬津液少者以甘潤之茯苓白术之甘緩脾生津肺燥氣􅀬以酸収之以甘緩之芍藥之酸以歛逆氣萎㽔門冬石膏甘草之甘潤肺除􅀬右十四味以水一斗先煑麻黄一兩沸去上沬内諸藥煑取}
