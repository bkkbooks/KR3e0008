  - {type: variant, offset: 3797, length: 0, content: '', krp: 两半去節甘温升麻一两一分甘平當歸一两一分辛温知母苦寒黄芩苦寒萎㽔甘平各十八銖石膏碎綿褁甘寒白术甘温乾薑辛熱芍藥酸平天門冬去心甘平桂枝辛熱茯苓甘平甘草炙甘平各六銖玉凾曰大熱之氣寒以取之甚熱之氣以汗發之麻黄升麻之甘以發浮熱正氣虚者以辛潤之當歸桂薑之辛以散寒上熱者以苦泄之知毋黄芩之苦凉心去熱津液少者以甘潤之茯苓白术之甘緩脾生津肺燥氣熱以酸収之以甘緩之芍藥之酸以歛逆氣萎㽔門冬石膏甘草之甘潤肺除熱右十四味以水一斗先煑麻黄一兩沸去上沬内諸藥煑取}
