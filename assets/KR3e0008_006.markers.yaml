  body:
  - {type: punctuation, offset: 0, content: 《, id: KR3e0008_CHANT_006-bkkpn1}
  - {type: variant, offset: 2, length: 3, content: 陽病脈, SBCK: 隂脉}
  - {type: variant, offset: 2, length: 3, content: 陽病脈, krp: 隂脉}
  - {type: variant, offset: 9, length: 1, content: 六, SBCK: 十太隂之爲病腹滿而􅄍食不下自利益甚時腹自痛若下之必胷下結鞕太隂爲病陽邪傳裏也太隂之脉布胃中邪氣壅而爲腹滿上不得降者嘔􅄍而食不下下不得升者自利益甚時腹自痛隂塞在内而爲腹痛者則爲常痛此陽邪干裏雖痛而亦不常痛但時時腹自痛也若下之則隂邪留於胷下爲結鞕經曰病􅀤於隂而反下之因作痞太隂中風四肢煩疼陽㣲隂澁而長者爲欲愈太隂脾也主營四末太隂中風四肢煩疼者風滛末疾也表邪少則㣲裏向和則澁而長長者陽也隂病見陽脉則生以隂得陽則解故云欲愈太隂病欲解時從亥至丑上脾爲隂土王於丑亥子向陽故云解時太隂病脉浮者可􅀤汗宜桂枝湯經曰浮爲在表沉爲在裏太隂病脉浮者邪在經也故當汗散之自利不渇者屬太隂以其藏有寒故也當温之宜服四逆軰自利而渇者屬少隂爲寒在下焦目利不渇者屬太隂爲寒在中焦與四逆等湯以温其藏傷寒脉浮而緩手足自温者繋在太隂太隂當􅀤身黄若小便自利者不能􅀤黄至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也太隂病至七八日大便鞕者爲太隂入府傳於陽明也今至七八日暴煩下利十餘行者脾家實腐穢去也下利煩燥者死此以脾氣和逐邪下泄故雖暴煩下利日十餘行而利必自止本}
  - {type: page-break, offset: 9, content: '', id: KR3e0008_SBCK_006-1b}
