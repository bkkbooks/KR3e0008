  - {type: variant, offset: 3851, length: 8, content: 身熱惡風頸項強脅, SBCK: 腹中痛若轉氣}
  - {type: variant, offset: 3851, length: 0, content: '', krp: 腹中痛若轉氣下趣少腹者此欲自利也傷寒四五日邪氣傳裏之時腹中痛轉氣下趣少腹者裏虚遇寒寒氣下行欲作自利也傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黄連黄芩人參湯主之傷寒邪自傳表爲本自寒下醫反吐下損傷正氣寒氣内爲格拒經曰格則吐逆食入口即吐謂之寒格更復吐下則重虚而死是更逆吐下與乾薑黄連黄芩人參湯以通寒格乾薑黄連黄芩人參湯方乾薑辛熱黄連苦寒黄芩苦寒人參甘温各三两辛以散之甘以緩之乾薑人參之甘辛以𥙷正氣苦以泄之黄連黄芩之苦以通寒格右四味以水六升煑取二升去滓分温再服下利有㣲熱而渇脉弱者今自愈下利隂寒之疾反大熱者逆有㣲熱而渇裏氣方温也經曰諸弱發熱脉弱者陽氣得復也今必自愈下利脉數有㣲熱汗岀今自愈設復緊爲未解下利隂病也脉數陽脉也隂病見陽脉者生㣲熱汗出陽氣得通也利必自愈諸緊爲寒設復脉緊隂氣猶勝故云未解下利手足厥冷無脉者灸之不温若脉不還反㣲喘者死下利手足厥逆無脉者隂氣獨勝陽氣大虚也灸之陽氣復手足温而脉還爲欲愈若手足不温脉不還者陽已絶也反㣲喘者陽氣脫也少隂負趺陽者爲順也少隂腎水趺陽脾土下利爲腎邪干脾水不勝土則爲㣲邪故爲順也下利寸脉反浮數尺中自濇者必清膿血下利者脉當沉而遲反浮數者裏有熱也濇爲無血尺中自濇者腸胃血散也隨利下必便膿血清與圊通脉經曰清者厠也下利清榖不可攻表汗岀必脹滿下利者脾胃虚也胃爲津液之主發汗亡津液則胃氣愈虚必脹滿下利脉沉弦者下重也脉大者爲未止脉㣲弱數者爲欲自止雖發熱不死沉爲在裏弦爲拘急裏氣不足是主下重大則病進此利未止脉㣲弱數者邪氣㣲而陽氣復爲欲自止雖發熱止由陽勝非大逆也下利脉沉而遲其人靣少赤身有㣲熱下利清榖者必鬰冒汗岀而解病人必㣲厥所以然者其靣戴陽下虚故也下利清榖脉沉而遲裏有寒也靣少赤身有㣲熱表未解也病人㣲厥針經曰下虚則厥表邪欲解臨汗之時以裏先虚必鬰冒然後汗岀而解也下利脉數而渇者今自愈設不差必清濃血以有熱故也經曰脉數不解而下不止必恊熱便膿血也下利後脉絶手足厥冷晬時脉還手足温者生脉不還者死下利後脉絶手足厥冷者無陽也晬時周時也周時厥愈脉岀爲陽氣復則生若手足不温脉不還者爲陽氣絶則死傷寒下利日十餘行脉反實者死下利者裏虚也脉當㣲弱反實者病勝藏也故死難經曰脉不應病病不應脉是爲死病下利清榖裏寒外熱汗岀而厥者通脉四逆湯主之下利清榖爲裏寒}
  - {type: variant, offset: 3853, length: 6, content: 惡風頸項強脅, krp: 不解爲外熱汗岀陽氣通行於外則未當厥其汗岀而厥者陽氣大虚也與通脉四逆湯以固陽氣熱利}
