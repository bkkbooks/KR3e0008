  - {type: 'tls:seg', offset: 2859, content: '', id: KR3e0008_CHANT_006-55a.6}
  - {type: variant, offset: 2859, length: 0, content: '', krp: 又主乆利方藏厥者死陽氣絶也蚘厥雖厥而煩吐蚘巳則静不若藏厥而躁無暫安時也病人藏寒胃虚蚘動上膈聞食臭岀因而吐蚘與烏梅圓温藏安蟲烏梅圓方烏梅三百箇味酸温細辛六两辛熱乾薑十两辛熱黄連一斤苦寒當歸四两辛温附子六两炮辛熱蜀椒四两去子辛熱桂枝六两辛熱人參六兩甘温黄蘗六两苦寒肺主氣肺欲収急食酸以収之烏梅之酸以収肺氣脾欲緩急食甘以緩之人參之甘以緩脾氣寒滛於内以辛潤之以苦堅之當歸桂椒細辛之辛以潤内寒寒滛所勝平以辛熱薑附之辛熱以勝寒蚘得甘則動得苦則安黄連黄蘗之苦以安蚘右十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟擣成埿和藥令相得内臼中與蜜杵二千下貟如梧梧子大先食飲服十圓日三服稍加至二十圓禁生冷滑物臭食等傷寒熱少厥㣲指頭寒黙黙不欲食煩躁數日小便利色白者此熱除也欲得食其病爲愈若厥而嘔胷脇煩滿者其後必便血指頭寒者是厥㣲熱少也黙黙不欲食煩躁者邪熱𥘉傳裏也數日之後小便色白裏熱去欲得食爲胃氣巳和其病爲愈厥隂之脉挾胃貫膈市脇肋厥而嘔胷脇煩滿者傳邪之熱甚於裏也厥隂肝主血後數日熱不去又不得外泄迫血下行必致便血病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也手足厥不結胷者無熱也小腹滿按之痛下焦冷結也傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者其後必便膿血先熱後厥者陽氣邪傳裏也發熱爲邪氣在表至四日後厥者傳之隂也後三日復傳陽經則復熱厥少則邪㣲熱多爲陽勝其病爲愈至七日傳經盡熱除則愈熱不除者爲熱氣有餘内搏厥隂之血其後必大便膿血傷寒厥四日熱反三日復厥五日其病爲進寒多熱少陽氣退故爲進也傷寒隂勝者先厥至四日邪傳裏重隂必陽却熱三日七日傳經盡當愈若不愈而復厥者傳作再經至四日則當復熱若不復熱至五日厥不除者隂勝於陽其病進也傷寒六七日脉㣲手足厥冷煩燥灸厥隂厥不還者死傷寒六七日則正氣當復邪氣當罷脉浮身熱爲欲解若反脉㣲而厥則隂勝陽也煩燥者陽虚而爭也灸厥隂以復其陽厥不還則陽氣巳絶不能復正而死傷寒發熱下利厥逆躁不得卧者死傷寒發熱邪在表也下利厥逆陽氣虚也躁不得卧者病勝藏也故死傷寒發熱下利至甚厥不止者死金匱要畧曰六府氣絶於外者手足寒五藏氣絶於内者利下不禁傷寒發熱爲邪氣獨甚下利至甚厥不止爲府藏氣絶故死傷寒六七日不利便發熱而利其人汗岀不止者死有隂無陽故也傷寒至七日爲邪正爭之時正勝則生邪勝則死始不下利而暴忽發熱下利汗岀不止者邪氣勝正陽氣脫也故死}
