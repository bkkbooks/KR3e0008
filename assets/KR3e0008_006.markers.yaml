  - {type: variant, offset: 2831, length: 1, content: 嘔, krp: 胃氣絶得麫則必發熱若不發熱}
  - {type: punctuation, offset: 2833, content: ，, id: KR3e0008_CHANT_006-bkkpn719}
  - {type: 'tls:seg', offset: 2833, content: '', id: KR3e0008_CHANT_006-54a.16}
  - {type: variant, offset: 2833, length: 2, content: 梔子, krp: 胃氣尚在也恐是寒極變熱因暴熱來而復去使之能食非除中也金匱要畧曰病人素不能食而反暴思之必發熱後三日脉之其熱續在者陽氣勝也期之旦日夜半愈若旦日不愈後三日脉數而熱不罷者爲熱氣有餘必發癰膿經曰數脉不時則}
  - {type: variant, offset: 2836, length: 2, content: 薑豉, krp: 惡瘡傷寒脉遲六七日而反與黄芩}
  - {type: variant, offset: 2839, length: 2, content: 主之, krp: 徹其熱脉遲爲寒今與黄芩湯復除其熱腹中應冷當不能食今反能食此名除中必死傷寒脉遲六七日爲寒氣已深反與黄芩湯寒藥兩寒相搏腹中當冷冷不消榖則不能食反能食者除中也四時皆以胃氣爲本胃氣已絶故云必死傷寒先厥後}
  - {type: punctuation, offset: 2841, content: 。, id: KR3e0008_CHANT_006-bkkpn720}
  - {type: xml-element, offset: 2841, content: '', id: KR3e0008_CHANT_006-bkkxmlele192}
  - {type: xml-element, offset: 2841, content: '', id: KR3e0008_CHANT_006-bkkxmlele193}
  - {type: 'tls:seg', offset: 2841, content: '', id: KR3e0008_CHANT_006-55a.1}
  - {type: 'tls:seg', offset: 2841, content: '', id: KR3e0008_CHANT_006-55a.2}
  - {type: variant, offset: 2842, length: 0, content: '', krp: 熱下利必自止而反}
  - {type: punctuation, offset: 2843, content: ，, id: KR3e0008_CHANT_006-bkkpn721}
  - {type: 'tls:seg', offset: 2843, content: '', id: KR3e0008_CHANT_006-55a.3}
  - {type: variant, offset: 2843, length: 0, content: '', krp: 岀咽中痛者其喉爲痺發熱無汗而利必自止}
  - {type: variant, offset: 2844, length: 0, content: '', krp: 不止必便膿血便膿血者其喉不痺傷寒先厥而利隂寒氣勝也寒極變熱後發熱下利必自止而反汗岀咽中痛其喉爲痺者熱氣上行也發熱無汗而利必自止利不止必便膿血者熱氣下行也熱氣下而不上其喉亦不痺也傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥㣲者熱亦㣲厥應}
  - {type: punctuation, offset: 2846, content: ，, id: KR3e0008_CHANT_006-bkkpn722}
  - {type: 'tls:seg', offset: 2846, content: '', id: KR3e0008_CHANT_006-55a.4}
  - {type: variant, offset: 2847, length: 0, content: '', krp: 反發汗者必口傷爛赤前厥後發熱者寒極生熱也前熱後厥者陽氣内䧟也厥深熱深厥㣲熱㣲隨陽氣䧟之深淺也熱之伏深必須下去之反發汗者引熱上行必口傷爛赤内經曰火氣内發上爲口糜傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈隂勝則厥陽勝則熱先厥五日爲隂勝至六日陽復勝熱亦五日後復厥者隂復勝若不厥爲陽全勝故自愈經曰發熱四日厥反三日復熱四日厥少熱多其病爲愈凡厥者隂陽氣不相順接便爲厥厥者手足逆冷是也手之三隂三陽相接於手十指足之三隂三陽相接於足十指陽氣内䧟陽不與隂相順接故手足爲之厥冷也復寒脉㣲而厥至七八日膚冷其人躁無暫安時者此爲藏厥非爲蚘厥也蚘厥者其人當吐蚘令病者静而復時}
  - {type: variant, offset: 2848, length: 4, content: 熱胸中窒, krp: 此爲藏寒蚘上入膈故煩須臾復止得食而嘔又煩}
  - {type: punctuation, offset: 2853, content: ，, id: KR3e0008_CHANT_006-bkkpn723}
  - {type: 'tls:seg', offset: 2853, content: '', id: KR3e0008_CHANT_006-55a.5}
  - {type: variant, offset: 2853, length: 4, content: 梔子豉湯, krp: 蚘聞食臭岀其人當自吐蚘蚘厥者烏梅圓}
  - {type: punctuation, offset: 2859, content: 。, id: KR3e0008_CHANT_006-bkkpn724}
  - {type: xml-element, offset: 2859, content: '', id: KR3e0008_CHANT_006-bkkxmlele194}
