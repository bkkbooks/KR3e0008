  - {type: variant, offset: 2729, length: 1, content: 發, SBCK: 者死有隂無陽故也傷寒至七日爲邪正爭之時正勝則生邪勝則死始不下利而暴忽􅀤􅀬下利}
  - {type: variant, offset: 2729, length: 0, content: '', krp: 厥隂中風脉㣲浮爲欲愈不浮爲未愈經曰隂病見陽脉而生浮者陽也厥隂中風脉㣲浮爲邪氣還表向汗之時故云欲愈厥隂病欲解時從寅至卯上厥隂木也王於卯丑寅向王故爲解時厥隂病渇欲飲水者少少與之愈邪至厥隂爲傳經盡欲汗之時渇欲得水者少少與之胃氣得潤則愈諸四逆厥者不可下之虚家亦然四逆者四肢不温也厥者手足冷也皆陽氣少而隂氣多故不可下虚家亦然下之是爲重虚金匱玉凾曰虚者十𥙷勿一㵼之傷寒先厥後}
