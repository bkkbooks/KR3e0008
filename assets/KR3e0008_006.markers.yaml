  - {type: variant, offset: 2621, length: 4, content: 中風發熱, SBCK: 稍加至二十圓禁生冷滑物臭食等傷寒􅀬少厥㣲指頭寒黙黙不欲食煩躁數日小便利色白者此􅀬除也欲得食其病爲愈若厥而嘔胷脇煩滿者其後必便血指頭寒者是厥㣲􅀬少也黙黙不欲食煩躁者邪􅀬􅀄傳裏也數日之後小便色白裏􅀬去欲得食爲胃氣巳和其病爲愈厥隂之脉挾胃貫膈市脇肋厥而嘔胷脇煩滿者傳邪之􅀬甚於裏也厥隂肝主血後數日􅀬不去又不得外泄迫血下行必致便血病者手足厥冷言我不結􅅐小腹滿按之痛者此冷結在膀胱關元也手足厥不結胷者無􅀬也小腹滿按之痛下焦冷結也傷寒􅀤􅀬四日厥反三日復􅀬四日厥少􅀬多其病當愈四日至七日􅀬不除者其後必便膿血先􅀬後厥者陽氣邪傳裏也􅀤􅀬爲邪氣在表至四日後厥者傳之隂也後三日復傳陽經則復􅀬厥少則邪㣲􅀬多爲陽勝其病爲愈至七日傳經盡􅀬除則愈􅀬不除者爲􅀬氣有餘内􅅮厥隂之血其後必大便膿血傷寒厥四日􅀬反三日復厥五日其病爲進寒多􅀬少陽氣退故爲進也傷寒隂勝者先厥至四日邪傳裏重隂必陽􅁍􅀬三日七日傳經盡當愈若不愈而復厥者傳作再經至四日則當復􅀬若不復􅀬至五日厥不除者隂勝於陽其病進也傷寒六七日脉㣲手足厥冷煩燥灸厥隂厥不還者死傷寒六七日則正氣當復邪氣當罷脉浮身􅀬爲欲解若反脉㣲而厥則隂勝陽也煩燥者陽虚而爭也灸厥隂以復其陽厥不還則陽氣巳絶不能復正而死傷寒􅀤􅀬下利厥逆躁不得卧者死傷寒􅀤􅀬邪在表也下利厥逆陽氣虚也躁不得卧者病勝藏也故死傷寒􅀤􅀬下利至甚厥不止者死金匱要畧曰六府氣絶於外者手足寒五藏氣絶於内者利下不禁傷寒􅀤􅀬爲邪氣獨甚下利至甚厥不止爲府藏氣絶故死傷寒}
