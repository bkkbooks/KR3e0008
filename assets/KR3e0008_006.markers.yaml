  - {type: variant, offset: 2629, length: 1, content: 解, krp: 大便者急下之宜大承氣湯此少隂入府也六七日少隂之邪入府之時陽明内熱壅甚腹滿不大便也陽明病土勝腎水則乾急與大承氣湯下之以救腎水少隂病脉沉者急温之冝四逆湯旣吐且利小便復利}
  - {type: variant, offset: 2631, length: 28, content: 煩有表裏證渴欲飲水水入則吐者名曰水逆五苓散主之未持脈時病, SBCK: 利其}
