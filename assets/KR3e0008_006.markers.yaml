  - {type: variant, offset: 2581, length: 0, content: '', SBCK: 六两辛􅀬人參六兩甘温黄蘗六两苦寒肺主氣肺欲収急食酸以収之烏梅之酸以収肺氣脾欲緩急食甘以緩之人參之甘以緩脾氣寒滛於内以辛潤之以苦堅之當歸桂椒細辛之辛以潤内寒寒滛所勝平以辛􅀬薑附之辛􅀬以勝寒蚘得甘則動得苦則安黄連黄蘗之苦以安蚘右十味異搗篩合治之以苦酒漬烏梅一􅀫去核蒸之五升米下飯熟擣成埿和藥令相得内臼中與􅁡杵}
