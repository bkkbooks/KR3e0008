  - {type: variant, offset: 2742, length: 78, content: 必反覆顛倒心中懊憹梔子豉湯主之梔子豉湯方梔子十四枚擘味苦寒香豉四合綿裹味苦寒右二味以水四升先煮梔子得二升半內豉煮取一升半去滓分為二服溫進一服得吐者止後服若少, SBCK: 邪}
  - {type: variant, offset: 2743, length: 0, content: '', krp: 自止見厥復利隂氣勝則厥逆而利陽氣復則發熱利必自止見厥則隂氣還勝而復利也傷寒始發熱六日厥}
