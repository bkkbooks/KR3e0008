  - {type: variant, offset: 3860, length: 1, content: 滿, SBCK: 趣少腹者此欲自利也傷寒四五日邪氣傳裏之時腹中痛轉氣下趣少腹者裏虚遇寒寒氣下行欲作自利也傷寒本自寒下醫復􅄍下之寒格更逆􅄍下若食入口即􅄍乾薑黄連黄芩人參湯主之傷寒邪自傳表爲本自寒下醫反􅄍下損傷正氣寒氣内爲格拒經曰格則􅄍逆食入口即􅄍謂之寒格更復􅄍下則重虚而死是更逆􅄍下與乾薑黄連黄芩人參湯以通寒格乾薑黄連黄芩人參湯方乾薑辛􅀬黄連苦寒黄芩苦寒人參甘温各三两辛以散之甘以緩之乾薑人參之甘辛以􅀘正氣苦以泄之黄連黄芩之苦以通寒格右四味以水六升煑取二升去滓分温再服下利有㣲􅀬而渇脉弱者今自愈下利隂寒之疾反大􅀬者逆有㣲􅀬而渇裏氣方温也經曰諸弱􅀤􅀬脉弱者陽氣得復也今必自愈下利脉數有㣲􅀬汗岀今自愈設復􅂃爲未解下利隂病也脉數陽脉也隂病見陽脉者生㣲􅀬汗出陽氣得通也利必自愈諸􅂃爲寒設復脉􅂃隂氣猶勝故云未解下利}
  - {type: page-break, offset: 3860, content: '', id: KR3e0008_SBCK_006-33a}
  - {type: page-break, offset: 3860, content: '', id: KR3e0008_SBCK_006-33b}
  - {type: page-break, offset: 3860, content: '', id: KR3e0008_SBCK_006-34a}
  - {type: variant, offset: 3860, length: 0, content: '', krp: 重者白頭翁湯主之利則津液少熱則傷氣氣虚下利致後重也與白頭翁湯散熱厚腸白頭翁湯方白頭翁二兩苦寒黄栢苦寒黄連苦寒秦皮苦寒各三两内經曰腎欲堅急食苦以堅之利則下焦虚是以純苦之劑堅之右四味以水七升煑取二升去滓温服一升不愈更服一升下利腹脹}
  - {type: punctuation, offset: 3861, content: ，, id: KR3e0008_CHANT_006-bkkpn966}
  - {type: 'tls:seg', offset: 3861, content: '', id: KR3e0008_CHANT_006-70a.6}
  - {type: variant, offset: 3861, length: 3, content: 手足溫, krp: 身體疼痛者先温其裏乃攻其表温裏四逆湯攻表桂枝湯下利腹滿者裏有虚寒先與四逆湯温裏身疼痛爲表未解利止裏和與桂枝湯攻表下利欲飲水者以有熱故也白頭翁湯主之自利不渇爲藏寒與四逆以温藏下利飲水爲有熱與白頭翁湯以凉中下利讝語者有燥屎也宜小承氣湯經曰實則讝語有燥屎爲胃實下利爲腸虚與小承氣湯以下燥屎下利後更煩按之心下濡者爲虚煩也宜梔子豉湯下利後不煩爲欲解若更煩}
  - {type: variant, offset: 3863, length: 1, content: 溫, SBCK: 厥冷無脉者灸之不温若脉不還反㣲喘者死下利手足厥逆無脉者隂氣獨勝陽氣大虚也灸之陽氣復手足温}
  - {type: variant, offset: 3865, length: 1, content: 渴, SBCK: 脉還爲欲愈若手足不温脉不還者陽已絶也反㣲喘者陽氣脫也少隂􅀒趺陽者爲順也少隂腎水趺陽脾土下利爲腎邪干脾水不勝土則爲㣲邪故爲順也下利寸脉反浮數尺中自濇者必清膿血下利者脉當沉而遲反浮數者裏有􅀬也濇爲無血尺中自濇者腸胃血散也隨利下必便膿血清與圊通脉經曰清者厠也下利清榖不可攻表汗岀必脹滿下利者脾胃虚也胃爲津液之主􅀤汗亡津液則胃氣愈虚必脹滿下利脉沉弦者下重也脉大者爲未止脉㣲弱數者爲欲自止雖􅀤􅀬不死沉爲在裏弦爲拘急裏氣不足是主下重大則病進此利未止脉㣲弱數者邪氣㣲而陽氣復爲欲自止雖􅀤􅀬止由陽勝非大逆也下利脉沉而遲其人靣少赤身有㣲􅀬下利清榖者必鬰冒汗岀而解病人必㣲厥所以然者其靣戴陽下虚故也下利清榖脉沉而遲裏有寒也靣少赤身有㣲􅀬表未解也病人㣲厥針經曰下虚則厥表邪欲解臨汗之時以裏先虚必鬰冒然後汗岀而解也下利脉數而渇者今自愈設不差必清濃血以有􅀬故也經曰脉數不解而下不止必恊􅀬便膿血也下利後脉絶手足厥冷晬時脉還手足温者生脉不還者死下利後脉絶手足厥冷者無陽也晬時周時也周時厥愈脉岀爲陽氣復則生若手足不温脉不還者爲陽氣絶則死傷寒下利日十餘行脉反實者死下利者裏虚也脉當㣲弱反實者病勝藏也故死難經曰脉不應病病不應脉是爲死病下利清榖裏寒外􅀬汗岀而厥者通脉四逆湯主之下利清榖爲裏寒身􅀬不解爲外􅀬汗岀陽氣通行於外則未當厥其汗岀而厥者陽氣大虚也與通脉四逆湯以固陽氣􅀬利下重者白頭翁湯主之利則津液少􅀬則傷氣氣虚下利致後重也與白頭翁湯散􅀬厚腸白頭翁湯方白頭翁二兩苦寒黄栢苦寒黄連苦寒秦皮苦寒各三两内經曰腎欲堅急食苦以堅之利則下焦虚是以純苦之劑堅之右四味以水七升煑取二升去滓温服一升不愈更服一升下利腹脹滿身體疼痛者先温其裏乃攻其表温裏四逆湯攻表桂枝湯下利腹滿者裏有虚寒先與四逆湯温裏身疼痛爲表未解利止裏和與桂枝湯攻表下利欲飲水者以有􅀬故也白頭翁湯主之自利不渇爲藏寒與四逆以温藏下利飲水爲有􅀬與白頭翁湯以凉中下利讝語者有燥屎也宜小承氣湯經曰實則讝語有燥屎爲胃實下利爲腸虚與小承氣湯以下燥屎下利後更煩按之心下濡者爲虚煩也宜梔子豉湯下利後不煩爲欲解若更煩而心下堅者恐爲谷煩此煩而心下濡者是邪􅀬乘虚客於胷中爲虚煩也與梔子豉湯􅄍之則愈嘔家有癰膿者不可治嘔膿盡自愈胃脘有癰則嘔而􅄍膿不可治嘔得膿盡嘔亦自愈嘔而脉弱小便復利身有㣲􅀬見厥者難治四逆湯主之嘔而脉弱爲邪氣傳裏嘔則氣上逆而小便當不利小便復利者裏虚也身有㣲􅀬見厥者隂勝陽也爲難治與四逆湯温裏􅂇陽乾嘔􅄍涎沫頭痛者呉茱茰湯主之乾嘔􅄍涎沫者裏寒也頭痛者寒氣上攻也與呉茱茰湯温裏散寒嘔而􅀤􅀬}
