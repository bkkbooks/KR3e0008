  - {type: variant, offset: 2660, length: 30, content: 手叉自冒心師因教試令欬而不欬者此必兩耳聾無聞也所以然者以重發, SBCK: ''}
  - {type: punctuation, offset: 2665, content: ，, id: KR3e0008_CHANT_006-bkkpn680}
