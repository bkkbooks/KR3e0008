  - {type: variant, offset: 2551, length: 0, content: '', SBCK: 其喉不痺傷寒先厥而利隂寒氣勝也寒極變熱後􅀤熱下利必自止而反汗岀咽中痛其喉爲痺者熱氣上行也􅀤熱無汗而利必自止利不止必便膿血者熱氣下行也熱氣下而不上其喉亦不痺也傷寒一二日至四}
  - {type: page-break, offset: 2551, content: '', id: KR3e0008_SBCK_006-24b}
  - {type: variant, offset: 2551, length: 8, content: 五苓散主之不渴者, krp: 加}
  - {type: variant, offset: 2552, length: 2, content: 苓散, SBCK: 日而厥者必􅀤熱前熱者後必厥厥深者熱亦深厥㣲者熱亦㣲厥應下之而反發汗者必口傷爛赤前厥後􅀤熱者寒極生熱也前熱後厥者陽氣内䧟也厥深熱深厥㣲熱㣲隨陽氣䧟之深淺也熱之伏深必須下去之反􅀤汗者引熱上行必口傷爛赤内經曰火氣内􅀤上爲口糜傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈隂勝則厥陽勝則􅀬先厥五日爲隂勝至六日陽復勝􅀬亦五日後復厥者隂復勝若不厥爲陽全勝故自愈經曰􅀤􅀬四日厥反三日復􅀬四日厥少􅀬多其病爲愈凡厥者隂陽氣不相順接便爲厥厥者手足逆冷是也手之三隂三陽相接於手十指足之三隂三陽相接於足十指陽氣内䧟陽不與隂相順接故手足爲之厥冷也復寒脉㣲而厥至七八日膚冷其人躁無暫安時者此爲藏厥非爲蚘厥也蚘厥者其人當􅄍蚘令病者静而復時煩此爲藏寒蚘上入膈故煩須􅁷復止得食而嘔又煩者蚘聞食臭岀其人當自􅄍蚘蚘厥者烏梅圓}
