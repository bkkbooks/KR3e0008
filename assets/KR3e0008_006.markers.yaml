  - {type: variant, offset: 114, length: 0, content: '', SBCK: 加大黄湯主之大實大滿自可除下之故加大黄以下大實太隂爲病脉弱其人續自便利設當行大黄芍藥者宜减之以其人胃氣弱易動故也腹滿痛者太隂病也脉弱其人續自便利則邪雖在裏未成大實欲與大黄芍藥攻滿痛者宜少與之以胃氣尚弱易爲動利也辨少隂病脉證并治第十一少隂之爲病脉㣲細但欲寐也少隂爲病脉㣲細爲邪氣傳裏深也衞氣行於陽則寤行於隂則寐邪傳少隂則氣行於隂而不行於陽故但欲寐少隂病欲􅄍不􅄍心煩但欲寐五六日自利而渇者屬少隂也虚故引水自救若小便色白者少隂病形悉具小便白者以下焦虚有寒不能制水故令色白也欲􅄍不􅄍心煩者表邪傳裏也若腹滿痛則屬太隂此但欲􅄰則知屬少隂五六日邪傳少隂之時自利不渴者寒在中焦屬太隂此自利而渴爲寒在下焦屬少隂腎虚水燥渇欲引水自救下焦虚寒不能制水小便色白也經曰下利欲飲水者以有􅀬故也此下利雖渴然以小便色白明非裏􅀬不可不察病人脉隂陽俱􅂃反汗岀者亡陽也此屬少隂}
