  - {type: punctuation, offset: 2675, content: ，, id: KR3e0008_CHANT_006-bkkpn681}
  - {type: 'tls:seg', offset: 2675, content: '', id: KR3e0008_CHANT_006-52a.5}
  - {type: variant, offset: 2675, length: 0, content: '', krp: 飲食入口則吐心中温温欲吐陽受氣於胷中邪旣留於胷中則陽氣不得宣發於外是以始得之手足寒脉弦遲}
  - {type: variant, offset: 2676, length: 0, content: '', krp: 是胷中實不可下而當吐其膈上有寒飲亦使人心中温温而手足寒吐則物岀嘔則物不岀吐與嘔别焉胷中實則吐而物岀若膈上有寒飲則但乾嘔而不吐也此不可吐可與四逆湯以温其膈少隂病下利脉㣲澁嘔而汗岀}
  - {type: variant, offset: 2677, length: 5, content: 兩耳聾無聞, krp: 數更衣反少者當温其上灸之脉㣲爲亡陽澁爲亡血下利嘔而汗岀亡陽亡血}
  - {type: punctuation, offset: 2683, content: 。, id: KR3e0008_CHANT_006-bkkpn682}
