  - {type: variant, offset: 132, length: 2, content: 葛根, SBCK: 脉􅁀㣲手足反温脉􅂃反去者爲欲解也雖煩下利必自愈少隂病脉􅂃者寒甚也至七八日傳經盡欲解之時自下利脉􅁀㣲者寒氣得泄也􅀂隂寒勝正陽虚而泄者則手足厥而脉􅂃不去今手足反温脉􅂃反去知陽氣復寒氣去故爲欲解下利煩燥者逆此正勝邪㣲雖煩下利必自止少隂病下利􅀂利自止惡寒而踡卧手足温者可治少隂病下利惡寒踡卧寒極而隂勝也利自止手足温者裏和陽氣得復故爲可治少隂病惡寒而踡時自煩欲去衣􅀍者可治惡寒而踡隂寒甚也時時自煩欲去衣􅀍爲陽氣得復故云可治少隂中風脉陽㣲隂浮者爲欲愈少隂中風陽脉當浮而陽脉㣲者表邪緩也隂脉當沉而隂脉浮者裏氣和也陽中有隂隂中有陽隂陽調和故爲欲愈少隂病欲解時從子至寅上陽生於子子爲一陽丑爲二陽寅爲三陽少隂解於此者隂得陽則解也少隂病􅄍利手足不逆冷反􅀤􅀬者不死脉不至者灸少隂七壯經曰少隂病􅄍利躁煩四逆者死􅄍利手足不厥冷者則陽氣不衰雖反􅀤􅀬不死脉不至者􅄍利􅁀虚也灸少隂七壯以通其脉少隂病八九日一身手足盡􅀬者以􅀬在膀胱必便血也膀胱太陽也少隂太陽爲表裏少隂病至八九日寒邪變􅀬復傳太陽太陽爲諸陽主氣􅀬在太陽故一身手足盡􅀬太陽經多血少氣爲􅀬所乗則血散下行必便血也少隂病但厥無汗而強􅀤之必動其血未知従何道岀或從口鼻或從目岀是名下厥上竭爲難治但厥無汗􅀬行於裏也而強􅀤汗虚其經絡􅀬乗經虚迫血妄行從虚而岀或從口鼻或從目岀諸厥者皆屬於下但厥爲下厥血亡於上爲上竭傷氣損血邪甚正虚故爲難治少隂病惡寒身踡而利手足逆冷者不治針經曰多􅀬者易已多寒者難已此内外寒極純隂無陽故云不治少隂病􅄍利燥煩四逆者死􅄍利者寒甚於裏四逆者寒甚於表躁煩則陽氣欲絶是知死矣少隂病下利止而頭眩時時自冒者死下利止則水榖竭眩冒則陽氣脫故死少隂病四逆惡寒而身踡脉不至不煩而躁者死四逆惡寒而身踡則寒甚脉不至則真氣絶煩􅀬也躁亂也若憤躁之躁從煩至躁爲􅀬來有漸則猶可不煩而躁是氣欲脫而爭也譬猶燈將㓕而暴明其能乆乎少隂病六七日息高者死腎爲生氣之源呼吸之門少隂病六七日不愈而息高者生氣㫁絶也少隂病脉㣲細沉但欲卧汗岀不煩自欲􅄍至五六日自利復煩躁不得卧寐者死隂氣方盛至五六日傳經盡陽氣得復則愈反更自利煩燥不得卧寐則正氣弱陽不能復病勝藏故死少隂病始得之反􅀤􅀬脉沉者麻黄附子細辛}
