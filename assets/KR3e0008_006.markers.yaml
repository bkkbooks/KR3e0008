  - {type: variant, offset: 122, length: 0, content: '', SBCK: 俱􅂃爲少隂傷寒法當無汗反汗岀者陽虚不固也故云亡陽以無陽隂獨是屬少隂内經曰邪客少隂之絡令人嗌痛不可内食少隂寒甚是當咽痛而復􅄍利少隂病欬而下利讝語者􅀍火氣刼故也小便必難以強責少隂汗也欬而下利裏寒而亡津液也反以火刼強責少隂汗者津液内竭加火氣煩之故讝語小便難也少隂病脉細沉数病爲在裏不可􅀤汗少隂病始得之反􅀤􅀬脉沉者爲邪在經可}
  - {type: page-break, offset: 122, content: '', id: KR3e0008_SBCK_006-4b}
  - {type: variant, offset: 122, length: 0, content: '', krp: 俱緊爲少隂傷寒法當無汗反汗岀者陽虚不固也故云亡陽以無陽隂獨是屬少隂内經曰邪客少隂之絡令人嗌痛不可内食少隂寒甚是當咽痛而復吐利少隂病欬而下利讝語者𬒳火氣刼故也小便必難以強責少隂汗也欬而下利裏寒而亡津液也反以火刼強責少隂汗者津液内竭加火氣煩之故讝語小便難也少隂病脉細沉数病爲在裏不可發汗少隂病始得之反發熱脉沉者爲邪在經可}
  - {type: variant, offset: 123, length: 0, content: '', SBCK: 麻黄附子細辛湯􅀤汗此少隂病脉細沉數爲病在裏故不可􅀤汗少隂病脉㣲不可􅀤汗亡}
  - {type: variant, offset: 123, length: 0, content: '', krp: 麻黄附子細辛湯發汗此少隂病脉細沉數爲病在裏故不可發汗少隂病脉㣲不可發汗亡}
  - {type: variant, offset: 124, length: 2, content: 明合, SBCK: 故也陽已虚尺脉弱濇者復不可下之脉㣲爲亡陽表虚不可􅀤汗脉弱濇爲亡陽裏虚復不可下少隂}
