  - {type: variant, offset: 2683, length: 1, content: 所, krp: 津液不足裏有虚寒必數更衣反少者温其上}
  - {type: variant, offset: 2685, length: 1, content: 然, krp: 助其陽也灸之以消其隂辨厥隂病脉證并治第十二厥隂之爲病消渇氣上撞心心中疼熱飢而不欲食食則吐蚘下之利不止邪傳厥隂則熱已深也邪自太陽傳至太隂則腹滿而嗌乾未成渇也邪至少隂}
  - {type: punctuation, offset: 2687, content: ，, id: KR3e0008_CHANT_006-bkkpn683}
  - {type: 'tls:seg', offset: 2687, content: '', id: KR3e0008_CHANT_006-52a.7}
  - {type: variant, offset: 2687, length: 5, content: 以重發汗虛, krp: 口燥舌乾而渇未成消也至厥隂成消渇者熱甚能消水}
  - {type: punctuation, offset: 2691, content: ，, id: KR3e0008_CHANT_006-bkkpn684}
