  - {type: variant, offset: 2546, length: 0, content: '', SBCK: 先厥後􅀤熱而利者必自止見厥復利隂氣勝則厥逆而利陽氣復則􅀤熱利必自止見厥則隂氣還勝而復利也傷寒始􅀤熱六日厥反九日而利凡厥利者當不能食今反能食者恐爲除中食以索餅不􅀤􅀬者知胃氣尚在必愈恐暴􅀬來岀而復去也後三日脉之其􅀬續在者期之旦日夜半愈所以然者本􅀤􅀬六日厥反九日復􅀤􅀬三日并前六日亦爲九日與厥相應故期之旦日夜半愈後三日脉之而脉數其熱不罷者此爲熱氣有餘必􅀤癰膿也始􅀤熱邪在表也至六日邪傳厥隂隂氣勝者作厥而利厥反九日隂寒氣多當不能食而反能食者恐爲除中除去也中胃氣也言邪氣大甚除去胃氣胃欲引食自救故暴能食此欲勝也食以索餅試之若胃氣絶得麫則必􅀤􅀬􅀂不􅀤􅀬者胃氣尚在也恐是寒極變􅀬因暴􅀬來而復去使之能食非除中也金匱要畧曰病人素不能食而反暴思之必􅀤􅀬後三日脉之其􅀬續在者陽氣勝也期之旦日夜半愈若旦日不愈後三日脉數而􅀬不罷者爲􅀬氣有餘必􅀤癰膿經曰數脉不時則生惡瘡傷寒脉遲六七日而反與黄芩湯徹其􅀬脉遲爲寒今與黄芩湯復除其􅀬腹中應冷當不能食今反能食此名除中必死傷寒脉遲六七日爲寒氣已深反與黄芩湯寒藥兩寒相􅅮腹中當冷冷不消榖則不能食反能食者除中也四時皆以胃氣爲本胃氣已絶故云必死傷寒先厥後􅀤熱下利必自止而反}
