  - {type: variant, offset: 2524, length: 0, content: '', SBCK: 而小便少者謂之消渇木生於火肝氣通心厥隂客􅀬氣上撞心心中疼熱傷寒六七日厥隂受病之時爲傳經盡則當入府胃虚客熱飢不欲食蚘在胃中無食則動聞食嗅而岀得食􅄍蚘此熱在厥隂經也若便下之虚其胃氣厥隂木邪相乘必􅄍下不止厥隂中風脉㣲浮爲欲愈不浮爲未愈經曰隂病見陽脉而生浮者陽也厥隂中風脉㣲浮爲邪氣還表向汗之時故云欲愈厥隂病欲解時從寅至􅆗上厥隂木也王於􅆗丑寅向王故爲解時厥隂病渇欲}
