  - {type: variant, offset: 4747, length: 835, content: 汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及多大便已頭卓然而痛其人足心必熱穀氣下流故也太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衂陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則讝語甚者至噦手足躁擾捻衣摸床小便利者其人可治傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之桂枝去芍藥加蜀漆龍骨牡蠣救逆湯方桂枝三兩去皮甘草二兩炙生薑三兩切牡蠣五兩熬味酸醎龍骨四兩味甘平大棗十二枚擘蜀漆三兩洗去腳味辛平右為末以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升形作傷寒其脈不弦緊而弱弱者必渴被火者必讝語弱者發熱脈浮解之當汗出愈太陽病以火熏之不得汗其人必躁到經不解必清血名為火邪脈浮熱甚反灸之此為實實以虛治因火而動必咽燥唾血微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痺名火逆也欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂二兩火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之桂枝甘草龍骨牡蠣湯方桂枝一兩甘草二兩牡蠣二兩熬龍骨二兩右為末以水伍升煮取二升半去滓溫服八合日三服太陽傷寒者加溫針必驚也太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱鬱微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈, SBCK: 􅎪}
