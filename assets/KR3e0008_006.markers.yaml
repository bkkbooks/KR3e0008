  - {type: variant, offset: 2821, length: 38, content: 者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之發汗若下之而煩熱胸中窒者梔子豉湯主之, SBCK: 勝正陽氣脫也故死}
