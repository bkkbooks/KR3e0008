  - {type: variant, offset: 327, length: 344, content: 先煮葛根減二升內諸藥煮取二升去滓分溫再服太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之麻黃湯方麻黃三兩味甘溫去節桂枝二兩去皮味辛熱甘草一兩炙味甘平杏仁七十箇湯去皮尖味辛溫右四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥餘如桂枝法將息太陽與陽明合病喘而胸滿者不可下宜麻黃湯主之太陽病十日以去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也大青龍湯主之大青龍湯方麻黃六兩去節味甘溫桂枝二兩去皮味辛熱甘草二兩炙味甘平杏人四十箇去皮尖味苦甘溫生薑三兩切味辛溫大棗十二枚擘味甘溫石膏如鷄子大碎味甘微寒右七味以水九升先煮麻黃減二升去上沫內諸藥煮, SBCK: 煑}
