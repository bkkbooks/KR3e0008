  - {type: variant, offset: 2523, length: 0, content: '', SBCK: 欬者加五味子乾薑各伍分并主下痢肺寒氣逆則欬五味子之酸収逆氣乾薑之辛散肺寒并主下痢者肺與大腸爲表裏上欬下痢治則頗同悸者加桂枝伍分悸者氣虚而不能通行心下築築然悸動也桂猶圭也引導陽氣若􅀬以使小便不利者加茯苓伍分茯苓味甘而淡用以滲泄腹中痛者加附子一枚炮令拆裏虚遇邪則痛加附子以􅀘虚泄利下重者先以水五升煑薤白三升煑取三升去滓以散三方寸匕内湯中煑取一升半分温再服泄利下重者下焦氣滯也加薤白以泄氣滯少隂病下利六七日欬而嘔渇心煩不得眠者猪苓湯主之下利不渇者裏寒也經曰自利不渇者属太隂以其藏寒故也此下利嘔渇知非裏寒心煩不得眠知恊􅀬也與猪苓湯滲泄小便分別水榖經曰復不止當利其小便此之謂歟少隂病得之二三日口燥咽乾者急下之宜大承氣湯傷寒傳經五六日邪傳少隂則口燥舌乾而渇爲邪漸深也今少隂病得之二三日邪氣未深入之時便作口燥咽乾者是邪􅀬巳甚腎水乾也急與大承氣湯下之以全腎也少隂病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯少隂腎水也青肝色也自利色青爲肝邪乘腎難經曰從前來者爲實邪以腎藴實邪必心下痛口乾燥也與大承氣湯以下實邪少隂病六七日腹脹不大便者急下之宜大承氣湯此少隂入府也六七日少隂之邪入府之時陽明内􅀬壅甚腹滿不大便也陽明病土勝腎水則乾急與大承氣湯下之以救腎水少隂病脉沉者急温之冝四逆湯旣􅄍且利小便復利而大汗岀下利清榖内寒外熱脉㣲欲絶者不云急温此少隂病脉沉而云急温者彼雖寒甚然而證已形見於外治之則有成法此􅀄頭脉沉未有形證不知邪氣所之將􅀤何病是急與四逆湯温之少隂病飲食入口則􅄍心中温温欲􅄍復不能􅄍始得之手足寒脉弦遲者此胷中實不可下也當􅄍之若膈上有寒飲乾嘔者不可􅄍也急温之宜四逆湯傷寒表邪傳裏至於少隂少隂之脉從肺岀絡心注胷中邪旣留於胷中而不散者飲食入口則􅄍心中温温欲􅄍陽受氣於胷中邪旣留於胷中則陽氣不得宣􅀤於外是以始得之手足寒脉弦遲此是胷中實不可下而當􅄍其膈上有寒飲亦使人心中温温而手足寒􅄍則物岀嘔則物不岀􅄍與嘔别焉胷中實則􅄍而物岀若膈上有寒飲則但乾嘔而不􅄍也此不可􅄍可與四逆湯以温其膈少隂病下利脉㣲澁嘔而汗岀必數更衣反少者當温其上灸之脉㣲爲亡陽澁爲亡血下利嘔而汗岀亡陽亡血也津液不足裏有虚寒必數更衣反少者温其上以􅂇其陽也灸之以消其隂辨厥隂病脉證并治第十二厥隂之爲病消渇氣上撞心心中疼熱飢而不欲食食則􅄍蚘下之利不止邪傳厥隂則熱已深也邪自太陽傳至太隂則腹滿而嗌乾未成渇也邪至少隂者口燥舌乾而渇未成消也至厥隂成消渇者熱甚能消水故也飲水}
