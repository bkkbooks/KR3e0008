  - {type: variant, offset: 2757, length: 13, content: 梔子豉湯方梔子十四枚擘味苦, krp: 其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日并前六日亦爲九日與厥相應故期之旦日夜半愈後三日脉之而脉數其熱不罷者此爲熱氣有餘必發癰膿也始發熱邪在表也至六日邪傳厥隂隂氣勝者作厥而利厥反九日隂}
